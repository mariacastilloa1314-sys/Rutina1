<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>El arte de dormir terriblemente mal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Cinzel:wght@400;600&family=Cinzel+Decorative&family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=Special+Elite&display=swap" rel="stylesheet"/>
<style>
:root {
  --ph:  clamp(460px, calc(100vh - 96px), 820px);
  --pw:  calc(var(--ph) / 1.54);
  --sw:  clamp(14px,1.8vw,22px);
  --gold:       #b8956a;
  --gold-mid:   #8a6e48;
  --gold-dim:   #5a4530;
  --gold-faint: #2e2010;
  --ink:        #d0c4a8;
  --ink2:       #4a3828;
  --ink3:       #52402e;
  --crimson:    #8a1e1e;
  --crimson2:   #c44040;
  --red-ink:    rgba(155,18,18,0.85);
  --paper:      #f4f0e2;
  --paper2:     #eee8d0;
  --sepia:      #1e3260;
  --sepia2:     #2a4480;
  --sepia3:     #4a6aaa;
  --line-col:   rgba(50,80,180,0.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,
body{height:100%;overflow:hidden}
body{
  background: #12181f;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  user-select:none;min-height:100vh;
  font-family:'Crimson Pro',serif;
}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.03;}
#cd,#cr{position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
#cd{width:4px;height:4px;background:var(--gold);border-radius:50%}
#cr{width:22px;height:22px;border:1px solid rgba(184,149,106,.35);border-radius:50%;transition:width .25s,height .25s,border-color .25s}
.scene{
  position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(.6rem,1.4vh,1.2rem);width:100%;height:100%;
  z-index:1;
  padding:2vh 4vw;
  box-sizing:border-box;
}

/* ═══════════════════════════════════════
   DIARY COVER — thick book texture
═══════════════════════════════════════ */
.book{
  position: relative;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.book-closed{
  position:relative;width:var(--pw);height:var(--ph);cursor:pointer;
  filter:drop-shadow(-6px 16px 48px rgba(0,0,0,.8)) drop-shadow(2px 4px 12px rgba(0,0,0,.5));
  overflow:visible;
}
/* thick page stack — multiple layers */
.book-closed::before{
  content:"";position:absolute;
  top:2px;bottom:2px;right:-11px;width:11px;
  background:repeating-linear-gradient(
    to right,
    #ddd0b0 0px, #e8dcc0 3px,
    #ccc0a0 3px, #ddd0b0 5px,
    #e0d4b8 5px, #ddd0b0 7px,
    #cac0a0 7px, #ddd0b0 9px,
    #e8dcc0 9px, #ccc0a0 11px
  );
  border-radius:0 6px 6px 0;
  box-shadow:inset -1px 0 3px rgba(0,0,0,.2), 1px 0 4px rgba(0,0,0,.3);
}
.book-closed::after{
  content:"";position:absolute;
  top:5px;bottom:5px;right:-15px;width:4px;
  background:linear-gradient(to right,#b8aa88,#c8bc9a);
  border-radius:0 2px 2px 0;opacity:.8;
}

/* Cover body */
.cover-body{
  position:absolute;inset:0;
  border-radius:2px 3px 3px 2px;
  overflow:hidden;
  /* Old leather texture — pebbled grain like a real journal cover */
  background:
    /* worn highlight spots (like your photo — lighter patches where leather wore) */
    radial-gradient(ellipse at 62% 38%, rgba(140,70,30,.22) 0%, transparent 28%),
    radial-gradient(ellipse at 30% 62%, rgba(120,55,20,.18) 0%, transparent 22%),
    radial-gradient(ellipse at 80% 15%, rgba(110,50,18,.14) 0%, transparent 18%),
    radial-gradient(ellipse at 15% 80%, rgba(130,60,22,.16) 0%, transparent 20%),
    /* pebbled grain simulation via fine repeating lines at multiple angles */
    repeating-linear-gradient(17deg,
      transparent 0px, transparent 2px,
      rgba(0,0,0,.028) 2px, rgba(0,0,0,.028) 3px),
    repeating-linear-gradient(73deg,
      transparent 0px, transparent 2px,
      rgba(0,0,0,.022) 2px, rgba(0,0,0,.022) 3px),
    repeating-linear-gradient(134deg,
      transparent 0px, transparent 3px,
      rgba(0,0,0,.016) 3px, rgba(0,0,0,.016) 4px),
    /* base leather tones — rich dark brown, warmer than before */
    radial-gradient(ellipse at 20% 15%, rgba(110,42,10,.55) 0%, transparent 40%),
    radial-gradient(ellipse at 78% 82%, rgba(80,28,6,.48) 0%, transparent 42%),
    radial-gradient(ellipse at 50% 50%, rgba(60,18,4,.20) 0%, transparent 68%),
    linear-gradient(158deg,
      #3d1408 0%, #2e0e06 12%, #260a04 25%,
      #321006 38%, #280c04 52%,
      #3a1208 65%, #2c0e06 78%,
      #3e1409 90%, #2a0c05 100%
    );
  box-shadow:
    inset 4px 0 12px rgba(0,0,0,.65),
    inset -1px 0 5px rgba(0,0,0,.35),
    inset 0 4px 12px rgba(0,0,0,.45),
    inset 0 -4px 10px rgba(0,0,0,.40);
}
/* Leather noise texture layer */
.cover-body::before{
  content:"";position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='leath'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.72' numOctaves='5' seed='12' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0.3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23leath)'/%3E%3C/svg%3E");
  opacity:.14;mix-blend-mode:overlay;border-radius:2px;
}
/* Worn edges — edges lighter (leather cracked + faded) */
.cover-body::after{
  content:"";position:absolute;inset:0;
  background:
    /* top edge worn */
    linear-gradient(to bottom, rgba(160,80,30,.18) 0%, transparent 8%),
    /* bottom edge worn */
    linear-gradient(to top, rgba(160,80,30,.16) 0%, transparent 8%),
    /* corner highlights */
    radial-gradient(ellipse at 1% 1%, rgba(180,90,35,.22) 0%, transparent 22%),
    radial-gradient(ellipse at 99% 1%, rgba(170,80,30,.18) 0%, transparent 18%),
    radial-gradient(ellipse at 1% 99%, rgba(175,85,32,.20) 0%, transparent 20%),
    radial-gradient(ellipse at 99% 99%, rgba(165,78,28,.15) 0%, transparent 16%);
  border-radius:2px;
}

.cover-spine{
  position:absolute;top:0;left:0;bottom:0;width:var(--sw);z-index:5;
  background:linear-gradient(to right,#0e0402 0%,#1e0806 30%,#180604 65%,#0e0402 100%);
  border-right:1px solid rgba(80,30,10,.4);
}
/* Stitching along right edge of spine */
.cover-stitch{
  position:absolute;top:0;right:0;bottom:0;width:clamp(10px,1.8vw,16px);z-index:6;
  background:
    repeating-linear-gradient(to bottom,
      transparent 0px, transparent 6px,
      rgba(180,120,60,.22) 6px, rgba(180,120,60,.22) 7px,
      transparent 7px, transparent 10px,
      rgba(180,120,60,.18) 10px, rgba(180,120,60,.18) 11px,
      transparent 11px, transparent 14px
    );
}

/* Elastic band */
.cover-elastic{
  position:absolute;top:50%;right:-15px;
  transform:translateY(-50%);
  width:calc(100% + 15px);
  height:clamp(9px,1.5vw,13px);
  background:linear-gradient(to bottom,
    rgba(14,4,4,.92) 0%,rgba(28,8,8,.96) 45%,
    rgba(22,6,6,.92) 55%,rgba(12,3,3,.88) 100%);
  z-index:6;border-radius:1px;
  box-shadow:0 2px 4px rgba(0,0,0,.55),0 -1px 2px rgba(0,0,0,.35);
}
.cover-elastic::before,.cover-elastic::after{
  content:"";position:absolute;left:0;right:0;height:1px;
}
.cover-elastic::before{top:1px;background:rgba(255,255,255,.035);}
.cover-elastic::after{bottom:1px;background:rgba(0,0,0,.25);}

/* Ribbon bookmark */
.cover-ribbon{
  position:absolute;bottom:-14px;right:clamp(22px,4vw,34px);
  width:clamp(8px,1.2vw,11px);height:clamp(32px,5.5vw,48px);
  background:linear-gradient(to bottom,#9a2020,#6e1414);
  z-index:3;border-radius:0 0 3px 3px;
  box-shadow:1px 2px 5px rgba(0,0,0,.45);
}
.cover-ribbon::after{
  content:"";position:absolute;bottom:0;left:0;right:0;transform:translateY(100%);
  border-left:calc(clamp(8px,1.2vw,11px)/2) solid #9a2020;
  border-right:calc(clamp(8px,1.2vw,11px)/2) solid #9a2020;
  border-top:clamp(5px,.8vw,7px) solid transparent;
}

/* Title label — hand-glued paper */
.cover-label{
  position:absolute;
  left:calc(var(--sw) + clamp(12px,2.5vw,20px));
  right:clamp(10px,2vw,18px);
  top:50%;transform:translateY(-53%) rotate(-1.5deg);
  background:
    linear-gradient(175deg,rgba(244,238,218,.11) 0%,rgba(235,226,200,.07) 100%);
  border:1px solid rgba(184,149,106,.12);
  padding:clamp(10px,2vw,18px) clamp(8px,1.8vw,16px);
  z-index:7;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:.3rem;
  box-shadow:0 2px 10px rgba(0,0,0,.4);
}
.label-eyebrow{font-family:'Caveat',cursive;font-size:clamp(.6rem,1.1vw,.82rem);letter-spacing:.12em;color:rgba(190,158,100,.5);}
.label-rule{width:clamp(18px,2.5vw,28px);height:1px;background:rgba(184,149,106,.25);margin:.1rem auto;}
.label-title{font-family:'Caveat',cursive;font-weight:700;font-size:clamp(1rem,2.2vw,1.82rem);line-height:1.15;color:rgba(215,188,138,.82);text-shadow:0 1px 4px rgba(0,0,0,.5);}
.label-sub{font-family:'Caveat',cursive;font-size:clamp(.52rem,.95vw,.72rem);letter-spacing:.18em;color:rgba(170,135,85,.42);}
.cover-author{position:absolute;bottom:clamp(.9rem,2.2vw,1.7rem);left:0;right:0;text-align:center;z-index:7;}
.cover-author-name{font-family:'Caveat',cursive;font-weight:600;font-size:clamp(.82rem,1.5vw,1.2rem);color:rgba(175,140,90,.55);letter-spacing:.04em;}
.open-hint{position:absolute;bottom:0;right:0;width:52px;height:52px;cursor:pointer;z-index:10;}
.open-hint::before{content:"";position:absolute;bottom:0;right:0;width:0;height:0;border-style:solid;border-width:0 0 42px 42px;border-color:transparent transparent rgba(184,149,106,.13) transparent;transition:all .35s;}
.open-hint:hover::before{border-width:0 0 56px 56px;border-color:transparent transparent rgba(184,149,106,.26) transparent;}

/* ═══════════════════════════════════════
   OPEN BOOK
═══════════════════════════════════════ */
.book-open{
  display:none;position:relative;flex-direction:row;
  width:calc(var(--pw)*2 + var(--sw));height:var(--ph);
  border-radius:8px;
  outline: 2px solid #3a1a08;
  outline-offset: 4px;
}

.pg{width:var(--pw);height:var(--ph);position:relative;overflow:hidden;flex-shrink:0;}
.pg-l{
  background:#0d0a06;
  box-shadow: inset -20px 0 40px rgba(0,0,0,.8);
  border-radius:7px 0 0 7px;
}
/* Page curve shadow — simulates book center curvature */
.pg-l::after{
  content:"";position:absolute;top:0;right:0;width:32px;height:100%;
  background:linear-gradient(to right,transparent,rgba(0,0,0,.22));
  pointer-events:none;z-index:2;
}
.pg-r::before{
  /* nullified — see override block */
  content:"";pointer-events:none;z-index:2;
}
.pg-r{
  background:#0d0a06;
  box-shadow: inset 20px 0 40px rgba(0,0,0,.8);
  border-radius:0 7px 7px 0;
}
.pg-r::after{
  content:"";position:absolute;top:2px;bottom:2px;right:-11px;width:11px;
  background:repeating-linear-gradient(to right,#ddd0b0 0px,#e8dcc0 3px,#ccc0a0 3px,#ddd0b0 5px,#e0d4b8 5px,#ccc0a0 7px,#ddd0b0 7px,#e8dcc0 9px,#cac0a0 9px,#ddd0b0 11px);
  border-radius:0 3px 3px 0;
}
.pg::before{content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse at 95% 5%,rgba(40,28,14,.28) 0%,transparent 45%),
    radial-gradient(ellipse at 5% 95%,rgba(30,18,8,.22) 0%,transparent 45%);
  pointer-events:none;z-index:0;}
.book-spine{
  width:var(--sw);height:var(--ph);flex-shrink:0;
  background:linear-gradient(to right,
    #080202 0%,
    #2a0a05 20%,
    #4a1508 45%,
    #3a1008 50%,
    #4a1508 55%,
    #2a0a05 80%,
    #080202 100%
  );
  box-shadow:inset 2px 0 6px rgba(0,0,0,.55),inset -2px 0 6px rgba(0,0,0,.55);z-index:5;
}

/* ═══════════════════════════════════════
   JOURNAL / DIARY PAGES
═══════════════════════════════════════ */
.p-journal{
  width:100%;height:100%;position:relative;overflow-y:auto;overflow-x:hidden;
  background:
    radial-gradient(ellipse at 10% 8%,rgba(230,210,160,.32) 0%,transparent 38%),
    radial-gradient(ellipse at 90% 92%,rgba(215,195,145,.2) 0%,transparent 32%),
    linear-gradient(178deg,#f6f1e5 0%,#f1e9d1 30%,#ede5ca 60%,#e9e0c2 100%);
}
/* Override dark pg background for journal spreads */
/* ── JOURNAL SPREAD: full paper, zero dark ── */
.journal-spread .pg-l,
.journal-spread .pg-r,
.journal-spread .pg {
  background: #ede5ca !important;
  box-shadow: none !important;
}
.journal-spread .pg-l::before,
.journal-spread .pg-l::after,
.journal-spread .pg-r::before,
.journal-spread .pg-r::after,
.journal-spread .pg::before,
.journal-spread .pg::after {
  display: none !important;
  background: none !important;
  content: none !important;
}
.journal-spread .book-spine {
  background: linear-gradient(to right,#d2c99a 0%,#ddd3a8 40%,#d2c99a 100%) !important;
  box-shadow: none !important;
}
/* Make p-journal fill completely — no clip artifacts */
.journal-spread .p-journal {
  clip-path: none !important;
  border-radius: 1px;
}
.pg-paper-fill{
  position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(ellipse at 8% 6%,   rgba(255,252,240,.70) 0%, transparent 38%),
    radial-gradient(ellipse at 92% 94%, rgba(235,218,185,.45) 0%, transparent 35%),
    #f5eedf;
  pointer-events:none;
}
.paper-grain{
  position:absolute;inset:0;pointer-events:none;z-index:1;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='t'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.68' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23t)'/%3E%3C/svg%3E");
  opacity:.07;mix-blend-mode:multiply;
}
.paper-stain{position:absolute;pointer-events:none;z-index:1;opacity:.5;}
.s3{width:clamp(28px,5vw,50px);height:clamp(22px,4vw,38px);top:32%;right:6%;
  background:radial-gradient(ellipse,rgba(120,80,30,.09) 0%,transparent 60%);
  transform:rotate(5deg);border-radius:50%;}

/* Organic page edge with clip-path */
.pg-l .p-journal{
  clip-path:polygon(
    0% 1%, 96% 0%, 97.5% 8%, 98.5% 22%, 99% 38%,
    99.2% 55%, 98.8% 72%, 97.5% 88%, 96% 100%, 0% 99%
  );
}
.pg-r .p-journal{
  clip-path:polygon(
    4% 0%, 100% 1%, 100% 99%, 4% 100%,
    2.5% 88%, 1.2% 72%, 0.8% 55%, 1% 38%,
    1.5% 22%, 2.5% 8%
  );
}

/* Ruled lines */
.journal-lines{
  position:absolute;inset:0;pointer-events:none;z-index:2;
  background-image:repeating-linear-gradient(to bottom,transparent 0px,transparent 25px,var(--line-col) 26px,var(--line-col) 26px);
  background-size:100% 26px;
}
.journal-lines::before{
  content:"";position:absolute;left:clamp(28px,6vw,44px);top:0;bottom:0;width:1px;
  background:rgba(155,45,45,.18);
}

/* DOODLE page */
.p-doodle{position:relative;}
.doodle-svg{
  position:absolute;inset:0;width:100%;height:100%;overflow:visible;
}
/* Pencil/sketch texture filter */
.sketch-filter{
  filter: url(#pencilTexture);
}

/* ── ANIMATIONS ── */
/* Each element floats independently */
/* Float animations — each class floats in place, no drifting */
.fi1{animation:f1 5.2s ease-in-out infinite;}
.fi2{animation:f2 6.8s ease-in-out 0.6s infinite;}
.fi3{animation:f3 5.8s ease-in-out 1.2s infinite;}
.fi4{animation:f4 7.4s ease-in-out 0.3s infinite;}
.fi5{animation:f5 6.2s ease-in-out 1.8s infinite;}
.fi6{animation:f6 8s ease-in-out 0.9s infinite;}
.title-pulse{animation:titPulse 5s ease-in-out infinite;}

/* clapper arm opens and closes around its hinge (top-left corner) */
.clap-arm{
  transform-origin: 4px 10px;
  transform-box: fill-box;
  animation: clapOpen 3.5s ease-in-out 1s infinite;
}

@keyframes f1{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-7px) rotate(.6deg)}}
@keyframes f2{0%,100%{transform:translateY(0) rotate(0deg)}45%{transform:translateY(-9px) rotate(-.7deg)}}
@keyframes f3{0%,100%{transform:translateY(0)}40%{transform:translateY(-6px) rotate(.5deg)}}
@keyframes f4{0%,100%{transform:translateY(0) rotate(0deg)}55%{transform:translateY(-8px) rotate(.8deg)}}
@keyframes f5{0%,100%{transform:translateY(0)}35%{transform:translateY(-5px) rotate(-.4deg)}}
@keyframes f6{0%,100%{transform:translateY(0) rotate(0deg)}60%{transform:translateY(-10px) rotate(.6deg)}}
@keyframes titPulse{0%,100%{opacity:.9}50%{opacity:1}}

/* clapper: closed -> open -> pause -> close */
/* zombie shamble */
@keyframes zombieWalk{
  0%,100%{transform:translateX(0) rotate(0deg)}
  25%{transform:translateX(6px) rotate(.8deg)}
  50%{transform:translateX(0px) rotate(0deg)}
  75%{transform:translateX(-4px) rotate(-.5deg)}
}
.zombie-walk{animation:zombieWalk 2.8s ease-in-out infinite;}

@keyframes clapOpen{
  0%{transform:rotate(0deg)}
  20%{transform:rotate(-38deg)}
  55%{transform:rotate(-38deg)}
  75%{transform:rotate(0deg)}
  100%{transform:rotate(0deg)}
}

/* Lined page content */
.lined-content{
  position:relative;z-index:3;width:100%;height:100%;
  padding:clamp(1.2rem,3vw,2rem) clamp(1rem,2.5vw,1.8rem);
  padding-left:clamp(36px,7.5vw,52px);
  display:flex;flex-direction:column;gap:.45rem;overflow:hidden;
}
.j-title{
  font-family:'Caveat',cursive;font-weight:700;
  font-size:clamp(1.8rem,4vw,2.8rem);
  color:var(--sepia);
  transform:rotate(-1.6deg);display:inline-block;
  margin-bottom:.3rem;line-height:1.1;
}
.j-title-red{
  font-family:'IM Fell English',serif;font-style:italic;
  color:rgba(148,12,12,0.88);
  font-size:clamp(1.2rem,2.5vw,1.8rem);
  transform:rotate(-1.2deg);
  /* ink bleed/stain: layered text-shadow simulates wet ink spreading */
  text-shadow:
    0 0 8px rgba(148,12,12,0.35),
    1px 1px 3px rgba(148,12,12,0.25),
    -1px 0px 6px rgba(148,12,12,0.20),
    0 2px 8px rgba(148,12,12,0.18),
    2px -1px 4px rgba(148,12,12,0.15);
  filter: blur(0.3px);
}
.j-body{
  font-family:'Caveat',cursive;
  font-size:clamp(1.05rem,2vw,1.3rem);
  line-height:1.85;color:var(--sepia);
}
.j-body em{font-style:italic;color:var(--sepia2);}
.j-closing{color:var(--sepia2);font-style:italic;}
/* Index on journal paper */
.j-idx-title{
  font-family:'IM Fell English',serif;font-style:italic;
  font-size:clamp(2rem,4.5vw,3.1rem);
  color:rgba(148,12,12,0.88);transform:rotate(-1deg);display:inline-block;
  margin-bottom:.6rem;line-height:1.1;
  text-shadow:0 0 8px rgba(148,12,12,0.30),1px 1px 3px rgba(148,12,12,0.20),-1px 0px 6px rgba(148,12,12,0.18);
  filter:blur(0.3px);
}
.j-idx{display:flex;flex-direction:column;gap:.1rem;}
.j-idx-item{display:flex;align-items:baseline;gap:.5rem;padding:.18rem 0;border-bottom:none;}
.j-idx-n{font-family:'Caveat',cursive;font-size:clamp(.78rem,1.4vw,.95rem);color:rgba(148,12,12,0.75);min-width:2.8rem;font-weight:700;}

.j-sig-name{font-family:'Caveat',cursive;font-size:clamp(.9rem,1.7vw,1.15rem);color:var(--sepia2);transform:rotate(-.7deg);display:inline-block;}

/* ═══════════════════════════════════════
   DARK STORY PAGES
═══════════════════════════════════════ */
.p{position:relative;z-index:1;width:100%;height:100%;
  padding:clamp(1.3rem,3.2vw,2.4rem) clamp(1rem,2.5vw,2rem);
  display:flex;flex-direction:column;overflow:hidden;}
.p::before{content:"";position:absolute;inset:clamp(7px,1.2vw,12px);border:1px solid rgba(184,149,106,.045);pointer-events:none;z-index:0;}
.ch-label{font-family:'Cinzel',serif;font-size:clamp(.38rem,.6vw,.52rem);letter-spacing:.4em;text-transform:uppercase;color:var(--crimson2);margin-bottom:clamp(.5rem,1.2vw,.9rem);opacity:.8;}
.pt{font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(1.05rem,2.1vw,1.7rem);line-height:1.15;color:var(--gold);margin-bottom:.55rem;}
.pt-sm{font-size:clamp(.88rem,1.65vw,1.3rem);}
.pb{font-family:'Crimson Pro',serif;font-size:clamp(.83rem,1.35vw,1.05rem);line-height:1.82;color:var(--ink2);font-weight:300;position:relative;z-index:1;}
.pb em{color:var(--ink);font-style:italic}
.hr{width:32px;height:1px;background:linear-gradient(to right,transparent,var(--crimson),transparent);margin:.7rem 0;opacity:.45;}
.qblock{border-left:2px solid rgba(201,64,64,.25);padding:.45rem .8rem .45rem .9rem;margin:.45rem 0;}
.qtext{font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(.82rem,1.35vw,1.05rem);line-height:1.58;color:var(--ink);}
.qcite{font-family:'Cinzel',serif;font-size:clamp(.33rem,.52vw,.46rem);letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);margin-top:.4rem;}
.idx-list{display:flex;flex-direction:column;}
.idx-item{display:flex;align-items:baseline;gap:.7rem;padding:clamp(.42rem,.85vw,.65rem) 0;border-bottom:1px solid rgba(184,149,106,.07);cursor:pointer;transition:border-color .3s;}
.idx-item:hover{border-color:rgba(201,64,64,.18)}.idx-item:hover .idx-t{color:var(--crimson2)}
.idx-n{font-family:'Cinzel',serif;font-size:clamp(.48rem,.76vw,.62rem);color:var(--ink3);min-width:1.7rem;letter-spacing:.04em;}
.idx-t{font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(.8rem,1.35vw,1.02rem);color:var(--ink);flex:1;line-height:1.25;transition:color .3s;}
.idx-more{padding:.45rem 0;border-bottom:none;justify-content:flex-end;}
.idx-more-txt{font-family:'Cinzel',serif;font-size:clamp(.36rem,.56vw,.5rem);letter-spacing:.28em;color:var(--ink3);text-transform:uppercase;}
.pnum{position:absolute;bottom:clamp(.55rem,1.2vw,1rem);left:0;right:0;font-family:'Cinzel',serif;font-size:clamp(.36rem,.56vw,.5rem);letter-spacing:.28em;text-transform:uppercase;color:var(--ink3);text-align:center;opacity:.6;}
.sub-wrap{display:flex;flex-direction:column;gap:.75rem;}
.sub-label{font-family:'Cinzel',serif;font-size:clamp(.36rem,.56vw,.5rem);letter-spacing:.3em;text-transform:uppercase;color:var(--ink3);}
.sub-input{background:transparent;border:none;border-bottom:1px solid rgba(184,149,106,.18);color:var(--ink);font-family:'Crimson Pro',serif;font-size:clamp(.83rem,1.35vw,1.05rem);padding:.35rem 0;outline:none;font-style:italic;transition:border-color .3s;}
.sub-input::placeholder{color:var(--ink3)}.sub-input:focus{border-color:rgba(201,64,64,.45);}
.sub-btn{align-self:flex-start;background:transparent;border:1px solid var(--gold-dim);color:var(--gold-mid);font-family:'Cinzel',serif;font-size:clamp(.36rem,.56vw,.5rem);letter-spacing:.3em;text-transform:uppercase;padding:.45rem 1rem;cursor:pointer;transition:all .3s;}
.sub-btn:hover{background:var(--gold-faint);border-color:var(--gold);}

/* ═══════════════════════════════════════
   FLIP LEAF
═══════════════════════════════════════ */
.leaf{
  position:absolute;top:0;left:var(--pw);width:var(--pw);height:var(--ph);
  transform-origin:left center;transform-style:preserve-3d;
  z-index:20;display:none;pointer-events:none;
}
.leaf-face,.leaf-back{position:absolute;inset:0;backface-visibility:hidden;overflow:hidden;}
.leaf-back{transform:rotateY(180deg)}
.leaf-face::after,.leaf-back::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(to right,rgba(0,0,0,.45) 0%,transparent 22%,transparent 78%,rgba(0,0,0,.18) 100%);
  pointer-events:none;z-index:10;
}

/* ═══════════════════════════════════════
   NAV
═══════════════════════════════════════ */
.nav-row{
  display:flex;align-items:center;gap:clamp(.6rem,2vw,1.6rem);
  z-index:100;opacity:0;transition:opacity .5s;
  background:transparent;
  padding:clamp(2px,.6vh,6px) clamp(10px,2.5vw,20px);
  margin-top:clamp(4px,.8vh,10px);
}
.nav-row.show{opacity:1;pointer-events:auto;}
.nav-btn{
  background:none;border:none;
  color:rgba(148,12,12,.55);cursor:pointer;
  padding:.3rem;transition:color .25s,opacity .25s,transform .18s;
  display:flex;align-items:center;justify-content:center;
  opacity:.7;
}
.nav-btn:hover:not(:disabled){color:rgba(148,12,12,.95);opacity:1;transform:scale(1.15);}
.nav-btn:disabled{opacity:.15;cursor:default;}
.nav-label{
  font-family:'Cinzel',serif;font-size:clamp(.3rem,.48vw,.42rem);
  letter-spacing:.28em;text-transform:uppercase;
  color:rgba(148,12,12,.35);text-align:center;min-width:70px;
}
.nav-home{
  background:none;border:none;
  color:rgba(148,12,12,.45);cursor:pointer;
  padding:.3rem;transition:color .25s,opacity .25s,transform .18s;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
}
.nav-home.show{opacity:.7;pointer-events:auto;}
.nav-home:hover{color:rgba(148,12,12,.95);opacity:1;transform:scale(1.15);}
.zone{position:absolute;top:0;bottom:0;width:15%;z-index:15;cursor:pointer;display:none;}
.zone-l{left:0}.zone-r{right:0}
.book-open .zone{display:block}

/* ═══════════════════════════════════════
   MOBILE
═══════════════════════════════════════ */
@media(max-width:700px){
  :root{--pw:clamp(240px,88vw,390px);--ph:calc(var(--pw)*1.54);--sw:12px;}
  .book-open.spread{width:var(--pw);}
  .pg-l,.book-spine{display:none;}
  .pg-r::after{display:none;}.pg-r{box-shadow:none;}
  .leaf{left:0;width:var(--pw);}
  .pg-r .p-journal{clip-path:none;}
  .pg-l .p-journal{clip-path:none;}
  .pb{font-size:clamp(.95rem,3.8vw,1.12rem);line-height:1.88;}
  .pt{font-size:clamp(1.15rem,4.8vw,1.6rem);}
  .j-body{font-size:clamp(1rem,4vw,1.2rem);}
  .j-title{font-size:clamp(2rem,7vw,3rem);}
  .idx-t{font-size:clamp(.94rem,3.8vw,1.1rem);}
  .idx-item{padding:.7rem 0;}
  .ch-label{font-size:clamp(.46rem,1.9vw,.62rem);}
}

/* ══════════════════════════════════════════════════
   STORY PAGES — CINEMATIC ATMOSPHERIC READER
══════════════════════════════════════════════════ */
.p-story {
  position: relative;
  width: 100%; height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  scrollbar-width: thin;
  scrollbar-color: rgba(148,12,12,.20) transparent;
}
.p-story::-webkit-scrollbar { width: 3px; }
/* curl moved to pg-l::before / pg-r::before */}
.p-story::-webkit-scrollbar-thumb { background: rgba(148,12,12,.22); border-radius: 2px; }

/* Layer 0: base paper — always underneath */
.story-base-paper {
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse at 8% 6%,   rgba(255,252,240,.70) 0%, transparent 38%),
    radial-gradient(ellipse at 92% 94%, rgba(235,218,185,.45) 0%, transparent 35%),
    radial-gradient(ellipse at 50% 50%, rgba(250,244,228,.25) 0%, transparent 65%),
    #f5eedf;
}

/* Layer 1: Atmospheric wash — crossfades, cinematic */
.story-atmos-layer {
  position: absolute; inset: 0; z-index: 1;
  pointer-events: none;
  opacity: 0;
  transition: opacity 2s cubic-bezier(.4,0,.2,1);
}
.story-atmos-layer.atmos-visible {
  opacity: 0;
}

/* Layer 2: Vignette — deepens with darkness */
.story-vignette {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background: none;
  opacity: 0;
}
.p-story.atmos-deep .story-vignette { opacity: 1; }

/* Layer 3: Ruled lines — always visible */
.story-lines {
  position: absolute; inset: 0; pointer-events: none; z-index: 3;
  background-image:
    linear-gradient(to right, transparent 36px, rgba(155,45,45,.12) 36px, rgba(155,45,45,.12) 37px, transparent 37px),
    repeating-linear-gradient(to bottom,
      transparent 0px, transparent 25px,
      rgba(50,80,180,.08) 25px, rgba(50,80,180,.08) 26px);
  background-attachment: local;
}

/* Layer 4: Paper grain */
.p-story::after {
  content: "";
  position: absolute; inset: 0; pointer-events: none; z-index: 4;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='t'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.68' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23t)'/%3E%3C/svg%3E");
  opacity: .055; mix-blend-mode: multiply;
  pointer-events: none;
}

/* Layer 5: Content */
.story-scroll {
  position: relative; z-index: 5;
  padding: clamp(.6rem,2vw,1.2rem) clamp(.8rem,2.5vw,1.6rem) clamp(2rem,5vw,3.5rem);
  min-height: 100%;
}

/* ── CINEMATIC INK TRANSITIONS ── */
/* Default: blue ink */
.story-scroll .pb,
.story-scroll .pd {
  font-family: 'Crimson Pro', serif;
  font-size: clamp(.78rem,1.5vw,1.05rem);
  line-height: 1.84;
  color: rgba(195,168,118,.88);
  margin-bottom: .58em;
  text-align: justify;
  transition: color 2.2s cubic-bezier(.4,0,.2,1),
              text-shadow 2.2s ease;
}
.story-scroll .pd {
  padding-left: clamp(.5rem,1.4vw,.9rem);
  border-left: 2px solid rgba(148,12,12,.20);
  font-style: italic;
  color: rgba(185,155,100,.85);
}
/* Warm dim: dusk atmosphere */
.p-story.atmos-warm .story-scroll .pb,
.p-story.atmos-warm .story-scroll .pd {
  color: rgba(38,20,8,.88);
}
/* Dark: deep night — ink becomes amber */
.p-story.atmos-dark .story-scroll .pb,
.p-story.atmos-dark .story-scroll .pd {
  color: rgba(218,185,105,.95);
  text-shadow: 0 1px 8px rgba(0,0,0,.4);
}
/* Horror: crimson tinge */
.p-story.atmos-horror .story-scroll .pb,
.p-story.atmos-horror .story-scroll .pd {
  color: rgba(225,195,120,.95);
  text-shadow: 0 1px 10px rgba(0,0,0,.5);
}

/* Chapter label */
.story-scroll .ch-label {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(.42rem,.72vw,.62rem);
  letter-spacing: .3em;
  color: rgba(148,12,12,.60);
  text-transform: uppercase;
  margin-bottom: .5em;
  opacity: .88;
  transition: color 2s ease;
}
/* Story title */
.story-scroll .pt {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: clamp(1.05rem,2.0vw,1.6rem);
  color: rgba(148,12,12,.88);
  text-shadow: 0 0 8px rgba(148,12,12,.22), 1px 1px 4px rgba(148,12,12,.15);
  line-height: 1.2;
  margin-bottom: .3em;
  filter: blur(.15px);
  transition: text-shadow 2s ease, color 2s ease;
}
/* Story title on dark/warm backgrounds */
.p-story.atmos-dark .story-scroll .pt,
.p-story.atmos-horror .story-scroll .pt {
  color: rgba(200,148,60,.95);
}
.p-story.atmos-warm .story-scroll .pt {
  color: rgba(90,40,12,.92);
}
.p-story.atmos-dark .story-scroll .pt {
  color: rgba(200,100,60,.90);
  text-shadow: 0 0 14px rgba(180,60,10,.28), 1px 1px 5px rgba(160,40,5,.20);
}
.story-scroll .hr {
  width: clamp(28px,7vw,55px);
  height: 1px;
  background: linear-gradient(to right, rgba(148,12,12,.50), transparent);
  margin-bottom: .85em;
}

/* ── SCENE BREAK — horizontal dingbat ── */
.scene-break {
  text-align: center;
  font-family: 'Caveat', cursive;
  color: rgba(148,12,12,.30);
  font-size: .9rem;
  margin: .3em 0;
  letter-spacing: .5em;
}

/* ── ATMOSPHERE TRANSITION INDICATOR ── */
/* Subtle glow behind paragraph when atmosphere shifts */
@keyframes atmosPulse {
  0% { box-shadow: 0 0 0 rgba(148,12,12,0); }
  40% { box-shadow: 0 0 20px rgba(148,12,12,.06); }
  100% { box-shadow: 0 0 0 rgba(148,12,12,0); }
}
.atmos-trigger { animation: atmosPulse 2.5s ease; }

.p-story {
  position: relative;
  width: 100%; height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}
/* Paper + lines overlay — always on top of atmosphere */
.story-lines {
  position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background-image:
    /* left red margin line */
    linear-gradient(to right, transparent 36px, rgba(155,45,45,.14) 36px, rgba(155,45,45,.14) 37px, transparent 37px),
    /* horizontal ruled lines */
    repeating-linear-gradient(to bottom,
      transparent 0px, transparent 25px,
      rgba(50,80,180,.09) 25px, rgba(50,80,180,.09) 26px);
  background-attachment: local;
}
/* The atmospheric layer — absolute, fills page, transitions on bg change */
.story-atmos-layer {
  position: absolute; inset: 0; z-index: 0;
  pointer-events: none;
  /* Default: warm paper */
  background:
    radial-gradient(ellipse at 12% 10%, rgba(230,210,155,.35) 0%, transparent 42%),
    radial-gradient(ellipse at 88% 90%, rgba(210,190,135,.22) 0%, transparent 38%),
    #ede5ca;
  transition: background 2.0s cubic-bezier(.4,0,.2,1);
  mix-blend-mode: normal;
}
/* Paper grain on top of atmosphere */
.p-story::after {
  content: "";
  position: absolute; inset: 0; pointer-events: none; z-index: 2;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='t'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.68' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23t)'/%3E%3C/svg%3E");
  opacity: .06; mix-blend-mode: multiply;
}
/* Story content scrolls over atmosphere */
.story-scroll {
  position: relative; z-index: 3;
  padding: clamp(.6rem,2vw,1.2rem) clamp(.8rem,2.5vw,1.6rem) clamp(1rem,3vw,2rem);
}
/* Chapter label */
.story-scroll .ch-label {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(.45rem,.75vw,.68rem);
  letter-spacing: .28em;
  color: rgba(148,12,12,.65);
  text-transform: uppercase;
  margin-bottom: .5em;
  opacity: .85;
}
/* Story title */
.story-scroll .pt {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: clamp(1.1rem,2.2vw,1.7rem);
  color: rgba(148,12,12,.88);
  text-shadow: 0 0 8px rgba(148,12,12,.25), 1px 1px 3px rgba(148,12,12,.18);
  line-height: 1.2;
  margin-bottom: .3em;
  filter: blur(0.2px);
}
.story-scroll .hr {
  width: clamp(30px, 8vw, 60px);
  height: 1px;
  background: linear-gradient(to right, rgba(148,12,12,.55), transparent);
  margin-bottom: .8em;
}
/* Paragraphs — blue ink on paper */
.story-scroll .pb, .story-scroll .pd {
  font-family: 'Crimson Pro', serif;
  font-size: clamp(.78rem,1.5vw,1.05rem);
  line-height: 1.82;
  color: rgba(195,168,118,.88);
  margin-bottom: .55em;
  text-align: justify;
  transition: color 1.2s ease;
}
.story-scroll .pd {
  padding-left: clamp(.6rem, 1.5vw, 1rem);
  border-left: 2px solid rgba(148,12,12,.20);
  color: rgba(22,38,90,.85);
  font-style: italic;
}
/* Dark atmosphere: ink shifts slightly warmer */
.p-story.atmos-dark .pb,
.p-story.atmos-dark .pd {
  color: rgba(200,170,100,.88);
}
.p-story.atmos-horror .pb,
.p-story.atmos-horror .pd {
  color: rgba(210,160,100,.82);
}
/* Scroll indicator at bottom */
.story-scroll-hint {
  text-align: center;
  font-family: 'Caveat', cursive;
  font-size: clamp(.55rem,.9vw,.75rem);
  color: rgba(148,12,12,.35);
  padding-top: .5rem;
  letter-spacing: .1em;
  animation: hintFade 2s ease-in-out infinite alternate;
}
@keyframes hintFade { 0%{opacity:.3} 100%{opacity:.7} }

/* ── Real doodle illustration ── */
.p-doodle-real {
  display: flex;
  align-items: stretch;
  justify-content: stretch;
}
.doodle-real-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
  border-radius: 1px;
}

/* ══════════════════════════════════════
   MUSIC PLAYER — floating cinematic bar
══════════════════════════════════════ */
.music-player {
  position: absolute;
  bottom: clamp(6px, 1.2vw, 12px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex;
  align-items: center;
  gap: clamp(5px, 1vw, 9px);
  padding: clamp(4px,.8vw,7px) clamp(8px,1.5vw,14px);
  border-radius: 50px;
  /* frosted glass on paper */
  background: rgba(237, 229, 202, 0.82);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(148,12,12,.18);
  box-shadow: 0 2px 18px rgba(0,0,0,.10), 0 1px 4px rgba(148,12,12,.08);
  /* hidden by default, fades in */
  opacity: 0;
  pointer-events: none;
  transition: opacity .8s ease, transform .8s ease;
  transform: translateX(-50%) translateY(14px);
  white-space: nowrap;
  max-width: 90%;
}
.music-player.mp-visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateX(-50%) translateY(0);
}
.mp-icon {
  font-size: clamp(.7rem,1.2vw,1rem);
  color: rgba(148,12,12,.75);
  flex-shrink: 0;
  line-height: 1;
}
.mp-title {
  font-family: 'Caveat', cursive;
  font-size: clamp(.6rem,1.1vw,.85rem);
  color: rgba(40,20,8,.72);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
}
.mp-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: rgba(148,12,12,.80);
  font-size: clamp(.65rem,1.1vw,.88rem);
  padding: 2px 4px;
  border-radius: 4px;
  transition: color .2s, background .2s;
  line-height: 1;
  flex-shrink: 0;
}
.mp-btn:hover { color: rgba(148,12,12,1); background: rgba(148,12,12,.08); }

/* Waveform animation when playing */
.mp-wave {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: clamp(10px,1.6vw,14px);
  flex-shrink: 0;
}
.mp-wave span {
  display: block;
  width: clamp(2px,.4vw,3px);
  background: rgba(148,12,12,.60);
  border-radius: 2px;
  transform-origin: bottom;
  animation: waveAnim 1.1s ease-in-out infinite alternate;
}
.mp-wave span:nth-child(1){ height: 35%; animation-delay: 0s; }
.mp-wave span:nth-child(2){ height: 80%; animation-delay: .18s; }
.mp-wave span:nth-child(3){ height: 55%; animation-delay: .35s; }
.mp-wave span:nth-child(4){ height: 90%; animation-delay: .12s; }
.mp-wave span:nth-child(5){ height: 45%; animation-delay: .28s; }
@keyframes waveAnim {
  from { transform: scaleY(1); }
  to   { transform: scaleY(.25); }
}
.mp-wave.mp-paused span { animation-play-state: paused; }

/* Volume slider */
.mp-vol {
  -webkit-appearance: none;
  appearance: none;
  width: clamp(28px,4vw,44px);
  height: 3px;
  border-radius: 2px;
  background: rgba(148,12,12,.25);
  outline: none;
  cursor: pointer;
  flex-shrink: 0;
}
.mp-vol::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: rgba(148,12,12,.75);
  cursor: pointer;
}

/* Dark atmosphere adaptation */
.p-story.atmos-dark .music-player,
.p-story.atmos-horror .music-player {
  background: rgba(25,15,8,.78);
  border-color: rgba(148,12,12,.30);
}
.p-story.atmos-dark .mp-title,
.p-story.atmos-horror .mp-title {
  color: rgba(200,160,90,.85);
}
.p-story.atmos-dark .mp-icon,
.p-story.atmos-dark .mp-btn,
.p-story.atmos-horror .mp-icon,
.p-story.atmos-horror .mp-btn {
  color: rgba(200,100,60,.80);
}
.p-story.atmos-dark .mp-wave span,
.p-story.atmos-horror .mp-wave span {
  background: rgba(200,100,60,.65);
}
.p-story.atmos-dark .mp-vol,
.p-story.atmos-horror .mp-vol {
  background: rgba(200,100,60,.22);
}

/* Hidden YouTube iframe container */
#yt-container {
  position: fixed;
  bottom: 0; right: 0;
  width: 1px; height: 1px;
  opacity: 0.01;
  pointer-events: none;
  overflow: hidden;
  z-index: 1;
}

/* ════════════════════════════════════════
   MUSIC PLAYER  — subtle literary style
════════════════════════════════════════ */
#music-widget {
  position: fixed;
  bottom: clamp(52px, 8vw, 62px);
  right: clamp(10px, 2.5vw, 18px);
  z-index: 9999;
  display: none;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  pointer-events: auto;
}
#music-widget.mw-show { display: flex; }

/* Track label */
#music-track-label {
  font-family: 'Caveat', cursive;
  font-size: clamp(.55rem, 1vw, .75rem);
  color: rgba(148,12,12,.65);
  background: rgba(240,232,208,.90);
  padding: 2px 7px;
  border-radius: 10px;
  letter-spacing: .04em;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity .4s, transform .4s;
  pointer-events: none;
  white-space: nowrap;
  max-width: 180px;
  overflow: hidden;
  text-overflow: ellipsis;
}
#music-widget.mw-playing #music-track-label {
  opacity: 1;
  transform: translateY(0);
}

/* Play/pause button */
#music-btn {
  width: clamp(32px, 5vw, 42px);
  height: clamp(32px, 5vw, 42px);
  border-radius: 50%;
  background: rgba(240,232,208,.92);
  border: 1.5px solid rgba(148,12,12,.25);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(.9rem, 1.6vw, 1.2rem);
  color: rgba(148,12,12,.75);
  transition: background .3s, border-color .3s, transform .2s, box-shadow .3s;
  pointer-events: auto;
  box-shadow: 0 2px 12px rgba(0,0,0,.12);
  position: relative;
  overflow: hidden;
}
#music-btn:hover {
  background: rgba(240,232,208,1);
  border-color: rgba(148,12,12,.50);
  transform: scale(1.08);
  box-shadow: 0 4px 18px rgba(148,12,12,.15);
}
#music-btn:active { transform: scale(.95); }

/* Vinyl spin ring when playing */
#music-btn::before {
  content: '';
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  border: 1.5px solid rgba(148,12,12,.18);
  border-top-color: rgba(148,12,12,.55);
  opacity: 0;
  transition: opacity .5s;
}
#music-widget.mw-playing #music-btn::before {
  opacity: 1;
  animation: vinylSpin 2.2s linear infinite;
}
@keyframes vinylSpin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* Equalizer bars — pulse when playing */
.eq-bars {
  display: flex;
  align-items: flex-end;
  gap: 1.5px;
  height: 12px;
}
.eq-bar {
  width: 2.5px;
  background: rgba(148,12,12,.70);
  border-radius: 2px;
  animation: none;
  height: 3px;
}
#music-widget.mw-playing .eq-bar:nth-child(1) { animation: eq1 .6s ease-in-out infinite alternate; }
#music-widget.mw-playing .eq-bar:nth-child(2) { animation: eq2 .8s ease-in-out infinite alternate; }
#music-widget.mw-playing .eq-bar:nth-child(3) { animation: eq1 .5s ease-in-out infinite alternate; }
#music-widget.mw-playing .eq-bar:nth-child(4) { animation: eq2 .7s ease-in-out infinite alternate; }
@keyframes eq1 { from{height:3px} to{height:11px} }
@keyframes eq2 { from{height:5px} to{height:9px} }

/* Autoplay notice */
#music-autoplay-notice {
  position: fixed;
  bottom: clamp(100px,18vw,120px);
  right: clamp(10px,2.5vw,18px);
  background: rgba(240,232,208,.97);
  border: 1.5px solid rgba(148,12,12,.35);
  border-radius: 10px;
  padding: 10px 16px;
  font-family: 'Caveat', cursive;
  font-size: clamp(.9rem,1.8vw,1.1rem);
  color: rgba(148,12,12,.90);
  z-index: 9998;
  display: none;
  max-width: 220px;
  box-shadow: 0 4px 18px rgba(0,0,0,.18);
  cursor: pointer;
  transition: opacity .4s;
}
#music-autoplay-notice.show { display: block; }
#music-autoplay-notice:hover { background: rgba(245,238,215,1); }

.music-active{
  color:#ff6b6b;
  letter-spacing:1px;
  transition:color 0.4s, letter-spacing 0.4s;
}


/* ══════════════════════════════════════════════════════
   VISUAL OVERRIDE FINAL v5 — Estructura El Libro Total
   SIN cambiar diseño visual original
══════════════════════════════════════════════════════ */

/* ═══════════════════════════════
   LAYOUT BASE
═══════════════════════════════ */
html, body {
  margin: 0 !important;
  padding: 0 !important;
  height: 100% !important;
  overflow: hidden !important;
  background: #12181f !important;
}

/* ═══════════════════════════════
   BARRA SUPERIOR DE LECTURA
═══════════════════════════════ */
.reader-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 50px;
  background: #0d1520;
  border-bottom: 1px solid rgba(100,130,170,.22);
  display: flex;
  align-items: center;
  gap: 0;
  z-index: 1000;
  box-sizing: border-box;
  padding: 0 12px;
}
.rh-left, .rh-right {
  display: flex;
  align-items: center;
  gap: 2px;
  flex-shrink: 0;
}
.rh-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-width: 0;
  padding: 0 8px;
  overflow: hidden;
}
.rh-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(.6rem, 1.2vw, .82rem);
  color: rgba(215,225,240,.90);
  letter-spacing: .07em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  line-height: 1.2;
}
.rh-author {
  font-family: 'Caveat', cursive;
  font-size: clamp(.58rem, 1vw, .75rem);
  color: rgba(160,178,200,.65);
  letter-spacing: .04em;
  line-height: 1;
}
.rh-btn {
  background: none;
  border: none;
  color: rgba(170,195,220,.65);
  cursor: pointer;
  padding: 7px 9px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color .18s, background .18s;
  line-height: 1;
}
.rh-btn:hover {
  color: rgba(220,235,250,.95);
  background: rgba(255,255,255,.07);
}
.rh-btn svg text { font-size: 10px; }
/* AA button: letras A pequeña y grande */
.rh-aa {
  font-family: 'Cinzel', serif;
  font-size: .7rem;
  letter-spacing: 0;
  gap: 0;
  padding: 7px 6px;
}
.rh-aa::before { content: "A"; font-size: .85rem; color: inherit; }
.rh-aa::after  { content: "A"; font-size: .6rem;  color: inherit; vertical-align: baseline; }
.rh-aa svg { display: none; }
/* Bookmark activo */
.rh-btn.bookmarked svg { fill: rgba(180,140,60,.9); stroke: rgba(180,140,60,.9); }

/* ═══════════════════════════════
   SCENE: ocupa todo bajo el header
═══════════════════════════════ */
.scene {
  position: fixed !important;
  top: 50px !important;
  left: 0 !important;
  right: 0 !important;
  bottom: 50px !important;
  padding: 0 !important;
  margin: 0 !important;
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
  justify-content: center !important;
  background: radial-gradient(ellipse at 50% 40%, #1a2535 0%, #12181f 70%) !important;
  overflow: visible !important;
  gap: 0 !important;
}

/* Book ocupa todo el espacio disponible */
.book {
  flex: 1 !important;
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
  justify-content: center !important;
  width: 100% !important;
  min-height: 0 !important;
  filter: none !important;
  overflow: visible !important;
}
/* book-open needs to stay clipped */
.book-open {
  overflow: hidden !important;
}

/* ═══════════════════════════════
   LIBRO: tamaño y marco
═══════════════════════════════ */
.book-open {
  border-radius: 4px !important;
  box-shadow:
    0 0 0 1px rgba(140,165,200,.30),
    0 0 0 4px rgba(75,105,140,.50),
    0 0 0 5px rgba(140,165,200,.15),
    0 18px 60px rgba(0,0,0,.80),
    0  4px 16px rgba(0,0,0,.45) !important;
}

/* ═══════════════════════════════
   PÁGINAS — mantiene diseño original
═══════════════════════════════ */
.pg-l {
  background: #f7f2e8 !important;
  border-radius: 4px 0 0 4px !important;
  overflow: hidden !important;
}
.pg-r {
  background: #f7f2e8 !important;
  border-radius: 0 4px 4px 4px !important;
  overflow: hidden !important;
}
/* p-story must be above zones so scroll works */
.p-story {
  z-index: 20 !important;
  position: relative !important;
}
.story-base-paper,
.pg-paper-fill {
  background: #f7f2e8 !important;
}

/* ═══════════════════════════════
   ATMÓSFERA: desactivada
   (fondos de relatos = hoja limpia)
═══════════════════════════════ */
.story-atmos-layer { display: none !important; }
.story-vignette    { display: none !important; }

/* ═══════════════════════════════
   TIPOGRAFÍA — mantiene estilo original
═══════════════════════════════ */
.story-scroll .pb,
.story-scroll .pd {
  font-family: 'Caveat', cursive !important;
  font-size: clamp(1.08rem, 1.72vw, 1.30rem) !important;
  line-height: 1.74 !important;
  color: #1e3260 !important;
  letter-spacing: .01em !important;
  font-weight: 400 !important;
}
.story-scroll .qblock {
  font-family: 'Caveat', cursive !important;
  color: #1e3260 !important;
  border-left: 2px solid rgba(148,12,12,.25) !important;
  padding-left: .7rem !important;
}
.story-scroll em,
.story-scroll .pb em {
  font-style: italic !important;
  color: #5a1010 !important;
}
.story-scroll .pt {
  color: #7a1414 !important;
}
/* Tamaños alternativos para el botón AA */
body.txt-md .story-scroll .pb,
body.txt-md .story-scroll .pd { font-size: clamp(1.22rem, 1.95vw, 1.46rem) !important; }
body.txt-lg .story-scroll .pb,
body.txt-lg .story-scroll .pd { font-size: clamp(1.38rem, 2.2vw, 1.62rem) !important; }

/* ═══════════════════════════════
   LOMO
═══════════════════════════════ */
.book-spine {
  background: linear-gradient(to right,
    #1a0e08 0%, #2e1a10 30%, #3e2418 50%, #2e1a10 70%, #1a0e08 100%) !important;
}

/* ═══════════════════════════════
   BARRA DE PROGRESO INFERIOR
═══════════════════════════════ */
.nav-row {
  position: fixed !important;
  bottom: 0 !important;
  left: 0 !important;
  right: 0 !important;
  height: 50px !important;
  width: 100% !important;
  display: flex !important;
  align-items: center !important;
  gap: 10px !important;
  padding: 4px 12px 6px !important;
  background: rgba(10,14,22,.92) !important;
  backdrop-filter: blur(10px) !important;
  box-sizing: border-box !important;
  opacity: 1 !important;
  pointer-events: auto !important;
  z-index: 200 !important;
  border-top: 1px solid rgba(184,149,106,.18) !important;
}
.nav-progress-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  min-width: 0;
}
.nav-progress {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,.15);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
  transition: height .15s;
}
.nav-progress:hover { height: 5px; }
.nav-progress::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: rgba(200,215,235,.90);
  cursor: pointer;
  box-shadow: 0 0 4px rgba(0,0,0,.5);
  transition: transform .15s;
}
.nav-progress::-webkit-slider-thumb:hover { transform: scale(1.3); }
.nav-progress::-moz-range-thumb {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: rgba(200,215,235,.90);
  border: none;
  cursor: pointer;
}
.nav-label {
  font-family: 'Caveat', cursive !important;
  font-size: .92rem !important;
  color: rgba(215,228,245,.90) !important;
  letter-spacing: .04em !important;
  white-space: nowrap !important;
  text-transform: none !important;
  font-weight: 600 !important;
}
.nav-btn {
  background: rgba(184,149,106,.12) !important;
  border: 1px solid rgba(184,149,106,.25) !important;
  color: rgba(184,149,106,.90) !important;
  cursor: pointer !important;
  padding: 6px 14px !important;
  border-radius: 20px !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  transition: color .18s, background .18s !important;
  flex-shrink: 0 !important;
}
.nav-btn:hover:not(:disabled) {
  color: rgba(220,235,250,.95) !important;
  background: rgba(255,255,255,.07) !important;
}
.nav-btn:disabled { opacity: .3 !important; cursor: default !important; }
.nav-home {
  background: none;
  border: none;
  color: rgba(170,195,220,.55);
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  transition: color .18s;
}
.nav-home:hover { color: rgba(220,235,250,.95); }

/* ═══════════════════════════════
   DOBLEZ INFERIOR — triángulo crema
   en esquinas inferiores de las páginas
═══════════════════════════════ */
.pg-l::before,
.pg-r::before {
  content: "" !important;
  position: absolute !important;
  bottom: 0 !important;
  top: auto !important;
  left: auto !important;
  right: auto !important;
  width: 32px !important;
  height: 32px !important;
  pointer-events: none !important;
  z-index: 30 !important;
  display: block !important;
  filter: drop-shadow(0 -1px 2px rgba(0,0,0,.12)) !important;
}
/* Relatos: tip crema claro (#f7f2e8) */
.pg-l::before {
  left: 0 !important;
  background: linear-gradient(
    to top right,
    #b8a878 0%, #d4c49a 40%, #f7f2e8 52%, transparent 52%
  ) !important;
}
.pg-r::before {
  right: 0 !important;
  background: linear-gradient(
    to top left,
    #b8a878 0%, #d4c49a 40%, #f7f2e8 52%, transparent 52%
  ) !important;
}
/* Páginas del diario (primeras 6): tip más cálido (#e9e0c2) */
.book-open.journal-spread .pg-l::before {
  background: linear-gradient(
    to top right,
    #b0a070 0%, #cebe8a 40%, #e9e0c2 52%, transparent 52%
  ) !important;
}
.book-open.journal-spread .pg-r::before {
  background: linear-gradient(
    to top left,
    #b0a070 0%, #cebe8a 40%, #e9e0c2 52%, transparent 52%
  ) !important;
}

/* ═══════════════════════════════
   BÚSQUEDA — panel flotante
═══════════════════════════════ */
.search-panel {
  position: fixed;
  top: 58px; right: 16px;
  width: min(340px, calc(100vw - 32px));
  background: #0d1520;
  border: 1px solid rgba(100,130,170,.30);
  border-radius: 8px;
  padding: 12px;
  z-index: 900;
  box-shadow: 0 8px 32px rgba(0,0,0,.6);
  display: none;
  flex-direction: column;
  gap: 8px;
}
.search-panel.open { display: flex; }
.search-input {
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(140,165,200,.25);
  border-radius: 5px;
  color: rgba(215,225,240,.90);
  font-family: 'Caveat', cursive;
  font-size: 1rem;
  padding: 7px 10px;
  outline: none;
  width: 100%;
  box-sizing: border-box;
}
.search-input::placeholder { color: rgba(150,170,195,.45); }
.search-results {
  max-height: 220px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.search-result-item {
  background: rgba(255,255,255,.04);
  border-radius: 4px;
  padding: 6px 9px;
  cursor: pointer;
  font-family: 'Caveat', cursive;
  font-size: .88rem;
  color: rgba(190,208,228,.80);
  border: 1px solid transparent;
  transition: background .15s, border-color .15s;
}
.search-result-item:hover {
  background: rgba(255,255,255,.08);
  border-color: rgba(140,165,200,.20);
}
.search-result-item strong {
  color: rgba(220,185,100,.9);
}
.search-no-results {
  font-family: 'Caveat', cursive;
  font-size: .9rem;
  color: rgba(160,175,195,.5);
  text-align: center;
  padding: 8px;
}

/* ═══════════════════════════════
   MÓVIL — Una página, pantalla completa
═══════════════════════════════ */
@media (max-width: 700px) {
  .reader-header {
    height: 46px;
    padding: 0 8px;
  }
  .rh-title  { font-size: .65rem; letter-spacing: .04em; }
  .rh-author { display: none; }
  .rh-btn    { padding: 6px 7px; }

  /* ── SCENE: full screen minus header ── */
  .scene {
    position: fixed !important;
    top: 46px !important;
    left: 0 !important; right: 0 !important;
    bottom: 0 !important;
    background: #f7f2e8 !important;
    display: flex !important;
    flex-direction: column !important;
    justify-content: flex-start !important;
    padding: 0 !important;
    gap: 0 !important;
    overflow: hidden !important;
  }

  /* ── BOOK wraps both cover and open states ── */
  .book {
    flex: 1 1 0 !important;
    min-height: 0 !important;
    width: 100% !important;
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    justify-content: flex-start !important;
    overflow: hidden !important;
  }

  /* Cover centered vertically */
  body.showing-cover .book {
    justify-content: center !important;
  }

  /* ── COVER ── */
  .book-closed {
    width: clamp(200px, 62vw, 320px) !important;
    height: calc(clamp(200px, 62vw, 320px) * 1.54) !important;
    max-height: calc(100vh - 100px) !important;
    flex-shrink: 0 !important;
  }

  /* ── BOOK OPEN: fills all remaining space ── */
  .book-open {
    flex: 1 1 0 !important;
    width: 100% !important;
    min-height: 0 !important;
    overflow: hidden !important;
    box-shadow: none !important;
    border-radius: 0 !important;
  }

  /* ── LEFT PAGE: hidden on mobile ── */
  .pg-l, .book-spine { display: none !important; }

  /* ── RIGHT PAGE: fills book-open, IS the scroll container ── */
  .pg-r {
    width: 100% !important;
    height: 100% !important;
    border-radius: 0 !important;
    background: #f7f2e8 !important;
    overflow-y: auto !important;
    overflow-x: hidden !important;
    -webkit-overflow-scrolling: touch !important;
    overscroll-behavior-y: contain !important;
    box-shadow: none !important;
  }

  /* ── .pg base override: fill container ── */
  .pg {
    width: 100% !important;
    height: 100% !important;
  }

  /* ── p-story: natural height, no scroll (pg-r scrolls) ── */
  .pg-r .p-story {
    width: 100% !important;
    height: auto !important;
    min-height: 100% !important;
    overflow: visible !important;
    padding-bottom: 60px !important;
  }

  /* ── No page-curl on mobile ── */
  .pg-l::before { display: none !important; }
  .pg-r::before { display: none !important; }

  /* ── Text sizing ── */
  .story-scroll .pb,
  .story-scroll .pd {
    font-size: clamp(1.05rem, 4vw, 1.25rem) !important;
    line-height: 1.75 !important;
  }

  /* ── Nav bar ── */
  .nav-row {
    height: 40px !important;
    padding: 3px 12px 5px !important;
    gap: 8px !important;
  }
}

/* ── Tachones effect ── */
.tachon-word {
  position: relative;
  display: inline-block;
}
.tachon-word::after {
  content: "";
  position: absolute;
  left: -2px; right: -2px;
  top: 48%;
  height: 3px;

/* ══════════════════════════════
   SISTEMA DE REACCIONES
══════════════════════════════ */

/* Wrapper de cada párrafo con reacción */
.para-reaction-wrap {
  position: relative;
}

/* Botón de reacción — aparece al hover/focus */
.reaction-btn {
  position: absolute;
  right: -6px;
  top: 2px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: rgba(107,0,0,.10);
  border: 1px solid rgba(107,0,0,.18);
  color: rgba(107,0,0,.45);
  font-size: 9px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.5;
  transition: opacity .2s, background .2s, transform .15s;
  z-index: 10;
  line-height: 1;
  padding: 0;
  font-family: sans-serif;
}
.para-reaction-wrap:hover .reaction-btn,
.para-reaction-wrap:active .reaction-btn {
  opacity: 1;
  transform: scale(1.15);
}
.para-reaction-wrap.has-comments .reaction-btn {
  opacity: 1;
  background: rgba(107,0,0,.18);
  color: rgba(107,0,0,.85);
}

/* Burbujas de comentarios */
.reaction-bubbles {
  display: none;
  flex-direction: column;
  gap: 4px;
  margin-top: 6px;
  padding-left: 4px;
}
.para-reaction-wrap.comments-open .reaction-bubbles {
  display: flex;
}
.reaction-bubble {
  background: rgba(240,232,208,.70);
  border-left: 2px solid rgba(107,0,0,.25);
  border-radius: 0 6px 6px 0;
  padding: 5px 8px;
  font-family: 'Caveat', cursive;
  font-size: 0.80em;
  color: #2a0808;
  line-height: 1.4;
}
.reaction-bubble-author {
  font-size: 0.72em;
  color: rgba(107,0,0,.55);
  margin-bottom: 2px;
  font-weight: 600;
}

/* ── Modal de reacción ── */
#reaction-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(18,24,31,.55);
  z-index: 10000;
  align-items: flex-end;
  justify-content: center;
}
#reaction-modal-overlay.open {
  display: flex;
}
#reaction-modal {
  background: #f6f0e2;
  border-radius: 18px 18px 0 0;
  padding: 24px 20px 32px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 -4px 32px rgba(0,0,0,.25);
  animation: slideUp .25s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
#reaction-modal-title {
  font-family: 'Caveat', cursive;
  font-size: 1.15rem;
  color: #3d0000;
  margin-bottom: 12px;
  font-weight: 700;
  text-align: center;
}
#reaction-textarea {
  width: 100%;
  min-height: 90px;
  background: rgba(255,255,255,.70);
  border: 1.5px solid rgba(107,0,0,.20);
  border-radius: 10px;
  padding: 10px 12px;
  font-family: 'Caveat', cursive;
  font-size: 1rem;
  color: #1e3260;
  resize: none;
  box-sizing: border-box;
  line-height: 1.5;
}
#reaction-textarea:focus {
  outline: none;
  border-color: rgba(107,0,0,.45);
}
#reaction-modal-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
}
#reaction-anon-label {
  font-family: 'Caveat', cursive;
  font-size: 0.82em;
  color: rgba(107,0,0,.55);
}
#reaction-submit {
  background: #6b0000;
  color: #f6f0e2;
  border: none;
  border-radius: 20px;
  padding: 8px 22px;
  font-family: 'Caveat', cursive;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: background .2s;
}
#reaction-submit:hover { background: #3d0000; }
#reaction-cancel {
  background: none;
  border: none;
  color: rgba(107,0,0,.45);
  font-family: 'Caveat', cursive;
  font-size: 0.85em;
  cursor: pointer;
  padding: 4px 8px;
}

/* ── Doodle / journaling pages ── */
.p-doodle-real {
  overflow: hidden;
}
.p-doodle-real .doodle-real-img {
  filter: drop-shadow(1px 2px 8px rgba(0,0,0,.28))
          drop-shadow(0 0 1px rgba(0,0,0,.08));
  image-rendering: auto;
}
/* Tape top-center */
.p-doodle-real::before {
  content: '';
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%) rotate(-2deg);
  width: 58px;
  height: 15px;
  background: rgba(200,185,140,.50);
  border-radius: 1px;
  z-index: 5;
  box-shadow: inset 0 0 0 1px rgba(160,140,100,.22),
              0 1px 3px rgba(0,0,0,.10);
}
/* Tape bottom-right corner */
.p-doodle-real::after {
  content: '';
  position: absolute;
  bottom: 20px;
  right: 18px;
  transform: rotate(3deg);
  width: 46px;
  height: 13px;
  background: rgba(200,185,140,.42);
  border-radius: 1px;
  z-index: 5;
  box-shadow: inset 0 0 0 1px rgba(160,140,100,.18),
              0 1px 2px rgba(0,0,0,.08);
}

.p-doodle-real .doodle-tape-extra {
  position: absolute;

  transform: rotate(-90deg) translateX(-50%);
  width: 40px;

  background: rgba(200,185,140,.38);
  border-radius: 1px;
  z-index: 5;
  box-shadow: inset 0 0 0 1px rgba(160,140,100,.15);
}

/* ── Notas al pie ── */
.footnote-section {
  margin-top: 2rem;

}
.footnote-rule {
  border: none;
  border-top: 1px solid rgba(30,50,96,.25);

  margin: 0 0 0.5rem 0;
}
.footnote-text {
  font-family: 'Caveat', cursive;

}
.footnote-text sup {
  font-size: 0.7em;
  vertical-align: super;
  margin-right: 1px;
}
/* Superscript in story text */
.story-scroll sup {
  font-size: 0.65em;
  vertical-align: super;
  color: rgba(107,0,0,.70);
}
</style>

<script>
const PAGES=["<div class=\"p-journal p-doodle p-doodle-real\">\n<div class=\"pg-paper-fill\"></div>\n<img src=\"https://i.imgur.com/SkmyTqM.webp\" class=\"doodle-real-img\" alt=\"Anoche soñé...\" loading=\"lazy\" style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-0.8deg);max-width:90%;max-height:88%;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,.18));\"/>\n</div>", "<div class=\"p-story\">\n<div class=\"story-lines\"></div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Prólogo</p>\n<h2 class=\"pt\">PRÓLOGO</h2>\n<div class=\"hr\"></div>\n<p class=\"pb\">Alguna vez leí que todos los sueños tienen significado, pero yo creo que son mensajes codificados que mi subconsciente usa para arruinarme el día. Cada vez que me despertaba intranquila por alguno, abría inmediatamente Google y buscaba cosas como: <em>soñar con ver ballenas volando</em>.</p>\n<p class=\"pb\">Los resultados eran alentadores: <em>grandes proyectos se avecinan</em>, <em>épocas de creatividad</em>, <em>prosperidad</em>, etc. Genial, pensaba, eso es genial.</p>\n<p class=\"pb\">Aunque, en mis sueños, las ballenas eran extremadamente terroríficas y yo estaba en pleno mar, atrapada en una caja de cristal mientras ellas intentaban romperla. Exactamente eso no se encuentra en Google, detalles que no creo haya considerado quien decidió que soñar con ballenas voladoras es de buen augurio.</p>\n<p class=\"pb\">Mi oráculo moderno (Google) no me da las respuestas que necesito. Prefiero pensar que los sueños son historias que buscan ser contadas.</p>\n<p class=\"pb\">Por ello, decidí plasmar parte de mi mundo onírico en relatos cortos. Quizás al escribirlos pueda entender por qué mi mente profunda insiste en mostrarme ballenas voladoras y cajas de cristal que se resquebrajan.</p>\n<p class=\"pb\">Y de paso, contribuir al arte y la ficción porque la ficción me ha salvado la vida en más de una ocasión y, si lo piensas bien, probablemente también haya salvado la tuya… y la de tu madre <em>(imagina un mundo sin novelas mexicanas: qué triste)</em>.</p>\n<p class=\"pb\">Así que, si te gustan las historias cortas, perturbadoras y sin gracia, bienvenido(a).</p>\n</div>\n</div>", "<div class=\"pg-paper-fill\"></div>\n<div class=\"p-journal p-lined\">\n<div class=\"paper-grain\"></div>\n<div class=\"journal-lines\"></div>\n<div class=\"lined-content\">\n</div>\n</div>", "<div class=\"p-story\">\n<div class=\"story-lines\"></div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Índice</p>\n<h2 class=\"pt\">Los sueños</h2>\n<div class=\"hr\"></div>\n\n      <p class=\"pb j-idx-item\" data-target=\"4\" style=\"cursor:pointer;padding:.3rem 0;border-bottom:1px solid rgba(148,12,12,.08)\"><span style=\"color:rgba(148,12,12,.6);font-size:.85em\">01 —</span> ¿Y si yo soy la mala del cuento?</p>\n      <p class=\"pb j-idx-item\" data-target=\"5\" style=\"cursor:pointer;padding:.3rem 0;border-bottom:1px solid rgba(148,12,12,.08)\"><span style=\"color:rgba(148,12,12,.6);font-size:.85em\">02 —</span> El gato</p>\n      <p class=\"pb j-idx-item\" data-target=\"6\" style=\"cursor:pointer;padding:.3rem 0;border-bottom:1px solid rgba(148,12,12,.08)\"><span style=\"color:rgba(148,12,12,.6);font-size:.85em\">03 —</span> Ayúdame a matarlo</p>\n      <p class=\"pb j-idx-item\" data-target=\"7\" style=\"cursor:pointer;padding:.3rem 0;border-bottom:1px solid rgba(148,12,12,.08)\"><span style=\"color:rgba(148,12,12,.6);font-size:.85em\">04 —</span> Noche críptica en Sepia</p>\n      <p class=\"pb j-idx-item\" data-target=\"8\" style=\"cursor:pointer;padding:.3rem 0;border-bottom:1px solid rgba(148,12,12,.08)\"><span style=\"color:rgba(148,12,12,.6);font-size:.85em\">05 —</span> ¿Desperté?</p>\n      <p class=\"pb j-idx-item\" data-target=\"9\" style=\"cursor:pointer;padding:.3rem 0;border-bottom:1px solid rgba(148,12,12,.08)\"><span style=\"color:rgba(148,12,12,.6);font-size:.85em\">06 —</span> Microchip</p>\n      <p class=\"pb j-idx-item\" data-target=\"10\" style=\"cursor:pointer;padding:.3rem 0;border-bottom:1px solid rgba(148,12,12,.08)\"><span style=\"color:rgba(148,12,12,.6);font-size:.85em\">07 —</span> Mi Miss Hyde</p>\n      <p class=\"pb j-idx-item\" data-target=\"11\" style=\"cursor:pointer;padding:.3rem 0;border-bottom:1px solid rgba(148,12,12,.08)\"><span style=\"color:rgba(148,12,12,.6);font-size:.85em\">08 —</span> No quiero ser bella</p>\n      <p class=\"pb j-idx-item\" data-target=\"12\" style=\"cursor:pointer;padding:.3rem 0;border-bottom:1px solid rgba(148,12,12,.08)\"><span style=\"color:rgba(148,12,12,.6);font-size:.85em\">09 —</span> Adiós, Morfeo</p>\n      <p class=\"pb j-idx-item\" data-target=\"13\" style=\"cursor:pointer;padding:.3rem 0;border-bottom:1px solid rgba(148,12,12,.08)\"><span style=\"color:rgba(148,12,12,.6);font-size:.85em\">10 —</span> ¿Hay algún zombi en la sala?</p>\n      <p class=\"pb j-idx-item\" data-target=\"14\" style=\"cursor:pointer;padding:.3rem 0;border-bottom:1px solid rgba(148,12,12,.08)\"><span style=\"color:rgba(148,12,12,.6);font-size:.85em\">11 —</span> Luces, cámara, terror</p>\n      <p class=\"pb j-idx-item\" data-target=\"15\" style=\"cursor:pointer;padding:.3rem 0;border-bottom:1px solid rgba(148,12,12,.08)\"><span style=\"color:rgba(148,12,12,.6);font-size:.85em\">12 —</span> Efecto Glitch</p>\n      <p class=\"pb j-idx-item\" data-target=\"16\" style=\"cursor:pointer;padding:.3rem 0;border-bottom:1px solid rgba(148,12,12,.08)\"><span style=\"color:rgba(148,12,12,.6);font-size:.85em\">13 —</span> Distopía en el Mall</p>\n      <p class=\"pb j-idx-item\" data-target=\"17\" style=\"cursor:pointer;padding:.3rem 0;border-bottom:1px solid rgba(148,12,12,.08)\"><span style=\"color:rgba(148,12,12,.6);font-size:.85em\">14 —</span> Vaca in blue</p>\n      <p class=\"pb j-idx-item\" data-target=\"18\" style=\"cursor:pointer;padding:.3rem 0;border-bottom:1px solid rgba(148,12,12,.08)\"><span style=\"color:rgba(148,12,12,.6);font-size:.85em\">15 —</span> No cruces la puerta</p>\n      <p class=\"pb j-idx-item\" data-target=\"19\" style=\"cursor:pointer;padding:.3rem 0;border-bottom:1px solid rgba(148,12,12,.08)\"><span style=\"color:rgba(148,12,12,.6);font-size:.85em\">B —</span> Bonus Experimental</p>\n      <p class=\"pb j-idx-item\" data-target=\"20\" style=\"cursor:pointer;padding:.3rem 0;border-bottom:1px solid rgba(148,12,12,.08)\"><span style=\"color:rgba(148,12,12,.6);font-size:.85em\">16 —</span> Pesadilla: La Incredulidad</p>\n      <p class=\"pb j-idx-item\" data-target=\"21\" style=\"cursor:pointer;padding:.3rem 0;border-bottom:1px solid rgba(148,12,12,.08)\"><span style=\"color:rgba(148,12,12,.6);font-size:.85em\">17 —</span> Dejen Dormir</p>\n    \n</div>\n</div>", "<div class=\"p-story\">\n<div class=\"story-atmos-layer\" id=\"sa_Relato_01\"></div>\n<div class=\"story-lines\"></div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Relato 01</p>\n<h2 class=\"pt\">¿Y si yo soy la mala del cuento?</h2>\n<div class=\"hr\"></div>\n<p class=\"pb\">Descendí las escaleras hacia el taller de mi padre. El silencio era intrigante; nunca había silencio cuando papá estaba allí. Al llegar, encontré a mi madre, mi padre y mis dos hermanos, inmóviles. No hablaban, solo se miraban entre sí con los ojos desmesuradamente abiertos. Durante los casi dos minutos que los observé, no parpadearon ni una sola vez. La situación era espeluznante.</p>\n<p class=\"pb\">Miré hacia la calle y vi a un hombre con gabardina y sombrero gris. Llevaba una jeringa. En mi mente lo bauticé como 'El Inyectador'. Este hombre inyectaba a la gente con una sustancia desconocida. Las personas inoculadas empezaban a comportarse de manera extraña, como mi familia: ojos abiertos de par en par, no hablaban, solo se miraban entre ellos y caminaban como si algo o alguien los manejara a control remoto, robotizados.</p>\n<p class=\"pb\">Mi cerebro dejó de mandar en mi cuerpo. Al intentar retroceder, me golpeé con un pedazo de madera. Mis ojos volvieron rápidamente hacia ellos. Me observaban con una mirada vacía, como si no me reconocieran. El Inyectador avanzaba hacia la casa, con sus ojos clavados en mí. Me quedé congelada. Mi familia se había transformado en algo y ese hombre venía directo hacia mí. Un pánico helador me paralizó. Pero de repente, el pensamiento de mis hermanas sacudió mi mente.</p>\n<p class=\"pb\">Salí corriendo por la puerta trasera hasta llegar a la calle. Durante mi apresurado trayecto, vi cómo la luna descendía del cielo; era enorme, de un gris fantasmal y aterradoramente hermosa, solo la mitad de ella permaneció a la vista. El cielo tenía un color negro azulado, un contraste demasiado bello para una situación tan perturbadora. De fondo, se escuchaban unos... ¿sonidos de trompetas? El hombre de la jeringa continuaba su macabra tarea, mientras las trompetas resonaban sin cesar, sus ecos se mezclaban con los gritos desesperados de aquellos que aún no habían sido inyectados. La música infernal parecía provenir de la tierra y del cielo a la vez.</p>\n<p class=\"pb\">Mi cabello me azotaba el rostro, el viento erizaba mi piel y hacía temblar mis piernas.\nIntenté pasar desapercibida mientras me dirigía a la casa de la vecina en busca de mis hermanas, con la mente enfocada únicamente en salvarlas. Pero mis pies se detuvieron abruptamente, paralizados por la escena apocalíptica que se desarrollaba. Estaba yo, inmóvil mirando el estrambótico fin del mundo. Volví en mí, volví a correr.</p>\n<p class=\"pb\">Finalmente llegué al lugar. Varios niños saltaban y jugaban alegremente, entre ellos mis hermanas. Me acerqué a ellas y les dije que teníamos que irnos. Comenzaron a hacer preguntas: \"¿Por qué? ¿A dónde vamos?\"</p>\n<p class=\"pd\">—Ya fue. Si no nos vamos, nos convertirán —dije, tratando de recuperar el aire.</p>\n<p class=\"pb\">Aparté la mirada solo unos segundos, lo suficiente para que mi hermana pequeña corriera hacia nuestro padre. La escena me golpeó en el estómago: ellos, tomados de la mano con los ojos escandalosamente abiertos, y a su lado, el Inyectador, mostrándome su maldita jeringa, con su maldito rostro inexpresivo, vacío de cualquier rastro de emoción. Al ver a mi hermana pequeña convertida en … algo, se me estremeció el cuerpo. No pude salvarla.</p>\n<p class=\"pb\">Me giré. Tomé a la mayor de la mano y corrimos, esquivando gente, saltando obstáculos, escondiéndonos. Pero mi mano sudaba tanto que terminamos soltándonos. Avancé unos metros más, impulsada por la inercia, hasta que el silencio me obligó a girarme. La vi caer.</p>\n<p class=\"pd\">—¡Mierda! ¡No puede ser!</p>\n<p class=\"pb\">Detrás de ella avanzaba una multitud. El tiempo parecía detenerse mientras luchaba por levantarse. De repente, el cielo se tiñó de tonos naranjas y rojizos, creando el arrebol más hermoso que jamás había presenciado. Pero aquella belleza se desvaneció abruptamente con un sonido estrepitoso. El cielo se partió en dos; la cruda realidad me golpeó de nuevo. Las trompetas continuaban sonando, compitiendo con los latidos frenéticos de mi corazón. Tucutún, tucutún, tucutún. Y ella no se levantaba.</p>\n<p class=\"pd\">—¡Levántate, por favor, levántate! —le gritaba mientras movía los brazos desesperadamente. El tumulto estaba ahí cerquita, detrás de ella.</p>\n<p class=\"pb\">Entre la masa de gente distinguí al Inyectador, abriéndose paso, apartando gente, o tal vez ordenándolos. ¿Acaso está flotando? ¿Esas son... alas? ¡Estaba subiendo al cielo! Lo mismo le empezó a pasar a otras personas. No podía creer lo que estaba viendo. Bajé la mirada hacia mi hermana y ella, con ambas rodillas en el piso, me veía también, aterrada.</p>\n<p class=\"pb\">Al voltear, un escalofrío me recorrió la espalda; detrás de mí estaba el diablo. No podría contarte cómo llegué a tal conclusión, pero lo supe de inmediato: era el señor de las tinieblas. Un hombre enorme de piel roja. Su rostro permanecía oculto, pero recuerdo su enorme torso muy bien trabajado en los gimnasios del infierno.</p>\n<p class=\"pb\">Mis ojos, llenos de angustia, buscaron desesperadamente a mi hermana. La escena seguía igual: la gente se elevaba hacia el resplandor del cielo abierto, mientras ella permanecía arrodillada e inmóvil en el suelo, presa del mismo terror que me consumía. Su mirada seguía fija en el infierno que se desplegaba a mi lado, un panorama rojo donde el fuego caía como pequeños meteoritos. El diablo seguía detrás de mí, y a nuestro alrededor, gente espantosamente fit pasaba indiferente.</p>\n<p class=\"pb\">De repente, la tierra se partió bajo mis pies, abriendo un abismo entre nosotras. El aire se volvió espeso, intensificando la sensación de asfixia que ya sentía en mi garganta. Mis ojos se cristalizaron. Algo me quemaba por dentro, quizá eran las preguntas atrapadas en mi interior: ¿Había perdido a mi familia? ¿O ellos se habían librado de mí?</p>\n<p class=\"pb\">Desperté.</p>\n\n<p class=\"pb\" style=\"margin-top:2rem;text-align:right\"><span class=\"music-tap-wrap\" onclick=\"startEvilMorty()\"><span class=\"music-tap-annotation\">toca aquí</span><span class=\"music-tap-btn\">Deja el teléfono a un costado y reflexiona sobre lo leído.</span></span></p>\n</div>\n</div>", "<div class=\"p-story\">\n<div class=\"story-atmos-layer\" id=\"sa_Relato_02\"></div>\n<div class=\"story-lines\"></div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Relato 02</p>\n<h2 class=\"pt\">El gato</h2>\n<div class=\"hr\"></div>\n<p class=\"pb\">Un crujido inesperado me arrancó el sueño, aquel ruido venía desde afuera de la calle, de la noche. Acaricié el pelaje sedoso del gato negro acurrucado en mi regazo, mientras miraba por la ventana entreabierta para darme calma, pero él se me escurrió de las manos para sentarse a mi lado. El cielo estaba nublado y gris, podía sentir el aire frío entrando y tocando mi cara. Todo se volvió silencio, ese silencio que indica que está ocurriendo algo, algo inminente y desconocido. Sentí como si estuviera conteniendo la respiración involuntariamente.</p>\n<p class=\"pb\">Un sonido, esta vez más fuerte y acompañado de un resplandor rojo, me sobresaltó. El gato saltó a mis piernas, con sus ojos fijos en la ventana. El mundo exterior era un lienzo rojo, un espectáculo aterrador que me dejó sin aliento. El aire me quemaba la nariz. No podía apartar la mirada de la ventana.</p>\n<p class=\"pb\">De repente pude ver la sombra de una especie de caballo pasar. El gato aulló y se lanzó por la ventana. Fui rápidamente a ver lo que sucedía: El felino a toda velocidad se subió encima del caballo, quien caminaba de una manera muy elegante y silenciosa.</p>\n<p class=\"pb\">Olvidando que estaba descalza, en pijama y que un lienzo rojo era presagio de caos, salí decidida a recuperar a mi gato. Corrí desenfrenada por dos largas cuadras hasta que los vi al otro lado de la calle. No era un caballo real. Era su sombra, su espectro: una silueta sin cuerpo ni mirada. Mi gato se restregaba contra él, hipnotizado, tratando en vano de llamar su atención. La sombra permanecía inmóvil, con su silueta apuntando hacia mí.</p>\n<p class=\"pb\">Movió la cabeza. No sé por qué entendí que era una invitación. No sé por qué la acepté.</p>\n<p class=\"pb\">Los carros pasaban a toda velocidad, dejando solo estelas de color, al igual que la gente que se difuminaba en mi visión. Esperé. Algo en mí sabía que cuando el tráfico se detuviera, tendría que cruzar, y que cruzaría. No había mucho que pensar al respecto.</p>\n<p class=\"pb\">Cuando el tráfico se detuvo, avancé.</p>\n<p class=\"pb\">Cuando estaba cerca, el felino saltó emocionado en mi dirección, haciéndome perder el equilibrio y caer sobre el asfalto. Traté de levantarme, dolorida, pero un Zzzzzzi me paralizó. Al girar a mi derecha, vi cómo un enorme camión con faros amarillos deslumbrantes que me cegaban, venía a toda velocidad. No pude actuar; todo pasó demasiado rápido. Solo atiné a cerrar los ojos, resignándome a recibir el impacto.</p>\n<p class=\"pb\">Un empujón violento me lanzó hacia adelante. Abrí los ojos, desorientada. Estaba sentada en la oscuridad, frente a una joven de cabello largo, que me miraba con los ojos muy abiertos y brillantes.  Se le notaba un poco aturdida.</p>\n<p class=\"pd\">—¿Así… así morí? —me preguntó con voz entrecortada.</p>\n<p class=\"pb\">La dueña del gato era ella.</p>\n</div>\n</div>", "<div class=\"p-story\">\n<div class=\"story-atmos-layer\" id=\"sa_Relato_03\"></div>\n<div class=\"story-lines\"></div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Relato 03</p>\n<h2 class=\"pt\">Ayúdame a matarlo</h2>\n<div class=\"hr\"></div>\n<p class=\"pb\">Estaba en una sala de espera.  Un niño empezó a llorar muy fuerte; su llanto y sus gritos resonaban en mi cabeza. Miré a la mujer que lo sostenía. Pálida, ojerosa, despeinada. Supuse que era su madre.</p>\n<p class=\"pd\">—¡Aaaah, señora!  ¿Por qué no calla a ese mocoso? ¡Por Dios! ¡Ya lleva más de 20 minutos llorando!</p>\n<p class=\"pb\">No reconocí esa voz, pero era mía. Las miradas de repudio se posaron en mí.</p>\n<p class=\"pb\">La vergüenza me inundó. Soy un desastre —pensé. ¿Pero acaso era la única que no aguantaba ese ruido espantoso?</p>\n<p class=\"pb\">Perdí la noción del tiempo por un momento, hasta que el llanto del niño me devolvió a la realidad. Al mirar a la madre, noté que también me observaba fijamente. Mientras buscaba algo en su bolso, sus ojos seguían clavados en los míos. ¿Qué buscaba con tanta intensidad?  Mis piernas comenzaron a temblar involuntariamente, y el sudor goteaba por mi frente. El llanto, cada vez más agudo, ya no parecía provenir de un niño, sino de una bestia atormentada. ¿Acaso era posible que semejante sonido saliera de un cuerpo tan pequeño?</p>\n<p class=\"pb\">Una sensación de malestar se apoderó de mí; necesitaba escapar de ese lugar. Me levanté con dificultad y me dirigí hacia la salida. De repente... silencio. Me detuve en seco y giré la cabeza, buscando el origen de aquel cambio repentino. La madre y el ni
