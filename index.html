<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>El arte de dormir terriblemente mal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Cinzel:wght@400;600&family=Cinzel+Decorative&family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --pw:  clamp(220px,28vw,400px);
  --ph:  calc(var(--pw)*1.54);
  --sw:  clamp(14px,1.8vw,22px);
  --gold:       #b8956a;
  --gold-mid:   #8a6e48;
  --gold-dim:   #5a4530;
  --gold-faint: #2e2010;
  --ink:        #d0c4a8;
  --ink2:       #8a7a62;
  --ink3:       #52402e;
  --crimson:    #8a1e1e;
  --crimson2:   #c44040;
  --red-ink:    rgba(155,18,18,0.85);
  --paper:      #f4f0e2;
  --paper2:     #eee8d0;
  --sepia:      #1a2e6a;
  --sepia2:     #2a4688;
  --sepia3:     #6a82b8;
  --line-col:   rgba(50,80,180,0.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  background:
    radial-gradient(ellipse at 25% 25%,#160a04 0%,transparent 55%),
    radial-gradient(ellipse at 75% 75%,#0c0810 0%,transparent 55%),
    #07050a;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:none;user-select:none;min-height:100vh;
  font-family:'Crimson Pro',serif;
}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.03;}
#cd,#cr{position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
#cd{width:4px;height:4px;background:var(--gold);border-radius:50%}
#cr{width:22px;height:22px;border:1px solid rgba(184,149,106,.35);border-radius:50%;transition:width .25s,height .25s,border-color .25s}
.scene{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(.6rem,1.5vh,1.2rem);width:100%;height:100%;}

/* ═══════════════════════════════════════
   DIARY COVER — thick book texture
═══════════════════════════════════════ */
.book-closed{
  position:relative;width:var(--pw);height:var(--ph);cursor:pointer;
  filter:drop-shadow(-6px 16px 48px rgba(0,0,0,.8)) drop-shadow(2px 4px 12px rgba(0,0,0,.5));
}
/* thick page stack — multiple layers */
.book-closed::before{
  content:"";position:absolute;
  top:2px;bottom:2px;right:-11px;width:11px;
  background:repeating-linear-gradient(
    to right,
    #ddd0b0 0px, #e8dcc0 3px,
    #ccc0a0 3px, #ddd0b0 5px,
    #e0d4b8 5px, #ddd0b0 7px,
    #cac0a0 7px, #ddd0b0 9px,
    #e8dcc0 9px, #ccc0a0 11px
  );
  border-radius:0 3px 3px 0;
  box-shadow:inset -1px 0 3px rgba(0,0,0,.2), 1px 0 4px rgba(0,0,0,.3);
}
.book-closed::after{
  content:"";position:absolute;
  top:5px;bottom:5px;right:-15px;width:4px;
  background:linear-gradient(to right,#b8aa88,#c8bc9a);
  border-radius:0 2px 2px 0;opacity:.8;
}

/* Cover body */
.cover-body{
  position:absolute;inset:0;
  border-radius:2px 3px 3px 2px;
  overflow:hidden;
  /* Thick canvas/cloth look */
  background:
    repeating-linear-gradient(
      0deg,
      transparent 0px, transparent 2px,
      rgba(0,0,0,.025) 2px, rgba(0,0,0,.025) 3px
    ),
    repeating-linear-gradient(
      90deg,
      transparent 0px, transparent 2px,
      rgba(0,0,0,.018) 2px, rgba(0,0,0,.018) 3px
    ),
    repeating-linear-gradient(
      45deg,
      transparent 0px, transparent 4px,
      rgba(255,255,255,.008) 4px, rgba(255,255,255,.008) 5px
    ),
    radial-gradient(ellipse at 18% 20%,rgba(90,30,10,.5) 0%,transparent 35%),
    radial-gradient(ellipse at 80% 80%,rgba(50,10,10,.4) 0%,transparent 40%),
    radial-gradient(ellipse at 50% 50%,rgba(30,8,8,.2) 0%,transparent 65%),
    linear-gradient(162deg,
      #2c0e0e 0%, #200808 15%, #180606 30%,
      #1e0a0a 48%, #160606 65%,
      #240e0e 80%, #1c0808 92%, #220c0c 100%
    );
  box-shadow:
    inset 3px 0 8px rgba(0,0,0,.6),
    inset -1px 0 4px rgba(0,0,0,.3),
    inset 0 3px 8px rgba(0,0,0,.4),
    inset 0 -3px 8px rgba(0,0,0,.35);
}
.cover-body::before{
  content:"";position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='t'%3E%3CfeTurbulence type='turbulence' baseFrequency='.55' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23t)'/%3E%3C/svg%3E");
  opacity:.09;mix-blend-mode:overlay;
}
/* worn edges — lighter on corners */
.cover-body::after{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 0% 0%, rgba(255,200,150,.06) 0%,transparent 30%),
    radial-gradient(ellipse at 100% 0%, rgba(255,200,150,.04) 0%,transparent 25%),
    radial-gradient(ellipse at 0% 100%, rgba(255,200,150,.05) 0%,transparent 25%),
    radial-gradient(ellipse at 100% 100%, rgba(255,200,150,.04) 0%,transparent 20%);
}

.cover-spine{
  position:absolute;top:0;left:0;bottom:0;width:var(--sw);z-index:5;
  background:linear-gradient(to right,#060102 0%,#160606 30%,#120404 65%,#060102 100%);
  border-right:1px solid rgba(50,15,8,.5);
}

/* Elastic band */
.cover-elastic{
  position:absolute;top:50%;right:-15px;
  transform:translateY(-50%);
  width:calc(100% + 15px);
  height:clamp(9px,1.5vw,13px);
  background:linear-gradient(to bottom,
    rgba(14,4,4,.92) 0%,rgba(28,8,8,.96) 45%,
    rgba(22,6,6,.92) 55%,rgba(12,3,3,.88) 100%);
  z-index:6;border-radius:1px;
  box-shadow:0 2px 4px rgba(0,0,0,.55),0 -1px 2px rgba(0,0,0,.35);
}
.cover-elastic::before,.cover-elastic::after{
  content:"";position:absolute;left:0;right:0;height:1px;
}
.cover-elastic::before{top:1px;background:rgba(255,255,255,.035);}
.cover-elastic::after{bottom:1px;background:rgba(0,0,0,.25);}

/* Ribbon bookmark */
.cover-ribbon{
  position:absolute;bottom:-20px;right:clamp(22px,4vw,34px);
  width:clamp(8px,1.2vw,11px);height:clamp(32px,5.5vw,48px);
  background:linear-gradient(to bottom,#9a2020,#6e1414);
  z-index:3;border-radius:0 0 3px 3px;
  box-shadow:1px 2px 5px rgba(0,0,0,.45);
}
.cover-ribbon::after{
  content:"";position:absolute;bottom:0;left:0;right:0;transform:translateY(100%);
  border-left:calc(clamp(8px,1.2vw,11px)/2) solid #9a2020;
  border-right:calc(clamp(8px,1.2vw,11px)/2) solid #9a2020;
  border-top:clamp(5px,.8vw,7px) solid transparent;
}

/* Title label — hand-glued paper */
.cover-label{
  position:absolute;
  left:calc(var(--sw) + clamp(12px,2.5vw,20px));
  right:clamp(10px,2vw,18px);
  top:50%;transform:translateY(-53%) rotate(-1.5deg);
  background:
    linear-gradient(175deg,rgba(244,238,218,.11) 0%,rgba(235,226,200,.07) 100%);
  border:1px solid rgba(184,149,106,.12);
  padding:clamp(10px,2vw,18px) clamp(8px,1.8vw,16px);
  z-index:7;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:.3rem;
  box-shadow:0 2px 10px rgba(0,0,0,.4);
}
.label-eyebrow{font-family:'Caveat',cursive;font-size:clamp(.6rem,1.1vw,.82rem);letter-spacing:.12em;color:rgba(190,158,100,.5);}
.label-rule{width:clamp(18px,2.5vw,28px);height:1px;background:rgba(184,149,106,.25);margin:.1rem auto;}
.label-title{font-family:'Caveat',cursive;font-weight:700;font-size:clamp(1rem,2.2vw,1.82rem);line-height:1.15;color:rgba(215,188,138,.82);text-shadow:0 1px 4px rgba(0,0,0,.5);}
.label-sub{font-family:'Caveat',cursive;font-size:clamp(.52rem,.95vw,.72rem);letter-spacing:.18em;color:rgba(170,135,85,.42);}
.cover-author{position:absolute;bottom:clamp(.9rem,2.2vw,1.7rem);left:0;right:0;text-align:center;z-index:7;}
.cover-author-name{font-family:'Caveat',cursive;font-weight:600;font-size:clamp(.82rem,1.5vw,1.2rem);color:rgba(175,140,90,.55);letter-spacing:.04em;}
.open-hint{position:absolute;bottom:0;right:0;width:52px;height:52px;cursor:pointer;z-index:10;}
.open-hint::before{content:"";position:absolute;bottom:0;right:0;width:0;height:0;border-style:solid;border-width:0 0 42px 42px;border-color:transparent transparent rgba(184,149,106,.13) transparent;transition:all .35s;}
.open-hint:hover::before{border-width:0 0 56px 56px;border-color:transparent transparent rgba(184,149,106,.26) transparent;}

/* ═══════════════════════════════════════
   OPEN BOOK
═══════════════════════════════════════ */
.book-open{
  display:none;position:relative;flex-direction:row;
  width:calc(var(--pw)*2 + var(--sw));height:var(--ph);
  filter:drop-shadow(-6px 16px 52px rgba(0,0,0,.82)) drop-shadow(2px 4px 16px rgba(0,0,0,.5));
}
.pg{width:var(--pw);height:var(--ph);position:relative;overflow:hidden;flex-shrink:0;}
.pg-l{
  background:linear-gradient(to right,#120c08,#0d0a06);
  box-shadow:inset -8px 0 20px rgba(0,0,0,.55);
}
/* Page curve shadow — simulates book center curvature */
.pg-l::after{
  content:"";position:absolute;top:0;right:0;width:32px;height:100%;
  background:linear-gradient(to right,transparent,rgba(0,0,0,.22));
  pointer-events:none;z-index:2;
}
.pg-r::before{
  content:"";position:absolute;top:0;left:0;width:32px;height:100%;
  background:linear-gradient(to left,transparent,rgba(0,0,0,.18));
  pointer-events:none;z-index:2;
}
.pg-r{background:linear-gradient(to left,#120c08,#0d0a06);box-shadow:inset 8px 0 20px rgba(0,0,0,.55);}
.pg-r::after{
  content:"";position:absolute;top:2px;bottom:2px;right:-11px;width:11px;
  background:repeating-linear-gradient(to right,#ddd0b0 0px,#e8dcc0 3px,#ccc0a0 3px,#ddd0b0 5px,#e0d4b8 5px,#ccc0a0 7px,#ddd0b0 7px,#e8dcc0 9px,#cac0a0 9px,#ddd0b0 11px);
  border-radius:0 3px 3px 0;
}
.pg::before{content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse at 95% 5%,rgba(40,28,14,.28) 0%,transparent 45%),
    radial-gradient(ellipse at 5% 95%,rgba(30,18,8,.22) 0%,transparent 45%);
  pointer-events:none;z-index:0;}
.book-spine{
  width:var(--sw);height:var(--ph);flex-shrink:0;
  background:linear-gradient(to right,#0a0302 0%,#1c0606 28%,#260a0a 50%,#180606 72%,#0a0302 100%);
  box-shadow:inset 2px 0 6px rgba(0,0,0,.55),inset -2px 0 6px rgba(0,0,0,.55);z-index:5;
}

/* ═══════════════════════════════════════
   JOURNAL / DIARY PAGES
═══════════════════════════════════════ */
.p-journal{
  width:100%;height:100%;position:relative;overflow:hidden;
  background:
    radial-gradient(ellipse at 10% 8%,rgba(230,210,160,.32) 0%,transparent 38%),
    radial-gradient(ellipse at 90% 92%,rgba(215,195,145,.2) 0%,transparent 32%),
    linear-gradient(178deg,#f6f1e5 0%,#f1e9d1 30%,#ede5ca 60%,#e9e0c2 100%);
}
/* Override dark pg background for journal spreads */
.journal-spread .pg-l,
.journal-spread .pg-r{
  background:#ede5ca !important;
  box-shadow: none !important;
}
.journal-spread .pg-r::after{ display:none; }
.paper-grain{
  position:absolute;inset:0;pointer-events:none;z-index:1;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='t'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.68' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23t)'/%3E%3C/svg%3E");
  opacity:.07;mix-blend-mode:multiply;
}
.paper-stain{position:absolute;pointer-events:none;z-index:1;opacity:.5;}
.s3{width:clamp(28px,5vw,50px);height:clamp(22px,4vw,38px);top:32%;right:6%;
  background:radial-gradient(ellipse,rgba(120,80,30,.09) 0%,transparent 60%);
  transform:rotate(5deg);border-radius:50%;}

/* Organic page edge with clip-path */
.pg-l .p-journal{
  clip-path:polygon(
    0% 1%, 96% 0%, 97.5% 8%, 98.5% 22%, 99% 38%,
    99.2% 55%, 98.8% 72%, 97.5% 88%, 96% 100%, 0% 99%
  );
}
.pg-r .p-journal{
  clip-path:polygon(
    4% 0%, 100% 1%, 100% 99%, 4% 100%,
    2.5% 88%, 1.2% 72%, 0.8% 55%, 1% 38%,
    1.5% 22%, 2.5% 8%
  );
}

/* Ruled lines */
.journal-lines{
  position:absolute;inset:0;pointer-events:none;z-index:2;
  background-image:repeating-linear-gradient(to bottom,transparent 0px,transparent 25px,var(--line-col) 26px,var(--line-col) 26px);
  background-size:100% 26px;
}
.journal-lines::before{
  content:"";position:absolute;left:clamp(28px,6vw,44px);top:0;bottom:0;width:1px;
  background:rgba(155,45,45,.18);
}

/* DOODLE page */
.p-doodle{position:relative;}
.doodle-svg{
  position:absolute;inset:0;width:100%;height:100%;overflow:visible;
}

/* ── ANIMATIONS ── */
/* Each element floats independently */
/* Float animations — each class floats in place, no drifting */
.fi1{animation:f1 5.2s ease-in-out infinite;}
.fi2{animation:f2 6.8s ease-in-out 0.6s infinite;}
.fi3{animation:f3 5.8s ease-in-out 1.2s infinite;}
.fi4{animation:f4 7.4s ease-in-out 0.3s infinite;}
.fi5{animation:f5 6.2s ease-in-out 1.8s infinite;}
.fi6{animation:f6 8s ease-in-out 0.9s infinite;}
.title-pulse{animation:titPulse 5s ease-in-out infinite;}

/* clapper arm opens and closes around its hinge (top-left corner) */
.clap-arm{
  transform-origin: 4px 10px;
  transform-box: fill-box;
  animation: clapOpen 3.5s ease-in-out 1s infinite;
}

@keyframes f1{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-7px) rotate(.6deg)}}
@keyframes f2{0%,100%{transform:translateY(0) rotate(0deg)}45%{transform:translateY(-9px) rotate(-.7deg)}}
@keyframes f3{0%,100%{transform:translateY(0)}40%{transform:translateY(-6px) rotate(.5deg)}}
@keyframes f4{0%,100%{transform:translateY(0) rotate(0deg)}55%{transform:translateY(-8px) rotate(.8deg)}}
@keyframes f5{0%,100%{transform:translateY(0)}35%{transform:translateY(-5px) rotate(-.4deg)}}
@keyframes f6{0%,100%{transform:translateY(0) rotate(0deg)}60%{transform:translateY(-10px) rotate(.6deg)}}
@keyframes titPulse{0%,100%{opacity:.9}50%{opacity:1}}

/* clapper: closed -> open -> pause -> close */
/* zombie shamble */
@keyframes zombieWalk{
  0%,100%{transform:translateX(0) rotate(0deg)}
  25%{transform:translateX(6px) rotate(.8deg)}
  50%{transform:translateX(0px) rotate(0deg)}
  75%{transform:translateX(-4px) rotate(-.5deg)}
}
.zombie-walk{animation:zombieWalk 2.8s ease-in-out infinite;}

@keyframes clapOpen{
  0%{transform:rotate(0deg)}
  20%{transform:rotate(-38deg)}
  55%{transform:rotate(-38deg)}
  75%{transform:rotate(0deg)}
  100%{transform:rotate(0deg)}
}

/* Lined page content */
.lined-content{
  position:relative;z-index:3;width:100%;height:100%;
  padding:clamp(1.2rem,3vw,2rem) clamp(1rem,2.5vw,1.8rem);
  padding-left:clamp(36px,7.5vw,52px);
  display:flex;flex-direction:column;gap:.45rem;overflow:hidden;
}
.j-title{
  font-family:'Caveat',cursive;font-weight:700;
  font-size:clamp(1.8rem,4vw,2.8rem);
  color:var(--sepia);
  transform:rotate(-1.6deg);display:inline-block;
  margin-bottom:.3rem;line-height:1.1;
}
.j-title-red{
  font-family:'IM Fell English',serif;font-style:italic;
  color:rgba(148,12,12,0.88);
  font-size:clamp(2rem,4.5vw,3.2rem);
  transform:rotate(-1.2deg);
  /* ink bleed/stain: layered text-shadow simulates wet ink spreading */
  text-shadow:
    0 0 8px rgba(148,12,12,0.35),
    1px 1px 3px rgba(148,12,12,0.25),
    -1px 0px 6px rgba(148,12,12,0.20),
    0 2px 8px rgba(148,12,12,0.18),
    2px -1px 4px rgba(148,12,12,0.15);
  filter: blur(0.3px);
}
.j-body{
  font-family:'Caveat',cursive;
  font-size:clamp(.9rem,1.75vw,1.12rem);
  line-height:1.7;color:var(--sepia);
}
.j-body em{font-style:italic;color:var(--sepia2);}
.j-closing{color:var(--sepia2);font-style:italic;}
/* Index on journal paper */
.j-idx-title{
  font-family:'IM Fell English',serif;font-style:italic;
  font-size:clamp(1.8rem,4vw,2.8rem);
  color:rgba(148,12,12,0.88);transform:rotate(-1deg);display:inline-block;
  margin-bottom:.6rem;line-height:1.1;
  text-shadow:0 0 8px rgba(148,12,12,0.30),1px 1px 3px rgba(148,12,12,0.20),-1px 0px 6px rgba(148,12,12,0.18);
  filter:blur(0.3px);
}
.j-idx{display:flex;flex-direction:column;gap:.1rem;}
.j-idx-item{display:flex;align-items:baseline;gap:.5rem;padding:.18rem 0;border-bottom:none;}
.j-idx-n{font-family:'Caveat',cursive;font-size:clamp(.78rem,1.4vw,.95rem);color:rgba(148,12,12,0.75);min-width:2.8rem;font-weight:700;}
.j-idx-t{font-family:'Caveat',cursive;font-size:clamp(.88rem,1.6vw,1.05rem);color:var(--sepia);flex:1;line-height:1.3;}
.j-sig-block{margin-top:clamp(.6rem,1.5vw,1rem);}
.j-sig-svg{width:clamp(90px,16vw,145px);display:block;margin-bottom:.15rem;}
.j-sig-name{font-family:'Caveat',cursive;font-size:clamp(.85rem,1.6vw,1.1rem);color:var(--sepia2);transform:rotate(-.7deg);display:inline-block;}
.j-pnum{color:var(--sepia3) !important;font-family:'Caveat',cursive !important;font-size:clamp(.62rem,1.1vw,.8rem) !important;letter-spacing:.05em !important;}

/* ═══════════════════════════════════════
   DARK STORY PAGES
═══════════════════════════════════════ */
.p{position:relative;z-index:1;width:100%;height:100%;
  padding:clamp(1.3rem,3.2vw,2.4rem) clamp(1rem,2.5vw,2rem);
  display:flex;flex-direction:column;overflow:hidden;}
.p::before{content:"";position:absolute;inset:clamp(7px,1.2vw,12px);border:1px solid rgba(184,149,106,.045);pointer-events:none;z-index:0;}
.ch-label{font-family:'Cinzel',serif;font-size:clamp(.38rem,.6vw,.52rem);letter-spacing:.4em;text-transform:uppercase;color:var(--crimson2);margin-bottom:clamp(.5rem,1.2vw,.9rem);opacity:.8;}
.pt{font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(1.05rem,2.1vw,1.7rem);line-height:1.15;color:var(--gold);margin-bottom:.55rem;}
.pt-sm{font-size:clamp(.88rem,1.65vw,1.3rem);}
.pb{font-family:'Crimson Pro',serif;font-size:clamp(.83rem,1.35vw,1.05rem);line-height:1.82;color:var(--ink2);font-weight:300;position:relative;z-index:1;}
.pb em{color:var(--ink);font-style:italic}
.hr{width:32px;height:1px;background:linear-gradient(to right,transparent,var(--crimson),transparent);margin:.7rem 0;opacity:.45;}
.qblock{border-left:2px solid rgba(201,64,64,.25);padding:.45rem .8rem .45rem .9rem;margin:.45rem 0;}
.qtext{font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(.82rem,1.35vw,1.05rem);line-height:1.58;color:var(--ink);}
.qcite{font-family:'Cinzel',serif;font-size:clamp(.33rem,.52vw,.46rem);letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);margin-top:.4rem;}
.idx-list{display:flex;flex-direction:column;}
.idx-item{display:flex;align-items:baseline;gap:.7rem;padding:clamp(.42rem,.85vw,.65rem) 0;border-bottom:1px solid rgba(184,149,106,.07);cursor:pointer;transition:border-color .3s;}
.idx-item:hover{border-color:rgba(201,64,64,.18)}.idx-item:hover .idx-t{color:var(--crimson2)}
.idx-n{font-family:'Cinzel',serif;font-size:clamp(.48rem,.76vw,.62rem);color:var(--ink3);min-width:1.7rem;letter-spacing:.04em;}
.idx-t{font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(.8rem,1.35vw,1.02rem);color:var(--ink);flex:1;line-height:1.25;transition:color .3s;}
.idx-more{padding:.45rem 0;border-bottom:none;justify-content:flex-end;}
.idx-more-txt{font-family:'Cinzel',serif;font-size:clamp(.36rem,.56vw,.5rem);letter-spacing:.28em;color:var(--ink3);text-transform:uppercase;}
.pnum{position:absolute;bottom:clamp(.55rem,1.2vw,1rem);left:0;right:0;font-family:'Cinzel',serif;font-size:clamp(.36rem,.56vw,.5rem);letter-spacing:.28em;text-transform:uppercase;color:var(--ink3);text-align:center;opacity:.6;}
.sub-wrap{display:flex;flex-direction:column;gap:.75rem;}
.sub-label{font-family:'Cinzel',serif;font-size:clamp(.36rem,.56vw,.5rem);letter-spacing:.3em;text-transform:uppercase;color:var(--ink3);}
.sub-input{background:transparent;border:none;border-bottom:1px solid rgba(184,149,106,.18);color:var(--ink);font-family:'Crimson Pro',serif;font-size:clamp(.83rem,1.35vw,1.05rem);padding:.35rem 0;outline:none;font-style:italic;transition:border-color .3s;}
.sub-input::placeholder{color:var(--ink3)}.sub-input:focus{border-color:rgba(201,64,64,.45);}
.sub-btn{align-self:flex-start;background:transparent;border:1px solid var(--gold-dim);color:var(--gold-mid);font-family:'Cinzel',serif;font-size:clamp(.36rem,.56vw,.5rem);letter-spacing:.3em;text-transform:uppercase;padding:.45rem 1rem;cursor:pointer;transition:all .3s;}
.sub-btn:hover{background:var(--gold-faint);border-color:var(--gold);}

/* ═══════════════════════════════════════
   FLIP LEAF
═══════════════════════════════════════ */
.leaf{
  position:absolute;top:0;left:var(--pw);width:var(--pw);height:var(--ph);
  transform-origin:left center;transform-style:preserve-3d;
  z-index:20;display:none;pointer-events:none;
}
.leaf-face,.leaf-back{position:absolute;inset:0;backface-visibility:hidden;overflow:hidden;}
.leaf-back{transform:rotateY(180deg)}
.leaf-face::after,.leaf-back::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(to right,rgba(0,0,0,.45) 0%,transparent 22%,transparent 78%,rgba(0,0,0,.18) 100%);
  pointer-events:none;z-index:10;
}

/* ═══════════════════════════════════════
   NAV
═══════════════════════════════════════ */
.nav-row{display:flex;align-items:center;gap:clamp(.8rem,2.5vw,2rem);z-index:10;opacity:0;transition:opacity .5s;}
.nav-row.show{opacity:1}
.nav-btn{background:transparent;border:none;font-family:'Cinzel',serif;font-size:clamp(.5rem,.8vw,.68rem);letter-spacing:.28em;text-transform:uppercase;color:rgba(148,12,12,0.70);cursor:pointer;padding:.3rem .4rem;transition:color .3s;font-weight:600;}
.nav-btn:hover:not(:disabled){color:rgba(148,12,12,1)}.nav-btn:disabled{opacity:.18;cursor:default;}
.nav-label{font-family:'Cinzel',serif;font-size:clamp(.34rem,.55vw,.48rem);letter-spacing:.22em;text-transform:uppercase;color:var(--ink3);opacity:.55;text-align:center;min-width:90px;}
.zone{position:absolute;top:0;bottom:0;width:38%;z-index:15;cursor:pointer;display:none;}
.zone-l{left:0}.zone-r{right:0}
.book-open .zone{display:block}

/* ═══════════════════════════════════════
   MOBILE
═══════════════════════════════════════ */
@media(max-width:700px){
  :root{--pw:clamp(240px,88vw,390px);--ph:calc(var(--pw)*1.54);--sw:12px;}
  .book-open.spread{width:var(--pw);}
  .pg-l,.book-spine{display:none;}
  .pg-r::after{display:none;}.pg-r{box-shadow:none;}
  .leaf{left:0;width:var(--pw);}
  .pg-r .p-journal{clip-path:none;}
  .pg-l .p-journal{clip-path:none;}
  .pb{font-size:clamp(.95rem,3.8vw,1.12rem);line-height:1.88;}
  .pt{font-size:clamp(1.15rem,4.8vw,1.6rem);}
  .j-body{font-size:clamp(1rem,4vw,1.2rem);}
  .j-title{font-size:clamp(2rem,7vw,3rem);}
  .idx-t{font-size:clamp(.94rem,3.8vw,1.1rem);}
  .idx-item{padding:.7rem 0;}
  .ch-label{font-size:clamp(.46rem,1.9vw,.62rem);}
}
</style>
</head>
<body>
<div id="cr"></div><div id="cd"></div>
<div class="scene">

  </div>

  </div>
</div>

<script>
const PAGES=["<div class=\"p-journal p-doodle\">\n<div class=\"paper-grain\"></div>\n<svg class=\"doodle-svg\" viewBox=\"0 0 300 460\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n\n<!-- ══ ZZZ — top left ══ -->\n<g transform=\"translate(12,14)\"><g class=\"fi1\">\n  <text x=\"0\" y=\"82\" font-family=\"Caveat,cursive\" font-size=\"50\" fill=\"rgba(148,12,12,0.80)\" transform=\"rotate(-14,0,82)\">Z</text>\n  <text x=\"42\" y=\"44\" font-family=\"Caveat,cursive\" font-size=\"32\" fill=\"rgba(148,12,12,0.52)\" transform=\"rotate(-10,42,44)\">z</text>\n  <text x=\"70\" y=\"18\" font-family=\"Caveat,cursive\" font-size=\"20\" fill=\"rgba(148,12,12,0.30)\" transform=\"rotate(-7,70,18)\">z</text>\n  <path d=\"M18 74 C32 58 42 48 54 36 C62 26 68 18 74 10\" stroke=\"rgba(148,12,12,0.15)\" stroke-width=\"1.3\" stroke-dasharray=\"2 5\" stroke-linecap=\"round\"/>\n</g></g>\n\n<!-- ══ BRAIN — top right, detailed crosshatch ══ -->\n<g transform=\"translate(206,22)\"><g class=\"fi3\">\n  <!-- Left hemisphere -->\n  <path d=\"M14 42 C4 40 0 32 0 24 C0 14 6 6 14 4 C12 0 18 -2 22 2 C26 -4 34 -2 36 4 C44 4 50 12 50 22 C50 30 46 38 38 42Z\"\n    stroke=\"rgba(148,12,12,0.78)\" stroke-width=\"2.2\" fill=\"none\" stroke-linecap=\"round\"/>\n  <!-- Central fold line -->\n  <path d=\"M22 2 C22 10 22 22 22 34 C22 38 22 42 22 42\"\n    stroke=\"rgba(148,12,12,0.55)\" stroke-width=\"1.8\" fill=\"none\" stroke-linecap=\"round\"/>\n  <!-- Left lobe gyri — wrinkled folds -->\n  <path d=\"M4 18 C6 14 10 12 14 14 C18 16 18 20 14 22 C10 24 6 22 6 18\"\n    stroke=\"rgba(148,12,12,0.42)\" stroke-width=\"1.5\" fill=\"none\" stroke-linecap=\"round\"/>\n  <path d=\"M4 28 C6 24 10 22 14 24 C18 26 18 30 14 32 C10 34 5 32 4 28\"\n    stroke=\"rgba(148,12,12,0.40)\" stroke-width=\"1.4\" fill=\"none\" stroke-linecap=\"round\"/>\n  <path d=\"M8 36 C10 32 14 31 17 33 C20 35 18 39 14 40\"\n    stroke=\"rgba(148,12,12,0.38)\" stroke-width=\"1.4\" fill=\"none\" stroke-linecap=\"round\"/>\n  <!-- Right lobe gyri -->\n  <path d=\"M28 14 C30 10 36 10 38 14 C40 18 38 22 34 22 C30 22 28 18 28 14\"\n    stroke=\"rgba(148,12,12,0.42)\" stroke-width=\"1.5\" fill=\"none\" stroke-linecap=\"round\"/>\n  <path d=\"M26 24 C28 20 34 20 36 24 C38 28 36 32 32 32 C28 32 26 28 26 24\"\n    stroke=\"rgba(148,12,12,0.40)\" stroke-width=\"1.4\" fill=\"none\" stroke-linecap=\"round\"/>\n  <path d=\"M28 34 C30 30 36 30 38 34 C40 38 37 42 34 42\"\n    stroke=\"rgba(148,12,12,0.38)\" stroke-width=\"1.4\" fill=\"none\" stroke-linecap=\"round\"/>\n  <!-- Cross-contour shadow hatching -->\n  <path d=\"M2 16 C6 15 10 15 14 16\" stroke=\"rgba(148,12,12,0.13)\" stroke-width=\"1.1\" fill=\"none\" stroke-linecap=\"round\"/>\n  <path d=\"M2 22 C6 21 10 21 14 22\" stroke=\"rgba(148,12,12,0.12)\" stroke-width=\"1\" fill=\"none\" stroke-linecap=\"round\"/>\n  <path d=\"M36 16 C40 15 44 15 48 16\" stroke=\"rgba(148,12,12,0.13)\" stroke-width=\"1.1\" fill=\"none\" stroke-linecap=\"round\"/>\n  <path d=\"M36 22 C40 21 44 21 48 22\" stroke=\"rgba(148,12,12,0.12)\" stroke-width=\"1\" fill=\"none\" stroke-linecap=\"round\"/>\n  <!-- Brain stem -->\n  <path d=\"M18 42 C17 46 17 50 18 52 L24 52 C25 50 25 46 24 42\"\n    stroke=\"rgba(148,12,12,0.65)\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\"/>\n  <path d=\"M18 48 L24 48\" stroke=\"rgba(148,12,12,0.30)\" stroke-width=\"1.2\" stroke-linecap=\"round\"/>\n</g></g>\n\n<!-- ══ SYRINGE — mid left ══ -->\n<g transform=\"translate(16,156)\"><g class=\"fi2\">\n  <!-- Syringe body cylinder -->\n  <path d=\"M8 0 L8 58 C8 60 10 62 14 62 C18 62 20 60 20 58 L20 0 C20 -2 18 -4 14 -4 C10 -4 8 -2 8 0Z\"\n    stroke=\"rgba(148,12,12,0.72)\" stroke-width=\"2\" fill=\"none\"/>\n  <!-- Graduation marks on barrel -->\n  <line x1=\"8\" y1=\"10\" x2=\"5\" y2=\"10\" stroke=\"rgba(148,12,12,0.45)\" stroke-width=\"1.4\" stroke-linecap=\"round\"/>\n  <line x1=\"8\" y1=\"18\" x2=\"6\" y2=\"18\" stroke=\"rgba(148,12,12,0.38)\" stroke-width=\"1.2\" stroke-linecap=\"round\" e\"/>\n  <text x=\"7\" y=\"46\" font-family=\"Caveat,cursive\" font-size=\"11.5\" fill=\"rgba(148,12,12,0.70)\" font-weight=\"700\">LUZ</text>\n  <text x=\"7\" y=\"60\" font-family=\"Caveat,cursive\" font-size=\"11.5\" fill=\"rgba(148,12,12,0.70)\" font-weight=\"700\">CÁMARA</text>\n  <text x=\"7\" y=\"74\" font-family=\"Caveat,cursive\" font-size=\"11.5\" fill=\"rgba(148,12,12,0.78)\" font-weight=\"700\">TERROR</text>\n  <!-- Board top bar -->\n  <path d=\"M1 12 L1 24 L71 24 L71 12 C71 11 70 10 69 10 L3 10 C2 10 1 11 1 12Z\"\n    stroke=\"rgba(148,12,12,0.62)\" stroke-width=\"2\" fill=\"none\"/>\n  <line x1=\"12\" y1=\"10\" x2=\"18\" y2=\"24\" stroke=\"rgba(148,12,12,0.40)\" stroke-width=\"1.6\"/>\n  <line x1=\"24\" y1=\"10\" x2=\"30\" y2=\"24\" stroke=\"rgba(148,12,12,0.40)\" stroke-width=\"1.6\"/>\n  <line x1=\"36\" y1=\"10\" x2=\"42\" y2=\"24\" stroke=\"rgba(148,12,12,0.40)\" stroke-width=\"1.6\"/>\n  <line x1=\"48\" y1=\"10\" x2=\"54\" y2=\"24\" stroke=\"rgba(148,12,12,0.40)\" stroke-width=\"1.6\"/>\n  <circle cx=\"5\" cy=\"12\" r=\"3\" stroke=\"rgba(148,12,12,0.55)\" stroke-width=\"1.5\" fill=\"none\"/>\n  <!-- Body shadow hatch -->\n  <path d=\"M3 28 L3 78\" stroke=\"rgba(148,12,12,0.13)\" stroke-width=\"1.3\" stroke-linecap=\"round\"/>\n  <path d=\"M5 28 L5 78\" stroke=\"rgba(148,12,12,0.10)\" stroke-width=\"1\" stroke-linecap=\"round\"/>\n</g>\n<!-- Arm animated -->\n<g class=\"clap-arm\">\n  <path d=\"M0 0 L70 -15\" stroke=\"rgba(148,12,12,0.65)\" stroke-width=\"14\" stroke-linecap=\"square\"/>\n  <path d=\"M0 0 L70 -15\" stroke=\"rgba(245,236,218,0.96)\" stroke-width=\"9.5\" stroke-linecap=\"square\"/>\n  <line x1=\"10\" y1=\"-2\" x2=\"18\" y2=\"-4\" stroke=\"rgba(148,12,12,0.80)\" stroke-width=\"9.5\"/>\n  <line x1=\"28\" y1=\"-6\" x2=\"36\" y2=\"-8\" stroke=\"rgba(148,12,12,0.80)\" stroke-width=\"9.5\"/>\n  <line x1=\"46\" y1=\"-10\" x2=\"54\" y2=\"-12\" stroke=\"rgba(148,12,12,0.80)\" stroke-width=\"9.5\"/>\n</g></g>\n\n<!-- ══ HASHTAG — center ══ -->\ é ...</text>\n</g></g>\n\n<!-- ══ HEART — bottom right ══ -->\n<g transform=\"translate(246,440)\"><g class=\"fi2\">\n  <path d=\"M14 20 C10 14 2 10 2 17 C2 24 14 34 26 40 C38 34 50 24 50 17 C50 10 42 14 38 20 C34 12 18 12 14 20Z\"\n    stroke=\"rgba(148,12,12,0.60)\" stroke-width=\"2\" fill=\"rgba(148,12,12,0.07)\"/>\n  <path d=\"M10 20 C14 18 20 17 26 17 C32 17 38 18 42 20\" stroke=\"rgba(148,12,12,0.14)\" stroke-width=\"1.1\" fill=\"none\" stroke-linecap=\"round\"/>\n  <path d=\"M8 26 C12 24 18 23 26 23 C34 23 40 24 44 26\" stroke=\"rgba(148,12,12,0.12)\" stroke-width=\"1\" fill=\"none\" stroke-linecap=\"round\"/>\n</g></g>\n\n</svg>\n</div>", "<div class=\"p-journal p-lined\">\n  <div class=\"paper-grain\"></div>\n  <div class=\"paper-stain s3\"></div>\n  <div class=\"journal-lines\"></div>\n  <div class=\"lined-content\">\n    <h2 class=\"j-title j-title-red\">Prólogo</h2>\n    <p class=\"j-body\">Alguna vez leí que todos los sueños tienen significado, pero yo creo que son mensajes codificados que mi subconsciente usa para arruinarme el día. Cada vez que me despertaba intranquila por alguno, abría inmediatamente Google y buscaba cosas como: <em>\"soñar con ver ballenas volando\"</em>.</p>\n    <p class=\"j-body\">Los resultados eran alentadores: <em>\"grandes proyectos se avecinan\"</em>, <em>\"épocas de creatividad\"</em>, <em>\"prosperidad\"</em>, etc. Genial, pensaba, eso es genial.</p>\n    <p class=\"j-body\">Aunque, en mis sueños, las ballenas eran extremadamente terroríficas y yo estaba en pleno mar, atrapada en una caja de cristal mientras ellas intentaban romperla. Exactamente eso no se encuentra en Google, detalles que no creo haya considerado quien decidió que soñar con ballenas voladoras es de buen augurio.</p>\n    <p class=\"j-body\">Mi oráculo moderno (Google) no me da las respuestas que necesito. Prefiero pensar que los sueños son historias que buscan ser contadas.</p>\n    <span class=\"pnum j-pnum\">ii</span>\n  </div>\n</div>", "<div class=\"p-journal p-lined\">\n  <div class=\"paper-grain\"></div>\n  <div class=\"journal-lines\"></div>\n  <div class=\"lined-content\">\n    <p class=\"j-body\">Por ello, decidí plasmar parte de mi mundo onírico en relatos cortos. Quizás al escribirlos pueda entender por qué mi mente profunda insiste en mostrarme ballenas voladoras y cajas de cristal que se resquebrajan.</p>\n    <p class=\"j-body\">Y de paso, contribuir al arte y la ficción porque la ficción me ha salvado la vida en más de una ocasión y, si lo piensas bien, probablemente también haya salvado la tuya… y la de tu madre <em>(imagina un mundo sin novelas mexicanas: qué triste)</em></p>\n    <p class=\"j-body j-closing\">Así que, si te gustan las historias cortas, perturbadoras y sin gracia, bienvenido(a).</p>\n    <div class=\"j-sig-block\">\n      <svg viewBox=\"0 0 180 42\" fill=\"none\" class=\"j-sig-svg\">\n        <path d=\"M8 34 C18 12 36 8 54 22 C64 30 70 32 80 20 C92 6 110 14 116 26 C126 42 138 34 152 22 C162 14 170 20 175 28\" stroke=\"rgba(40,22,8,0.45)\" stroke-width=\"1.6\" fill=\"none\" stroke-linecap=\"round\"/>\n      </svg>\n      <p class=\"j-sig-name\">Maria E. Castillo</p>\n    </div>\n    <span class=\"pnum j-pnum\">iii</span>\n  </div>\n</div>", "<div class=\"p-journal p-lined\">\n  <div class=\"paper-grain\"></div>\n  <div class=\"journal-lines\"></div>\n  <div class=\"lined-content\">\n    <h2 class=\"j-title j-idx-title\">Los sueños</h2>\n    <div class=\"j-idx\">\n      <div class=\"j-idx-item\"><span class=\"j-idx-n\">01 —</span><span class=\"j-idx-t\">¿Y si yo soy la mala del cuento?</span></div>\n      <div class=\"j-idx-item\"><span class=\"j-idx-n\">02 —</span><span class=\"j-idx-t\">El gato</span></div>\n      <div class=\"j-idx-item\"><span class=\"j-idx-n\">03 —</span><span class=\"j-idx-t\">Ayúdame a matarlo</span></div>\n      <div class=\"j-idx-item\"><span class=\"j-idx-n\">04 —</span><span class=\"j-idx-t\">Noche críptica en Sepia</span></div>\n      <div class=\"j-idx-item\"><span class=\"j-idx-n\">05 —</span><span class=\"j-idx-t\">¿Desperté?</span></div>\n      <div class=\"j-idx-item\"><span class=\"j-idx-n\">06 —</span><span class=\"j-idx-t\">Microchip</span></div>\n      <div class=\"j-idx-item\"><span class=\"j-idx-n\">07 —</span><span class=\"j-idx-t\">Mi Miss Hyde</span></div>\n      <div class=\"j-idx-item\"><span class=\"j-idx-n\">08 —</span><span class=\"j-idx-t\">No quiero ser bella</span></div>\n    </div>\n    <span class=\"pnum j-pnum\">iv</span>\n  </div>\n</div>", "<div class=\"p-journal p-lined\">\n  <div class=\"paper-grain\"></div>\n  <div class=\"journal-lines\"></div>\n  <div class=\"lined-content\" style=\"padding-top:clamp(.8rem,2vw,1.4rem)\">\n    <div class=\"j-idx\">\n      <div class=\"j-idx-item\"><span class=\"j-idx-n\">09 —</span><span class=\"j-idx-t\">Adiós, Morfeo</span></div>\n      <div class=\"j-idx-item\"><span class=\"j-idx-n\">10 —</span><span class=\"j-idx-t\">¿Hay algún zombi en la sala?</span></div>\n      <div class=\"j-idx-item\"><span class=\"j-idx-n\">11 —</span><span class=\"j-idx-t\">Luces, cámara, terror</span></div>\n      <div class=\"j-idx-item\"><span class=\"j-idx-n\">12 —</span><span class=\"j-idx-t\">Efecto Glitch</span></div>\n      <div class=\"j-idx-item\"><span class=\"j-idx-n\">13 —</span><span class=\"j-idx-t\">Distopía en el Mall</span></div>\n      <div class=\"j-idx-item\"><span class=\"j-idx-n\">14 —</span><span class=\"j-idx-t\">Vaca in blue</span></div>\n      <div class=\"j-idx-item\"><span class=\"j-idx-n\">15 —</span><span class=\"j-idx-t\">No cruces la puerta</span></div>\n      <div class=\"j-idx-item\" style=\"margin-top:.5rem;padding-top:.5rem;border-top:1px solid rgba(30,60,130,0.12)\">\n        <span class=\"j-idx-n\" style=\"font-style:italic\">B —</span><span class=\"j-idx-t\" style=\"font-style:italic\">Bonus Experimental</span>\n      </div>\n      <div class=\"j-idx-item\"><span class=\"j-idx-n\">16 —</span><span class=\"j-idx-t\">Pesadilla: La Incredulidad</span></div>\n      <div class=\"j-idx-item\"><span class=\"j-idx-n\">17 —</span><span class=\"j-idx-t\">Dejen Dormir</span></div>\n    </div>\n    <span class=\"pnum j-pnum\">v</span>\n  </div>\n</div>", "<div class=\"p\"><p class=\"ch-label\">Relato 01</p><h2 class=\"pt\">¿Y si yo soy la mala del cuento?</h2><div class=\"hr\"></div><p class=\"pb\">Descendí las escaleras hacia el taller de mi padre. El silencio era intrigante; nunca había silencio cuando papá estaba allí. Al llegar, encontré a mi madre, mi padre y mis dos hermanos, inmóviles. No hablaban, solo se miraban entre sí con los ojos desmesuradamente abiertos. Durante los casi dos minutos que los observé, no parpadearon ni una sola vez.</p><br><p class=\"pb\">Miré hacia la calle y vi a un hombre con gabardina y sombrero gris. Llevaba una jeringa. En mi mente lo bauticé como <em>El Inyectador</em>. Las personas inoculadas empezaban a comportarse de manera extraña, robotizados.</p><span class=\"pnum\">1</span></div>", "<div class=\"p\"><p class=\"pb\">Salí corriendo por la puerta trasera. Vi cómo la luna descendía del cielo; era enorme, de un gris fantasmal y aterradoramente hermosa. El cielo tenía un color negro azulado, un contraste demasiado bello para una situación tan perturbadora. De fondo, se escuchaban unos... ¿sonidos de trompetas?</p><br><p class=\"pb\">La vi caer. —¡Mierda! ¡No puede ser! El cielo se partió en dos. Tucutún, tucutún, tucutún.</p><br><p class=\"pb\">Al voltear, un escalofrío me recorrió la espalda. Detrás de mí estaba el diablo. Un hombre enorme de piel roja, torso muy bien trabajado en los gimnasios del infierno.</p><br><p class=\"pb\" style=\"color:var(--ink);font-style:italic\">¿Y si la mala del cuento era yo?</p><span class=\"pnum\">2</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 02</p><h2 class=\"pt\">El gato</h2><div class=\"hr\"></div><p class=\"pb\">Un crujido inesperado me arrancó el sueño. Acaricié el pelaje sedoso del gato negro acurrucado en mi regazo, pero él se escurrió para sentarse a mi lado. Todo se volvió silencio — ese silencio que indica que está ocurriendo algo inminente.</p><br><p class=\"pb\">Algo se acercaba. No era un caballo real. Era su sombra, su espectro: una silueta sin cuerpo ni mirada.</p><br><p class=\"pb\" style=\"color:var(--ink);font-style:italic\">La dueña del gato era ella.</p><span class=\"pnum\">3</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 03</p><h2 class=\"pt\">Ayúdame a matarlo</h2><div class=\"hr\"></div><p class=\"pb\">Había un niño. Estaba dentro de mí — o eso parecía. Quería salir y yo lo sentía moverse, pero no era un niño de verdad.</p><br><div class=\"qblock\"><p class=\"qtext\">\"Soy sus miedos más ocultos, sus ganas de morir, las ganas que tiene de hacerle daño a otros, sus mentiras, sus prejuicios — todo lo negro de su alma soy yo.\"</p></div><br><p class=\"pb\">— Ayúdame a matarlo — supliqué.</p><br><p class=\"pb\" style=\"color:var(--ink2);font-style:italic\">Nadie respondió. El silencio fue la respuesta.</p><span class=\"pnum\">4</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 04</p><h2 class=\"pt\">Noche críptica en Sepia</h2><div class=\"hr\"></div><p class=\"pb\">Las luces de los postes emanaban una luz tenue amarilla, envolviendo la noche en un filtro sepia. Él estaba de espaldas a mí. La sangre, a pesar de su brillo dorado bajo la luz amarillenta, era la única evidencia de algo que no podía entender.</p><br><div class=\"qblock\"><p class=\"qtext\">De fondo sonaba <em>Midnight City</em> de M83 — una canción que solía escuchar en noches menos complicadas.</p></div><br><p class=\"pb\" style=\"color:var(--ink);font-style:italic\">Nunca puedo recordar su rostro.</p><span class=\"pnum\">5</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 05</p><h2 class=\"pt\">¿Desperté?</h2><div class=\"hr\"></div><p class=\"pb\">El espejo estaba roto. La tubería del lavabo también. El agua salpicaba de formas extrañas. Intenté limpiarla pero mis manos atravesaban todo.</p><br><p class=\"pb\">Frente al espejo roto encontré algo. Un reflejo que se movía diferente — un segundo más lento, un grado más frío. Esa no era yo. O al menos, me veía — pero no me reconocía.</p><br><p class=\"pb\" style=\"color:var(--ink2);font-style:italic\">¿Desperté? ¿O aún estoy ahí adentro?</p><span class=\"pnum\">6</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 06</p><h2 class=\"pt\">Microchip</h2><div class=\"hr\"></div><p class=\"pb\">Tomé el bisturí sin vacilar y con total frialdad empecé a despojarme de las capas que protegían mi cabeza. No pensaba. Solo ejecutaba. Había algo ahí adentro. Un chip. Pequeño y frío.</p><br><div class=\"qblock\"><p class=\"qtext\">\"¿Alguna vez terminarás lo que empiezas?\" — sollozó alguien sin levantar la mirada.</p></div><br><p class=\"pb\" style=\"color:var(--ink2);font-style:italic\">No respondí. Ya había terminado.</p><span class=\"pnum\">7</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 07</p><h2 class=\"pt\">Mi Miss Hyde</h2><div class=\"hr\"></div><p class=\"pb\">Con los ojos cerrados, dejé que el agua me recorriera. Cuando los abrí, su imagen me golpeó: una mujer diminuta, de joroba prominente, estaba a mi lado. Vestía de negro de pies a cabeza. Su inquietante sonrisa me causó una ternura inexplicable.</p><br><p class=\"pb\">Tomé su cabeza con mis manos y la introduje en mi pierna derecha. Ella entró sin resistencia.</p><br><p class=\"pb\" style=\"color:var(--ink);font-style:italic\">Ese era el lugar al que pertenecía. Despertamos.</p><span class=\"pnum\">8</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 08</p><h2 class=\"pt\">No quiero ser bella</h2><div class=\"hr\"></div><p class=\"pb\">Lea llevaba semanas insistiendo. \"Hazlo\", decía con esa sonrisa que no llegaba a sus ojos. Cedí. Cuando miré mi mano, dentro de la piel había unos gusanos blancos, muy pequeños. Empecé a sentir cómo se retorcían ahí dentro.</p><br><p class=\"pb\">Lea me sonrió. Su piel era perfecta.</p><br><p class=\"pb\" style=\"color:var(--ink2);font-style:italic\">No quiero ser bella de esta manera.</p><span class=\"pnum\">9</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 09</p><h2 class=\"pt\">Adiós, Morfeo</h2><div class=\"hr\"></div><p class=\"pb\">La primera vez llegó con el cabello castaño y los ojos claros. La segunda vez, negro el cabello y los ojos — brillando. Cada vez que despertaba dentro del sueño, su apariencia cambiaba.</p><br><div class=\"qblock\"><p class=\"qtext\">\"Para mí son meses, incluso años. Para ti son minutos u horas.\"</p></div><br><p class=\"pb\" style=\"color:var(--ink2);font-style:italic\">Tomé mi frazada y me fui a dormir a la sala.</p><span class=\"pnum\">10</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 10</p><h2 class=\"pt\">¿Hay algún zombi en la sala?</h2><div class=\"hr\"></div><p class=\"pb\">Los zombis se estaban alineando para hacer una coreografía. Empezó a sonar <em>Take Me on the Floor</em>, de The Veronicas. Pisé algo blando. Era una mano cercenada. Me disculpé por reflejo.</p><br><div class=\"qblock\"><p class=\"qtext\">— ¿Eres persona? — susurró sin mirarme.<br>— Sí... sí lo soy.</p></div><br><p class=\"pb\" style=\"color:var(--ink2);font-style:italic\">Era el único humano en la sala. Y todos me dedicaban una sonrisa.</p><span class=\"pnum\">11</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 11</p><h2 class=\"pt\">Luces, cámara, terror</h2><div class=\"hr\"></div><p class=\"pb\">Todo comenzó normalmente. Luego noté las cámaras. Pequeñas, estratégicamente ubicadas, siguiendo cada uno de mis movimientos.</p><br><div class=\"qblock\"><p class=\"qtext\">\"Eres la protagonista de la serie más exitosa de todos los tiempos.\"</p></div><br><p class=\"pb\" style=\"color:var(--ink2);font-style:italic\">Quizá ahora que sé que no es real, ya no les sirva como protagonista.</p><span class=\"pnum\">12</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 12</p><h2 class=\"pt\">Efecto Glitch</h2><div class=\"hr\"></div><p class=\"pb\">Caminaba entre la gente y nadie me veía. Mi presencia era un error en el sistema.</p><br><p class=\"pb\" style=\"color:var(--ink);font-style:italic\">Me sentí un glitch.</p><br><p class=\"pb\">Pude verme desde afuera: una silueta con bordes parpadeantes. Alguien levantó una jeringa enorme y la colocó contra mi sien. La violencia se repetía en ciclos. Sin avanzar. Sin salida.</p><span class=\"pnum\">13</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 13</p><h2 class=\"pt\">Distopía en el Mall</h2><div class=\"hr\"></div><p class=\"pb\">Era extraño ver a personas tan ridículamente atractivas atacando a otros en el centro comercial. No con violencia convencional — con sus lenguas.</p><br><p class=\"pb\">— Solo lamen — explicó el hombre a mi lado —. Te lamen la cara y en minutos eres guapo. Perfectamente simétrico.</p><br><p class=\"pb\">Vi a Lea entre ellos. Perfecta. Demasiado perfecta.</p><br><p class=\"pb\" style=\"color:var(--ink2);font-style:italic\">Corrí. Alguien me rozó la mejilla. Empecé a sentir el calor en mi cara.</p><span class=\"pnum\">14</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 14</p><h2 class=\"pt\">Vaca in blue</h2><div class=\"hr\"></div><p class=\"pb\">El campo era tranquilo hasta que las vi. Las vacas pastaban normalmente, pero sus cabezas eran deformes — rostros de seres humanos estirados sobre cráneos bovinos. La de la camisa azul marino me miró directamente. Sentí como si quisiera decirme algo urgente.</p><br><p class=\"pb\" style=\"color:var(--ink);font-style:italic\">Tenía que volver. No sé a dónde — pero tenía que volver.</p><span class=\"pnum\">15</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 15</p><h2 class=\"pt\">No cruces la puerta</h2><div class=\"hr\"></div><p class=\"pb\">La puerta marrón perfectamente tallada me causó intriga. La crucé. Treinta minutos, me dije.</p><br><div class=\"qblock\"><p class=\"qtext\">\"¿Dónde estuviste? Te buscamos tanto tiempo. Tantos años...\"</p></div><br><p class=\"pb\">— Solo me fui treinta minutos — dije.</p><br><p class=\"pb\" style=\"color:var(--ink);font-style:italic\">— Ya han pasado treinta años.</p><span class=\"pnum\">16</span></div>", "<div class=\"p\"><p class=\"ch-label\">Bonus Experimental</p><p class=\"pb\" style=\"font-style:italic;color:var(--ink2);margin-bottom:1rem\">En los siguientes relatos encontrarás fragmentos de sueños y pensamientos donde la ironía, el sarcasmo y las crisis existenciales se entrelazan sin disculparse.</p><div class=\"hr\" style=\"margin:1rem 0\"></div><div class=\"qblock\"><p class=\"qtext\">\"Sin embargo, ¡cuántas cosas estamos a punto de descubrir si la cobardía y la dejadez no entorpecieran nuestra curiosidad!\"</p><p class=\"qcite\">— Mary Shelley · Frankenstein</p></div><div class=\"hr\" style=\"margin:1rem 0\"></div><p class=\"pb\" style=\"font-style:italic;color:var(--ink3)\">Continúa, si te atreves.</p><span class=\"pnum\">xix</span></div>", "<div class=\"p\"><p class=\"ch-label\">Bonus · Relato 16</p><h2 class=\"pt\">Pesadilla: La Incredulidad</h2><div class=\"hr\"></div><p class=\"pb\">No podía dormir. Llevaba horas mirando el techo cuando decidí levantarme.</p><br><p class=\"pb\" style=\"color:var(--ink);font-style:italic\">— ¡A la mierda el diablo y a la mierda todo! — dije en voz baja pero con una intensidad sorprendente.</p><br><p class=\"pb\">El pasillo estaba lleno de siluetas. Bailaban iluminadas por luces multicolores — pero sin música. Solo movimiento. Solo cuerpos sin sonido.</p><br><p class=\"pb\" style=\"color:var(--ink2);font-style:italic\">¿Esto era real o seguía soñando? Decidí no averiguarlo.</p><span class=\"pnum\">xx</span></div>", "<div class=\"p\"><p class=\"ch-label\">Bonus · Relato 17</p><h2 class=\"pt\">Dejen Dormir</h2><div class=\"hr\"></div><p class=\"pb\" style=\"font-style:italic;color:var(--ink2)\">¿Qué es peor? ¿Estar loca o ser acechada por lo sobrenatural? ¿Fantasmas o extraterrestres? ¿Demonios o espíritus?</p><br><p class=\"pb\">Ella seguía dando vueltas a estas preguntas mientras su cama se convertía, paradójicamente, en su único refugio seguro.</p><br><p class=\"pb\" style=\"font-style:italic;color:var(--ink3);font-size:.85em\">(Pensamiento del narrador: claramente todo lo anterior es un pensamiento suyo. Lo estoy diciendo yo — el narrador — porque ella ya se durmió.)</p><br><p class=\"pb\" style=\"text-align:center;letter-spacing:.4em;font-size:.9em;color:var(--ink2)\">Shhh.</p><div class=\"hr\" style=\"margin:1.5rem auto;width:28px\"></div><p class=\"pb\" style=\"text-align:center;font-style:italic;color:var(--crimson2)\">Fin.</p><span class=\"pnum\">xxi</span></div>", "<div class=\"p\"><p class=\"ch-label\">Suscribirse</p><h2 class=\"pt\" style=\"margin-bottom:.8rem\">No te pierdas lo que viene</h2><div class=\"hr\"></div><p class=\"pb\" style=\"margin-bottom:1.5rem\">Nuevas historias, cortos y cosas perturbadoras, directo a tu correo.</p><div class=\"sub-wrap\"><label class=\"sub-label\">Tu correo</label><input type=\"email\" class=\"sub-input\" placeholder=\"tu@correo.com\"/><button class=\"sub-btn\">Suscribirse</button></div><span class=\"pnum\">xxii</span></div>", "<div class=\"p\" style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;text-align:center\"><svg width=\"44\" height=\"52\" viewBox=\"0 0 200 240\" fill=\"none\"><g stroke=\"#7a6040\" stroke-linecap=\"round\" opacity=\".4\"><path stroke-width=\".9\" d=\"M100 28 C128 22 162 38 168 70 C174 102 152 128 132 138 C148 148 158 168 140 180 C122 192 98 178 84 162 C60 172 38 156 36 132 C34 108 52 88 68 80 C48 66 42 42 62 32 C78 24 92 30 100 28Z\"/></g></svg><p style=\"font-family:'Caveat',cursive;font-size:clamp(1.2rem,2.5vw,1.8rem);color:var(--gold)\">Maria E. Castillo</p><p style=\"font-size:.6em;color:var(--ink3);letter-spacing:.2em;font-family:'Cinzel',serif\">LIMA · MMXXV</p><div style=\"width:26px;height:1px;background:var(--gold-faint);margin:.4rem auto\"></div><p style=\"font-size:.58em;color:var(--ink3)\">© 2025 — Todos los sueños reservados</p></div>"];
const JOURNAL_PAGES=3, FLIP=640, FADE=380;
let cur=-2, busy=false;
const mob=()=>window.innerWidth<=700;
const $ = id => document.getElementById(id);
const bookClosed=$('bookClosed'), bookOpen=$('bookOpen');
const pageL=$('pageL'), pageR=$('pageR');
const leaf=$('leaf'), leafFace=$('leafFace'), leafBack=$('leafBack');
const navRow=$('navRow'), navPrev=$('navPrev'), navNext=$('navNext'), navLabel=$('navLabel');
const zoneL=$('zoneL'), zoneR=$('zoneR');

function reZ(){pageR.appendChild(zoneL);pageR.appendChild(zoneR);}
function renderPages(idx){
  const m=mob();
  pageL.innerHTML=(!m&&idx>=0&&idx<PAGES.length)?PAGES[idx]:'';
  const ri=m?idx:idx+1;
  pageR.innerHTML=(ri>=0&&ri<PAGES.length)?PAGES[ri]:'';
  reZ();
  // Journal pages get paper background
  const isJ = idx < 5;
  bookOpen.classList.toggle('journal-spread', isJ);
}
function isJournalFlip(from,to){
  return from<JOURNAL_PAGES+1||to<JOURNAL_PAGES+1;
}
function maxCur(){return PAGES.length-(mob()?1:2);}
function step(){return mob()?1:2;}
function updateNav(){
  navPrev.disabled=(cur<=-1);
  navNext.disabled=(cur>=maxCur());
  navLabel.textContent=cur>=0?(((mob()?cur:cur+1)+1)+' / '+PAGES.length):'';
}
function showCover(){
  bookOpen.style.display='none';
  bookClosed.style.display='';
  bookClosed.style.opacity='0';
  bookClosed.style.transform='scale(.96)';
  navRow.classList.remove('show');
  requestAnimationFrame(()=>{
    bookClosed.style.transition='opacity .45s,transform .45s';
    bookClosed.style.opacity='1';bookClosed.style.transform='scale(1)';
  });
  cur=-2;
}
function openBook(){
  if(busy||cur>=0)return;
  busy=true;cur=0;
  bookClosed.style.transition='opacity .42s,transform .42s';
  bookClosed.style.opacity='0';bookClosed.style.transform='scale(.96)';
  setTimeout(()=>{
    bookClosed.style.display='none';bookClosed.style.transition='';
    bookOpen.style.display='flex';renderPages(cur);navRow.classList.add('show');updateNav();busy=false;
  },430);
}
function doFlip(isNext){
  const m=mob();
  const next=isNext?cur+step():Math.max(0,cur-step());
  const useFlip=isJournalFlip(cur,next);
  const dur=useFlip?FLIP:FADE;
  if(isNext){
    leafFace.innerHTML=m?PAGES[cur]:(cur+1<PAGES.length?PAGES[cur+1]:'');
    leafBack.innerHTML=m?PAGES[next]:(next<PAGES.length?PAGES[next]:'');
    const ri=m?next:next+1;
    pageR.innerHTML=ri<PAGES.length?PAGES[ri]:'';
    if(!m)pageL.innerHTML=next<PAGES.length?PAGES[next]:'';
    reZ();
    if(useFlip){
      leaf.style.display='block';leaf.style.transition='none';leaf.style.transform='rotateY(0deg)';
      leaf.getBoundingClientRect();
      leaf.style.transition=`transform ${dur}ms cubic-bezier(.645,.045,.355,1)`;
      leaf.style.transform='rotateY(-180deg)';
    }
  } else {
    const ri=m?next:next+1;
    leafFace.innerHTML=ri<PAGES.length?PAGES[ri]:'';
    leafBack.innerHTML=m?PAGES[cur]:(cur<PAGES.length?PAGES[cur]:'');
    if(!m)pageL.innerHTML=next<PAGES.length?PAGES[next]:'';
    if(useFlip){
      leaf.style.display='block';leaf.style.transition='none';leaf.style.transform='rotateY(-180deg)';
      leaf.getBoundingClientRect();
      leaf.style.transition=`transform ${dur}ms cubic-bezier(.645,.045,.355,1)`;
      leaf.style.transform='rotateY(0deg)';
    }
  }
  setTimeout(()=>{
    leaf.style.display='none';leaf.style.transform='';
    cur=next;renderPages(cur);updateNav();busy=false;
  },dur+20);
}
function flipNext(){if(busy||cur<0||cur>=maxCur())return;busy=true;doFlip(true);}
function flipPrev(){
  if(busy)return;
  if(cur<=0){if(cur===0)showCover();return;}
  busy=true;doFlip(false);
}
$('openHint').addEventListener('click',openBook);
bookClosed.addEventListener('click',openBook);
navNext.addEventListener('click',flipNext);navPrev.addEventListener('click',flipPrev);
zoneR.addEventListener('click',flipNext);zoneL.addEventListener('click',flipPrev);
document.addEventListener('keydown',e=>{
  if(cur<0){if(e.key==='Enter'||e.key===' ')openBook();return;}
  if(['ArrowRight','ArrowDown',' '].includes(e.key)){e.preventDefault();flipNext();}
  if(['ArrowLeft','ArrowUp'].includes(e.key)){e.preventDefault();flipPrev();}
});
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>40){dx<0?flipNext():flipPrev();}},{passive:true});
window.addEventListener('resize',()=>{if(cur>=0)renderPages(cur);});
const cd=$('cd'),cr=$('cr');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cd.style.left=mx+'px';cd.style.top=my+'px';});
(function loop(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;cr.style.left=rx+'px';cr.style.top=ry+'px';requestAnimationFrame(loop);})();
document.querySelectorAll('a,button,input,.open-hint,.book-closed,.zone').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cr.style.width='34px';cr.style.height='34px';cr.style.borderColor='rgba(184,149,106,.65)';});
  el.addEventListener('mouseleave',()=>{cr.style.width='22px';cr.style.height='22px';cr.style.borderColor='rgba(184,149,106,.35)';});
});
</script>
</body>
</html>
