<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>El arte de dormir terriblemente mal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Cinzel:wght@400;600&family=Cinzel+Decorative&family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --pw:  clamp(200px,25vw,360px);
  --ph:  calc(var(--pw)*1.54);
  --sw:  clamp(14px,1.8vw,22px);
  --gold:       #b8956a;
  --gold-mid:   #8a6e48;
  --gold-dim:   #5a4530;
  --gold-faint: #2e2010;
  --page:       #0e0a07;
  --ink:        #d0c4a8;
  --ink2:       #8a7a62;
  --ink3:       #52402e;
  --crimson:    #8a1e1e;
  --crimson2:   #c44040;

  /* journal / diary colors */
  --paper:      #f0e8c8;
  --paper2:     #ede0b0;
  --paper-dark: #d8c898;
  --paper-line: rgba(100,70,30,0.12);
  --sepia:      #2a1a08;
  --sepia2:     #4a3018;
  --sepia3:     #7a5830;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  background:
    radial-gradient(ellipse at 30% 20%,#1a0808 0%,transparent 60%),
    radial-gradient(ellipse at 70% 80%,#0f0810 0%,transparent 60%),
    #06050a;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:none;user-select:none;min-height:100vh;
  font-family:'Crimson Pro',serif;
}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.03;}
#cd,#cr{position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
#cd{width:4px;height:4px;background:var(--gold);border-radius:50%}
#cr{width:22px;height:22px;border:1px solid rgba(184,149,106,.35);border-radius:50%;transition:width .25s,height .25s,border-color .25s}

.scene{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(.7rem,1.8vh,1.4rem);width:100%;height:100%;}

/* ── CLOSED BOOK ── */
.book-closed{position:relative;width:var(--pw);height:var(--ph);cursor:pointer;
  filter:drop-shadow(0 30px 70px rgba(0,0,0,.85)) drop-shadow(0 8px 24px rgba(0,0,0,.6));}
.book-closed::before{content:"";position:absolute;top:4px;bottom:4px;right:-7px;width:8px;
  background:linear-gradient(to right,#c4b090 0%,#e8d8b0 35%,#bea870 65%,#9a8858 100%);z-index:-1;border-radius:0 1px 1px 0;}
.book-closed::after{content:"";position:absolute;top:8px;bottom:8px;right:-12px;width:5px;background:#8a7050;z-index:-2;border-radius:0 1px 1px 0;}

/* ── COVER ── */
.cover{position:absolute;inset:0;overflow:hidden;border-radius:1px 2px 2px 1px;
  background:
    repeating-linear-gradient(92deg,transparent 0px,rgba(255,255,255,.004) 1px,transparent 2px,transparent 4px),
    repeating-linear-gradient(180deg,transparent 0px,rgba(0,0,0,.035) 1px,transparent 3px,transparent 6px),
    radial-gradient(ellipse at 20% 15%,rgba(80,20,20,.6) 0%,transparent 38%),
    radial-gradient(ellipse at 75% 85%,rgba(45,10,10,.45) 0%,transparent 40%),
    linear-gradient(158deg,#2e1010 0%,#1e0808 12%,#160606 28%,#1c0a0a 45%,#140606 62%,#221010 78%,#180808 90%,#200e0e 100%);
  box-shadow:inset 2px 0 6px rgba(0,0,0,.55),inset -1px 0 3px rgba(0,0,0,.3),inset 0 0 50px rgba(0,0,0,.35);}
.cover::after{content:"";position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='turbulence' baseFrequency='.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
  opacity:.055;mix-blend-mode:overlay;pointer-events:none;}
.cover-frame{position:absolute;inset:clamp(10px,2.2vw,16px);border:1px solid rgba(184,149,106,.22);pointer-events:none;}
.cover-frame::before{content:"";position:absolute;inset:4px;border:1px solid rgba(184,149,106,.07);}
.c-corn{position:absolute;width:12px;height:12px;opacity:.55}
.c-corn svg{width:100%;height:100%}
.c-corn.tl{top:clamp(8px,1.8vw,14px);left:clamp(8px,1.8vw,14px)}
.c-corn.tr{top:clamp(8px,1.8vw,14px);right:clamp(8px,1.8vw,14px);transform:scaleX(-1)}
.c-corn.bl{bottom:clamp(8px,1.8vw,14px);left:clamp(8px,1.8vw,14px);transform:scaleY(-1)}
.c-corn.br{bottom:clamp(8px,1.8vw,14px);right:clamp(8px,1.8vw,14px);transform:scale(-1)}
.cover-spine{position:absolute;top:0;left:0;bottom:0;width:var(--sw);
  background:linear-gradient(to right,#0a0202 0%,#1e0606 40%,#1a0505 60%,#0a0202 100%);
  border-right:1px solid rgba(80,30,10,.3);z-index:5;}
.cover-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:clamp(20px,4.5vw,44px) clamp(14px,3vw,28px);
  padding-left:calc(var(--sw) + clamp(14px,3vw,28px));
  text-align:center;gap:.5rem;z-index:2;}
.cov-eyebrow{font-family:'Cinzel',serif;font-size:clamp(.38rem,.65vw,.54rem);letter-spacing:.42em;text-transform:uppercase;color:var(--gold-mid);opacity:.65;}
.cov-line{width:clamp(24px,2.5vw,38px);height:1px;background:linear-gradient(to right,transparent,var(--gold-dim),transparent);margin:.15rem auto;opacity:.7;}
.cov-title{font-family:'Cinzel Decorative',serif;font-size:clamp(.9rem,2vw,1.75rem);line-height:1.2;color:var(--gold);text-shadow:0 1px 0 rgba(40,20,5,.9),0 0 25px rgba(184,149,106,.18);letter-spacing:.03em;}
.cov-sub{font-family:'Cinzel',serif;font-size:clamp(.36rem,.58vw,.5rem);letter-spacing:.52em;text-transform:uppercase;color:var(--gold-dim);}
.cov-author{position:absolute;bottom:clamp(1rem,2.5vw,2rem);right:clamp(.8rem,2vw,1.6rem);font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(.7rem,1.3vw,1rem);color:var(--gold-dim);letter-spacing:.03em;z-index:3;}
.open-hint{position:absolute;bottom:0;right:0;width:48px;height:48px;cursor:pointer;z-index:10;}
.open-hint::before{content:"";position:absolute;bottom:0;right:0;width:0;height:0;border-style:solid;border-width:0 0 38px 38px;border-color:transparent transparent rgba(184,149,106,.16) transparent;transition:border-width .3s,border-color .3s;}
.open-hint:hover::before{border-width:0 0 50px 50px;border-color:transparent transparent rgba(184,149,106,.3) transparent;}

/* ── OPEN BOOK ── */
.book-open{display:none;position:relative;flex-direction:row;width:calc(var(--pw)*2 + var(--sw));height:var(--ph);
  filter:drop-shadow(0 30px 70px rgba(0,0,0,.85)) drop-shadow(0 8px 24px rgba(0,0,0,.6));}
.pg{width:var(--pw);height:var(--ph);position:relative;overflow:hidden;flex-shrink:0;}
.pg-l{background:linear-gradient(to right,#130d09,#0e0a07);box-shadow:inset -8px 0 18px rgba(0,0,0,.5);}
.pg-r{background:linear-gradient(to left,#130d09,#0e0a07);box-shadow:inset 8px 0 18px rgba(0,0,0,.5);}
.pg-r::after{content:"";position:absolute;top:4px;bottom:4px;right:-7px;width:8px;
  background:linear-gradient(to right,#c4b090 0%,#e0d0a8 35%,#bea870 65%,#9a8858 100%);border-radius:0 1px 1px 0;}
.pg::before{content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse at 100% 0%,rgba(40,28,14,.3) 0%,transparent 50%),radial-gradient(ellipse at 0% 100%,rgba(30,18,8,.25) 0%,transparent 50%);
  pointer-events:none;z-index:0;}
.book-spine{width:var(--sw);height:var(--ph);flex-shrink:0;
  background:linear-gradient(to right,#0e0404 0%,#200808 30%,#2a0c0c 50%,#1c0808 75%,#0e0404 100%);
  box-shadow:inset 2px 0 5px rgba(0,0,0,.5),inset -2px 0 5px rgba(0,0,0,.5);z-index:5;}

/* ── JOURNAL PAGES ── */
.p-journal{
  background:
    radial-gradient(ellipse at 30% 20%,rgba(255,245,200,.03) 0%,transparent 60%),
    linear-gradient(170deg,var(--paper) 0%,var(--paper2) 50%,var(--paper-dark) 100%);
  overflow:hidden;position:relative;
}
/* aged paper grain */
.journal-bg{
  position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='t'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23t)'/%3E%3C/svg%3E");
  opacity:.08;mix-blend-mode:multiply;
}
/* ruled lines like a diary */
.journal-lines{
  position:absolute;inset:0;pointer-events:none;z-index:1;
  background-image:repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 27px,
    var(--paper-line) 28px,
    var(--paper-line) 28px
  );
  background-size:100% 28px;
}
/* red margin line */
.journal-lines::before{
  content:"";position:absolute;
  left:clamp(28px,6vw,44px);top:0;bottom:0;width:1px;
  background:rgba(180,60,60,.18);
}
.journal-content{
  position:relative;z-index:2;
  width:100%;height:100%;
  padding:clamp(1.2rem,3vw,2rem) clamp(1.2rem,3vw,2rem);
  padding-left:clamp(38px,8vw,56px);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.journal-content-text{gap:.5rem;}

/* DOODLE area takes up most of left page */
.doodle-area{
  flex:1;position:relative;
  display:flex;align-items:center;justify-content:center;
  min-height:0;
}
.doodle-svg{
  width:90%;height:90%;
  max-height:clamp(150px,28vw,280px);
}

/* ZZZ float animations */
.hz1{animation:zzf1 4.5s ease-in-out infinite;}
.hz2{animation:zzf2 5.8s ease-in-out .8s infinite;}
.hz3{animation:zzf3 7s ease-in-out 1.6s infinite;}
@keyframes zzf1{0%,100%{transform:translateY(0) rotate(-8deg);opacity:.62}50%{transform:translateY(-11px) translateX(3px) rotate(-10deg);opacity:.82}}
@keyframes zzf2{0%,100%{transform:translateY(0) rotate(-6deg);opacity:.48}50%{transform:translateY(-9px) translateX(4px) rotate(-8deg);opacity:.65}}
@keyframes zzf3{0%,100%{transform:translateY(0) rotate(-5deg);opacity:.32}50%{transform:translateY(-7px) translateX(4px) rotate(-7deg);opacity:.48}}

/* eye blink */
.hd-eye{animation:eyeBlink 8s ease-in-out 2s infinite;}
@keyframes eyeBlink{0%,85%,100%{opacity:1}88%{opacity:.1}92%{opacity:1}}

/* star twinkle */
.s1{animation:stw 3.8s ease-in-out infinite;}
.s2{animation:stw 5s ease-in-out .6s infinite;}
.s3{animation:stw 4.2s ease-in-out 1.4s infinite;}
@keyframes stw{0%,100%{opacity:.35}50%{opacity:.85}}

/* journal tagline at bottom */
.journal-tagline{
  padding-top:.6rem;
  border-top:1px solid rgba(100,70,30,.14);
  flex-shrink:0;
}
.jt-text{
  font-family:'Caveat',cursive;
  font-size:clamp(.95rem,2vw,1.25rem);
  line-height:1.65;
  color:var(--sepia);
}
.jt-line{width:20px;height:1px;background:rgba(180,60,60,.3);margin:.4rem 0;}
.jt-byline{
  font-family:'Caveat',cursive;
  font-size:clamp(.82rem,1.6vw,1.05rem);
  line-height:1.6;
  color:var(--sepia2);
}

/* journal title (Prólogo) */
.j-title{
  font-family:'Caveat',cursive;
  font-weight:600;
  font-size:clamp(1.8rem,4.5vw,3rem);
  color:var(--sepia);
  margin-bottom:.4rem;
  line-height:1.1;
  /* slight hand-drawn tilt */
  transform:rotate(-1.5deg);
  display:inline-block;
}

/* journal body text */
.j-body{
  font-family:'Caveat',cursive;
  font-size:clamp(.92rem,1.8vw,1.15rem);
  line-height:1.72;
  color:var(--sepia);
  margin-bottom:.3rem;
}
.j-body em{color:var(--sepia2);font-style:italic;}
.j-body-closing{
  color:var(--sepia2);
  font-style:italic;
  margin-top:.4rem;
}

/* journal signature */
.j-sig-wrap{margin-top:clamp(.8rem,2vw,1.4rem);}
.j-sig-svg{width:clamp(100px,18vw,160px);display:block;margin-bottom:.1rem;}
.j-sig-name{
  font-family:'Caveat',cursive;
  font-size:clamp(.85rem,1.6vw,1.1rem);
  color:var(--sepia2);
  transform:rotate(-.8deg);
  display:inline-block;
}

/* pnum on journal pages */
.j-pnum{color:var(--sepia3) !important;}

/* ── DARK PAGES (stories, index) ── */
.p{position:relative;z-index:1;width:100%;height:100%;
  padding:clamp(1.3rem,3.2vw,2.4rem) clamp(1rem,2.5vw,2rem);
  display:flex;flex-direction:column;overflow:hidden;}
.p::before{content:"";position:absolute;inset:clamp(7px,1.2vw,12px);border:1px solid rgba(184,149,106,.045);pointer-events:none;z-index:0;}
.p-deco{display:flex;align-items:center;justify-content:center;}
.ch-label{font-family:'Cinzel',serif;font-size:clamp(.38rem,.6vw,.52rem);letter-spacing:.4em;text-transform:uppercase;color:var(--crimson2);margin-bottom:clamp(.5rem,1.2vw,.9rem);opacity:.8;}
.pt{font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(1.05rem,2.1vw,1.7rem);line-height:1.15;color:var(--gold);margin-bottom:.55rem;}
.pt-sm{font-size:clamp(.88rem,1.65vw,1.3rem);}
.pb{font-family:'Crimson Pro',serif;font-size:clamp(.83rem,1.35vw,1.05rem);line-height:1.82;color:var(--ink2);font-weight:300;position:relative;z-index:1;}
.pb em{color:var(--ink);font-style:italic}
.hr{width:32px;height:1px;background:linear-gradient(to right,transparent,var(--crimson),transparent);margin:.7rem 0;opacity:.45;}
.qblock{border-left:2px solid rgba(201,64,64,.25);padding:.45rem .8rem .45rem .9rem;margin:.45rem 0;}
.qtext{font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(.82rem,1.35vw,1.05rem);line-height:1.58;color:var(--ink);}
.qcite{font-family:'Cinzel',serif;font-size:clamp(.33rem,.52vw,.46rem);letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);margin-top:.4rem;}
.idx-list{display:flex;flex-direction:column;}
.idx-item{display:flex;align-items:baseline;gap:.7rem;padding:clamp(.42rem,.85vw,.65rem) 0;border-bottom:1px solid rgba(184,149,106,.07);cursor:pointer;transition:border-color .3s;}
.idx-item:hover{border-color:rgba(201,64,64,.18)}.idx-item:hover .idx-t{color:var(--crimson2)}
.idx-n{font-family:'Cinzel',serif;font-size:clamp(.48rem,.76vw,.62rem);color:var(--ink3);min-width:1.7rem;letter-spacing:.04em;}
.idx-t{font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(.8rem,1.35vw,1.02rem);color:var(--ink);flex:1;line-height:1.25;transition:color .3s;}
.idx-more{padding:.45rem 0;border-bottom:none;justify-content:flex-end;}
.idx-more-txt{font-family:'Cinzel',serif;font-size:clamp(.36rem,.56vw,.5rem);letter-spacing:.28em;color:var(--ink3);text-transform:uppercase;}
.pnum{position:absolute;bottom:clamp(.55rem,1.2vw,1rem);left:0;right:0;font-family:'Cinzel',serif;font-size:clamp(.36rem,.56vw,.5rem);letter-spacing:.28em;text-transform:uppercase;color:var(--ink3);text-align:center;opacity:.6;}
.sub-wrap{display:flex;flex-direction:column;gap:.75rem;}
.sub-label{font-family:'Cinzel',serif;font-size:clamp(.36rem,.56vw,.5rem);letter-spacing:.3em;text-transform:uppercase;color:var(--ink3);}
.sub-input{background:transparent;border:none;border-bottom:1px solid rgba(184,149,106,.18);color:var(--ink);font-family:'Crimson Pro',serif;font-size:clamp(.83rem,1.35vw,1.05rem);padding:.35rem 0;outline:none;font-style:italic;transition:border-color .3s;}
.sub-input::placeholder{color:var(--ink3)}.sub-input:focus{border-color:rgba(201,64,64,.45);}
.sub-btn{align-self:flex-start;background:transparent;border:1px solid var(--gold-dim);color:var(--gold-mid);font-family:'Cinzel',serif;font-size:clamp(.36rem,.56vw,.5rem);letter-spacing:.3em;text-transform:uppercase;padding:.45rem 1rem;cursor:pointer;transition:all .3s;}
.sub-btn:hover{background:var(--gold-faint);border-color:var(--gold);}

/* ── FLIP LEAF ── */
.leaf{position:absolute;top:0;left:var(--pw);width:var(--pw);height:var(--ph);transform-origin:left center;transform-style:preserve-3d;z-index:20;display:none;pointer-events:none;}
.leaf-face,.leaf-back{position:absolute;inset:0;backface-visibility:hidden;overflow:hidden;}
.leaf-back{transform:rotateY(180deg)}
.leaf-face::after,.leaf-back::after{content:"";position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.4) 0%,transparent 25%,transparent 75%,rgba(0,0,0,.18) 100%);pointer-events:none;z-index:10;}

/* ── NAV ── */
.nav-row{display:flex;align-items:center;gap:clamp(.8rem,2.5vw,2rem);z-index:10;opacity:0;transition:opacity .5s;}
.nav-row.show{opacity:1}
.nav-btn{background:transparent;border:none;font-family:'Cinzel',serif;font-size:clamp(.38rem,.62vw,.54rem);letter-spacing:.28em;text-transform:uppercase;color:var(--ink3);cursor:pointer;padding:.3rem .4rem;transition:color .3s;}
.nav-btn:hover:not(:disabled){color:var(--gold)}.nav-btn:disabled{opacity:.18;cursor:default;}
.nav-label{font-family:'Cinzel',serif;font-size:clamp(.34rem,.55vw,.48rem);letter-spacing:.22em;text-transform:uppercase;color:var(--ink3);opacity:.55;text-align:center;min-width:90px;}
.zone{position:absolute;top:0;bottom:0;width:38%;z-index:15;cursor:pointer;display:none;}
.zone-l{left:0}.zone-r{right:0}
.book-open .zone{display:block}

/* ── MOBILE ── */
@media(max-width:700px){
  :root{--pw:clamp(240px,88vw,390px);--ph:calc(var(--pw)*1.54);--sw:12px;}
  .book-open.spread{width:var(--pw);}
  .pg-l,.book-spine{display:none;}
  .pg-r::after{display:none;}.pg-r{box-shadow:none;}
  .leaf{left:0;width:var(--pw);}
  .pb{font-size:clamp(.95rem,3.8vw,1.12rem);line-height:1.88;}
  .pt{font-size:clamp(1.15rem,4.8vw,1.6rem);}
  .j-body{font-size:clamp(1rem,4vw,1.2rem);line-height:1.75;}
  .j-title{font-size:clamp(2rem,7vw,3.2rem);}
  .jt-text{font-size:clamp(1rem,4vw,1.2rem);}
  .jt-byline{font-size:clamp(.88rem,3.5vw,1.05rem);}
  .idx-t{font-size:clamp(.94rem,3.8vw,1.1rem);}
  .idx-item{padding:.7rem 0;}
  .ch-label{font-size:clamp(.46rem,1.9vw,.62rem);}
}
</style>
</head>
<body>
<div id="cr"></div><div id="cd"></div>
<div class="scene">

  <div class="book" id="bookWrap">
    <div class="book-closed" id="bookClosed">
      <div class="cover" id="coverEl">
        <div class="cover-spine"></div>
        <div class="cover-frame"></div>
        <div class="c-corn tl"><svg viewBox="0 0 20 20" fill="none"><path d="M1 19 L1 1 L19 1" stroke="rgba(184,149,106,.6)" stroke-width="1.2"/><circle cx="1" cy="1" r="1.5" fill="rgba(184,149,106,.5)"/></svg></div>
        <div class="c-corn tr"><svg viewBox="0 0 20 20" fill="none"><path d="M1 19 L1 1 L19 1" stroke="rgba(184,149,106,.6)" stroke-width="1.2"/><circle cx="1" cy="1" r="1.5" fill="rgba(184,149,106,.5)"/></svg></div>
        <div class="c-corn bl"><svg viewBox="0 0 20 20" fill="none"><path d="M1 19 L1 1 L19 1" stroke="rgba(184,149,106,.6)" stroke-width="1.2"/><circle cx="1" cy="1" r="1.5" fill="rgba(184,149,106,.5)"/></svg></div>
        <div class="c-corn br"><svg viewBox="0 0 20 20" fill="none"><path d="M1 19 L1 1 L19 1" stroke="rgba(184,149,106,.6)" stroke-width="1.2"/><circle cx="1" cy="1" r="1.5" fill="rgba(184,149,106,.5)"/></svg></div>
        <div class="cover-content">

<script>
const PAGES=["<div class=\"p p-journal\">\n  <div class=\"journal-bg\"></div>\n  <div class=\"journal-lines\"></div>\n  <div class=\"journal-content\">\n\n    <!-- hand-drawn ZZZ & eye doodles -->\n    <div class=\"doodle-area\" aria-hidden=\"true\">\n      <svg viewBox=\"0 0 220 200\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" class=\"doodle-svg\">\n        <!-- Rough hand-drawn ZZZs floating -->\n        <text class=\"hd-z hz1\" x=\"52\" y=\"88\" font-family=\"Caveat, cursive\" font-size=\"32\" fill=\"rgba(60,35,12,0.62)\" transform=\"rotate(-8,52,88)\">Z</text>\n        <text class=\"hd-z hz2\" x=\"88\" y=\"58\" font-family=\"Caveat, cursive\" font-size=\"22\" fill=\"rgba(60,35,12,0.48)\" transform=\"rotate(-6,88,58)\">z</text>\n        <text class=\"hd-z hz3\" x=\"114\" y=\"36\" font-family=\"Caveat, cursive\" font-size=\"15\" fill=\"rgba(60,35,12,0.32)\" transform=\"rotate(-5,114,36)\">z</text>\n        <!-- wobbly rising path between Zs -->\n        <path class=\"hd-trail\" d=\"M62 82 Q72 70 84 65 Q96 54 106 44\" stroke=\"rgba(60,35,12,0.18)\" stroke-width=\"1.2\" fill=\"none\" stroke-dasharray=\"3 3\"/>\n\n        <!-- Hand-drawn closed eye (simple sketch) -->\n        <g class=\"hd-eye\" transform=\"translate(50,130)\">\n          <!-- eye curve -->\n          <path d=\"M0 0 Q30 -14 60 0\" stroke=\"rgba(40,22,8,0.65)\" stroke-width=\"1.8\" fill=\"none\" stroke-linecap=\"round\"/>\n          <!-- lashes rough -->\n          <line x1=\"8\"  y1=\"-2\" x2=\"5\"  y2=\"-9\"  stroke=\"rgba(40,22,8,0.45)\" stroke-width=\"1.2\" stroke-linecap=\"round\"/>\n          <line x1=\"18\" y1=\"-6\" x2=\"17\" y2=\"-13\" stroke=\"rgba(40,22,8,0.45)\" stroke-width=\"1.2\" stroke-linecap=\"round\"/>\n          <line x1=\"30\" y1=\"-8\" x2=\"30\" y2=\"-16\" stroke=\"rgba(40,22,8,0.45)\" stroke-width=\"1.2\" stroke-linecap=\"round\"/>\n          <line x1=\"42\" y1=\"-6\" x2=\"44\" y2=\"-13\" stroke=\"rgba(40,22,8,0.45)\" stroke-width=\"1.2\" stroke-linecap=\"round\"/>\n          <line x1=\"52\" y1=\"-2\" x2=\"55\" y2=\"-9\"  stroke=\"rgba(40,22,8,0.45)\" stroke-width=\"1.2\" stroke-linecap=\"round\"/>\n          <!-- brow rough arc -->\n          <path d=\"M-2 -16 Q28 -28 62 -16\" stroke=\"rgba(40,22,8,0.28)\" stroke-width=\"1.2\" fill=\"none\" stroke-linecap=\"round\"/>\n        </g>\n\n        <!-- scattered tiny stars hand-drawn -->\n        <g fill=\"none\" stroke=\"rgba(40,22,8,0.35)\" stroke-width=\"1.1\" stroke-linecap=\"round\">\n          <!-- star 1 -->\n          <line x1=\"148\" y1=\"50\"  x2=\"148\" y2=\"42\"/>\n          <line x1=\"144\" y1=\"46\"  x2=\"152\" y2=\"46\"/>\n          <!-- star 2 -->\n          <line x1=\"175\" y1=\"90\"  x2=\"175\" y2=\"83\"/>\n          <line x1=\"171\" y1=\"86\"  x2=\"179\" y2=\"86\"/>\n          <!-- star 3 small -->\n          <line x1=\"30\"  y1=\"165\" x2=\"30\"  y2=\"160\"/>\n          <line x1=\"27\"  y1=\"162\" x2=\"33\"  y2=\"162\"/>\n          <!-- crescent moon rough -->\n          <path d=\"M168 130 Q158 118 162 105 Q150 112 152 128 Q155 142 168 130Z\" stroke=\"rgba(40,22,8,0.3)\" stroke-width=\"1.3\" fill=\"rgba(40,22,8,0.05)\"/>\n        </g>\n\n        <!-- a few wavy dream lines -->\n        <path d=\"M10 108 Q35 100 55 108 Q75 116 95 108 Q115 100 135 108\" stroke=\"rgba(60,35,12,0.12)\" stroke-width=\".9\" fill=\"none\"/>\n        <path d=\"M140 148 Q158 142 175 150 Q192 158 205 148\" stroke=\"rgba(60,35,12,0.1)\" stroke-width=\".8\" fill=\"none\"/>\n      </svg>\n    </div>\n\n    <!-- handwritten tagline at bottom -->\n    <div class=\"journal-tagline\">\n      <p class=\"jt-text\">Esta es una colección de relatos oníricos, perturbadores e irónicos, donde el terror susurra, baila, lame y besa.</p>\n      <div class=\"jt-line\"></div>\n      <p class=\"jt-byline\">No la escribe una mente perturbada —<br>es solo un subconsciente con complejo de productor.</p>\n    </div>\n\n  </div>\n</div>", "<div class=\"p p-journal\">\n  <div class=\"journal-bg\"></div>\n  <div class=\"journal-lines\"></div>\n  <div class=\"journal-content journal-content-text\">\n\n    <h2 class=\"j-title\">Prólogo</h2>\n\n    <p class=\"j-body\">Alguna vez leí que todos los sueños tienen significado, pero yo creo que son mensajes codificados que mi subconsciente usa para arruinarme el día. Cada vez que me despertaba intranquila por alguno, abría inmediatamente Google y buscaba cosas como: <em>\"soñar con ver ballenas volando\"</em>.</p>\n\n    <p class=\"j-body\">Los resultados eran alentadores: <em>\"grandes proyectos se avecinan\"</em>, <em>\"épocas de creatividad\"</em>, <em>\"prosperidad\"</em>, etc. Genial, pensaba, eso es genial.</p>\n\n    <p class=\"j-body\">Aunque, en mis sueños, las ballenas eran extremadamente terroríficas y yo estaba en pleno mar, atrapada en una caja de cristal mientras ellas intentaban romperla. Exactamente eso no se encuentra en Google, detalles que no creo haya considerado quien decidió que soñar con ballenas voladoras es de buen augurio.</p>\n\n    <p class=\"j-body\">Mi oráculo moderno (Google) no me da las respuestas que necesito. Prefiero pensar que los sueños son historias que buscan ser contadas.</p>\n\n  </div>\n  <span class=\"pnum j-pnum\">ii</span>\n</div>", "<div class=\"p p-journal\">\n  <div class=\"journal-bg\"></div>\n  <div class=\"journal-lines\"></div>\n  <div class=\"journal-content journal-content-text\">\n\n    <p class=\"j-body\">Por ello, decidí plasmar parte de mi mundo onírico en relatos cortos. Quizás al escribirlos pueda entender por qué mi mente profunda insiste en mostrarme ballenas voladoras y cajas de cristal que se resquebrajan.</p>\n\n    <p class=\"j-body\">Y de paso, contribuir al arte y la ficción porque la ficción me ha salvado la vida en más de una ocasión y, si lo piensas bien, probablemente también haya salvado la tuya… y la de tu madre <em>(imagina un mundo sin novelas mexicanas: qué triste)</em></p>\n\n    <p class=\"j-body j-body-closing\">Así que, si te gustan las historias cortas, perturbadoras y sin gracia, bienvenido(a).</p>\n\n    <!-- signature doodle -->\n    <div class=\"j-sig-wrap\">\n      <svg viewBox=\"0 0 160 40\" fill=\"none\" class=\"j-sig-svg\">\n        <path d=\"M10 30 C20 10 35 8 50 20 C58 26 62 28 70 18 C80 6 95 12 100 22 C108 36 118 30 130 20 C138 14 145 18 150 25\" stroke=\"rgba(40,22,8,0.5)\" stroke-width=\"1.5\" fill=\"none\" stroke-linecap=\"round\"/>\n        <path d=\"M10 32 L150 32\" stroke=\"rgba(40,22,8,0.15)\" stroke-width=\".8\"/>\n      </svg>\n      <p class=\"j-sig-name\">Maria E. Castillo</p>\n    </div>\n\n  </div>\n  <span class=\"pnum j-pnum\">iii</span>\n</div>", "<div class=\"p\"><p class=\"ch-label\">Índice</p><h2 class=\"pt pt-sm\" style=\"margin-bottom:1.2rem\">Los relatos</h2><div class=\"idx-list\"><div class=\"idx-item\"><span class=\"idx-n\">01</span><span class=\"idx-t\">¿Y si yo soy la mala del cuento?</span></div><div class=\"idx-item\"><span class=\"idx-n\">02</span><span class=\"idx-t\">El gato</span></div><div class=\"idx-item\"><span class=\"idx-n\">03</span><span class=\"idx-t\">Ayúdame a matarlo</span></div><div class=\"idx-item\"><span class=\"idx-n\">04</span><span class=\"idx-t\">Noche críptica en Sepia</span></div><div class=\"idx-item\"><span class=\"idx-n\">05</span><span class=\"idx-t\">¿Desperté?</span></div><div class=\"idx-item\"><span class=\"idx-n\">06</span><span class=\"idx-t\">Microchip</span></div><div class=\"idx-item\"><span class=\"idx-n\">07</span><span class=\"idx-t\">Mi Miss Hyde</span></div><div class=\"idx-item\"><span class=\"idx-n\">08</span><span class=\"idx-t\">No quiero ser bella</span></div><div class=\"idx-item idx-more\"><span class=\"idx-more-txt\">continúa →</span></div></div><span class=\"pnum\">iv</span></div>", "<div class=\"p\"><div class=\"idx-list\" style=\"margin-top:clamp(2.5rem,5vw,4rem)\"><div class=\"idx-item\"><span class=\"idx-n\">09</span><span class=\"idx-t\">Adiós, Morfeo</span></div><div class=\"idx-item\"><span class=\"idx-n\">10</span><span class=\"idx-t\">¿Hay algún zombi en la sala?</span></div><div class=\"idx-item\"><span class=\"idx-n\">11</span><span class=\"idx-t\">Luces, cámara, terror</span></div><div class=\"idx-item\"><span class=\"idx-n\">12</span><span class=\"idx-t\">Efecto Glitch</span></div><div class=\"idx-item\"><span class=\"idx-n\">13</span><span class=\"idx-t\">Distopía en el Mall</span></div><div class=\"idx-item\"><span class=\"idx-n\">14</span><span class=\"idx-t\">Vaca in blue</span></div><div class=\"idx-item\"><span class=\"idx-n\">15</span><span class=\"idx-t\">No cruces la puerta</span></div><div class=\"idx-item\" style=\"margin-top:.8rem;border-top:1px solid var(--gold-faint);padding-top:.8rem\"><span class=\"idx-n\" style=\"color:var(--crimson2);font-style:italic\">b.</span><span class=\"idx-t\" style=\"font-style:italic;color:var(--ink2)\">Bonus Experimental</span></div><div class=\"idx-item\"><span class=\"idx-n\">16</span><span class=\"idx-t\">Pesadilla: La Incredulidad</span></div><div class=\"idx-item\"><span class=\"idx-n\">17</span><span class=\"idx-t\">Dejen Dormir</span></div></div><span class=\"pnum\">v</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 01</p><h2 class=\"pt\">¿Y si yo soy la mala del cuento?</h2><div class=\"hr\"></div><p class=\"pb\">Descendí las escaleras hacia el taller de mi padre. El silencio era intrigante; nunca había silencio cuando papá estaba allí. Al llegar, encontré a mi madre, mi padre y mis dos hermanos, inmóviles. No hablaban, solo se miraban entre sí con los ojos desmesuradamente abiertos. Durante los casi dos minutos que los observé, no parpadearon ni una sola vez. La situación era espeluznante.</p><br><p class=\"pb\">Miré hacia la calle y vi a un hombre con gabardina y sombrero gris. Llevaba una jeringa. En mi mente lo bauticé como <em>El Inyectador</em>.</p><span class=\"pnum\">1</span></div>", "<div class=\"p\"><p class=\"pb\">Este hombre inyectaba a la gente con una sustancia desconocida. Las personas inoculadas empezaban a comportarse de manera extraña, como mi familia: ojos abiertos de par en par, no hablaban, solo se miraban entre ellos y caminaban como si algo o alguien los manejara a control remoto, robotizados.</p><br><p class=\"pb\">Al intentar retroceder, me golpeé con un pedazo de madera. Mis ojos volvieron rápidamente hacia ellos. Me observaban con una mirada vacía, como si no me reconocieran. El Inyectador avanzaba hacia la casa, con sus ojos clavados en mí.</p><br><p class=\"pb\">Salí corriendo por la puerta trasera. Durante mi apresurado trayecto, vi cómo la luna descendía del cielo; era enorme, de un gris fantasmal y aterradoramente hermosa. El cielo tenía un color negro azulado, un contraste demasiado bello para una situación tan perturbadora. De fondo, se escuchaban unos... ¿sonidos de trompetas?</p><span class=\"pnum\">2</span></div>", "<div class=\"p\"><p class=\"pb\">Intenté pasar desapercibida mientras me dirigía a la casa de la vecina en busca de mis hermanas, con la mente enfocada únicamente en salvarlas. Varios niños saltaban y jugaban alegremente, entre ellos mis hermanas. Les dije que teníamos que irnos.</p><br><p class=\"pb\">Aparté la mirada solo unos segundos, lo suficiente para que mi hermana pequeña corriera hacia nuestro padre. La escena me golpeó en el estómago: ellos, tomados de la mano con los ojos escandalosamente abiertos, y a su lado, el Inyectador, mostrándome su maldita jeringa.</p><br><p class=\"pb\">Al ver a mi hermana pequeña convertida en… algo, se me estremeció el cuerpo. No pude salvarla. Tomé a la mayor de la mano y corrimos.</p><span class=\"pnum\">3</span></div>", "<div class=\"p\"><p class=\"pb\">La vi caer. —¡Mierda! ¡No puede ser! El cielo se tiñó de tonos naranjas y rojizos, creando el arrebol más hermoso que jamás había presenciado. Pero aquella belleza se desvaneció abruptamente con un sonido estrepitoso. El cielo se partió en dos.</p><br><p class=\"pb\">Tucutún, tucutún, tucutún. Y ella no se levantaba. —¡Levántate, por favor, levántate!</p><br><p class=\"pb\">Entre la masa de gente distinguí al Inyectador, abriéndose paso. ¿Acaso está flotando? ¿Esas son... alas? Lo mismo le empezó a pasar a otras personas.</p><br><p class=\"pb\">Al voltear, un escalofrío me recorrió la espalda; detrás de mí estaba el diablo. Un hombre enorme de piel roja. Su rostro permanecía oculto, pero recuerdo su enorme torso muy bien trabajado en los gimnasios del infierno.</p><br><p class=\"pb\" style=\"color:var(--ink);font-style:italic\">¿Y si la mala del cuento era yo?</p><span class=\"pnum\">4</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 02</p><h2 class=\"pt\">El gato</h2><div class=\"hr\"></div><p class=\"pb\">Un crujido inesperado me arrancó el sueño. Acaricié el pelaje sedoso del gato negro acurrucado en mi regazo, pero él se escurrió para sentarse a mi lado. Todo se volvió silencio — ese silencio que indica que está ocurriendo algo inminente.</p><br><p class=\"pb\">Algo se acercaba. No era un caballo real. Era su sombra, su espectro: una silueta sin cuerpo ni mirada.</p><br><p class=\"pb\" style=\"color:var(--ink);font-style:italic\">La dueña del gato era ella.</p><span class=\"pnum\">5</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 03</p><h2 class=\"pt\">Ayúdame a matarlo</h2><div class=\"hr\"></div><p class=\"pb\">Había un niño. Estaba dentro de mí — o eso parecía. Quería salir y yo lo sentía moverse, pero no era un niño de verdad.</p><br><div class=\"qblock\"><p class=\"qtext\">\"Soy sus miedos más ocultos, sus ganas de morir, las ganas que tiene de hacerle daño a otros, sus mentiras, sus prejuicios — todo lo negro de su alma soy yo.\"</p></div><br><p class=\"pb\">La voz, áspera y ronca, resonó con una gravedad inesperada. — Ayúdame a matarlo — supliqué.</p><br><p class=\"pb\" style=\"color:var(--ink2);font-style:italic\">Nadie respondió. El silencio fue la respuesta.</p><span class=\"pnum\">6</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 04</p><h2 class=\"pt\">Noche críptica en Sepia</h2><div class=\"hr\"></div><p class=\"pb\">Las luces de los postes emanaban una luz tenue amarilla, envolviendo la noche en un filtro sepia. Como si el mundo estuviera teñido de una nostalgia amarga.</p><br><p class=\"pb\">Él estaba de espaldas a mí. La sangre, a pesar de su brillo dorado bajo la luz amarillenta, era la única evidencia de algo que no podía entender.</p><br><div class=\"qblock\"><p class=\"qtext\" style=\"font-size:.9em\">De fondo sonaba <em>Midnight City</em> de M83 — una canción que solía escuchar en noches menos complicadas.</p></div><br><p class=\"pb\" style=\"color:var(--ink);font-style:italic\">Nunca puedo recordar su rostro.</p><span class=\"pnum\">7</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 05</p><h2 class=\"pt\">¿Desperté?</h2><div class=\"hr\"></div><p class=\"pb\">El espejo estaba roto. La tubería del lavabo también. El agua salpicaba de formas extrañas, como si quisiera alcanzarme. Intenté limpiarla pero mis manos atravesaban todo.</p><br><p class=\"pb\">Frente al espejo roto encontré algo. Un reflejo que se movía diferente — un segundo más lento, un grado más frío.</p><br><p class=\"pb\">Esa no era yo. O al menos, me veía — pero no me reconocía.</p><br><p class=\"pb\" style=\"color:var(--ink2);font-style:italic\">¿Desperté? ¿O aún estoy ahí adentro?</p><span class=\"pnum\">8</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 06</p><h2 class=\"pt\">Microchip</h2><div class=\"hr\"></div><p class=\"pb\">Estaba en un consultorio de aspecto clínico. Tomé el bisturí sin vacilar y con total frialdad empecé a despojarme de las capas que protegían mi cabeza. No pensaba. Solo ejecutaba.</p><br><p class=\"pb\">Había algo ahí adentro. Un chip. Pequeño y frío, brillando con una luz que no debería existir dentro de un cráneo humano.</p><br><div class=\"qblock\"><p class=\"qtext\">\"¿Alguna vez terminarás lo que empiezas?\" — sollozó alguien sin levantar la mirada.</p></div><br><p class=\"pb\" style=\"color:var(--ink2);font-style:italic\">No respondí. Ya había terminado.</p><span class=\"pnum\">9</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 07</p><h2 class=\"pt\">Mi Miss Hyde</h2><div class=\"hr\"></div><p class=\"pb\">Con los ojos cerrados, dejé que el agua me recorriera. El vapor era denso, casi opaco. Cuando los abrí, su imagen me golpeó: una mujer diminuta, de joroba prominente, estaba a mi lado.</p><br><p class=\"pb\">Vestía de negro de pies a cabeza. Su inquietante sonrisa me causó una ternura inexplicable.</p><br><p class=\"pb\">Tomé su cabeza con mis manos y la introduje en mi pierna derecha. Ella entró sin resistencia.</p><br><p class=\"pb\" style=\"color:var(--ink);font-style:italic\">Ese era el lugar al que pertenecía. Despertamos.</p><span class=\"pnum\">10</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 08</p><h2 class=\"pt\">No quiero ser bella</h2><div class=\"hr\"></div><p class=\"pb\">Lea llevaba semanas insistiendo. \"Hazlo\", decía con esa sonrisa que no llegaba a sus ojos. \"Te vas a ver increíble.\" Cedí. El procedimiento fue rápido. Demasiado rápido.</p><br><p class=\"pb\">Cuando miré mi mano, dentro de la piel había unos gusanos blancos, muy pequeños. Empecé a sentir cómo se retorcían ahí dentro.</p><br><p class=\"pb\">Lea me sonrió. Su piel era perfecta.</p><br><p class=\"pb\" style=\"color:var(--ink2);font-style:italic\">No quiero ser bella de esta manera.</p><span class=\"pnum\">11</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 09</p><h2 class=\"pt\">Adiós, Morfeo</h2><div class=\"hr\"></div><p class=\"pb\">La primera vez llegó con el cabello castaño y los ojos claros. La segunda vez, negro el cabello y los ojos — brillando. Cada vez que despertaba dentro del sueño, su apariencia cambiaba.</p><br><div class=\"qblock\"><p class=\"qtext\">\"Para mí son meses, incluso años. Para ti son minutos u horas.\"</p></div><br><p class=\"pb\">Vi su entrada para nada romántica: descendiendo por la pared como una araña.</p><br><p class=\"pb\" style=\"color:var(--ink2);font-style:italic\">Tomé mi frazada y me fui a dormir a la sala.</p><span class=\"pnum\">12</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 10</p><h2 class=\"pt\">¿Hay algún zombi en la sala?</h2><div class=\"hr\"></div><p class=\"pb\">Los zombis se estaban alineando para hacer una coreografía. Empezó a sonar una melodía que reconocí de inmediato: <em>Take Me on the Floor</em>, de The Veronicas.</p><br><p class=\"pb\">Pisé algo blando. Era una mano cercenada. Me disculpé por reflejo.</p><br><div class=\"qblock\"><p class=\"qtext\">— ¿Eres persona? — susurró sin mirarme.<br>— Sí... sí lo soy.</p></div><br><p class=\"pb\" style=\"color:var(--ink2);font-style:italic\">Era el único humano en la sala. Y todos me dedicaban una sonrisa.</p><span class=\"pnum\">13</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 11</p><h2 class=\"pt\">Luces, cámara, terror</h2><div class=\"hr\"></div><p class=\"pb\">Todo comenzó normalmente. Luego noté las cámaras. Pequeñas, estratégicamente ubicadas, siguiendo cada uno de mis movimientos.</p><br><div class=\"qblock\"><p class=\"qtext\">\"Eres la protagonista de la serie más exitosa de todos los tiempos.\"</p></div><br><p class=\"pb\">Mi familia — mi falsa familia — me había torturado de la manera más aterradora posible. Y todo había sido grabado.</p><br><p class=\"pb\" style=\"color:var(--ink2);font-style:italic\">Quizá ahora que sé que no es real, ya no les sirva como protagonista.</p><span class=\"pnum\">14</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 12</p><h2 class=\"pt\">Efecto Glitch</h2><div class=\"hr\"></div><p class=\"pb\">Caminaba entre la gente y nadie me veía. Mi presencia era un error en el sistema.</p><br><p class=\"pb\" style=\"color:var(--ink);font-style:italic\">Me sentí un glitch.</p><br><p class=\"pb\">Pude verme desde afuera: una silueta con bordes parpadeantes. Alguien levantó una jeringa enorme y la colocó contra mi sien. Para corregir el error, supongo.</p><br><p class=\"pb\">La violencia se repetía en ciclos. Sin avanzar. Sin salida.</p><span class=\"pnum\">15</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 13</p><h2 class=\"pt\">Distopía en el Mall</h2><div class=\"hr\"></div><p class=\"pb\">Era extraño ver a personas tan ridículamente atractivas atacando a otros en el centro comercial. No con violencia convencional — con sus lenguas.</p><br><p class=\"pb\">— Solo lamen — explicó el hombre a mi lado —. Te lamen la cara y en minutos eres guapo. Perfectamente simétrico.</p><br><p class=\"pb\">Vi a Lea entre ellos. Perfecta. Demasiado perfecta.</p><br><p class=\"pb\" style=\"color:var(--ink2);font-style:italic\">Corrí. Alguien me rozó la mejilla con la lengua. Empecé a sentir el calor en mi cara.</p><span class=\"pnum\">16</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 14</p><h2 class=\"pt\">Vaca in blue</h2><div class=\"hr\"></div><p class=\"pb\">El campo era tranquilo hasta que las vi. Las vacas pastaban normalmente, pero sus cabezas eran deformes — rostros de seres humanos deformados, estirados sobre cráneos bovinos.</p><br><p class=\"pb\">La de la camisa azul marino me miró directamente. Su rostro era el de una mujer vieja y afligida. Sentí como si quisiera decirme algo urgente.</p><br><p class=\"pb\" style=\"color:var(--ink);font-style:italic\">Tenía que volver. No sé a dónde — pero tenía que volver.</p><span class=\"pnum\">17</span></div>", "<div class=\"p\"><p class=\"ch-label\">Relato 15</p><h2 class=\"pt\">No cruces la puerta</h2><div class=\"hr\"></div><p class=\"pb\">La puerta marrón perfectamente tallada me causó intriga. La crucé. Treinta minutos, me dije.</p><br><div class=\"qblock\"><p class=\"qtext\">\"¿Dónde estuviste? Te buscamos tanto tiempo. Tantos años...\"</p></div><br><p class=\"pb\">Una mujer me abrazó. Sus manos temblaban. Miré a mi alrededor — todo había cambiado.</p><br><p class=\"pb\">— Solo me fui treinta minutos — dije.</p><br><p class=\"pb\" style=\"color:var(--ink);font-style:italic\">— Ya han pasado treinta años.</p><span class=\"pnum\">18</span></div>", "<div class=\"p\"><p class=\"ch-label\">Bonus Experimental</p><h2 class=\"pt pt-sm\" style=\"margin-bottom:.8rem\">Una advertencia breve</h2><p class=\"pb\" style=\"font-style:italic;color:var(--ink2)\">En los siguientes relatos encontrarás fragmentos de sueños y pensamientos donde la ironía, el sarcasmo y las crisis existenciales se entrelazan sin disculparse.</p><div class=\"hr\" style=\"margin:1.2rem 0\"></div><div class=\"qblock\"><p class=\"qtext\">\"Sin embargo, ¡cuántas cosas estamos a punto de descubrir si la cobardía y la dejadez no entorpecieran nuestra curiosidad!\"</p><p class=\"qcite\">— Mary Shelley · Frankenstein</p></div><div class=\"hr\" style=\"margin:1.2rem 0\"></div><p class=\"pb\" style=\"font-style:italic;color:var(--ink3)\">Continúa, si te atreves.</p><span class=\"pnum\">xix</span></div>", "<div class=\"p\"><p class=\"ch-label\">Bonus · Relato 16</p><h2 class=\"pt\">Pesadilla: La Incredulidad</h2><div class=\"hr\"></div><p class=\"pb\">No podía dormir. Llevaba horas mirando el techo cuando decidí levantarme.</p><br><p class=\"pb\" style=\"color:var(--ink);font-style:italic\">— ¡A la mierda el diablo y a la mierda todo! — dije en voz baja pero con una intensidad sorprendente.</p><br><p class=\"pb\">El pasillo que conducía a las habitaciones estaba lleno de siluetas. Bailaban iluminadas por luces multicolores — pero sin música. Solo movimiento. Solo cuerpos sin sonido.</p><br><p class=\"pb\" style=\"color:var(--ink2);font-style:italic\">¿Esto era real o seguía soñando? Decidí no averiguarlo.</p><span class=\"pnum\">xx</span></div>", "<div class=\"p\"><p class=\"ch-label\">Bonus · Relato 17</p><h2 class=\"pt\">Dejen Dormir</h2><div class=\"hr\"></div><p class=\"pb\" style=\"font-style:italic;color:var(--ink2)\">¿Qué es peor? ¿Estar loca o ser acechada por lo sobrenatural? ¿Fantasmas o extraterrestres? ¿Demonios o espíritus?</p><br><p class=\"pb\">Ella seguía dando vueltas a estas preguntas mientras su cama se convertía, paradójicamente, en su único refugio seguro.</p><br><p class=\"pb\" style=\"font-style:italic;color:var(--ink3);font-size:.85em\">(Pensamiento del narrador: claramente todo lo anterior es un pensamiento suyo. Lo estoy diciendo yo — el narrador — porque ella ya se durmió.)</p><br><p class=\"pb\" style=\"text-align:center;letter-spacing:.4em;font-size:.9em;color:var(--ink2);margin-top:1rem\">Shhh.</p><div class=\"hr\" style=\"margin:1.5rem auto;width:28px\"></div><p class=\"pb\" style=\"text-align:center;font-style:italic;color:var(--crimson2)\">Fin.</p><span class=\"pnum\">xxi</span></div>", "<div class=\"p\"><p class=\"ch-label\">Suscribirse</p><h2 class=\"pt\" style=\"margin-bottom:.8rem\">No te pierdas lo que viene</h2><div class=\"hr\"></div><p class=\"pb\" style=\"margin-bottom:1.5rem\">Nuevas historias, cortos y cosas perturbadoras, directo a tu correo.</p><div class=\"sub-wrap\"><label class=\"sub-label\">Tu correo</label><input type=\"email\" class=\"sub-input\" placeholder=\"tu@correo.com\"/><button class=\"sub-btn\">Suscribirse</button></div><span class=\"pnum\">xxii</span></div>", "<div class=\"p p-deco\" style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;text-align:center\"><svg width=\"44\" height=\"52\" viewBox=\"0 0 200 240\" fill=\"none\"><g stroke=\"#7a6040\" stroke-linecap=\"round\" opacity=\".4\"><path stroke-width=\".9\" d=\"M100 28 C128 22 162 38 168 70 C174 102 152 128 132 138 C148 148 158 168 140 180 C122 192 98 178 84 162 C60 172 38 156 36 132 C34 108 52 88 68 80 C48 66 42 42 62 32 C78 24 92 30 100 28Z\"/></g><text x=\"100\" y=\"125\" text-anchor=\"middle\" font-size=\"18\" fill=\"rgba(201,64,64,.4)\" font-family=\"serif\">✦</text></svg><p style=\"font-family:'Cinzel',serif;font-size:clamp(.8rem,1.6vw,1.1rem);color:var(--gold);letter-spacing:.08em\">Maria E. Castillo</p><p style=\"font-size:.62em;color:var(--ink3);letter-spacing:.2em;font-family:'Cinzel',serif\">LIMA · MMXXV</p><div style=\"width:26px;height:1px;background:var(--gold-faint);margin:.4rem auto\"></div><p style=\"font-size:.58em;color:var(--ink3)\">© 2025 — Todos los sueños reservados</p></div>"];
const FLIP=620;
let cur=-2,busy=false;
const mob=()=>window.innerWidth<=700;
const bookClosed=document.getElementById('bookClosed');
const bookOpen=document.getElementById('bookOpen');
const pageL=document.getElementById('pageL');
const pageR=document.getElementById('pageR');
const leaf=document.getElementById('leaf');
const leafFace=document.getElementById('leafFace');
const leafBack=document.getElementById('leafBack');
const navRow=document.getElementById('navRow');
const navPrev=document.getElementById('navPrev');
const navNext=document.getElementById('navNext');
const navLabel=document.getElementById('navLabel');
const zoneL=document.getElementById('zoneL');
const zoneR=document.getElementById('zoneR');

function reZ(){pageR.appendChild(zoneL);pageR.appendChild(zoneR);}
function renderPages(idx){
  const m=mob();
  pageL.innerHTML=(!m&&idx>=0&&idx<PAGES.length)?PAGES[idx]:'';
  const ri=m?idx:idx+1;
  pageR.innerHTML=(ri>=0&&ri<PAGES.length)?PAGES[ri]:'';
  reZ();
}
function maxCur(){return PAGES.length-(mob()?1:2);}
function step(){return mob()?1:2;}
function updateNav(){
  navPrev.disabled=(cur<=-1);
  navNext.disabled=(cur>=maxCur());
  if(cur>=0){const ri=mob()?cur:cur+1;navLabel.textContent=(ri+1)+' / '+PAGES.length;}
  else navLabel.textContent='';
}
function showCover(){
  bookOpen.style.display='none';
  bookClosed.style.display='';
  bookClosed.style.opacity='0';bookClosed.style.transform='scale(.97)';
  navRow.classList.remove('show');
  requestAnimationFrame(()=>{
    bookClosed.style.transition='opacity .4s,transform .4s';
    bookClosed.style.opacity='1';bookClosed.style.transform='scale(1)';
  });
  cur=-2;
}
function openBook(){
  if(busy||cur>=0)return;
  busy=true;cur=0;
  bookClosed.style.transition='opacity .4s,transform .4s';
  bookClosed.style.opacity='0';bookClosed.style.transform='scale(.97)';
  setTimeout(()=>{
    bookClosed.style.display='none';bookClosed.style.transition='';
    bookOpen.style.display='flex';renderPages(cur);navRow.classList.add('show');updateNav();busy=false;
  },420);
}
function flipNext(){
  if(busy||cur<0||cur>=maxCur())return;
  busy=true;const m=mob();const next=cur+step();
  leafFace.innerHTML=m?PAGES[cur]:(cur+1<PAGES.length?PAGES[cur+1]:'');
  leafBack.innerHTML=m?PAGES[next]:(next<PAGES.length?PAGES[next]:'');
  const nextRi=m?next:next+1;
  pageR.innerHTML=nextRi<PAGES.length?PAGES[nextRi]:'';
  if(!m)pageL.innerHTML=next<PAGES.length?PAGES[next]:'';
  reZ();
  leaf.style.display='block';leaf.style.transition='none';leaf.style.transform='rotateY(0deg)';
  leaf.getBoundingClientRect();
  leaf.style.transition=`transform ${FLIP}ms cubic-bezier(.645,.045,.355,1)`;leaf.style.transform='rotateY(-180deg)';
  setTimeout(()=>{leaf.style.display='none';leaf.style.transform='';cur=next;renderPages(cur);updateNav();busy=false;},FLIP+20);
}
function flipPrev(){
  if(busy)return;
  if(cur<=0){if(cur===0)showCover();return;}
  busy=true;const m=mob();const prev=Math.max(0,cur-step());
  const prevRi=m?prev:prev+1;
  leafFace.innerHTML=prevRi<PAGES.length?PAGES[prevRi]:'';
  leafBack.innerHTML=m?PAGES[cur]:(cur<PAGES.length?PAGES[cur]:'');
  if(!m)pageL.innerHTML=prev<PAGES.length?PAGES[prev]:'';
  leaf.style.display='block';leaf.style.transition='none';leaf.style.transform='rotateY(-180deg)';
  leaf.getBoundingClientRect();
  leaf.style.transition=`transform ${FLIP}ms cubic-bezier(.645,.045,.355,1)`;leaf.style.transform='rotateY(0deg)';
  setTimeout(()=>{leaf.style.display='none';leaf.style.transform='';cur=prev;renderPages(cur);updateNav();busy=false;},FLIP+20);
}
document.getElementById('openHint').addEventListener('click',openBook);
document.getElementById('coverEl').addEventListener('click',openBook);
navNext.addEventListener('click',flipNext);navPrev.addEventListener('click',flipPrev);
zoneR.addEventListener('click',flipNext);zoneL.addEventListener('click',flipPrev);
document.addEventListener('keydown',e=>{
  if(cur<0){if(e.key==='Enter'||e.key===' ')openBook();return;}
  if(['ArrowRight','ArrowDown',' '].includes(e.key)){e.preventDefault();flipNext();}
  if(['ArrowLeft','ArrowUp'].includes(e.key)){e.preventDefault();flipPrev();}
});
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>40){dx<0?flipNext():flipPrev();}},{passive:true});
window.addEventListener('resize',()=>{if(cur>=0)renderPages(cur);});
const cd=document.getElementById('cd'),cr=document.getElementById('cr');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cd.style.left=mx+'px';cd.style.top=my+'px';});
(function loop(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;cr.style.left=rx+'px';cr.style.top=ry+'px';requestAnimationFrame(loop);})();
document.querySelectorAll('a,button,input,.open-hint,.book-closed,.zone').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cr.style.width='34px';cr.style.height='34px';cr.style.borderColor='rgba(184,149,106,.65)';});
  el.addEventListener('mouseleave',()=>{cr.style.width='22px';cr.style.height='22px';cr.style.borderColor='rgba(184,149,106,.35)';});
});
</script>
