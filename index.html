o lo hace la gente cuando está rindiendo un examen y busca recordar algo. Anhelaba que las voces cesaran. No distinguía las palabras, ni siquiera el idioma, solo un sonido distorsionado.</p>\n<p class=\"pb\">Por un instante, el miedo la invadió: ¿y si las voces eran producto de su mente? Cerró los ojos y sacudió la cabeza, intentando alejar ese pensamiento que la arrastraba hacia los rincones más oscuros de su psique. A pesar de ello, mil ideas disparatadas empezaron a brotar en su cabeza.</p>\n<p class=\"pb\"><em>¿Qué es </em>peor<em>? ¿Estar loca o ser acechada por lo sobrenatural? ¿Fantasmas</em><em> o</em><em> </em><em>e</em><em>xtraterrestres? ¿Demonios</em><em> o </em><em>Espíritus? ¿Exorcismo u hospital psiquiátrico? ¿Bajo astral o emociones ultra negativas? ¿Posesión</em><em>, </em><em>a</em><em>bducción</em><em> o una cita</em><em> con el psiquiatra? ¿Canalización o fallo en los neurotransmisores? ¿Algo en esta vida tiene lógica? ¿Según quién?</em></p>\n<p class=\"pb\"><em>Los extraterrestres me aterran. No por su cabeza grande, sus ojos como aceitunas ni por su color. ¡</em><em>Agh</em><em>!, Hollywood me ha dañado el cerebro. Se supone que son más evolucionados, pero ¿y si su evolución tecnológica no ha ido de la mano de una evolución social? Como nosotros. Hemos avanzado tecnológicamente, pero moralmente nos hemos quedado atascados. La ética, los valores, las buenas costumbres... se perdieron en el camino hacia los autos voladores. La gente sigue muriendo, matando de formas grotescas. Sufren niños, animales, sufre la tierra misma. ¿Por qué el ser humano es tan violento y destructivo? Eso es terrorífico, seres con mucha tecnología y poder. ¡Basta!, deja de pensar. ¿Será verdad que abducen vacas? ¿Una raza hindú avanzada? ¿Cuidarán ellos de los árboles, el agua, los océanos? ¿Respetarán a sus comunidades o también se habrán desarrollado despreciando a los suyos? ¿Cómo era tu lema, Sábato? ¿\"Hay que resistir\"?</em></p>\n<p class=\"pb\"><em>No puede ser, aquí vamos otra vez. ¿Qué es lo peor que puede hacer un alma en pena? Son inmateriales, bueno, te hacen pensar que no. Malditos. O maldita sea la mente oscura y creativa. ¿Qué querrán? ¿Por qué tan violentos? ¿Por qué no crean su propia sociedad, sus propias reglas y nos dejan en paz? En el caso de que existan, claro... es solo una idea... </em><em>win</em><em>, </em><em>win</em><em>.</em></p>\n<p class=\"pb\">Un cambio repentino de temperatura interrumpió sus pensamientos. La frazada comenzó a deslizarse lentamente hacia abajo, indicándole que algo se acercaba. Sintió el viento frío azotar su espalda y la atmósfera se volvió pesada, cargada de una energía familiar. Todo era reconocible; ya sabía qué hacer. Contuvo el aliento, sus manos temblorosas adoptaron la posición defensiva que había practicado innumerables veces. Se sentía como un pistolero en un duelo al amanecer, su corazón retumbaba, pero no había tiempo para el miedo, solo para la acción. Estaba lista.</p>\n<p class=\"pb\">De repente, sintió unas manos deslizarse por sus piernas; apenas rozando su piel. La sensación era una mezcla de calor, frío y peso. Las manos ascendieron hacia su vientre. No había anticipado eso; esperaba solo un toque en la costilla “<em>¡Corte! Eso no estaba en el guion</em><em>”</em>. Sabía que debía contener la respiración y moverse para alejar su costilla de la presión. Pero ¿manos?</p>\n<p class=\"pd\"><em>“¿Qué puedo hacer ahora? Manos tratando de tocar mi cuerpo y yo … ¡puedo moverme!”</em> </p>\n<p class=\"pb\">Salió del shock y empezó a luchar desesperadamente contra las manos que intentaban hacerle cosquillas. Odiaba las cosquillas. Tenía un trauma con eso, eran parte de sus pesadillas, un problema no resuelto que la desquiciaba. Peleaba con todas sus fuerzas, usando manos y pies para evitar que la tocaran. De repente, las vio: unas manos enormes y arrugadas, con uñas puntiagudas como ramas, se posaron en su vientre y comenzaron a moverse bruscamente, como si teclearan un mensaje frenético. Era el sonido de un teclado, resonando en su propio cuerpo. Podía sentir cada dedo, cada pulsación. Su corazón estaba a punto de explotar, pero logró sentarse.</p>\n<p class=\"pb\">Las manos desaparecieron —¿Qué fue eso? — Se preguntó, temblando de frío, mientras se envolvía en la frazada, acurrucándose con recelo. Quería mantenerse alerta, pero sus párpados le pesaban. No se atrevía a moverse a otro lugar, presentía que podría encontrar algo más. “Si lo imaginas, existe”, había escuchado esa frase demasiadas veces. Irónicamente, su cama se había convertido en su mejor escondite. Luchaba contra el sueño, pero volvió a sentir cómo jalaban lentamente su frazada. Los pensamientos la secuestraron:</p>\n<p class=\"pd\"><em>“¿Qué carajo me pasa? ¿A qué le tengo miedo? ¿Estas cosas no pueden matarme... o sí? No, no debo pensar en eso, les estoy dando poder. Basta. Apaga la mente, apaga la mente.”</em></p>\n<p class=\"pb\">Volvió a sentir unas manos en sus piernas, pero esta vez era diferente. La mano derecha avanzaba hasta su caja toráxica. Ella estaba dispuesta a detenerla, pero una sensación escalofriante la invadió: su cuerpo parecía disolverse, volverse etéreo. Era como si una parte de ella se desprendiera …</p>\n<p class=\"pb\">De repente, se encontró en un lugar desconocido. Delante de ella, un hombre vestido con una túnica negra se destacaba, y unos pasos más allá, un grupo de personas vestidas de la misma manera formaban un círculo alrededor de algo o alguien. A su lado, un pequeño grupo de niños vestidos de blanco la miró fugazmente, lanzándole una sonrisa antes de volver a entrelazar sus manos y fijar la vista en el suelo.</p>\n<p class=\"pb\">La luna bañaba el paisaje con una luz fantasmal, destacando solo las personas. Una espesa niebla grisácea difuminaba los contornos, ocultando los límites del campo abierto. El silencio era absoluto.</p>\n<p class=\"pd\">—Ella puede hacerlo— las palabras del hombre de espaldas cortaron el silencio abruptamente.</p>\n<p class=\"pb\">Todas las cabezas giraron hacia él, luego hacia ella, que permanecía inmóvil unos pasos detrás. Algo estaba pasando. Hablaban, cuchicheaban, pero él no se movió ni la miró.</p>\n<p class=\"pb\">La sensación de estar fuera de su cuerpo la invadía. El sentirse tan ligera, pero ser incapaz de dar un paso, la aturdía.</p>\n<p class=\"pd\">—Si no me muevo, no existo —pensaba, aunque de alguna manera, presentía que su llegada allí era importante.</p>\n<p class=\"pd\">—Se acaba el tiempo —escuchó decir a alguien más. Las palabras la estremecieron. No lograba entender lo que decían los demás; parecían discutir. La intuición, o tal vez el eco de sus propias dudas, le gritaban que debía actuar.</p>\n<p class=\"pb\">¿Pero cómo? ¿Qué tengo que hacer? Me acosté a las 11:00 p.m. ¿Seguirá siendo miércoles o ya será madrugada? Si esto se demora, llegaré tarde y hecha un desastre al trabajo. No puedo creer que esté pensando en esto en medio de un ritual satánico. Qué fuerte esto de ser humano, ¿eh?</p>\n<p class=\"pb\">De repente, una mujer emergió desde lo más espeso de la neblina. Se abalanzó sobre el hombre que seguía de espaldas y lo aprisionó contra una pared. Sus labios se encontraron con los de él en un beso que no transmitía pasión, sino una furia fría y calculadora. Sin embargo, los ojos, intensos y desafiantes de aquella mujer, no se apartaban de la joven que observaba la escena, paralizada.</p>\n<p class=\"pb\">La chica bajó la cabeza, abrumada por la intensidad de esa mirada y la extrañeza de la situación. La absurdez era algo inherente en su vida, pero esto... esto superaba cualquier lógica.</p>\n<p class=\"pb\">Algo la empujó con fuerza. Un viento, una fuerza invisible. De repente, estaba acostada en su cama, con la frazada en sus pies. Buscó el celular desesperadamente: eran las 4:44. Solo había sido un mal sueño, un tonto sueño.</p>\n<p class=\"pb\">Dejó caer el celular sobre la mesita de noche e intentó cerrar los ojos, obligándose a relajarse. El reloj seguía su marcha, indiferente a su inquietud. La noche no se detendría, el día llegaría, y ella necesitaba descansar. Tenía que trabajar, tenía que vivir. Las estúpidas pesadillas no pagaban las cuentas.</p>\n<p class=\"pb\">Pero el sueño se resistía. Cada vez que cerraba los ojos, el eco distorsionado de ese infernal \"Zzzzzzi\" resonaba en sus oídos, taladrándole el cerebro. Quedaba una hora y cuarenta y cinco minutos, que podría usar para dormir.</p>\n<p class=\"pb\">Cerró los ojos e intentó no darle importancia. Después de todo, tendría once horas para pensar en ello o, tal vez, para ignorarlo. Sí, solo había sido un sueño. Sí, se había asustado, pero no era para tanto. La vida real solía ser más dura a veces. Por ejemplo, en algún rincón del mundo, una vida estaba llegando a su fin.</p>\n<p class=\"pb\">(Pensamiento del narrador) Claramente, ese es un pensamiento suyo. Lo estoy diciendo yo porque ya se durmió.</p>\n<p class=\"pb\">Shhh.</p>\n</div>\n</div>", "<div class=\"p-journal p-doodle p-doodle-real\">\n<div class=\"pg-paper-fill\"></div>\n<img src=\"https://i.imgur.com/WsGk9sW.jpg\" class=\"doodle-real-img\" alt=\"dibujo final\" loading=\"lazy\" style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-0.8deg);max-width:90%;max-height:88%;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,.18));\"/>\n</div>", "<div class=\"p\" style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;text-align:center\"><svg width=\"44\" height=\"52\" viewBox=\"0 0 200 240\" fill=\"none\"><g stroke=\"#7a6040\" stroke-linecap=\"round\" opacity=\".4\"><path stroke-width=\".9\" d=\"M100 28 C128 22 162 38 168 70 C174 102 152 128 132 138 C148 148 158 168 140 180 C122 192 98 178 84 162 C60 172 38 156 36 132 C34 108 52 88 68 80 C48 66 42 42 62 32 C78 24 92 30 100 28Z\"/></g></svg><p style=\"font-family:'Caveat',cursive;font-size:clamp(1.2rem,2.5vw,1.8rem);color:var(--gold)\">Maria E. Castillo</p><p const JOURNAL_PAGES=3, FLIP=260, FADE=140;
// Pages to skip on mobile (blank or irrelevant)
const SKIP_MOB = new Set([2]); // skip blank journal page only
let cur=-2, busy=false;
document.body.classList.add('showing-cover');

/* ── Music helper stubs (used by renderPages before full engine loads) ── */
function stopAllMusic(){
  if(typeof players!=='undefined'){
    Object.keys(players).forEach(k=>{ try{ stopMusic(parseInt(k),400); }catch(e){} });
  }
  if(typeof currentMusicPage!=='undefined') currentMusicPage=null;
}
function showMusicPlayer(id){
  const el=document.getElementById('mp-'+id);

}
function hideMusicPlayer(id){

}
function startTrack(id,vol){
  const map={midnight:7,floor:13};const pgIdx=map[id];
  if(pgIdx==null)return;
  try{ startMusic(pgIdx); }catch(e){}
}
function bindMusicControls(id){
  const map={midnight:7,floor:13};const pgIdx=map[id];
  const btn=document.getElementById('mpbtn-'+id);
  const volEl=document.getElementById('mpvol-'+id);
  if(!btn||pgIdx==null)return;
  btn.onclick=()=>{
    try{
      const p=players[pgIdx];if(!p)return;
      const s=p.getPlayerState();
      if(s===1){p.pauseVideo();btn.textContent='▶';}
      else{p.playVideo();btn.textContent='⏸';}
    }catch(e){}
  };
  if(volEl) volEl.oninput=()=>{ try{players[pgIdx]&&players[pgIdx].setVolume(parseInt(volEl.value));}catch(e){} };
}
const mob=()=>window.innerWidth<=700;
const $ = id => document.getElementById(id);
const bookClosed=$('bookClosed'), bookOpen=$('bookOpen');
const pageL=$('pageL'), pageR=$('pageR');
const leaf=$('leaf'), leafFace=$('leafFace'), leafBack=$('leafBack');
const navRow=$('navRow'), navPrev=$('navPrev'), navNext=$('navNext'), navLabel=$('navLabel'), navHome=$('navHome');
const zoneL=$('zoneL'), zoneR=$('zoneR');

function reZ(hide){
  zoneL.style.display = hide ? 'none' : '';
  zoneR.style.display = hide ? 'none' : '';
  pageL.appendChild(zoneL);   // zona izq en página izquierda
  pageR.appendChild(zoneR);   // zona der en página derecha
}
function renderPages(idx){
  const m=mob();
  pageL.innerHTML=(!m&&idx>=0&&idx<PAGES.length)?PAGES[idx]:'';
  const ri=m?idx:idx+1;
  pageR.innerHTML=(ri>=0&&ri<PAGES.length)?PAGES[ri]:'';
  const isJ = idx < 4;
  reZ(isJ);
  bookOpen.classList.toggle('journal-spread', isJ);
  // En desktop se muestran 2 páginas: idx (izq) e idx+1 (der)
  const rightIdx = mob() ? null : idx + 1;
  if(window.onMusicPageChange) window.onMusicPageChange(idx, rightIdx);
  setTimeout(() => { initMusicTriggers(); initMusicEndTriggers(); }, 100);
  // Impedir que clicks en el contenido del relato activen las zonas de flip
  pageL.querySelectorAll('.p-story').forEach(s => {
    s.addEventListener('click', e => e.stopPropagation());
  });
  pageR.querySelectorAll('.p-story').forEach(s => {
    s.addEventListener('click', e => e.stopPropagation());
  });

  // ── Index item clicks ──
  document.querySelectorAll('.j-idx-item[data-target]').forEach(el=>{
    el.addEventListener('click',()=>{
      const t=parseInt(el.dataset.target);
      if(!isNaN(t)&&!busy){
        const dest=t;
        cur=Math.max(0,Math.min(dest,maxCur()));
        renderPages(cur);updateNav();
      }
    });
  });

  // ── CINEMATIC ATMOSPHERE ENGINE ──
  document.querySelectorAll('.p-story').forEach(storyEl => {
    // Ensure base paper div exists
    if(!storyEl.querySelector('.story-base-paper')){
      const base=document.createElement('div');
      base.className='story-base-paper';
      storyEl.prepend(base);
    }
    // Ensure vignette exists
    if(!storyEl.querySelector('.story-vignette')){
      const vig=document.createElement('div');
      vig.className='story-vignette';
      storyEl.prepend(vig);
    }

    const layer = storyEl.querySelector('.story-atmos-layer');
    if(!layer) return;
    const atmParagraphs = storyEl.querySelectorAll('[data-atmos]');
    if(!atmParagraphs.length) return;

    let currentAtmos = null;
    let atmosTimer = null;

    function applyAtmos(bg, triggerEl) {
      if(bg === currentAtmos) return;
      currentAtmos = bg;

      // Cross-fade: hide old, set new bg, show
      layer.classList.remove('atmos-visible');

      clearTimeout(atmosTimer);
      atmosTimer = setTimeout(() => {
        layer.style.background = bg;
        layer.classList.add('atmos-visible');
        if(triggerEl) {
          triggerEl.classList.add('atmos-trigger');
          setTimeout(()=>triggerEl.classList.remove('atmos-trigger'), 2600);
        }
      }, 120);

      // Classify darkness for ink color
      // Check the last linear-gradient stop for darkness
      const darkMatch = bg.match(/linear-gradient\([^)]+,(#[0-9a-f]{3,6})\s*\d*%\)/i);
      let dark = false, warm = false, horror = false;
      if(darkMatch){
        const hex=darkMatch[1].replace('#','');
        const r=parseInt(hex.substring(0,2)||hex[0]+hex[0],16);
        const g=parseInt(hex.substring(2,4)||hex[1]+hex[1],16);
        const b=parseInt(hex.substring(4,6)||hex[2]+hex[2],16);
        const lum=(r+g+b)/3;
        dark = lum < 95;
        warm = lum >= 95 && lum < 170 && r > g;
        horror = dark && (bg.includes('rgba(148,12') || bg.includes('rgba(180,') || bg.includes('rgba(200,'));
      }
      storyEl.classList.toggle('atmos-dark', dark);
      storyEl.classList.toggle('atmos-warm', warm && !dark);
      storyEl.classList.toggle('atmos-horror', horror);
      storyEl.classList.toggle('atmos-deep', dark);
    }

    // Set initial atmosphere
    applyAtmos(atmParagraphs[0].dataset.atmos, null);

    const observer = new IntersectionObserver((entries) => {
      // Find the most-visible triggering entry
      let best = null, bestRatio = 0;
      entries.forEach(entry => {
        if(entry.isIntersecting && entry.intersectionRatio > bestRatio){
          bestRatio = entry.intersectionRatio;
          best = entry;
        }
      });
      if(best) applyAtmos(best.target.dataset.atmos, best.target);
    }, {
      root: storyEl,
      threshold: [0.1, 0.3, 0.5],
      rootMargin: '-8% 0px -25% 0px'
    });

    atmParagraphs.forEach(p => observer.observe(p));

    // ── Take Me on the Floor trigger ──
    // Start music when lyrics paragraph enters view in Relato 10
    const lyricsTrigger = storyEl.querySelector('[data-lyrics-trigger]');
    if(lyricsTrigger) {
      const lyricsObs = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if(e.isIntersecting) {
            showMusicPlayer('floor');
            startTrack('floor', 70);
            lyricsObs.disconnect();
          }
        });
      }, { root: storyEl, threshold: 0.3, rootMargin: '-5% 0px -20% 0px' });
      lyricsObs.observe(lyricsTrigger);
    }
  });
}
function isJournalFlip(from,to){
  return from<JOURNAL_PAGES+1||to<JOURNAL_PAGES+1;
}
function maxCur(){return PAGES.length-(mob()?1:2);}
function step(){return mob()?1:2;}
function updateNav(){
  navPrev.disabled=(cur<=-1);
  navNext.disabled=(cur>=maxCur());
  // Page counter: on mobile count skipped pages
  let pageNum = 0;
  if (cur >= 0) {
    if (mob()) {
      // Count how many non-skipped pages we've passed
      let count = 0;
      for (let i = 0; i <= cur; i++) { if (!SKIP_MOB.has(i)) count++; }
      pageNum = count;
    } else {
      pageNum = cur + 1;
    }
  }
  const totalPages = mob() ? (PAGES.length - SKIP_MOB.size) : PAGES.length;
  navLabel.textContent = cur>=0 ? (pageNum+' / '+totalPages) : '';
  navHome.classList.toggle('show', cur>=0);
  if(cur>=0) navRow.classList.add('show');
  // Progress bar
  const prog = document.getElementById('navProgress');
  if(prog){
    prog.max = Math.max(0, PAGES.length-1);
    prog.value = cur>=0 ? (mob()?cur:cur+1) : 0;
    // Fill color gradient
    const pct = prog.max > 0 ? (prog.value/prog.max)*100 : 0;
    prog.style.background = `linear-gradient(to right, rgba(200,215,235,.75) ${pct}%, rgba(255,255,255,.13) ${pct}%)`;
  }
  // Header: show current story title in rh-title if past cover
  if(cur>=4){
    const pg = document.getElementById('pageR');
    const pt = pg && pg.querySelector('.pt');
    const titleEl = document.getElementById('rhStoryTitle');
    if(titleEl && pt) titleEl.textContent = pt.textContent;
  }
}
function showCover(){

}
function doFlip(isNext){
  const m=mob();
  // On mobile, skip blank pages
  let next=isNext?cur+step():Math.max(0,cur-step());
  if(mob()){ while(SKIP_MOB.has(next) && isNext && next<PAGES.length-1) next++;
             while(SKIP_MOB.has(next) && !isNext && next>0) next--; }
  const useFlip=isJournalFlip(cur,next);
  const dur=useFlip?FLIP:FADE;
  if(isNext){
    leafFace.innerHTML=m?PAGES[cur]:(cur+1<PAGES.length?PAGES[cur+1]:'');
    leafBack.innerHTML=m?PAGES[next]:(next<PAGES.length?PAGES[next]:'');
    const ri=m?next:next+1;
    pageR.innerHTML=ri<PAGES.length?PAGES[ri]:'';
    if(!m)pageL.innerHTML=next<PAGES.length?PAGES[next]:'';
    reZ();
    if(useFlip){
      leaf.style.display='block';leaf.style.transition='none';leaf.style.transform='rotateY(0deg)';
      leaf.getBoundingClientRect();
      leaf.style.transition=`transform ${dur}ms cubic-bezier(.645,.045,.355,1)`;
      leaf.style.transform='rotateY(-180deg)';
    }
  } else {
    const ri=m?next:next+1;
    leafFace.innerHTML=ri<PAGES.length?PAGES[ri]:'';
    leafBack.innerHTML=m?PAGES[cur]:(cur<PAGES.length?PAGES[cur]:'');
    if(!m)pageL.innerHTML=next<PAGES.length?PAGES[next]:'';
    if(useFlip){
      leaf.style.display='block';leaf.style.transition='none';leaf.style.transform='rotateY(-180deg)';
      leaf.getBoundingClientRect();
      leaf.style.transition=`transform ${dur}ms cubic-bezier(.645,.045,.355,1)`;
      leaf.style.transform='rotateY(0deg)';
    }
  }
  if(useFlip){
    setTimeout(()=>{
      leaf.style.display='none';leaf.style.transform='';
      cur=next;renderPages(cur);updateNav();busy=false;
    },dur+20);
  } else {
    cur=next;renderPages(cur);updateNav();busy=false;
  }
}
function flipNext(){if(busy||cur<0||cur>=maxCur())return;busy=true;userInteracted=true;doFlip(true);}
function flipPrev(){

}

<script>
/* ═══════════════════════════════════════════════════

let currentMusicPage = null;

const mNotice = document.getElementById('music-autoplay-notice');

const zombieAudio   = document.getElementById('audio-zombie');

function fadeAudio(el, from, to, ms, onDone) {
  if (!el) return;
  el.volume = Math.max(0, Math.min(1, from));
  const steps = 40, iv = ms / steps;
  let s = 0;
  const t = setInterval(() => {
    s++;
    el.volume = Math.max(0, Math.min(1, from + (to - from) * s / steps));
    if (s >= steps) { clearInterval(t); if (onDone) onDone(); }
  }, iv);
}

// ══ RELATO 04 — Midnight City ══
function startMidnightCity() {
  if (!midnightAudio) return;
  const trigger = document.getElementById('mc-trigger');
  if (trigger) { trigger.classList.add('played'); trigger.parentNode.classList.add('played'); }

  currentMusicPage = 7;
  mLabel.textContent = '\u266a Midnight City \u2014 M83';
  mWidget.classList.add('mw-show', 'mw-playing');
  mNotice.classList.remove('show');

  midnightAudio.currentTime = 0;
  midnightAudio.loop = true;
  midnightAudio.volume = 0;
  midnightAudio.play().then(() => {
    fadeAudio(midnightAudio, 0, 0.38, 2500);
  }).catch(() => {
    mNotice.textContent = '\u25b6 Toca de nuevo';
    mNotice.classList.add('show');
  });
}

function stopMidnightCity() {
  if (!midnightAudio) return;
  if (!midnightAudio.paused) {
    fadeAudio(midnightAudio, midnightAudio.volume, 0, 2000, () => {
      midnightAudio.pause(); midnightAudio.currentTime = 0;
    });
  }
}

// ══ RELATO 10 — Take Me on the Floor ══
function startZombie(seekSecs) {
  if (!zombieAudio) return;
  const trigger = document.getElementById('zombie-trigger-1');
  if (trigger) { trigger.classList.add('played'); if(trigger.closest('.music-tap-wrap')) trigger.closest('.music-tap-wrap').classList.add('played'); }

  currentMusicPage = 13;
  mLabel.textContent = '\u266a Take Me on the Floor \u2014 The Veronicas';
  mWidget.classList.add('mw-show', 'mw-playing');
  mNotice.classList.remove('show');

  zombieAudio.currentTime = (seekSecs != null && seekSecs !== undefined) ? seekSecs : 0;
  zombieAudio.loop = false;
  zombieAudio.volume = 0;
  zombieAudio.play().then(() => {
    fadeAudio(zombieAudio, 0, 0.50, 2000);
    // Poll for zombie-stop element coming into view (backup for scroll events)
    _startZombieStopWatcher();
  }).catch(() => {
    mNotice.textContent = '\u25b6 Toca de nuevo';
    mNotice.classList.add('show');
  });
}

function _startZombieStopWatcher() {
  const scrollEl = document.getElementById('pageR');
  if (!scrollEl) return;
  // Check every 500ms regardless of scroll events
  const watcher = setInterval(() => {
    if (!zombieAudio || zombieAudio.paused || currentMusicPage !== 13) {
      clearInterval(watcher); return;
    }
    const stopEl = document.getElementById('zombie-stop');
    if (!stopEl || stopEl.dataset.triggered) { clearInterval(watcher); return; }
    const top = scrollEl.scrollTop, h = scrollEl.clientHeight;
    let off = 0, e = stopEl;
    while (e && e !== scrollEl) { off += e.offsetTop; e = e.offsetParent; }
    if (off < top + h * 0.9) {
      stopEl.dataset.triggered = '1';
      clearInterval(watcher);
      fadeAudio(zombieAudio, zombieAudio.volume, 0, 3500, () => {
        zombieAudio.pause();
        zombieAudio.currentTime = 0;
        mWidget.classList.remove('mw-playing');
        isPlaying = false;
      });
    }
  }, 500);
}

function zombieJumpTo(seekSecs) {
  // Second toca aquí in Relato 10: jump to 2:01 with slightly higher volume
  if (!zombieAudio) return;
  const trigger = document.getElementById('zombie-trigger');
  if (trigger) { trigger.classList.add('played'); trigger.closest('.music-tap-wrap').classList.add('played'); }
  
  if (zombieAudio.paused) {
    // Song not playing yet - start it from seekSecs
    zombieAudio.currentTime = seekSecs;
    zombieAudio.loop = false;
    zombieAudio.volume = 0;
    zombieAudio.play().then(() => {
      fadeAudio(zombieAudio, 0, 0.60, 1500);
      currentMusicPage = 13;
      mWidget.classList.add('mw-show', 'mw-playing');
    });
  } else {
    // Already playing - just jump and raise volume
    zombieAudio.currentTime = seekSecs;
    fadeAudio(zombieAudio, zombieAudio.volume, 0.60, 1500);
  }
  // Reset vol-change handlers so they can fire after the jump
  document.querySelectorAll('[data-vol-handled]').forEach(el => delete el.dataset.volHandled);
}

function stopZombie() {
  if (!zombieAudio) return;
  if (!zombieAudio.paused) {
    fadeAudio(zombieAudio, zombieAudio.volume, 0, 2500, () => {
      zombieAudio.pause(); zombieAudio.currentTime = 0;
    });

}

mBtn.addEventListener('click', () => {

window.onMusicPageChange = function(pageIdx, rightIdx) {

  if (active === 7) {

  } else if (active === 4) {

  } else if (active !== 13 && active !== 11) {

};

// ── Volumen dinámico por scroll (Relato 10) ──
function initMusicTriggers() {
  const scrollEl = document.getElementById('pageR');
  if (!scrollEl) return;

  const check = () => {
    if (currentMusicPage !== 13 || !zombieAudio || zombieAudio.paused) return;
    const top = scrollEl.scrollTop, h = scrollEl.clientHeight;

    // Vol down: gentle fade as recognition scene starts
    document.querySelectorAll('[data-vol-change]').forEach(el => {
      if (el.dataset.volHandled) return;
      let off = 0, e = el;
      while (e && e !== scrollEl) { off += e.offsetTop; e = e.offsetParent; }
      if (off < top + h * 0.75) {
        el.dataset.volHandled = '1';
        if (el.dataset.volChange === 'down') fadeAudio(zombieAudio, zombieAudio.volume, 0.22, 4000);
      }
    });

    // Stop music when "Now everybody kiss." comes into view
    const stopEl = document.getElementById('zombie-stop');
    if (stopEl && !stopEl.dataset.triggered) {
      let off = 0, e = stopEl;
      while (e && e !== scrollEl) { off += e.offsetTop; e = e.offsetParent; }
      if (off < top + h * 0.85) {
        stopEl.dataset.triggered = '1';
        fadeAudio(zombieAudio, zombieAudio.volume, 0, 3500, () => {
          zombieAudio.pause();
          zombieAudio.currentTime = 0;
          mWidget.classList.remove('mw-playing');
          isPlaying = false;
        });
      }
    }
  };

  scrollEl.addEventListener('scroll', check, { passive: true });
}

// Fetch MP3 filename from archive.org XML and play
function _playArchiveItem(audioEl, identifier, seekSecs) {
  const xmlUrl = 'https://archive.org/download/' + identifier + '/' + identifier + '_files.xml';
  fetch(xmlUrl)
    .then(r => r.text())
    .then(xml => {
      // Find first .mp3 file in XML
      const match = xml.match(/name="([^"]+\.mp3)"/i);
      if (!match) throw new Error('No MP3 found');
      const filename = match[1];
      const url = 'https://archive.org/download/' + identifier + '/' + encodeURIComponent(filename);
      audioEl.src = url;
      audioEl.load();
      audioEl.currentTime = seekSecs || 0;
      audioEl.volume = 0;
      return audioEl.play();
    })
    .then(() => fadeAudio(audioEl, 0, 0.55, 2000))
    .catch(err => {
      console.log('Archive.org fetch failed, trying direct URL:', err);
      // Fallback: try identifier as filename
      const fallback = 'https://archive.org/download/' + identifier + '/' + identifier + '.mp3';
      audioEl.src = fallback;
      audioEl.load();
      setTimeout(() => {
        audioEl.currentTime = seekSecs || 0;
        audioEl.volume = 0;
        audioEl.play().then(() => fadeAudio(audioEl, 0, 0.55, 2000)).catch(()=>{});
      }, 300);
    });
}

function stopAllMusic() {
  stopMidnightCity();
  stopZombie();

  document.querySelectorAll('[data-vol-handled]').forEach(el => delete el.dataset.volHandled);
  const s = document.getElementById('zombie-stop');
  if (s) delete s.dataset.triggered;
}

    activeParagraphId = paraId;
    const overlay = document.getElementById('reaction-modal-overlay');
    const ta = document.getElementById('reaction-textarea');
    ta.value = '';
    overlay.classList.add('open');
    setTimeout(() => ta.focus(), 300);

    // Toggle comments visibility
    if (wrap) {
      wrap.classList.toggle('comments-open');
    }
  }

  // ── Submit ──
  document.getElementById('reaction-submit').addEventListener('click', () => {
    const ta = document.getElementById('reaction-textarea');
    const text = ta.value.trim();
    if (!text || !activeParagraphId) return;

    saveComment(activeParagraphId, text, myName);
    loadComments(activeParagraphId);
    closeModal();
  });

  document.getElementById('reaction-cancel').addEventListener('click', closeModal);
  document.getElementById('reaction-modal-overlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
  });

  function closeModal() {
    document.getElementById('reaction-modal-overlay').classList.remove('open');
    document.getElementById('reaction-textarea').value = '';
    activeParagraphId = null;
  }

  // ── Storage (localStorage) ──
  function saveComment(paraId, text, author) {
    const key = 'reactions_' + paraId;
    const existing = JSON.parse(localStorage.getItem(key) || '[]');
    existing.push({ text, author, ts: Date.now() });
    localStorage.setItem(key, JSON.stringify(existing));
  }

  function loadComments(paraId) {
    const key = 'reactions_' + paraId;
    const comments = JSON.parse(localStorage.getItem(key) || '[]');
    const container = document.getElementById('bubbles_' + paraId);
    const wrap = container && container.parentNode;
    if (!container) return;

    container.innerHTML = '';
    comments.forEach(c => {
      const bubble = document.createElement('div');
      bubble.className = 'reaction-bubble';
      bubble.innerHTML = '<div class="reaction-bubble-author">' + c.author + '</div>' + escHtml(c.text);
      container.appendChild(bubble);
    });

    if (comments.length > 0 && wrap) {
      wrap.classList.add('has-comments');
    }
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Re-attach on every renderPages ──
  const _origRender = window.renderPages;
  window.renderPages = function(idx) {
    _origRender(idx);
    setTimeout(attachReactions, 150);
  };

  // Also attach on first load
  document.addEventListener('DOMContentLoaded', () => setTimeout(attachReactions, 500));
})();
</script>
</body>
</html>
