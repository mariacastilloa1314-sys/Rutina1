<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="var(--ink)"/>
<title>Rutina 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400;1,600&display=swap" rel="stylesheet">
<style>
:root{
  --ivory:#FAF8F5;
  --ivory2:#F5F1EC;
  --white:#FFFFFF;
  --ink:#1C1410;
  --ink2:#2E2018;
  --mu:#A0928A;
  --mu2:#C4B8B2;
  --gold:#C9A96E;
  --gold2:#A8873F;
  --gold3:#EDE0C4;
  --mauve:#B8909A;
  --mauve2:#D4B8C0;
  --sage:#7A9E84;
  --border:#EAE4DE;
  --border2:#D8CFC8;
  --card:#FFFFFF;
  --tx:var(--ink);

  /* back-compat */
  --c:var(--ivory);--w:var(--gold3);--br:var(--ink);--br2:var(--ink2);
  --br3:#4A3028;--tr:var(--mauve);--tr2:#9A6070;--gd:var(--gold);
  --gd2:var(--gold2);--sg:var(--sage);--bl:var(--border);--wh:var(--white);
  --midnight:var(--ink);--navy:var(--ink2);--navy2:#3A2818;
  --ch:var(--gold);--ch2:var(--gold2);--ch3:var(--gold3);

  --r:16px;           /* card radius */
  --r-sm:10px;
  --r-pill:100px;
  --shad:0 1px 12px rgba(28,20,16,0.07);
  --shad2:0 4px 28px rgba(28,20,16,0.11);
  --shad3:0 8px 40px rgba(28,20,16,0.14);
  --ff:'Bodoni Moda',serif;
  --fb:'DM Sans',sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}

body{
  background:var(--ivory2);
  font-family:var(--fb);
  color:var(--ink);
  min-height:100vh;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}

/* ══ HEADER ══ */
.hdr{
  background:var(--ivory);
  border-bottom:1px solid var(--border);
  padding:14px 18px 12px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 1px 20px rgba(28,20,16,.06);
}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.hdr-left{}
.app-ttl{
  color:var(--ink);
  font-family:var(--ff);
  font-size:19px;
  font-style:italic;
  font-weight:400;
  letter-spacing:.5px;
}
.app-sub{
  color:var(--gold2);
  font-size:8px;
  letter-spacing:3px;
  text-transform:uppercase;
  margin-top:3px;
  font-weight:300;
}
.hdr-meta{display:flex;gap:6px;align-items:center;margin-top:9px;flex-wrap:wrap}
.moon-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(201,169,110,.12);
  border:1px solid rgba(201,169,110,.3);
  border-radius:var(--r-pill);
  padding:4px 12px;
  font-size:9px;color:var(--gold);
  letter-spacing:1px;font-weight:400;
  cursor:pointer;transition:background .2s;
}
.moon-badge:hover{background:rgba(201,169,110,.16)}
.elem-badge{
  border-radius:var(--r-pill);
  padding:4px 12px;font-size:9px;
  letter-spacing:1px;font-weight:400;
}
.clk-wrap{text-align:right}
.clk-time{
  color:var(--ink);
  font-family:var(--fb);
  font-size:15px;font-weight:300;
  letter-spacing:3px;
}
.clk-date{
  color:var(--mu);
  font-size:8px;margin-top:3px;
  letter-spacing:1.5px;font-weight:300;
  text-transform:uppercase;
}
.pb{height:2px;background:var(--border);margin-top:11px;overflow:hidden}
.pbf{height:100%;background:linear-gradient(90deg,var(--gold),rgba(201,169,110,.3));transition:width .9s cubic-bezier(.4,0,.2,1)}

/* ══ TABS ══ */
.tabs{
  display:flex;
  background:var(--ivory);
  border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;
  padding:0 4px;
}
.tabs::-webkit-scrollbar{display:none}
.tbt{
  flex:1;min-width:48px;
  padding:9px 2px 8px;
  background:none;border:none;
  border-bottom:2px solid transparent;
  color:var(--mu2);
  font-size:8px;letter-spacing:1.5px;
  text-transform:uppercase;
  cursor:pointer;font-family:var(--fb);
  font-weight:500;transition:all .2s;
  white-space:nowrap;
}
.tbt.on{color:var(--gold);border-bottom-color:var(--gold)}

/* ══ CONTENT ══ */
.content{
  padding:18px 16px 120px;
  max-width:500px;margin:0 auto;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.content{animation:fadeIn .28s ease}

/* ══ SECTION LABEL ══ */
.sec-ttl{
  font-size:8px;letter-spacing:3px;text-transform:uppercase;
  color:var(--mu);margin:0 0 10px;
  display:flex;align-items:center;gap:10px;font-weight:400;
}
.sec-ln{flex:1;height:1px;background:var(--border)}

/* ══ NOW CARD ══ */
.now-section{margin-bottom:18px}
.now-label{
  font-size:8px;letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);margin-bottom:10px;
  display:flex;align-items:center;gap:7px;font-weight:400;
}
.now-pulse{
  width:5px;height:5px;
  background:var(--gold);border-radius:50%;
  box-shadow:0 0 0 0 rgba(201,169,110,.4);
  animation:ripple 2s infinite;
}
@keyframes ripple{
  0%{box-shadow:0 0 0 0 rgba(201,169,110,.4)}
  70%{box-shadow:0 0 0 8px rgba(201,169,110,0)}
  100%{box-shadow:0 0 0 0 rgba(201,169,110,0)}
}
.now-card{
  background:var(--white);
  border:1.5px solid rgba(201,169,110,.25);
  border-radius:20px;
  padding:22px 20px 18px;
  box-shadow:0 4px 28px rgba(28,20,16,.08);
  position:relative;overflow:hidden;
}
.now-card::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.now-time{
  font-size:9px;color:rgba(201,169,110,.6);
  font-weight:400;letter-spacing:2.5px;
  margin-bottom:6px;text-transform:uppercase;
}
.now-icon{font-size:22px;margin-bottom:10px;display:block}
.now-name{
  font-family:var(--ff);font-size:23px;
  font-weight:400;font-style:italic;
  color:var(--ink);line-height:1.2;margin-bottom:12px;
}
.now-sci{
  font-size:11px;color:var(--mu);
  line-height:1.75;font-style:italic;
  border-left:1px solid rgba(201,169,110,.3);
  padding-left:12px;font-weight:300;
}
.now-check{margin-top:16px;display:flex;justify-content:flex-end}
.done-btn{
  background:var(--gold);color:var(--ink);
  border:none;border-radius:var(--r-pill);
  padding:10px 26px;font-size:10px;
  cursor:pointer;letter-spacing:1.5px;
  font-family:var(--fb);font-weight:600;
  transition:all .2s;text-transform:uppercase;
}
.done-btn:active{transform:scale(.97)}
.done-btn.undone{
  background:var(--ivory2);
  border:1.5px solid var(--border2);
  color:var(--mu);
}

/* ══ SCHEDULE CARDS ══ */
.scard{
  background:var(--card);
  border-radius:var(--r);
  padding:13px 15px;margin-bottom:6px;
  cursor:pointer;transition:transform .15s, box-shadow .15s;
  box-shadow:var(--shad);
  border:none;
}
.scard:active{transform:scale(.99)}
.scard.done{
  opacity:.5;
  background:rgba(122,158,132,.06);
  box-shadow:none;
}
.crow{display:flex;align-items:center;gap:10px}
.cdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.ctm{
  color:var(--mu);font-size:10px;
  min-width:38px;font-weight:300;
  letter-spacing:.5px;
}
.cico{font-size:15px;flex-shrink:0}
.clbl{flex:1;font-size:14px;font-weight:400;color:var(--ink)}
.clbl.done{text-decoration:line-through;color:var(--mu2);font-weight:300}
.ckbtn{
  width:24px;height:24px;border-radius:50%;
  border:1.5px solid var(--border2);
  background:transparent;cursor:pointer;
  display:flex;align-items:center;
  justify-content:center;flex-shrink:0;
  transition:all .2s;font-size:12px;
}
.ckbtn.on{background:var(--sage);border-color:var(--sage);color:white}
.sci-box{
  margin-top:9px;padding:10px 13px;
  background:rgba(201,169,110,.04);
  border-left:1.5px solid rgba(201,169,110,.25);
  border-radius:0 8px 8px 0;
  font-size:11px;color:var(--mu);
  line-height:1.75;font-style:italic;font-weight:300;
}

/* ══ PAST ACTIVITIES ══ */
.past-toggle{
  width:100%;background:none;border:none;
  padding:10px 0;font-size:8px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--mu2);
  cursor:pointer;display:flex;align-items:center;
  gap:8px;margin-bottom:4px;font-family:var(--fb);font-weight:300;
}
.pcard{
  background:rgba(250,248,245,.7);
  border-radius:var(--r-sm);
  padding:8px 13px;margin-bottom:5px;
  opacity:.45;cursor:pointer;
  box-shadow:none;
}
.pcard.done{opacity:.6;background:rgba(122,158,132,.06)}
.prow{display:flex;align-items:center;gap:8px}
.missed-tag{
  font-size:8px;color:var(--mauve);
  letter-spacing:1px;background:rgba(184,144,154,.08);
  padding:2px 8px;border-radius:var(--r-pill);
}

/* ══ WORKOUT ══ */
.wk-hdr{
  background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);
  padding:16px 18px;margin-bottom:12px;
  display:flex;align-items:center;gap:13px;
  position:relative;overflow:hidden;
  box-shadow:var(--shad);
}
.wk-emo{font-size:28px}
.wk-ttl{color:var(--ink);font-family:var(--ff);font-size:18px;font-style:italic}
.wk-sub{color:var(--gold2);font-size:8px;letter-spacing:2.5px;text-transform:uppercase;margin-top:3px;font-weight:300}
.ex-card{
  background:var(--card);border-radius:var(--r);
  padding:13px 15px;margin-bottom:6px;
  display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:transform .15s;
  box-shadow:var(--shad);
}
.ex-card:active{transform:scale(.99)}
.ex-card.done{opacity:.5;background:rgba(122,158,132,.06);box-shadow:none}
.ex-name{font-size:14px;font-weight:400;color:var(--ink)}
.ex-name.done{text-decoration:line-through;color:var(--mu2);font-weight:300}
.ex-meta{font-size:10px;color:var(--mu);margin-top:2px;font-weight:300;letter-spacing:.3px}
.tip-box{
  background:rgba(201,169,110,.05);
  border-radius:var(--r-sm);
  padding:12px 14px;font-size:12px;
  color:var(--ink2);line-height:1.75;
  margin-top:10px;font-style:italic;font-weight:300;
}
.wu-box{
  background:rgba(122,158,132,.07);
  border-radius:var(--r-sm);
  padding:12px 14px;font-size:12px;
  color:#3A5A40;line-height:1.65;margin-bottom:12px;font-weight:300;
}
.prot-box{
  background:rgba(201,169,110,.06);
  border-radius:var(--r-sm);
  padding:12px 14px;font-size:12px;
  color:var(--gold2);line-height:1.65;margin-top:10px;font-weight:300;
}

/* ══ STATS ══ */
.stats-page{padding:4px 0}
.stats-title{font-family:var(--ff);font-size:26px;color:var(--ink);text-align:center;margin-bottom:4px;font-style:italic}
.stats-sub{text-align:center;font-size:9px;color:var(--mu);letter-spacing:2.5px;margin-bottom:18px;font-weight:300;text-transform:uppercase}
.week-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:18px}
.day-orb{display:flex;flex-direction:column;align-items:center;gap:4px}
.orb-ring{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--ff);font-size:14px;font-weight:400}
.orb-lbl{font-size:8px;color:var(--mu);letter-spacing:1.5px;text-transform:uppercase;font-weight:300}
.big-stat{background:var(--card);border-radius:var(--r);padding:18px;margin-bottom:10px;text-align:center;box-shadow:var(--shad)}
.big-num{font-family:var(--ff);font-size:50px;color:var(--mauve);font-weight:400;line-height:1}
.big-lbl{font-size:9px;color:var(--mu);letter-spacing:2.5px;text-transform:uppercase;margin-top:4px;font-weight:300}
.stats-row{display:flex;gap:8px;margin-bottom:8px}
.mini-stat{flex:1;background:var(--card);border-radius:var(--r);padding:14px 8px;text-align:center;box-shadow:var(--shad)}
.mini-num{font-family:var(--ff);font-size:26px;color:var(--gold);font-weight:400}
.mini-lbl{font-size:8px;color:var(--mu);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;font-weight:300}
.week-msg{background:var(--ink);border-radius:var(--r);padding:20px;text-align:center;font-family:var(--ff);font-size:17px;color:var(--ivory);font-style:italic;line-height:1.8}

/* ══ ENGLISH ══ */
.ph-tag{display:inline-block;font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:3px 12px;border-radius:var(--r-pill);margin:10px 0 8px;font-weight:400}
.eng-card{background:var(--card);border-radius:var(--r);padding:13px 15px;margin-bottom:6px;cursor:pointer;transition:transform .15s;box-shadow:var(--shad)}
.eng-card:active{transform:scale(.99)}
.eng-card.done{opacity:.5;background:rgba(122,158,132,.06);box-shadow:none}
.eng-row{display:flex;align-items:center;gap:10px}

/* ══ VISION ══ */
.vb-img{width:100%;border-radius:var(--r);margin-bottom:16px;box-shadow:var(--shad3)}
.quote-card{background:var(--ink);border-radius:20px;padding:24px 20px;margin-bottom:16px;position:relative;overflow:hidden}
.quote-card::before{content:'“';position:absolute;top:10px;left:16px;font-size:56px;color:rgba(201,169,110,.08);font-family:serif;line-height:1}
.quote-txt{font-family:var(--ff);font-size:17px;color:var(--ivory);line-height:1.8;text-align:center;font-style:italic;margin-bottom:8px}
.quote-src{font-size:9px;color:rgba(201,169,110,.5);letter-spacing:2.5px;text-transform:uppercase;text-align:center;font-weight:300}
.spirit-card{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--shad)}
.spirit-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.spirit-ico{font-size:18px}
.spirit-ttl{font-family:var(--ff);font-size:14px;font-weight:400;color:var(--ink)}
.spirit-txt{font-size:12px;color:var(--mu);line-height:1.75;font-weight:300}
.cat-section{margin-bottom:14px}
.cat-hdr{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--mu);margin-bottom:8px;display:flex;align-items:center;gap:8px;font-weight:300}
.goal-item{
  display:flex;align-items:center;gap:12px;
  padding:13px 15px;background:var(--card);
  border-radius:var(--r);margin-bottom:5px;
  cursor:pointer;transition:transform .15s;
  box-shadow:var(--shad);
}
.goal-item:active{transform:scale(.99)}
.goal-item.done{opacity:.5;background:rgba(122,158,132,.06);box-shadow:none}
.goal-txt{flex:1;font-size:14px;font-weight:400;color:var(--ink)}
.goal-txt.done{text-decoration:line-through;color:var(--mu2)}
.goal-chk{
  width:22px;height:22px;border-radius:50%;
  border:1.5px solid var(--border2);
  background:transparent;cursor:pointer;
  display:flex;align-items:center;
  justify-content:center;font-size:11px;
  flex-shrink:0;transition:all .2s;
}
.goal-chk.on{background:var(--sage);border-color:var(--sage);color:white}
.moon-section{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px;text-align:center}
.moon-emo{font-size:36px;display:block;margin-bottom:6px}
.moon-name{color:var(--gold2);font-family:var(--ff);font-size:16px;font-style:italic;margin-bottom:3px}
.moon-energy{color:var(--mu);font-size:8px;letter-spacing:2.5px;text-transform:uppercase;font-weight:300}

/* ══ PNL ══ */
.pnl-hero{background:var(--white);border:1.5px solid rgba(201,169,110,.2);border-radius:20px;padding:22px 18px;margin-bottom:16px;text-align:center;position:relative;overflow:hidden;box-shadow:var(--shad2)}
.pnl-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,169,110,.25),transparent)}
.pnl-hero-emo{font-size:34px;display:block;margin-bottom:10px}
.pnl-hero-ttl{color:var(--ink);font-family:var(--ff);font-size:22px;font-style:italic;margin-bottom:4px}
.pnl-hero-sub{color:var(--gold2);font-size:8px;letter-spacing:3px;text-transform:uppercase;font-weight:300}
.pnl-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.pnl-tabs::-webkit-scrollbar{display:none}
.pnl-tab{
  flex-shrink:0;padding:7px 16px;
  background:var(--card);
  border-radius:var(--r-pill);
  font-size:9px;cursor:pointer;
  color:var(--mu);transition:all .2s;
  font-family:var(--fb);font-weight:500;
  letter-spacing:1px;text-transform:uppercase;
  box-shadow:var(--shad);border:none;
}
.pnl-tab.on{background:var(--ink);color:var(--gold)}
.belief-card{background:var(--card);border-radius:var(--r);padding:15px;margin-bottom:8px;cursor:pointer;box-shadow:var(--shad);transition:transform .15s}
.belief-card:active{transform:scale(.99)}
.belief-card.done{opacity:.5;background:rgba(122,158,132,.06);box-shadow:none}
.belief-row{display:flex;align-items:flex-start;gap:11px}
.belief-ico{font-size:20px;flex-shrink:0;margin-top:1px}
.belief-body{flex:1}
.belief-ttl{font-size:14px;font-weight:400;color:var(--ink);margin-bottom:2px}
.belief-ttl.done{text-decoration:line-through;color:var(--mu2);font-weight:300}
.belief-sub{font-size:12px;color:var(--mu);line-height:1.6;font-weight:300}
.belief-expand{margin-top:10px;padding:11px 14px;background:rgba(28,20,16,.03);border-left:1.5px solid rgba(201,169,110,.3);border-radius:0 8px 8px 0;font-size:12px;color:var(--ink2);line-height:1.8;font-weight:300}
.reframe-box{background:rgba(201,169,110,.05);border-radius:var(--r-sm);padding:12px 14px;margin-top:10px}
.reframe-old{font-size:12px;color:var(--mu);text-decoration:line-through;margin-bottom:5px}
.reframe-new{font-size:13px;color:var(--sage);font-weight:500}
.identity-mirror{background:var(--white);border:1.5px solid rgba(201,169,110,.2);border-radius:var(--r);padding:20px 18px;margin-bottom:14px;text-align:center;box-shadow:var(--shad2)}
.identity-you{color:var(--mu);font-size:8px;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;font-weight:300}
.identity-new{color:var(--gold2);font-family:var(--ff);font-size:24px;font-style:italic;line-height:1.35;margin-bottom:8px}
.identity-sci{color:var(--mu);font-size:11px;line-height:1.75;font-weight:300}
.affirmation-card{background:var(--card);border-radius:var(--r);padding:13px 15px;margin-bottom:6px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .15s;box-shadow:var(--shad)}
.affirmation-card:active{transform:scale(.99)}
.affirmation-card.done{opacity:.5;background:rgba(122,158,132,.06);box-shadow:none}
.aff-txt{flex:1;font-size:13px;font-style:italic;color:var(--ink);line-height:1.65;font-weight:300}
.aff-txt.done{text-decoration:line-through;color:var(--mu2);font-style:normal}
.technique-card{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:6px;cursor:pointer;box-shadow:var(--shad);transition:transform .15s}
.technique-card:active{transform:scale(.99)}
.technique-card.done{opacity:.5;background:rgba(122,158,132,.06);box-shadow:none}
.tech-row{display:flex;align-items:center;gap:11px}
.tech-num{width:28px;height:28px;border-radius:50%;background:var(--ink);color:var(--gold);font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:600}
.future-timeline{position:relative;padding-left:22px;margin-bottom:16px}
.future-timeline::before{content:'';position:absolute;left:7px;top:4px;bottom:4px;width:1px;background:linear-gradient(180deg,var(--gold),rgba(201,169,110,.1))}
.tl-item{position:relative;margin-bottom:12px}
.tl-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--gold);background:var(--ivory)}
.tl-dot.done{background:var(--gold)}
.tl-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:5px;font-weight:300}
.tl-card{background:var(--card);border-radius:var(--r-sm);padding:12px 14px;cursor:pointer;margin-bottom:5px;box-shadow:var(--shad);transition:transform .15s}
.tl-card:active{transform:scale(.99)}
.tl-card.done{opacity:.5;background:rgba(122,158,132,.06);box-shadow:none}

/* ══ NOTIFICATION BTN ══ */
.notif-btn{
  width:100%;background:var(--ink);color:var(--gold);
  border:none;border-radius:var(--r);
  padding:14px;font-size:10px;cursor:pointer;
  font-family:var(--fb);font-weight:500;
  margin-bottom:14px;letter-spacing:2px;
  text-transform:uppercase;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity .2s;box-shadow:var(--shad2);
}
.notif-btn:active{opacity:.85}

/* ══ TOAST ══ */
.toast{
  position:fixed;bottom:84px;left:50%;
  transform:translateX(-50%);
  background:var(--ink);color:var(--ivory);
  padding:12px 26px;border-radius:var(--r-pill);
  font-size:12px;z-index:999;display:none;
  box-shadow:var(--shad3);white-space:nowrap;
  letter-spacing:.5px;font-weight:400;
}

/* ══ MOTIVA ══ */
.motiva{
  background:var(--card);
  border-radius:var(--r);
  padding:14px 15px;margin-bottom:14px;
  display:flex;gap:12px;align-items:center;
  box-shadow:var(--shad);
}
.motiva-txt{flex:1;font-size:12px;color:var(--ink);line-height:1.75;font-style:italic;font-family:var(--ff)}
.motiva-x{background:none;border:none;cursor:pointer;color:var(--mu);font-size:18px;padding:0;line-height:1}

/* ══ STAT MINI ══ */
.stat3{display:flex;gap:8px;margin-bottom:14px}
.s3c{flex:1;background:var(--card);border-radius:var(--r);padding:12px 6px;text-align:center;box-shadow:var(--shad)}
.s3n{font-family:var(--ff);font-size:22px;color:var(--mauve);font-weight:400}
.s3l{font-size:8px;letter-spacing:1.5px;color:var(--mu);text-transform:uppercase;margin-top:2px;font-weight:300}

/* ══ RING ══ */
#day-ring svg circle{transition:stroke-dasharray .8s cubic-bezier(.4,0,.2,1)}

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ══ TAP STATES for mobile ══ */
@media(hover:none){
  .scard:hover,.ex-card:hover,.goal-item:hover,
  .belief-card:hover,.eng-card:hover{transform:none;box-shadow:var(--shad)}
}

  background: var(--white);

  padding: 18px 16px;
  margin-bottom: 12px;
  box-shadow: var(--shad2);

}

  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

  color: var(--mu);

}

  text-align: center;

  color: var(--mu);
  font-weight: 300;

  font-weight: 300;
  margin-top: 2px;

function getTotalToday(){
  const dow = new Date().getDay();
  const schedTotal = SCHED.length;
  const engTotal   = ENG.length;
  const exTotal    = (dow>=1&&dow<=5&&WK[dow]&&!WK[dow].rest&&WK[dow].ex) ? WK[dow].ex.length : 0;
  const vozToday   = getVozDayExercises();
  const vozTotal   = vozToday ? vozToday.length : 0;
  const pnlTotal   = (dow>=1&&dow<=5) ? getPnlDailyTotal() : 0;
  return schedTotal + engTotal + exTotal + vozTotal + pnlTotal;
}

function getTotalDone(){
  const schedDone = Object.values(done).filter(Boolean).length;
  const engDone2  = Object.values(engD).filter(Boolean).length;
  const exDone2   = Object.values(exD).filter(Boolean).length;
  const vozDone2  = Object.values(vozD).filter(Boolean).length;
  const pnlDone2  = (new Date().getDay()>=1&&new Date().getDay()<=5) ? getPnlDailyDone() : 0;
  return schedDone + engDone2 + exDone2 + vozDone2 + pnlDone2;
}

function countTrue(obj){return Object.values(obj||{}).filter(Boolean).length;}

function updateProgress(){
  var schedDone=countTrue(done);
  var engDone=countTrue(engD);
  var exDone=countTrue(exD);
  var vozDone=0;
  try{
    var vEjs2=getVozDayExercises();
    if(vEjs2)vozDone=vEjs2.filter(function(e){return !!vozD[e.id];}).length;
    else vozDone=countTrue(vozD);
  }catch(e){vozDone=countTrue(vozD);}
  var pnlDone2=0;
  try{pnlDone2=getPnlDailyDone();}catch(e){pnlDone2=countTrue(pnlD);}
  var dow=new Date().getDay();
  var isWk=(dow>=1&&dow<=5);
  var exT=0,vozT=0,pnlT=0;
  try{if(isWk&&WK[dow]&&WK[dow].ex)exT=WK[dow].ex.length;}catch(e){}
  try{if(isWk&&VDIA&&VDIA[dow]&&VDIA[dow].ejs)vozT=VDIA[dow].ejs.length;}catch(e){}
  try{if(isWk)pnlT=getPnlDailyTotal();}catch(e){pnlT=4;}
  // Global bar = ALL tabs
  var totalDone=schedDone+engDone+exDone+vozDone+pnlDone2;
  var total=SCHED.length+ENG.length+exT+vozT+pnlT;
  var pct=total>0?Math.round(totalDone/total*100):0;
  var pbf=document.getElementById('pbf');
  if(pbf)pbf.style.width=pct+'%';
  // Drive single RUTINA ring
  var C2=175.9;
  var schedPct2=SCHED.length>0?Math.round(countTrue(done)/SCHED.length*100):0;
  var rc=document.getElementById('r-ru');
  var rt=document.getElementById('t-ru');
  var rd=document.getElementById('ring-done');
  var rl=document.getElementById('ring-total');
  var rb=document.getElementById('ring-bar');
  if(rc)rc.setAttribute('stroke-dasharray',(C2*schedPct2/100).toFixed(1)+' '+(C2*(1-schedPct2/100)).toFixed(1));
  if(rt)rt.textContent=schedPct2+'%';
  if(rd)rd.textContent=countTrue(done);
  if(rl)rl.textContent='de '+SCHED.length;
  if(rb)rb.style.background='linear-gradient(90deg,var(--gold) '+schedPct2+'%,var(--border) '+schedPct2+'%)';

  try{saveDailySnapshot(totalDone,total);}catch(e){}
  updateProgLabel();
}

function saveDailySnapshot(cnt, total){
  const k = "snap_"+TK;
  const prev = JSON.parse(localStorage.getItem(k)||"null");
  // Only save if improved (or first time)
  if(!prev || cnt > (prev.cnt||0)){
    localStorage.setItem(k, JSON.stringify({cnt, total, pct: total>0?Math.round(cnt/total*100):0, ts: Date.now()}));
  }
}

function t2m(t){const[h,m]=t.split(":").map(Number);return h*60+m}
function now2m(){const n=new Date();return n.getHours()*60+n.getMinutes()}

function getCurrent(){
  const m=now2m();
  const GRACE=2; // 2 min after activity ends — still markable
  for(let i=0;i<SCHED.length-1;i++){
    const start=t2m(SCHED[i].t);
    const next=t2m(SCHED[i+1].t);
    if(m>=start&&m<next+GRACE)return SCHED[i].id;
  }
  if(m>=t2m("22:00")||m<t2m("06:00"))return 20;
  return null;
}
function getRecentlyPassed(){
  // Returns the id of an activity that ended up to 3 min ago
  const m=now2m();
  for(let i=1;i<SCHED.length;i++){
    const passed=t2m(SCHED[i].t);
    if(m>=passed&&m<passed+3)return SCHED[i-1].id;
  }
  return null;
}

  const illum=Math.round((1-Math.cos(2*Math.PI*days/29.53))/2*100);
  const phases=[
    {d:1.85, n:"Luna Nueva 🌑",      energy:"Intención y semilla",
     sci:"La Luna está entre la Tierra y el Sol. No refleja luz visible desde aquí. Es el mejor momento del mes para ver estrellas — el cielo está completamente oscuro."},
    {d:7.38, n:"Creciente 🌒",       energy:"Acción y arranque",
     sci:"Ves el lado derecho iluminado. La Luna sale al mediodía y se pone a medianoche. La sombra curved que ves se llama terminador — es la línea día/noche lunar."},
    {d:9.22, n:"Cuarto Creciente 🌓", energy:"Decisión y compromiso",
     sci:"Exactamente la mitad iluminada. La Luna está a 90° del Sol vista desde la Tierra. La gravedad lunar está jalando las mareas al máximo — igual que tus decisiones, todo se tensiona."},
    {d:14.77,n:"Gibosa Creciente 🌔", energy:"Refinamiento",
     sci:"Más de la mitad iluminada, casi llena. 'Gibosa' viene del latín gibbus: joroba. El lado visible crece cada noche. Ya se ve claramente en el cielo diurno por las tardes."},
    {d:16.61,n:"Luna Llena 🌕",      energy:"Manifestación máxima",
     sci:"La Tierra está entre el Sol y la Luna. Toda la cara visible está iluminada. Sale al atardecer exacto y se pone al amanecer exacto. Las mareas son las más altas del mes."},
    {d:22.15,n:"Gibosa Menguante 🌖", energy:"Gratitud y integración",
     sci:"La iluminación empieza a reducirse por la izquierda. Sale a las 9pm y se ve en el cielo matutino. La Luna ya pasó su punto máximo — el ciclo empieza a cerrar."},
    {d:23.99,n:"Cuarto Menguante 🌗", energy:"Liberación",
     sci:"Exactamente la mitad iluminada, pero ahora el lado izquierdo. Sale a medianoche y se ve toda la mañana. Es el espejo exacto del Cuarto Creciente, dos semanas después."},

function playChime(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    // Crystalline chime — two harmonics per note for glass/crystal texture
    const notes=[1047,1319,1568,2093];
    notes.forEach((f,i)=>{
      [1, 2.756].forEach(harm=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type="sine";o.frequency.value=f*harm;
        const t=ctx.currentTime+i*.22;
        const vol=harm===1?.18:.06;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(vol,t+.01);
        g.gain.exponentialRampToValueAtTime(.001,t+1.2);
        o.start(t);o.stop(t+1.25);
      });
    });
  }catch(e){}
}

function tick(){
  const now=new Date();
  // update key if day changed
  const nk=todayKey();
  if(nk!==TK){
    TK=nk;
    done=JSON.parse(localStorage.getItem("done_"+nk)||"{}");
    engD=JSON.parse(localStorage.getItem("eng_"+nk)||"{}");
    exD =JSON.parse(localStorage.getItem("ex_"+nk)||"{}");
    vozD=JSON.parse(localStorage.getItem("voz_"+nk)||"{}");
    pnlD=JSON.parse(localStorage.getItem("pnl_"+nk)||"{}");
    render();
  }

  const h=String(now.getHours()).padStart(2,"0");
  const m=String(now.getMinutes()).padStart(2,"0");
  document.getElementById("clock").textContent=h+":"+m;
  var rdl=document.getElementById("ring-date-lbl");
  if(rdl) rdl.textContent=DAYS_ES[now.getDay()]+", "+now.getDate()+" de "+MONTHS_ES[now.getMonth()];
  document.getElementById("clk-date").textContent=
    DAYS_ES[now.getDay()]+", "+now.getDate()+" de "+MONTHS_ES[now.getMonth()];

  // moon + element
  const moon=getMoon(now);
  const elem=ELEMENTS[now.getDay()];
  var mb=document.getElementById("moon-badge");
  mb.textContent=moon.n+" · "+moon.illum+"%";
  var energyEl=document.getElementById("moon-energy-lbl");
  if(energyEl){
    energyEl.textContent=moon.energy;
    energyEl.setAttribute("data-sci", moon.sci||"");
    energyEl.setAttribute("data-illum", moon.illum||0);
    energyEl.setAttribute("data-days", moon.days||0);
  }
  const eb=document.getElementById("elem-badge");
  eb.textContent=elem.n;eb.style.background=elem.c;eb.style.color=elem.tc;

  // time-based header tint
  const hr=now.getHours();
  const hdr=document.getElementById("hdr");
  if(hr>=6&&hr<10)hdr.style.background="var(--ivory)";
  else if(hr>=10&&hr<17)hdr.style.background="var(--ivory)";
  else if(hr>=17&&hr<20)hdr.style.background="var(--ivory)";
  else hdr.style.background="var(--ivory)";

  updateProgress();

  // notify
  if(notifOK){
    const cid=getCurrent()||getRecentlyPassed();
    const nid=""+cid+"-"+h+":"+m;
    if(cid&&nid!==lastNid&&m==="00"||m==="30"){
      if(!done[cid]){
        const item=SCHED.find(s=>s.id===cid);
        if(item){
          lastNid=nid;
          playChime();
          new Notification(item.i+" "+item.l,{body:item.s.substring(0,80)+"…",tag:"rt"});
        }
      }
    }
  }

  // re-highlight without full re-render
  if(tab==="hoy"){
    const cid=getCurrent();
    document.querySelectorAll("[data-now]").forEach(el=>{
      el.setAttribute("data-now","0");
    });
    const nc=document.querySelector("[data-id=\'"+cid+"\']");
    if(nc)nc.setAttribute("data-now","1");
  }
}

      <span style="font-family:'Bodoni Moda',serif;font-size:28px;font-style:italic;color:var(--mu2);font-weight:400" id="ring-total">de 0</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:2px">
    <div style="font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--mu);font-weight:300">actividades completadas hoy</div>

  </div>
    <div style="margin-top:14px;height:1px;background:linear-gradient(90deg,var(--gold),transparent)" id="ring-bar"></div>
  </div>`


;

  // Separate into current / upcoming / past
  const past=[];const upcoming=[];let current=null;
  for(const item of SCHED){
    const itemMin=t2m(item.t);
    if(item.id===cid){current=item;}
    else if(itemMin<curMin){past.push(item);}
    else{upcoming.push(item);}
  }

  // CURRENT — pinned
  if(current){
    const isDone=!!done[current.id];
    h+=`<div class="now-section">
      <div class="now-label"><span class="now-pulse"></span> AHORA MISMO</div>
      <div class="now-card" data-id="${current.id}">
        <div class="now-time">${current.t} · ${current.cat}</div>
        <div class="now-icon">${current.i}</div>
        <div class="now-name">${current.l}</div>
        <div class="now-sci">${current.s}</div>
        <div class="now-check">
          <button class="done-btn ${isDone?"":"undone"}" onclick="tog(${current.id})">
            ${isDone?"✓ Completada — tap para desmarcar":"Marcar como completada"}
          </button>
        </div>
      </div>
    </div>`;
  }

  // UPCOMING
  if(upcoming.length){
    h+=`<div class="sec-ttl"><span>Próximas</span><div class="sec-ln"></div></div>`;
    upcoming.forEach(item=>{
      const isDone=!!done[item.id];
      const isExp=expanded===item.id;
      h+=`<div class="scard ${isDone?"done":""}" onclick="togExp(${item.id})">
        <div class="crow">
          <div class="cdot" style="background:${CAT_C[item.cat]||"#888"}"></div>

          <span class="cico">${item.i}</span>
          <span class="clbl ${isDone?"done":""}">${item.l}</span>
          <button class="ckbtn ${isDone?"on":""}" onclick="event.stopPropagation();tog(${item.id})">${isDone?"✓":""}</button>
        </div>
        ${isExp?`<div class="sci-box">🔬 ${item.s}</div>`:""}
      </div>`;
    });
  }

  // PAST (collapsed, greyed)
  if(past.length){
    h+=`<button class="past-toggle" onclick="pastOpen=!pastOpen;render()">
      <div class="sec-ln"></div>
      <span>${pastOpen?"▾":"▸"} Ya pasaron (${past.length})</span>
      <div class="sec-ln"></div>
    </button>`;
    if(pastOpen){
      past.forEach(item=>{
        const isDone=!!done[item.id];
        const isExp=expanded===("p"+item.id);
        h+=`<div class="pcard ${isDone?"done":""}" onclick="togExp('p'+${item.id})">

          </div>
          ${isExp?`<div class="sci-box" style="font-size:11px">🔬 ${item.s}</div>`:""}
        </div>`;
      });
    }
  }

  return h;
}

function getWeekSummary(){
  var now=new Date(), dow=now.getDay();
  var mon=new Date(now);
  mon.setDate(now.getDate()-(dow===0?6:dow-1));
  var days=[1,2,3,4,5].map(function(i){
    var d=new Date(mon); d.setDate(mon.getDate()+(i-1));
    var k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var data=JSON.parse(localStorage.getItem("done_"+k)||"{}");
    var cnt=Object.values(data).filter(Boolean).length;
    var pct=SCHED.length>0?Math.round(cnt/SCHED.length*100):0;
    return {d:["L","M","X","J","V"][i-1], pct:pct, cnt:cnt};
  });
  var total=days.reduce(function(a,b){return a+b.cnt;},0);
  var avg=Math.round(days.reduce(function(a,b){return a+b.pct;},0)/5);
  return {days:days, total:total, avg:avg};
}

function renderStats(){
  const now = new Date();
  const dow = now.getDay();
  const isSun = dow===0;
  const ws = getWeekStats();
  const total = ws.reduce((a,d)=>a+d.c,0);
  const maxDay = ws.reduce((a,b)=>b.c>a.c?b:a,ws[0]);
  const prom = Math.round(total/5);
  const weekPct = Math.round(total/(SCHED.length*5)*100);
  let streak=0;
  for(let i=ws.length-1;i>=0;i--){if(ws[i].pct>30)streak++;else break;}

  const wkIdx = now.getDate()%WEEKEND_SCI.length;
  const shaIdx = now.getDate()%WEEKEND_SHA.length;
  const sci = WEEKEND_SCI[wkIdx];
  const sha = WEEKEND_SHA[shaIdx];

  // Monthly stats
  const ms = getMonthStats(now.getFullYear(), now.getMonth());
  const topAct = getMostCompletedActivity();
  const bestMonth = getMostProductiveMonth();

  // 3 random optional activities
  const seed = now.getDate();
  const opts = [WEEKEND_OPTS[seed%WEEKEND_OPTS.length],
                WEEKEND_OPTS[(seed+2)%WEEKEND_OPTS.length],
                WEEKEND_OPTS[(seed+5)%WEEKEND_OPTS.length]];

  const weekMsgs=[[80,"Semana excepcional. Tu cerebro y tu cuerpo lo están agradeciendo."],[50,"Buena semana. Cada día que cumples refuerza quien estás siendo."],[20,"Semana en construcción. El hábito más difícil es el que más te transforma."],[0,"Nueva oportunidad. Un día a la vez."]];
  const wMsg = weekMsgs.find(([t])=>weekPct>=t)[1];

  const colors=["var(--ch)","#C9A84C","#7A9E6A","#7AAEAA","#B8A0C8"];

  let h = `<div class="wk-hdr" style="flex-direction:column;align-items:flex-start;gap:4px">
    <div style="display:flex;align-items:center;gap:12px;width:100%">
      <span class="wk-emo">${isSun?"🌙":"🌿"}</span>
      <div><div class="wk-ttl">${isSun?"Domingo — Integra y descansa":"Sábado — Recarga y revisa"}</div>
      <div class="wk-sub">Tu semana en números</div></div>
    </div>
  </div>`;

  // ── WEEKLY ──
  h += `<div class="sec-ttl"><span>Semana</span><div class="sec-ln"></div></div>`;
  h += `<div class="week-grid">`;
  ws.forEach((d,i)=>{
    const p=d.pct;
    const col=p>70?colors[2]:p>40?colors[1]:p>0?colors[0]:"rgba(200,180,160,.3)";
    const border=p>0?`3px solid ${col}`:"3px dashed rgba(200,180,160,.4)";
    h+=`<div class="day-orb"><div class="orb-ring" style="border:${border};color:${p>0?col:"var(--mu)"};font-size:13px">${p>0?p+"%":"—"}</div><div class="orb-lbl">${d.lbl}</div></div>`;
  });
  h += `</div>`;

  h += `<div class="stats-row">
    <div class="mini-stat"><div class="mini-num">${weekPct}%</div><div class="mini-lbl">Eficiencia</div></div>
    <div class="mini-stat"><div class="mini-num">${streak}</div><div class="mini-lbl">Racha días</div></div>
    <div class="mini-stat"><div class="mini-num">${prom}</div><div class="mini-lbl">Prom/día</div></div>
  </div>`;

  // ── MONTHLY ──
  h += `<div class="sec-ttl" style="margin-top:6px"><span>${MONTHS_ES[now.getMonth()]} — mes actual</span><div class="sec-ln"></div></div>`;
  h += `<div class="stats-row">
    <div class="mini-stat"><div class="mini-num">${ms.avg}%</div><div class="mini-lbl">Promedio mes</div></div>
    <div class="mini-stat"><div class="mini-num">${ms.days}</div><div class="mini-lbl">Días activa</div></div>
    <div class="mini-stat"><div class="mini-num">${ms.best.pct}%</div><div class="mini-lbl">Mejor día</div></div>
  </div>`;

  // ── WRAPPED preview ──
  if(topAct || bestMonth.month>=0){
    h += `<div class="sec-ttl" style="margin-top:6px"><span>✨ Tu año hasta hoy</span><div class="sec-ln"></div></div>`;
    h += `<div style="display:flex;gap:8px;margin-bottom:10px">`;
    if(bestMonth.avg>0){
      h+=`<div class="mini-stat" style="flex:1"><div style="font-size:11px;color:var(--gd);font-weight:500;margin-bottom:2px">Mes más productivo</div><div style="font-size:15px;font-weight:600;color:var(--tr);text-transform:capitalize">${bestMonth.name}</div><div class="mini-lbl">${bestMonth.avg}% promedio</div></div>`;
    }
    if(topAct && topAct.count>0){
      h+=`<div class="mini-stat" style="flex:1"><div style="font-size:11px;color:var(--gd);font-weight:500;margin-bottom:2px">Actividad estrella</div><div style="font-size:13px;font-weight:600;color:var(--tr)">${topAct.item.i} ${topAct.item.l}</div><div class="mini-lbl">${topAct.count} veces</div></div>`;
    }
    h += `</div>`;
  }

  // ── WEEK MESSAGE ──
  h += `<div class="week-msg" style="margin-bottom:14px">"${wMsg}"</div>`;

  // ── CIENCIA Y CHAMÁN ──
  h += `<div class="spirit-card" style="margin-bottom:8px"><div class="spirit-hdr"><span class="spirit-ico">🔬</span><span class="spirit-ttl">La ciencia del descanso</span></div><div class="spirit-txt">${sci}</div></div>`;
  h += `<div class="spirit-card" style="margin-bottom:14px;border-left:3px solid var(--gd);border-radius:0 14px 14px 0"><div class="spirit-hdr"><span class="spirit-ico">🪶</span><span class="spirit-ttl">Sabiduría chamánica</span></div><div class="spirit-txt">${sha}</div></div>`;

  // ── 3 OPTIONAL ACTIVITIES ──
  h += `<div class="sec-ttl"><span>3 ideas para hoy (sin presión)</span><div class="sec-ln"></div></div>`;
  h += `<div style="font-size:10px;color:var(--mu);margin-bottom:10px">No son obligación. Son regalos opcionales para ti.</div>`;
  opts.forEach((opt,i)=>{
    const k = "wkopt_"+TK+"_"+i;
    const isDone = !!JSON.parse(localStorage.getItem(k)||"false");
    h += `<div class="ex-card ${isDone?"done":""}" style="cursor:pointer" onclick="toggleWeekOpt('${k}',this)">
      <span style="font-size:22px">${opt.i}</span>
      <div style="flex:1">
        <div class="ex-name ${isDone?"done":""}">${opt.n}</div>
        <div class="ex-meta" style="font-style:italic">${opt.why}</div>
      </div>
      <span style="font-size:18px">${isDone?"✅":"○"}</span>
    </div>`;
  });

  return h;
}

}
function toggleSeed(){
  var k='seed_'+todayKey();

}

}

function getVozDayData(){
  var dow=new Date().getDay();
  var nivel=getVozNivel();
  var nd=VOZ_NIVELES[nivel];
  if(!nd) return null;
  return nd.dias[dow]||null;
}

function renderVoz(){
  const now = new Date();
  const dow = now.getDay();
  var nivel = getVozNivel();
  var nd = VOZ_NIVELES[nivel];

  if(dow===0||dow===6){
    var tip=VOZ_WEEKEND_TIPS[now.getDate()%VOZ_WEEKEND_TIPS.length];
    var h='<div class="wk-hdr"><span class="wk-emo">🎤</span><div>';
    h+='<div class="wk-ttl">Descanso vocal</div>';
    h+='<div class="wk-sub">La voz se consolida en el reposo</div></div></div>';
    h+='<div style="background:var(--white);border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:var(--shad)">';
    h+='<div style="display:flex;gap:12px;align-items:flex-start"><span style="font-size:24px">'+tip.e+'</span>';
    h+='<div><div style="font-family:var(--ff);font-size:16px;font-style:italic;color:var(--ink);margin-bottom:8px">'+tip.t+'</div>';
    h+='<div style="font-size:12px;color:var(--mu);line-height:1.75;font-weight:300">'+tip.txt+'</div></div></div>';
    h+='</div>';
    return h;
  }

  var diaData=getVozDayData();
  var DIAS_ES=['','Lunes','Martes','Miércoles','Jueves','Viernes'];

  // Header nivel
  var h='<div style="background:var(--white);border:1.5px solid rgba(201,169,110,.2);border-radius:20px;padding:18px;margin-bottom:12px;box-shadow:var(--shad)">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
  h+='<div style="font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--mu);font-weight:300">Tu nivel actual</div>';
  h+='<div style="display:flex;gap:6px">';
  [1,2,3].forEach(function(n){
    h+='<button onclick="setVozNivel('+n+')" style="width:28px;height:28px;border-radius:50%;border:1.5px solid '+(n===nivel?'var(--gold)':'var(--border)')+';background:'+(n===nivel?'var(--gold)':'transparent')+';color:'+(n===nivel?'white':'var(--mu)')+';font-size:10px;font-weight:600;cursor:pointer">'+n+'</button>';
  });
  h+='</div></div>';
  h+='<div style="font-family:var(--ff);font-size:18px;font-style:italic;color:'+nd.color+';margin-bottom:6px">'+nd.label+'</div>';
  h+='<div style="font-size:11px;color:var(--mu);line-height:1.7;font-weight:300">'+nd.desc+'</div>';
  h+='</div>';

  if(!diaData){
    h+='<div style="text-align:center;padding:30px;color:var(--mu);font-size:13px">No hay ejercicios para hoy 🎤</div>';
    return h;
  }

  // Tema del día
  h+='<div class="sec-ttl"><span>'+DIAS_ES[dow]+' — '+diaData.tema+'</span><div class="sec-ln"></div></div>';

  // Ciencia
  h+='<div style="background:var(--white);border-radius:14px;padding:14px 16px;margin-bottom:8px;box-shadow:var(--shad)">';
  h+='<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><span style="font-size:16px">🔬</span>';

  h+='<div style="background:rgba(144,96,192,.05);border-left:2px solid #9060C0;border-radius:0 14px 14px 0;padding:14px 16px;margin-bottom:12px">';

  h+='<div style="font-size:12px;color:var(--ink);line-height:1.75;font-weight:300">'+diaData.sha+'</div>';
  h+='</div>';

  // Ejercicios
  h+='<div class="sec-ttl"><span>Ejercicios de hoy</span><div class="sec-ln"></div></div>';

    h+='</div>';
  });

  return h;

function togVoz(id){
  vozD[id]=!vozD[id];
  localStorage.setItem('voz_'+TK,JSON.stringify(vozD));
  updateProgress();
  render();
}

function exBlock(ex,expKey){
  var isDone=!!pnlD[ex.id];
  var isExp=expanded===expKey;
  var h='<div class="belief-card '+(isDone?'done':'')+'" onclick="togExp(\''+expKey+'\')">';
  h+='<div class="belief-row">';
  h+='<span class="belief-ico">'+(isDone?'✅':'🔮')+'</span>';
  h+='<div class="belief-body"><div class="belief-ttl '+(isDone?'done':'')+'">'+ex.n+'</div><div class="belief-sub">⏱ '+ex.dur+'</div></div>';
  h+='<button class="ckbtn '+(isDone?'on':'')+'" onclick="event.stopPropagation();togPnl(\''+ex.id+'\')">'+(isDone?'✓':'')+'</button>';
  h+='</div>';
  if(isExp){
    h+='<div class="belief-expand">';
    for(var s=0;s<ex.steps.length;s++){h+='<b>'+(s+1)+'.</b> '+ex.steps[s]+'<br>';}
    h+='<div style="margin-top:10px;padding-top:8px;border-top:1px solid rgba(201,169,110,.2)">';
    h+='<div style="font-size:11px;color:var(--br2)">🔬 '+ex.sci+'</div>';
    h+='<div style="font-size:11px;color:var(--br2);margin-top:6px">🪶 '+ex.sha+'</div>';
    h+='</div></div>';
  }
  h+='</div>';
  return h;
}

    var pattern=[[523,0],[659,.12],[784,.24],[1047,.36],[1047,.55],[1175,.65],[1319,.75],[1047,.9],[784,1.1],[1047,1.25],[1319,1.4],[1568,1.55],[1319,1.8],[1568,1.95],[1319,2.1],[1047,2.3]];
    pattern.forEach(function(p){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type="sine";o.frequency.value=p[0];
      var s=ctx.currentTime+p[1];
      g.gain.setValueAtTime(0,s);
      g.gain.linearRampToValueAtTime(.22,s+.05);
      g.gain.exponentialRampToValueAtTime(.001,s+.38);
      o.start(s);o.stop(s+.4);

  }catch(e){}
}

var _scheduledAlarms={};

function scheduleAlarmsForToday(){
  if(!notifOK) return;
  var now=new Date();
  var fired=0;
  ALARM_TIMES.forEach(function(al){
    var alTime=new Date(now.getFullYear(),now.getMonth(),now.getDate(),al.h,al.m,0);
    var diff=alTime.getTime()-now.getTime();
    var key=al.h+":"+al.m;
    if(diff>0 && diff<86400000 && !_scheduledAlarms[key]){
      _scheduledAlarms[key]=true;
      fired++;
      setTimeout(function(){
        fireAlarm(al);
      }, diff);
    }
  });
  console.log("Scheduled "+fired+" alarms for today");
}

function fireAlarm(al){
  if(al.type==="wake"){
    playWakeAlarm();
    setTimeout(playWakeAlarm,3500);
    showNotif("🌅 "+al.label,"Levántate. Sin celular los primeros 10 minutos.","wake");
  } else if(al.type==="sleep"){
    playSleepAlarm();
    setTimeout(playSleepAlarm,4500);
    showNotif("🌙 "+al.label,"Las 22-02h son el sueño más reparador. Apaga pantallas.","sleep");
  } else if(al.type==="warn"){
    playChime();
    showNotif("⏱ "+al.label,"Prepárate para la siguiente actividad.","warn");
  } else {
    playChime();
    playChime();
    showNotif("▶ "+al.label,"Toca para abrir la app.","activity");
  }
}

function showNotif(title,body,tag){
  try{
    if(Notification.permission==="granted"){
      new Notification(title,{body:body,tag:tag,icon:"/icon.png",vibrate:[200,100,200]});
    }
  }catch(e){}
  // Also show in-app toast
  toast(title);
}

function reqNotifAndSchedule(){
  if(typeof Notification==="undefined") return;
  Notification.requestPermission().then(function(p){
    notifOK=(p==="granted");
    if(notifOK){
      playChime();
      toast("🔔 Alarmas activadas — recibirás avisos aunque cierres la app");
      navigator.serviceWorker.ready.then(function(r){
        r.active.postMessage({type:'SCHEDULE'});
      });
      render();
    }
  });
}

// ─── MARCA HELPERS ───
function saveMarca(mod,key,val){
  var d=JSON.parse(localStorage.getItem('marca_data')||'{}');
  if(!d[mod])d[mod]={};
  d[mod][key]=val;
  localStorage.setItem('marca_data',JSON.stringify(d));
  // no re-render to avoid losing focus
}
function doneMarca(mod){
  var d=JSON.parse(localStorage.getItem('marca_data')||'{}');
  if(!d[mod])d[mod]={};
  d[mod].done=!d[mod].done;
  localStorage.setItem('marca_data',JSON.stringify(d));
  render();
}
function elegirBio(i){
  var d=JSON.parse(localStorage.getItem('marca_data')||'{}');
  if(!d.bio)d.bio={};
  d.bio.selected=i;
  var opts=["Administración + datos + espiritualidad. Sí, todo junto y sin disculparme por eso. Aprendo ciencia de datos, practico chamanería y creo contenido sobre lo que pasa cuando mezclas los números con el alma.","Soy María. Estudié administración, ahora estudio datos, y en el proceso descubrí que la ciencia y lo ancestral dicen lo mismo con distintas palabras. Aquí documento eso — sin filtro y con bastante cúrcuma.","Data scientist en construcción. Administradora de formación. Algo bruja por vocación. Hablo de salud, datos y espiritualidad — a veces los tres en el mismo post."];
  d.bio.texto=opts[i];
  localStorage.setItem('marca_data',JSON.stringify(d));
  render();
}
function togMarcaPers(p){
  var d=JSON.parse(localStorage.getItem('marca_data')||'{}');
  if(!d.voz)d.voz={};
  var arr=d.voz.personalidad||[];
  var idx=arr.indexOf(p);
  if(idx>-1)arr.splice(idx,1);
  else if(arr.length<3)arr.push(p);
  d.voz.personalidad=arr;
  localStorage.setItem('marca_data',JSON.stringify(d));
  render();
}
function addPilar(p){
  var d=JSON.parse(localStorage.getItem('marca_data')||'{}');
  if(!d.pilares)d.pilares={list:[]};
  if(!d.pilares.list)d.pilares.list=[];
  if(d.pilares.list.indexOf(p)===-1&&d.pilares.list.length<5)d.pilares.list.push(p);
  localStorage.setItem('marca_data',JSON.stringify(d));
  render();
}
function addPilarCustom(){
  var inp=document.getElementById('pilar-input');
  if(inp&&inp.value.trim()){addPilar(inp.value.trim());inp.value='';}
}
function removePilar(i){
  var d=JSON.parse(localStorage.getItem('marca_data')||'{}');
  if(d.pilares&&d.pilares.list)d.pilares.list.splice(i,1);
  localStorage.setItem('marca_data',JSON.stringify(d));
  render();
}

function closeWelcome(){
  sessionStorage.setItem('wel_shown','1');
  var overlay=document.getElementById('welcome');
  if(overlay){
    overlay.style.opacity='0';
    setTimeout(function(){overlay.style.display='none';},500);
  }
}

// ── DRAWER ──
var drawerOpen=false;
var TAB_ORDER=['hoy','cuerpo','mente','voz','pnl','vision','marca'];
var TAB_NAMES={hoy:'Hoy',cuerpo:'Cuerpo',mente:'Inglés',voz:'Voz',pnl:'PNL',vision:'Visión',marca:'✦ Marca'};

function openDrawer(){
  drawerOpen=true;
  var dr=document.getElementById('drawer');
  var ov=document.getElementById('drawer-overlay');
  if(dr){dr.style.transform='translateX(0)';}
  if(ov){ov.style.opacity='1';ov.style.pointerEvents='auto';}
  updateDrwProgress();
}

function closeDrawer(){
  drawerOpen=false;
  var dr=document.getElementById('drawer');
  var ov=document.getElementById('drawer-overlay');
  if(dr){dr.style.transform='translateX(-100%)';}
  if(ov){ov.style.opacity='0';ov.style.pointerEvents='none';}
}

function swDrawer(t,btn){
  var oldIdx=TAB_ORDER.indexOf(tab);
  var newIdx=TAB_ORDER.indexOf(t);
  var dir=newIdx>=oldIdx?'r':'l';
  tab=t;expanded=null;
  // Update drawer buttons
  document.querySelectorAll('.drw-btn').forEach(function(b){b.classList.remove('active');});
  if(btn)btn.classList.add('active');
  // Update header title
  var hdrSec=document.getElementById('hdr-section');
  if(hdrSec)hdrSec.textContent=TAB_NAMES[t]||t;
  closeDrawer();
  var el=document.getElementById('content');
  el.classList.remove('slide-r','slide-l');
  void el.offsetWidth;
  render();
  el.classList.add(dir==='r'?'slide-r':'slide-l');
}

function updateDrwProgress(){
  var el=document.getElementById('drw-progress');
  if(!el) return;
  var cnt=Object.values(done).filter(Boolean).length;
  var pct=SCHED.length>0?Math.round(cnt/SCHED.length*100):0;
  el.innerHTML='<div style="font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:6px;font-weight:300">Rutina HOY</div>'
    +'<div style="height:3px;background:var(--border);border-radius:2px;margin-bottom:4px"><div style="height:100%;width:'+pct+'%;background:var(--gold);border-radius:2px;transition:width .6s"></div></div>'
    +'<div style="font-size:10px;color:var(--mu2)">'+cnt+' de '+SCHED.length+' · '+pct+'%</div>';
}

// ── PROGRESS PANEL ──
var progPanelOpen=false;
function togProgressPanel(){
  progPanelOpen=!progPanelOpen;
  var panel=document.getElementById('progress-panel');
  if(progPanelOpen){updateProgDetail();panel.style.maxHeight='300px';}
  else{panel.style.maxHeight='0';}
}

function updateProgDetail(){
  var el=document.getElementById('prog-detail');
  if(!el) return;
  el.innerHTML='';
  var cats=[
    {l:'Rutina',c:Object.values(done).filter(Boolean).length,t:SCHED.length,co:'var(--gold)'},
    {l:'Inglés',c:Object.values(engD).filter(Boolean).length,t:3,co:'var(--mauve)'},
    {l:'Ejercicio',c:Object.values(exD).filter(Boolean).length,t:4,co:'#7A9E84'},
    {l:'Voz',c:Object.values(vozD).filter(Boolean).length,t:3,co:'#9060C0'},
  ];
  cats.forEach(function(c){
    var pct=c.t>0?Math.round(c.c/c.t*100):0;
    var div=document.createElement('div');
    div.style.cssText='background:var(--ivory2);border-radius:12px;padding:10px 12px';
    div.innerHTML='<div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu);margin-bottom:5px;font-weight:300">'+c.l+'</div>'
      +'<div style="font-family:var(--ff);font-size:24px;font-style:italic;color:'+c.co+'">'+c.c+'<span style="font-size:13px;color:var(--mu2)"> /'+c.t+'</span></div>'
      +'<div style="margin-top:6px;height:2px;background:var(--border);border-radius:2px">'
      +'<div style="height:100%;width:'+pct+'%;background:'+c.co+';border-radius:2px;transition:width .6s"></div></div>';
    el.appendChild(div);
  });
}

function updateProgLabel(){
  var lbl=document.getElementById('prog-label');
  if(!lbl) return;
  var cnt=Object.values(done).filter(Boolean).length;
  lbl.textContent=cnt+' de '+SCHED.length+' completadas ↕';
}

</script>
