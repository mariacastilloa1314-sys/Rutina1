<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// Global error handler - prevents blank screen on unhandled errors
window.addEventListener('error', function(e) {
  console.error('Global error:', e.error);
  // Don't let React crash the whole page
  e.preventDefault();
});
window.addEventListener('unhandledrejection', function(e) {
  console.error('Unhandled promise rejection:', e.reason);
  e.preventDefault();
});
const SB_URL = 'https://pemjeszznysuoquzwvpj.supabase.co';
const SB_KEY = 'sb_publishable_ioce_gG_IzgUF5jBH82a6g_Ho2-3dRs';
const sb = supabase.createClient(SB_URL, SB_KEY);
const SHEETS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5oneyorXbHcQy2Ap0j8xPVFY3Xc1hupeqKtp--ghvkkjqVb4CY50sMPCSSSS9_46DcIyjupCn86Ff/pub?output=csv';
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
function getKey(){ return localStorage.getItem('revisorKey') || ''; }

// PDF reading
async function imgToB64(page) {
  const vp = page.getViewport({scale:1.5});
  const c = document.createElement('canvas');
  c.width=vp.width; c.height=vp.height;
  await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
  return c.toDataURL('image/jpeg',0.8).split(',')[1];
}
async function visionPage(b64) {
  const r = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':getKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,messages:[{role:'user',content:[
      {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
      {type:'text',text:'Transcribe TODO el texto visible en esta imagen: nombres, numeros, fechas, cargos, empresas, sellos. No omitas nada.'}
    ]}]})
  });
  const d = await r.json();
  return (d.content && d.content[0]) ? d.content[0].text : '[ilegible]';
}
async function readPDF(url, onProg) {
  const pdf = await pdfjsLib.getDocument(url).promise;
  let txt='', dig=0, img=0;
  for(let i=1;i<=pdf.numPages;i++){
    const pg = await pdf.getPage(i);
    const ct = await pg.getTextContent();
    const t = ct.items.map(function(x){return x.str;}).join(' ').trim();
    const hasText = t.replace(/\s/g,'').length > 150;
    if(onProg) onProg(i,pdf.numPages,hasText?'digital':'imagen');
    if(hasText){txt+='\n--- Pag '+i+' (digital) ---\n'+t; dig++;}
    else{
      try{const b=await imgToB64(pg);const v=await visionPage(b);txt+='\n--- Pag '+i+' (escaneada) ---\n'+v;img++;}
      catch(e){txt+='\n--- Pag '+i+' (error) ---\n[no se pudo leer]';}
    }
  }
  return {texto:txt,paginas:pdf.numPages,digitales:dig,imagenes:img};
}

// Read reference files
async function readExcel(url){
  const r=await fetch(url);const buf=await r.arrayBuffer();
  const wb=XLSX.read(buf,{type:'array'});
  let txt='';
  wb.SheetNames.forEach(function(n){
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1,defval:''});
    txt+='\n=== HOJA: '+n+' ===\n';
    rows.forEach(function(row){const line=row.filter(function(c){return c!=='';}).join(' | ');if(line.trim())txt+=line+'\n';});
  });
  return txt;
}
async function readWord(url){
  const r=await fetch(url);const buf=await r.arrayBuffer();
  const res=await mammoth.extractRawText({arrayBuffer:buf});
  return res.value||'';
}
async function readRef(path){
  try{
    const {data,error}=await sb.storage.from('expedientes').createSignedUrl(path,300);
    if(error||!data||!data.signedUrl){
      console.error('readRef signed URL error:',error);
      return '[no se pudo acceder al archivo]';
    }
    const url=data.signedUrl;
    const ext=path.split('.').pop().toLowerCase().split('?')[0];
    console.log('readRef: path='+path+' ext='+ext);
    if(ext==='pdf'){
      try{const r=await readPDF(url,null);console.log('PDF read: '+r.texto.length+' chars');return r.texto;}
      catch(e){console.error('PDF error:',e);return '[error leyendo PDF: '+e.message+']';}
    }
    if(ext==='xlsx'||ext==='xls') return await readExcel(url);
    if(ext==='docx'||ext==='doc') return await readWord(url);
    // If no extension match, try by content
    console.warn('Extension not recognized: '+ext+' for path: '+path);
    return '[formato no reconocido: '+ext+']';
  }catch(e){
    console.error('readRef error:',e);
    return '[error: '+e.message+']';
  }
}
async function readAllRefs(refs,onProg){
  const res={};
  for(let i=0;i<refs.length;i++){
    const ref=refs[i];
    if(onProg) onProg(ref.nombre_archivo,i+1,refs.length);
    try{
      const txt=await readRef(ref.storage_path);
      res[ref.tipo]=(res[ref.tipo]||'')+'\n\n=== '+ref.nombre_archivo+' ===\n'+txt;
      console.log('OK ['+ref.tipo+']: '+txt.length+' chars');
    }catch(e){
      res[ref.tipo]=(res[ref.tipo]||'')+'\n[ERROR: '+ref.nombre_archivo+']';
      console.error('FAIL:',ref.nombre_archivo,e);
    }
  }
  return res;
}

// Sheets
async function readSheets(){
  const r=await fetch(SHEETS_URL);const csv=await r.text();
  const rows=csv.trim().split('\n').map(function(row){return row.split(',').map(function(c){return c.trim().replace(/^"|"$/g,'');});});
  const h=rows[0].map(function(x){return x.toLowerCase().trim();});
  return rows.slice(1).filter(function(r){return r.length>1&&r[0];}).map(function(r){
    const o={};h.forEach(function(k,i){o[k]=r[i]||'';});
    return {orden:parseInt(o['orden'])||0,nombre:o['nombre_documento']||'',obligatorio:(o['obligatorio']||'').toUpperCase()==='SI',claves:(o['palabras_clave']||'').split(';').map(function(p){return p.trim().toLowerCase();}).filter(Boolean)};
  }).sort(function(a,b){return a.orden-b.orden;});
}

// Claude API call
async function callClaude(prompt){
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':getKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content:prompt}]})
  });
  if(!r.ok){const e=await r.json();throw new Error((e.error&&e.error.message)||'Error API');}
  const d=await r.json();
  const raw=(d.content&&d.content[0])?d.content[0].text:'';
  return raw.replace(/\u0060\u0060\u0060json|\u0060\u0060\u0060/g,'').trim();
}

function sleep(ms){ return new Promise(function(r){setTimeout(r,ms);}); }

function safeParseJSON(text, fallback) {
  try {
    // Try direct parse
    return JSON.parse(text);
  } catch(e1) {
    try {
      // Try finding JSON object in text
      const m = text.match(/\{[\s\S]+\}/);
      if (m) return JSON.parse(m[0]);
    } catch(e2) {}
    console.warn('JSON parse failed:', text.slice(0,200));
    return fallback;
  }
}

      +'\n4. FORMATOS ACTUALIZADOS: compara con formatos de referencia. Si uso formatos desactualizados -> ERROR.'
      +'\n5. DJ y ANEXOS: datos personales completos, firma nitida.'
      +'\n\nResponde SOLO en JSON: {"items":[{"tipo":"ok","texto":"descripcion"}]}';
    const r3=await callClaude(p3);
    const j3=safeParseJSON(r3,{items:[{tipo:"warning",texto:"No se pudo procesar la respuesta del analisis de formatos"}]});
    secciones.push({titulo:'Propuesta Economica y Formatos',estado:j3.items.some(function(x){return x.tipo==='error';})?'error':j3.items.some(function(x){return x.tipo==='warning';})?'observacion':'ok',items:j3.items});
  }catch(e){secciones.push({titulo:'Propuesta Economica y Formatos',estado:'observacion',items:[{tipo:'warning',texto:'Error: '+e.message}]});}

  await sleep(12000);
  // CALL 4: DNI, RNP, RUC y Perfil
  if(params.onProg) params.onProg('Verificando DNI, RNP, RUC y perfil (4/4)...');
  try{

      +'\n\nFECHA PRESENTACION: '+params.fechaPres

      +'\n4. PERFIL DEL PUESTO: usando el documento de perfil, verifica grado academico, experiencia general y especifica.'
      +'\n\nResponde SOLO en JSON: {"perfil":{"grado_academico":{"cumple":true,"detalle":"..."},"experiencia_general":{"cumple":true,"detalle":"calculado X - requerido Y"},"experiencia_especifica":{"cumple":true,"detalle":"calculado X - requerido Y"}},"items":[{"tipo":"ok","texto":"descripcion"}]}';
    const r4=await callClaude(p4);
    const j4=safeParseJSON(r4,{perfil:null,items:[{tipo:"warning",texto:"No se pudo procesar la respuesta del analisis de DNI/perfil"}]});
    if(j4.perfil) perfilResult=j4.perfil;
    secciones.push({titulo:'DNI, RNP, RUC y Perfil',estado:j4.items.some(function(x){return x.tipo==='error';})?'error':j4.items.some(function(x){return x.tipo==='warning';})?'observacion':'ok',items:j4.items||[]});
  }catch(e){secciones.push({titulo:'DNI, RNP, RUC y Perfil',estado:'observacion',items:[{tipo:'warning',texto:'Error: '+e.message}]});}

  const tieneError=secciones.some(function(s){return s.estado==='error';});
  const tieneObs=secciones.some(function(s){return s.estado==='observacion';});
  const resultado=tieneError||tieneObs?'CON OBSERVACIONES':'CORRECTO';
  const errCount=secciones.reduce(function(n,s){return n+s.items.filter(function(i){return i.tipo==='error';}).length;},0);
  const warnCount=secciones.reduce(function(n,s){return n+s.items.filter(function(i){return i.tipo==='warning';}).length;},0);
  const resumen=resultado==='CORRECTO'?'Sin observaciones':errCount+' error(es) y '+warnCount+' advertencia(s)';
  return {resultado_final:resultado,resumen:resumen,perfil:perfilResult,secciones:secciones};
}

// Excel report
function buildExcel(proceso,exps,reportes){
  const wb=XLSX.utils.book_new();
  const sum=[['REPORTE DE REVISION'],[''],['Proceso:',proceso.nombre],['Fecha:',proceso.fecha_presentacion],[''],
    ['N','EXPEDIENTE','RESULTADO','GRADO','EXP.GENERAL','EXP.ESPECIFICA','RESUMEN']];
  exps.forEach(function(e,i){
    const r=reportes[e.id];
    if(r) sum.push([i+1,e.nombre_archivo.replace('.pdf',''),r.resultado_final,r.perfil&&r.perfil.grado_academico?r.perfil.grado_academico.cumple?'CUMPLE':'NO CUMPLE':'',r.perfil&&r.perfil.experiencia_general?r.perfil.experiencia_general.cumple?'CUMPLE':'NO CUMPLE':'',r.perfil&&r.perfil.experiencia_especifica?r.perfil.experiencia_especifica.cumple?'CUMPLE':'NO CUMPLE':'',r.resumen||'']);
    else sum.push([i+1,e.nombre_archivo.replace('.pdf',''),'SIN ANALIZAR','','','','']);
  });
  const ws1=XLSX.utils.aoa_to_sheet(sum);
  ws1['!cols']=[{wch:5},{wch:35},{wch:18},{wch:16},{wch:14},{wch:16},{wch:60}];
  XLSX.utils.book_append_sheet(wb,ws1,'Resumen');
  const obs=[['N','EXPEDIENTE','SECCION','TIPO','OBSERVACION']];
  exps.forEach(function(e,i){
    const r=reportes[e.id];
    if(!r||!Array.isArray(r.secciones)) return;
    r.secciones.forEach(function(s){
      if(!Array.isArray(s.items)) return;
      s.items.forEach(function(it){if(it.tipo!=='ok') obs.push([i+1,e.nombre_archivo.replace('.pdf',''),s.titulo,it.tipo==='error'?'ERROR':'ADVERTENCIA',it.texto]);});
    });
  });
  const ws2=XLSX.utils.aoa_to_sheet(obs);
  ws2['!cols']=[{wch:5},{wch:35},{wch:25},{wch:14},{wch:80}];
  XLSX.utils.book_append_sheet(wb,ws2,'Observaciones');
  const fecha=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,'Reporte_'+proceso.nombre.replace(/\s+/g,'_')+'_'+fecha+'.xlsx');
}

    const ups=[];
    excels.forEach(function(f,i){ups.push({file:f,tipo:'excel_referencia',path:proc.id+'/ref/excel'+i+'_'+f.name});});
    ups.push({file:word1,tipo:'word_referencia',path:proc.id+'/ref/word1_'+word1.name});
    if(word2) ups.push({file:word2,tipo:'word_referencia_2',path:proc.id+'/ref/word2_'+word2.name});
    ups.push({file:asignacion,tipo:'excel_asignacion',path:proc.id+'/ref/asig_'+asignacion.name});
    ups.push({file:perfil,tipo:'perfil_puesto',path:proc.id+'/ref/perfil_'+perfil.name});
    for(let i=0;i<ups.length;i++){
      const u=ups[i];
      const {error:eU}=await sb.storage.from('expedientes').upload(u.path,u.file,{upsert:true});
      if(!eU) await sb.from('archivos_referencia').insert({proceso_id:proc.id,tipo:u.tipo,nombre_archivo:u.file.name,storage_path:u.path});
    }
    onToast('Referencias guardadas','success');
    setSaving(false);setStep(3);
  };
  const addPdfs=function(files){
    const ok=Array.from(files).filter(function(f){return f.type==='application/pdf';});
    if(ok.length!==files.length) onToast('Solo se aceptan PDF.','error');
    setPdfs(function(prev){
      const names=new Set(prev.map(function(x){return x.file.name;}));
      return [...prev,...ok.filter(function(f){return !names.has(f.name);}).map(function(f){return {file:f,status:'pending'};})];
    });
  };
  const subir=async function(){
    if(pdfs.length===0){onToast('Agrega al menos un PDF.','error');return;}
    setSaving(true);
    for(let i=0;i<pdfs.length;i++){
      const f=pdfs[i];
      setPdfs(function(prev){return prev.map(function(x,idx){return idx===i?{...x,status:'uploading'}:x;});});
      const path=pid+'/expedientes/'+f.file.name;
      const {error:eU}=await sb.storage.from('expedientes').upload(path,f.file,{upsert:true});
      if(eU){setPdfs(function(prev){return prev.map(function(x,idx){return idx===i?{...x,status:'error'}:x;});});}
      else{
        await sb.from('expedientes').insert({proceso_id:pid,nombre_archivo:f.file.name,storage_path:path,estado:'pendiente'});
        setPdfs(function(prev){return prev.map(function(x,idx){return idx===i?{...x,status:'done'}:x;});});
      }
    }
    onToast('Proceso creado!','success');
    setSaving(false);
    setTimeout(function(){onDone();},1200);
  };
  const done=pdfs.filter(function(f){return f.status==='done';}).length;
  const pend=pdfs.filter(function(f){return f.status==='pending';}).length;
  return (
    <div>
      <div className="page-header"><div><div className="page-title">Nuevo Proceso</div><div className="page-subtitle">Configura el proceso en 3 pasos</div></div></div>
      <div className="page-body">
        <Stepper step={step}/>
        {step===1&&(
          <div className="card">
            <div className="card-title"><div className="card-dot"/> Datos del Proceso</div>
            <div className="field"><label>Nombre del proceso</label><input type="text" value={nombre} onChange={function(e){setNombre(e.target.value);}} placeholder="Ej: Contratacion CAS Mayo 2025"/></div>
            <div className="form-grid">
              <div className="field"><label>Fecha de presentacion</label><input type="date" value={fechaPres} onChange={function(e){setFechaPres(e.target.value);}}/><div className="field-hint">Fecha que llevan todos los formatos Excel</div></div>
              <div className="field"><label>Fecha de inicio laboral</label><input type="date" value={fechaInicio} onChange={function(e){setFechaInicio(e.target.value);}}/><div className="field-hint">Fecha que lleva la DJ Politica SST</div></div>
            </div>
            <div className="actions-row"><div/><button className="btn-gold" onClick={go2}>Siguiente <Ic n="arrow" s={14}/></button></div>
          </div>
        )}
        {step===2&&(
          <div className="card">
            <div className="card-title"><div className="card-dot"/> Archivos de Referencia</div>
            <p style={{fontSize:13,color:'var(--gray3)',marginBottom:16}}>Claude usara estos archivos para comparar con cada expediente.</p>
            <div style={{position:'relative'}}><UpSlot label="Formatos Excel de referencia" hint="Los formatos Excel que le entregaste al proveedor (puedes subir varios)" iconName="excel" iconCls="excel" req={true} accept=".xlsx,.xls" multi={true} val={excels} onChange={setExcels}/></div>
            <div style={{position:'relative'}}><UpSlot label="DJ Politica SST (Word - siempre va)" hint="Lleva fecha de inicio laboral" iconName="word" iconCls="word" req={true} accept=".docx,.doc" val={word1} onChange={setWord1}/></div>
            <div style={{position:'relative'}}><UpSlot label="DJ Conflicto de Intereses (Word - a veces va)" hint="Solo si aplica a este grupo" iconName="word" iconCls="word" req={false} accept=".docx,.doc" val={word2} onChange={setWord2}/></div>
            <div style={{position:'relative'}}><UpSlot label="Excel de asignacion" hint="Nombre, servicio, sede y monto de cada proveedor" iconName="excel" iconCls="excel" req={true} accept=".xlsx,.xls" val={asignacion} onChange={setAsignacion}/></div>
            <div className="divider"/>
            <div style={{position:'relative'}}><UpSlot label="Perfil del puesto" hint="Grado academico, experiencia general y especifica requeridos" iconName="person" iconCls="general" req={true} accept=".pdf,.docx,.doc" val={perfil} onChange={setPerfil}/></div>
            <div className="actions-row">
              <button className="btn-secondary" onClick={function(){setStep(1);}}><Ic n="back" s={14}/> Atras</button>
              <button className="btn-gold" onClick={go3} disabled={saving}>{saving?<><Ic n="spin" s={14}/> Guardando...</>:<>Siguiente <Ic n="arrow" s={14}/></>}</button>
            </div>
          </div>
        )}
        {step===3&&(
          <div>
            {pdfs.length>0&&<div className="stats-row">
              <div className="stat-card"><div className="stat-label">Total</div><div className="stat-value">{pdfs.length}</div></div>
              <div className="stat-card"><div className="stat-label">Subidos</div><div className="stat-value" style={{color:'var(--success)'}}>{done}</div></div>
              <div className="stat-card"><div className="stat-label">Pendientes</div><div className="stat-value" style={{color:'var(--warning)'}}>{pend}</div></div>
            </div>}
            <div className="card">
              <div className="card-title"><div className="card-dot"/> Expedientes de Proveedores</div>
              <div className="upload-zone" onDragOver={function(e){e.preventDefault();setDrag(true);}} onDragLeave={function(){setDrag(false);}} onDrop={function(e){e.preventDefault();setDrag(false);addPdfs(e.dataTransfer.files);}} onClick={function(){fileRef.current&&fileRef.current.click();}}>
                <input ref={fileRef} type="file" accept=".pdf" multiple onChange={function(e){addPdfs(e.target.files);}} style={{display:'none'}}/>
                <div style={{width:48,height:48,background:'var(--navy)',borderRadius:12,display:'inline-flex',alignItems:'center',justifyContent:'center',marginBottom:12}}><Ic n="upload" s={22}/></div>
                <div style={{fontSize:15,fontWeight:600,color:'var(--navy)',marginBottom:4}}>Arrastra los PDF o haz clic</div>
                <div style={{fontSize:12,color:'var(--gray3)'}}>Puedes subir varios a la vez</div>
              </div>
              {pdfs.length>0&&<div className="file-list">{pdfs.map(function(f,i){return (
                <div className="file-item" key={i}>
                  <div className="file-badge">PDF</div>
                  <div className="file-name">{f.file.name}</div>
                  <div className="file-size">{fmt(f.file.size)}</div>
                  <span className={'fstatus '+f.status}>{f.status==='pending'?'Pendiente':f.status==='uploading'?'Subiendo...':f.status==='done'?'Listo':'Error'}</span>
                  {f.status==='pending'&&!saving&&<button className="btn-sm" style={{background:'var(--danger)'}} onClick={function(){setPdfs(function(prev){return prev.filter(function(_,idx){return idx!==i;});});}}><Ic n="x" s={12}/></button>}
                </div>
              );})}</div>}
              <div className="actions-row">
                <button className="btn-secondary" disabled={saving} onClick={function(){setStep(2);}}><Ic n="back" s={14}/> Atras</button>
                <button className="btn-gold" onClick={subir} disabled={saving||pdfs.length===0}>{saving?<><Ic n="spin" s={14}/> Subiendo...</>:<><Ic n="upload" s={14}/> Subir expedientes</>}</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

const Reporte = function({r}){
  const ok=r.resultado_final==='CORRECTO';
  return (
    <div className="reporte-wrap">
      <div className={'reporte-head '+(ok?'ok':'obs')}>
        <span style={{fontSize:20}}>{ok?'OK':'!'}</span>
        <div><div className={'rh-title '+(ok?'ok':'obs')}>Expediente {r.resultado_final}</div><div className="rh-sub">{r.resumen}</div></div>
      </div>
      <div className="reporte-body">
        {r.perfil&&<div className="perfil-grid">
          {[['Grado Academico',r.perfil.grado_academico],['Exp. General',r.perfil.experiencia_general],['Exp. Especifica',r.perfil.experiencia_especifica]].map(function(entry){
            const label=entry[0],v=entry[1];
            if(!v) return null;
            return <div key={label} className={'perfil-item '+(v.cumple?'si':'no')}>
              <div className="perfil-lbl">{label}</div>
              <div className="perfil-val">{v.cumple?'Cumple':'No cumple'}</div>
              {v.detalle&&<div className="perfil-det">{v.detalle}</div>}
            </div>;
          })}
        </div>}
        {Array.isArray(r.secciones)&&r.secciones.map(function(sec,i){return (
          <div key={i} style={{marginBottom:12}}>
            <div className="sec-title">{sec.estado==='error'?'[ERROR]':sec.estado==='observacion'?'[OBS]':'[OK]'} {sec.titulo}</div>
            {Array.isArray(sec.items)&&sec.items.map(function(it,j){return (
              <div key={j} className={'obs-item '+(it.tipo==='error'?'error':it.tipo==='warning'?'warning':'ok')}>
                <div className={'obs-dot '+(it.tipo==='error'?'error':it.tipo==='warning'?'warning':'ok')}/>
                <span>{it.texto}</span>
              </div>
            );})}
          </div>
        );})}
      </div>
    </div>
  );
};

const DetalleProceso = function({proceso,user,onToast,onBack}){
  const [exps,setExps]=useState([]);
  const [refs,setRefs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [textos,setTextos]=useState({});
  const [reportes,setReportes]=useState({});
  const [refData,setRefData]=useState(null);
  const [leyRefs,setLeyRefs]=useState(false);
  const [leyExps,setLeyExps]=useState(false);
  const [analizando,setAnalizando]=useState({});
  const [analizandoTodo,setAnalizandoTodo]=useState(false);
  const [msg,setMsg]=useState('');
  const [preview,setPreview]=useState(null);
  const [showAddRef,setShowAddRef]=useState(false);
  const [newRefFile,setNewRefFile]=useState(null);
  const [newRefTipo,setNewRefTipo]=useState('perfil_puesto');

  useEffect(function(){
    async function load(){
      const [{data:e},{data:r}]=await Promise.all([
        sb.from('expedientes').select('*').eq('proceso_id',proceso.id).order('created_at'),
        sb.from('archivos_referencia').select('*').eq('proceso_id',proceso.id)
      ]);
      const expsArr=Array.isArray(e)?e:[];
      const rpts={};
      expsArr.forEach(function(x){if(x.reporte_json){try{rpts[x.id]=JSON.parse(x.reporte_json);}catch(_){}}});
      setReportes(rpts);
      const txts={};
      expsArr.forEach(function(x){if(x.texto_extraido) txts[x.id]={texto:x.texto_extraido,paginas:'?'};});
      setTextos(txts);
      setExps(expsArr);
      const refsArr=Array.isArray(r)?r:[];
      setRefs(refsArr);
      setLoading(false);
      if(refsArr.length>0){
        setLeyRefs(true);
        setMsg('Cargando archivos de referencia...');
        try{
          const c=await readAllRefs(refsArr,function(nm,i,t){setMsg('Leyendo '+i+'/'+t+': '+nm);});
          setRefData(c);
          console.log('Refs OK:',Object.keys(c).join(', '));
        }catch(err){console.error(err);}
        setLeyRefs(false);setMsg('');
      }
    }
    load();
  },[proceso.id]);

  const getUrl=async function(path){const {data}=await sb.storage.from('expedientes').createSignedUrl(path,120);return data&&data.signedUrl;};

  const subirRef=async function(){
    try{
      if(!newRefFile){onToast('Selecciona un archivo primero.','error');return;}
      const rawName = newRefFile.name;
    const safeName = rawName.replace(/[^a-zA-Z0-9._-]/g,'_').slice(0,60);
    const path=proceso.id+'/ref/add_'+newRefTipo+'_'+Date.now()+'_'+safeName;
      const {error:eU}=await sb.storage.from('expedientes').upload(path,newRefFile,{upsert:true});
      if(eU){onToast('Error subiendo archivo: '+eU.message,'error');return;}
      await sb.from('archivos_referencia').insert({proceso_id:proceso.id,tipo:newRefTipo,nombre_archivo:newRefFile.name,storage_path:path});
      setNewRefFile(null);
      setShowAddRef(false);
      const {data:r2}=await sb.from('archivos_referencia').select('*').eq('proceso_id',proceso.id);
      setRefs(Array.isArray(r2)?r2:[]);
      setRefData(null);
      onToast('Subido! Ahora haz clic en Recargar.','success');
    }catch(err){
      console.error('subirRef:',err);
      onToast('Error: '+err.message,'error');
    }
  };

  const leerUno=async function(exp){
    setExps(function(prev){return prev.map(function(x){return x.id===exp.id?{...x,leyendo:true,progMsg:''}:x;});});
    try{
      const url=await getUrl(exp.storage_path);
      const {texto,paginas,imagenes}=await readPDF(url,function(i,t,tipo){
        setExps(function(prev){return prev.map(function(x){return x.id===exp.id?{...x,progMsg:'Pag '+i+'/'+t+(tipo==='imagen'?' (vision)':'')}:x;});});
      });
      setTextos(function(prev){return {...prev,[exp.id]:{texto,paginas,imagenes}};});
      setExps(function(prev){return prev.map(function(x){return x.id===exp.id?{...x,leyendo:false,leido:true,progMsg:''}:x;});});
      await sb.from('expedientes').update({texto_extraido:texto,estado:'leido'}).eq('id',exp.id);
      onToast(exp.nombre_archivo+': '+paginas+' pags ('+imagenes+' escaneadas)','success');
    }catch(err){
      setExps(function(prev){return prev.map(function(x){return x.id===exp.id?{...x,leyendo:false,error:true,progMsg:''}:x;});});
      onToast('Error leyendo: '+err.message,'error');
    }
  };

  const leerTodos=async function(){
    setLeyExps(true);
    const pend=exps.filter(function(x){return !x.leido&&!textos[x.id];});
    for(let i=0;i<pend.length;i++) await leerUno(pend[i]);
    setLeyExps(false);
  };

  const analizarUno=async function(exp){
    if(!textos[exp.id]){onToast('Primero lee el expediente.','error');return;}
    if(!refData){onToast('Espera a que carguen las referencias.','error');return;}
    setAnalizando(function(prev){return {...prev,[exp.id]:true};});
    setMsg('Iniciando analisis...');
    try{
      let orden='No disponible';
      try{
        const sheets=await readSheets();
        orden=sheets.map(function(d){return d.orden+'. '+d.nombre+' ('+(d.obligatorio?'OBLIGATORIO':'OPCIONAL')+')';}).join('\n');
      }catch(e){console.warn('Sheets no disponible:',e.message);}

      const rc=refData||{};
      const reporte=await analyzeDoc({
        archivo:exp.nombre_archivo,
        fechaPres:proceso.fecha_presentacion,
        fechaInicio:proceso.fecha_inicio_laboral,
        orden:orden,
        asignacion:rc['excel_asignacion']||'No subido',
        perfil:rc['perfil_puesto']||rc['pdf_perfil']||'No subido',
        fmtWord:(rc['word_referencia']||'')+(rc['word_referencia_2']?'\n'+rc['word_referencia_2']:''),
        fmtExcel:rc['excel_referencia']||'No subido',
        texto:textos[exp.id].texto,
        onProg:function(m){setMsg(m);},
      });
      setReportes(function(prev){return {...prev,[exp.id]:reporte};});
      try{
        await sb.from('expedientes').update({reporte_json:JSON.stringify(reporte),estado:'analizado'}).eq('id',exp.id);
      }catch(eDb){console.warn('No se pudo guardar en DB:',eDb);}
      onToast('Analisis completado','success');
    }catch(err){
      console.error('analizarUno error:',err);
      onToast('Error en analisis: '+err.message,'error');
    }finally{
      setAnalizando(function(prev){return {...prev,[exp.id]:false};});
      setMsg('');
    }
  };

  const analizarTodos=async function(){
    const pend=exps.filter(function(x){return textos[x.id]&&!reportes[x.id];});
    if(pend.length===0){onToast('Nada pendiente.','error');return;}
    setAnalizandoTodo(true);
    for(let i=0;i<pend.length;i++) await analizarUno(pend[i]);
    setAnalizandoTodo(false);
  };

  const tipoLabel={excel_referencia:'Excel ref',word_referencia:'Word SST',word_referencia_2:'Word Conflicto',excel_asignacion:'Asignacion',perfil_puesto:'Perfil',pdf_perfil:'Perfil'};
  const tipoClass={excel_referencia:'excel',word_referencia:'word',word_referencia_2:'word',excel_asignacion:'asign',perfil_puesto:'pdf',pdf_perfil:'pdf'};
  const leidos=exps.filter(function(x){return x.leido||textos[x.id];}).length;
  const pct=exps.length>0?Math.round(leidos/exps.length*100):0;
  const fmtD=function(d){return d?new Date(d+'T00:00:00').toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'}):'---';};

  return (
    <div>
      <div className="page-header">
        <div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <button className="btn-sm" onClick={onBack}><Ic n="back" s={13}/> Volver</button>
            <div className="page-title">{proceso.nombre}</div>
          </div>
          <div className="page-subtitle">Presentacion: {fmtD(proceso.fecha_presentacion)} - Inicio: {fmtD(proceso.fecha_inicio_laboral)}</div>
        </div>
        {Object.keys(reportes).length>0&&<button className="btn-gold" onClick={function(){buildExcel(proceso,exps,reportes);}}><Ic n="download" s={14}/> Descargar Excel</button>}
      </div>
      <div className="page-body">
        <div className="card" style={{padding:'12px 20px',marginBottom:16}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
            <div style={{display:'flex',alignItems:'center',gap:8,fontSize:13}}>
              {leyRefs
                ?<><Ic n="spin" s={15}/><span style={{color:'var(--gray3)'}}>{msg||'Cargando referencias...'}</span></>
                :refData
                  ?<><span style={{color:'var(--success)',fontWeight:600}}>OK - Referencias listas para analizar</span></>
                  :<span style={{color:'var(--warning)'}}>Cargando referencias...</span>
              }
            </div>
            <div style={{display:'flex',gap:6}}>
              <button className="btn-sm gray" onClick={async function(){
                setLeyRefs(true);
                try{const c=await readAllRefs(refs,function(nm,i,t){setMsg('Leyendo '+i+'/'+t+': '+nm);});setRefData(c);onToast('Referencias recargadas','success');}
                catch(e){onToast('Error: '+e.message,'error');}
                setLeyRefs(false);setMsg('');
              }} disabled={leyRefs||refs.length===0}>Recargar</button>
              <button className="btn-sm" onClick={function(){setShowAddRef(!showAddRef);}}>+ Agregar</button>
            </div>
          </div>
          {refs.length>0&&<div style={{display:'flex',flexWrap:'wrap',marginTop:8,gap:4}}>{refs.map(function(r){return (
            <span key={r.id} className={'ref-chip '+(tipoClass[r.tipo]||'pdf')} style={{fontSize:10}}>
              {r.nombre_archivo}
            </span>
          );})}</div>}
          {showAddRef&&(
            <div className="add-ref-panel">
              <div style={{fontSize:12,fontWeight:600,color:'var(--navy)',marginBottom:8}}>Agregar archivo de referencia</div>
              <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                <select value={newRefTipo} onChange={function(e){setNewRefTipo(e.target.value);}} style={{padding:'5px 8px',border:'1.5px solid var(--gray2)',borderRadius:6,fontSize:12}}>
                  <option value="perfil_puesto">Perfil del puesto</option>
                  <option value="excel_asignacion">Excel de asignacion</option>
                  <option value="excel_referencia">Formato Excel</option>
                  <option value="word_referencia">Word DJ SST</option>
                  <option value="word_referencia_2">Word DJ Conflicto</option>
                </select>
                <input type="file" onChange={function(e){setNewRefFile(e.target.files[0]);}} style={{fontSize:12}}/>
                {newRefFile&&<button className="btn-sm gold" onClick={subirRef}>Subir</button>}
                <button className="btn-sm gray" onClick={function(){setShowAddRef(false);setNewRefFile(null);}}>Cancelar</button>
              </div>
            </div>
          )}
        </div>

        <div className="card">
          <div className="card-title" style={{justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}><div className="card-dot"/> Expedientes ({exps.length})</div>
            <div style={{display:'flex',gap:6}}>
              {leidos<exps.length&&<button className="btn-sm" onClick={leerTodos} disabled={leyExps||analizandoTodo||leyRefs}>{leyExps?<><Ic n="spin" s={12}/> Leyendo...</>:<><Ic n="search" s={12}/> Leer todos</>}</button>}
              {exps.filter(function(x){return textos[x.id]&&!reportes[x.id];}).length>0&&<button className="btn-sm gold" onClick={analizarTodos} disabled={analizandoTodo||leyExps||leyRefs||!refData}>{analizandoTodo?<><Ic n="spin" s={12}/> Analizando...</>:'Analizar todos'}</button>}
            </div>
          </div>
          {exps.length>0&&<div style={{marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--gray3)',marginBottom:4}}>
              <span>{Object.keys(reportes).length} analizados - {leidos} leidos - {exps.length} total</span>
              <span>{pct}%</span>
            </div>
            <div className="progress-bar"><div className="progress-fill" style={{width:pct+'%'}}/></div>
          </div>}
          {msg&&!leyRefs&&<div className="info-bar"><Ic n="spin" s={15}/><span>{msg}</span></div>}
          {loading
            ?<div style={{textAlign:'center',padding:32}}><Ic n="spin" s={20}/></div>
            :exps.length===0
              ?<div className="empty">No hay expedientes en este proceso.</div>
              :exps.map(function(exp){
                const txt=textos[exp.id];
                const leido=exp.leido||!!txt;
                const leyendo=exp.leyendo;
                const reporte=reportes[exp.id];
                const aUno=analizando[exp.id];
                const show=preview===exp.id;
                return (
                  <div key={exp.id} style={{marginBottom:12}}>
                    <div className="exp-row">
                      <div className="file-badge">PDF</div>
                      <div className="exp-name">{exp.nombre_archivo}</div>
                      {txt&&<span style={{fontSize:11,color:'var(--gray3)',flexShrink:0}}>{txt.paginas} pags</span>}
                      {reporte
                        ?<span style={{fontSize:11,fontWeight:600,padding:'3px 9px',borderRadius:20,flexShrink:0,background:reporte.resultado_final==='CORRECTO'?'#dcfce7':'#fef3dc',color:reporte.resultado_final==='CORRECTO'?'var(--success)':'#92400e'}}>{reporte.resultado_final==='CORRECTO'?'Correcto':'Con obs.'}</span>
                        :<span style={{fontSize:11,fontWeight:600,padding:'3px 9px',borderRadius:20,flexShrink:0,background:leido?'#dcfce7':leyendo?'#dbeafe':'#fef3dc',color:leido?'var(--success)':leyendo?'#1e40af':'#9a6c00'}}>{leido?'Leido':leyendo?(exp.progMsg||'Leyendo...'):'Pendiente'}</span>
                      }
                      {!leido&&!leyendo&&<button className="btn-sm" onClick={function(){leerUno(exp);}} disabled={leyExps||analizandoTodo||leyRefs}><Ic n="search" s={12}/> Leer</button>}
                      {leido&&!aUno&&!reporte&&<button className="btn-sm gold" onClick={function(){analizarUno(exp);}} disabled={analizandoTodo||leyExps||leyRefs||!refData}>Analizar</button>}
                      {aUno&&<button className="btn-sm" disabled><Ic n="spin" s={12}/> Analizando...</button>}
                      {reporte&&!aUno&&<button className="btn-sm gray" onClick={function(){analizarUno(exp);}} disabled={analizandoTodo||leyExps||leyRefs||!refData} title="Volver a analizar">Reanalizar</button>}
                      {reporte&&<button className="btn-sm" onClick={function(){setPreview(show?null:exp.id);}}>{show?'Ocultar':'Ver reporte'}</button>}
                    </div>
                    {show&&reporte&&<Reporte r={reporte}/>}
                  </div>
                );
              })
          }
        </div>
      </div>
    </div>
  );
};

const ListaProcesos = function({user,onToast,onSelect}){
  const [procesos,setProcesos]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(function(){
    async function load(){
      const {data}=await sb.from('procesos').select('*, expedientes(count)').eq('user_id',user.id).order('created_at',{ascending:false});
      setProcesos(Array.isArray(data)?data:[]);setLoading(false);
    }
    load();
  },[]);
  const fmtD=function(d){return d?new Date(d+'T00:00:00').toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'}):'---';};
  return (
    <div>
      <div className="page-header"><div><div className="page-title">Procesos</div><div className="page-subtitle">Haz clic en un proceso para ver sus expedientes</div></div></div>
      <div className="page-body">
        {loading
          ?<div style={{textAlign:'center',padding:60}}><Ic n="spin" s={24}/></div>
          :procesos.length===0
            ?<div className="card"><div className="empty">No hay procesos. Crea el primero desde el menu.</div></div>
            :procesos.map(function(p){return (
              <div className="proceso-row" key={p.id} onClick={function(){onSelect(p);}}>
                <div style={{width:42,height:42,background:'var(--navy)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Ic n="folder" s={18}/></div>
                <div className="proceso-info">
                  <div className="proceso-name">{p.nombre}</div>
                  <div className="proceso-meta">Presentacion: {fmtD(p.fecha_presentacion)} - Inicio: {fmtD(p.fecha_inicio_laboral)} - {(p.expedientes&&p.expedientes[0])?p.expedientes[0].count:0} expedientes</div>
                </div>
                <Ic n="arrow" s={16}/>
              </div>
            );})}
      </div>
    </div>
  );
};

const App = function(){
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [page,setPage]=useState('nuevo');
  const [toast,setToast]=useState(null);
  const [proceso,setProceso]=useState(null);
  const [apiKey,setApiKey]=useState(function(){return localStorage.getItem('revisorKey')||'';});
  useEffect(function(){
    sb.auth.getSession().then(function({data}){setUser(data.session&&data.session.user?data.session.user:null);setLoading(false);});
    const {data:{subscription}}=sb.auth.onAuthStateChange(function(_,s){setUser(s&&s.user?s.user:null);});
    return function(){subscription.unsubscribe();};
  },[]);
  const showToast=function(msg,type){setToast({msg,type:type||'success'});setTimeout(function(){setToast(null);},4000);};
  const logout=async function(){await sb.auth.signOut();setUser(null);};
  if(loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--navy)'}}><Ic n="spin" s={32}/></div>;
  if(!apiKey) return <ApiKeyScreen onSave={function(k){setApiKey(k);}}/>;
  if(!user) return <Login onLogin={setUser}/>;
  const initials=(user.email||'?').slice(0,2).toUpperCase();
  return (
    <div className="app-layout">
      <aside className="sidebar">
        <div className="sidebar-header">
          <div className="sidebar-logo">
            <div className="sidebar-logo-box"><Ic n="logo" s={18}/></div>
            <div className="sidebar-brand">Revisor de<br/>Expedientes<span>Sistema automatizado</span></div>
          </div>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-label">Revision</div>
          <div className={'nav-item '+(page==='nuevo'?'active':'')} onClick={function(){setPage('nuevo');}}><Ic n="plus" s={15}/> Nuevo Proceso</div>
          <div className={'nav-item '+(page==='procesos'||page==='detalle'?'active':'')} onClick={function(){setPage('procesos');}}><Ic n="list" s={15}/> Ver Procesos</div>
        </nav>
        <div className="sidebar-footer">
          <div className="user-info">
            <div className="user-avatar">{initials}</div>
            <div className="user-email">{user.email}</div>
            <button className="btn-logout" onClick={logout} title="Cerrar sesion"><Ic n="logout" s={14}/></button>
          </div>
          <button onClick={function(){localStorage.removeItem('revisorKey');setApiKey('');}} style={{fontSize:10,color:'rgba(255,255,255,.3)',background:'none',border:'none',cursor:'pointer',width:'100%',textAlign:'left',padding:'6px 10px',marginTop:4}}>
            Cambiar API Key
          </button>
        </div>
      </aside>
      <main className="main-content">
        {page==='nuevo'&&<NuevoProceso user={user} onToast={showToast} onDone={function(){setPage('procesos');}}/>}
        {page==='procesos'&&<ListaProcesos user={user} onToast={showToast} onSelect={function(p){setProceso(p);setPage('detalle');}}/>}
        {page==='detalle'&&proceso&&<DetalleProceso proceso={proceso} user={user} onToast={showToast} onBack={function(){setProceso(null);setPage('procesos');}}/>}
      </main>
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={function(){setToast(null);}}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
