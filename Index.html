        </div>
      </div>
    </div>
  );
}


/* ══ PRÉSTAMOS ══════════════════════════════════════════════════ */
function Prestamos({loans,sched,onDelete,onVer,onPagar,onEditar}){
  const[q,setQ]=useState('');
  const[editLoan,setEditLoan]=useState(null);
  const[filtro,setFiltro]=useState('activos');
  if(!Array.isArray(loans)||!Array.isArray(sched))return<div style={{padding:30,textAlign:'center',color:'var(--grey)'}}>Cargando...</div>;

  const getEst2=l=>getEstPrestamo(sched.filter(r=>r.prestamo_id===l.id));

  // Split and sort: active first, cancelled last
  const activos=loans.filter(l=>getEst2(l)!=='CANCELADO');
  const cancelados=loans.filter(l=>getEst2(l)==='CANCELADO');
  const listBase=filtro==='activos'?activos:filtro==='cancelados'?cancelados:[...activos,...cancelados];
  const fl=listBase.filter(l=>l.cliente.toLowerCase().includes(q.toLowerCase())||String(l.id).includes(q));

  const cob=id=>sched.filter(r=>r.prestamo_id===id&&r.monto_pagado).reduce((a,r)=>a+N(r.monto_pagado),0);
  const sig=id=>sched.filter(r=>r.prestamo_id===id&&!['Pagado','Adelantado'].includes(getEst(r))).sort((a,b)=>a.n_cuota-b.n_cuota)[0];

  const tabStyle=(t)=>({
    padding:'7px 18px',fontSize:12.5,fontWeight:600,borderRadius:6,cursor:'pointer',border:'none',
    background:filtro===t?'var(--teal)':'var(--light)',
    color:filtro===t?'#fff':'var(--grey)',
    transition:'all .2s',
  });

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      {editLoan&&<EditarModal loan={editLoan} onClose={()=>setEditLoan(null)} onSave={async(loan,newData,recalc)=>{await onEditar(loan,newData,recalc);setEditLoan(null);}}/>}
      <div><div className="pg-ey">Portafolio</div><div className="pg-ti">Préstamos</div></div>

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,marginBottom:13,flexWrap:'wrap'}}>
        {/* FILTRO TABS */}
        <div style={{display:'flex',gap:6}}>
          <button style={tabStyle('activos')} onClick={()=>setFiltro('activos')}>
            Activos <span style={{fontSize:11,opacity:.75}}>({activos.length})</span>
          </button>
          <button style={tabStyle('todos')} onClick={()=>setFiltro('todos')}>
            Todos <span style={{fontSize:11,opacity:.75}}>({loans.length})</span>
          </button>
          <button style={tabStyle('cancelados')} onClick={()=>setFiltro('cancelados')}>
            Cancelados <span style={{fontSize:11,opacity:.75}}>({cancelados.length})</span>
          </button>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          <span style={{fontSize:13,color:'var(--grey)'}}>{fl.length} préstamo{fl.length!==1?'s':''}</span>
          <input className="inp" placeholder="Buscar cliente o ID..." value={q} onChange={e=>setQ(e.target.value)} style={{width:200}}/>
        </div>
      </div>

      <div className="card"><div className="tbl-wrap"><table>
        <thead><tr><th>ID</th><th>Cliente / Garante</th><th>Monto</th><th>Tipo / Tasa</th><th>Cuotas</th><th>Progreso</th><th>Cobrado / Saldo</th><th>Inicio</th><th>Estado</th><th>Acciones</th></tr></thead>
        <tbody>
          {fl.length===0&&<tr><td colSpan={10} style={{textAlign:'center',padding:44,color:'var(--grey)'}}>No se encontraron préstamos</td></tr>}
          {fl.map(l=>{
            const cuotas=sched.filter(r=>r.prestamo_id===l.id);
            const est=getEst2(l);
            const cancelado=est==='CANCELADO';
            const s2=sig(l.id);
            const pagadas=cuotas.filter(r=>['Pagado','Adelantado','Solo int.'].includes(getEst(r))).length;
            const saldo=est==='CANCELADO'?0:cuotas.reduce((a,r)=>a+getSaldo(r),0);
            const cobrado=cob(l.id);
            const totalCuotas=cuotas.length||l.cuotas||1;
            const pct=Math.round(pagadas/totalCuotas*100);
            return(
              <tr key={l.id} style={{opacity:cancelado?.55:1,background:cancelado?'#f9f9f9':undefined}}>
                <td style={{color:'var(--grey)',fontSize:11,fontWeight:600,whiteSpace:'nowrap'}}>#{l.id}</td>
                <td style={{minWidth:130}}>
                  <div style={{fontWeight:700,color:cancelado?'#888':'var(--ink)',fontSize:13}}>{l.cliente}</div>
                  {l.garante&&<div style={{fontSize:11,color:'var(--grey)',marginTop:1}}>Gar: {l.garante}</div>}
                  {l.referencia&&<div style={{fontSize:10.5,color:'var(--teal)',marginTop:1}}>Ref: {l.referencia}</div>}
                </td>
                <td style={{fontWeight:700,color:cancelado?'#888':'var(--dark)',whiteSpace:'nowrap'}}>{fmt(l.monto)}</td>
                <td>
                  <span style={{fontSize:10,background:'var(--light)',color:'var(--dark)',borderRadius:4,padding:'2px 7px',fontWeight:700,display:'block',marginBottom:3}}>{l.tipo}</span>
                  <span style={{fontSize:11,color:'var(--grey)',fontWeight:600}}>{(N(l.tasa)*100).toFixed(1)}%</span>
                </td>
                <td style={{textAlign:'center'}}>
                  <div style={{fontWeight:700,fontSize:13,color:'var(--dark)'}}>{pagadas}<span style={{color:'var(--grey)',fontWeight:400}}>/{totalCuotas}</span></div>
                  <div style={{fontSize:9.5,color:'var(--grey)',letterSpacing:'.05em'}}>pagadas</div>
                </td>
                <td style={{minWidth:90}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <div style={{flex:1,height:5,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
                      <div style={{height:'100%',width:pct+'%',background:pct===100?'var(--green)':'var(--teal2)',borderRadius:3}}/>
                    </div>
                    <span style={{fontSize:10.5,fontWeight:700,color:pct===100?'var(--green)':'var(--grey)',minWidth:28}}>{pct}%</span>
                  </div>
                </td>
                <td style={{minWidth:110}}>
                  <div style={{fontWeight:700,color:'var(--green)',fontSize:12}}>{fmt(cobrado)}</div>
                  <div style={{fontSize:11,color:saldo>0?'var(--red)':'var(--grey)',fontWeight:saldo>0?600:400}}>Saldo: {fmt(saldo)}</div>
                </td>
                <td style={{color:'var(--grey)',fontSize:11,whiteSpace:'nowrap'}}>{fmtD(l.fecha_prestamo)}</td>
                <td><Badge s={est}/></td>
                <td>
                  <div style={{display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
                    <button className="btn-ol btn-sm" onClick={()=>onVer(l)}>Ver</button>
                    {!cancelado&&s2&&<button className="btn btn-sm" onClick={()=>onPagar(s2)}>Pagar</button>}
                    {!cancelado&&<button className="btn-ol btn-sm" onClick={()=>setEditLoan(l)} style={{fontSize:11}}>✏</button>}
                    <button className="btn-del" onClick={()=>onDelete(l.id)}>×</button>
                  </div>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table></div></div>
    </div>
  );
}


function CronogramaModal({loan,rows,onClose,isBorrador=false}){
  const modalRef=React.useRef(null);
  const totBase=rows.reduce((a,r)=>a+N(r.cuota_base),0);
  const totCap=rows.reduce((a,r)=>a+N(r.capital_cuota),0);
  const totInt=rows.reduce((a,r)=>a+N(r.interes_cuota),0);
  const totDeg=rows.reduce((a,r)=>a+N(r.desgravamen),0);
  const totGO=rows.reduce((a,r)=>a+N(r.gasto_operativo||0),0);
  const hasDeg=rows.some(r=>N(r.desgravamen)>0);
  const hasGO=rows.some(r=>N(r.gasto_operativo)>0);
  const T='#2d8a7a'; const D='#1B4F45'; const MINT='#d4ede5';
  const NF="'DM Sans',sans-serif";

  async function captureEl(){
    const el=modalRef.current;
    if(!el||!window.html2canvas)throw new Error('html2canvas no disponible');
    // Get real full dimensions including overflow
    const fullW=Math.max(el.scrollWidth, el.offsetWidth, 600);
    const fullH=el.scrollHeight;
    // Clone off-screen at full width so nothing gets clipped
    const clone=el.cloneNode(true);
    clone.style.cssText=[
      'position:fixed',
      'top:-99999px',
      'left:0',
      'z-index:-1',
      'width:'+fullW+'px',
      'overflow:visible',
      'background:#fff',
      'pointer-events:none',
      // Make all inner tables/divs not clip
      'white-space:nowrap',
    ].join(';');
    // Also make the inner scroll wrapper visible
    const scrollDiv=clone.querySelector('[style*="overflow"]');
    if(scrollDiv)scrollDiv.style.overflow='visible';
    document.body.appendChild(clone);
    const canvas=await window.html2canvas(clone,{
      scale:2,
      useCORS:true,
      backgroundColor:'#ffffff',
      logging:false,
      width:fullW,
      height:clone.scrollHeight,
      windowWidth:fullW,
      windowHeight:clone.scrollHeight,
    });
    document.body.removeChild(clone);
    return canvas;
  }

  async function copiarImagen(){
    const btn=document.getElementById('pm-btns');
    try{
      if(btn)btn.style.display='none';
      const canvas=await captureEl();
      if(btn)btn.style.display='';
      canvas.toBlob(async(blob)=>{
        await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
        alert('✓ Imagen copiada al portapapeles');
      },'image/png');
    }catch(ex){
      if(btn)btn.style.display='';
      alert('No se pudo copiar: '+ex.message);
    }
  }

  async function descargarImagen(){
    const btn=document.getElementById('pm-btns');
    try{
      if(btn)btn.style.display='none';
      const canvas=await captureEl();
      if(btn)btn.style.display='';
      const a=document.createElement('a');
      a.download='cronograma_'+loan.cliente.replace(/\s+/g,'_')+'.png';
      a.href=canvas.toDataURL('image/png');
      a.click();
    }catch(ex){
      if(btn)btn.style.display='';
      alert('Error: '+ex.message);
    }
  }

  function imprimir(){
    const el=modalRef.current;
    const w=window.open('','_blank');
    w.document.write('<html><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}body{font-family:"DM Sans",sans-serif;background:#fff}</style></head><body>'+el.innerHTML+'</body></html>');
    w.document.close();
    setTimeout(()=>{w.print();},800);
  }

  const thStyle={padding:'9px 12px',color:'#fff',fontWeight:600,fontSize:10.5,textTransform:'uppercase',letterSpacing:'.05em',background:T,whiteSpace:'nowrap'};

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.72)',zIndex:500,display:'flex',flexDirection:'column',alignItems:'center',overflowY:'auto'}}>
      <div style={{width:'100%',maxWidth:600,display:'flex',flexDirection:'column'}}>

        {/* BARRA FIJA */}
        <div id="pm-btns" style={{position:'sticky',top:0,zIndex:10,background:'rgba(15,40,35,.97)',padding:'10px 12px',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',borderBottom:'1px solid rgba(255,255,255,.15)',flexShrink:0}}>
          <button onClick={onClose} style={{background:'#e53935',border:'none',color:'#fff',fontWeight:700,fontSize:13,padding:'8px 18px',borderRadius:7,cursor:'pointer'}}>✕ Cerrar</button>
          <button onClick={copiarImagen} style={{background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.2)',color:'#fff',fontSize:12,padding:'8px 14px',borderRadius:7,cursor:'pointer',fontWeight:600}}>📋 Copiar</button>
          <button onClick={descargarImagen} style={{background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.2)',color:'#fff',fontSize:12,padding:'8px 14px',borderRadius:7,cursor:'pointer',fontWeight:600}}>⬇ Guardar</button>
          <button onClick={imprimir} style={{background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.2)',color:'#fff',fontSize:12,padding:'8px 14px',borderRadius:7,cursor:'pointer',fontWeight:600}}>🖨 Imprimir</button>
        </div>

        {/* CONTENIDO */}
        <div ref={modalRef} style={{fontFamily:NF,color:'#111',background:'#fff'}}>

          {/* CABECERA */}
          <div style={{background:T,padding:'18px 24px',textAlign:'center'}}>
            <div style={{fontSize:10,color:'rgba(255,255,255,.55)',letterSpacing:'.22em',textTransform:'uppercase',marginBottom:4}}>Crédito San Juan</div>
            <div style={{fontSize:19,fontWeight:700,color:'#fff',textTransform:'uppercase',letterSpacing:'.04em',marginBottom:isBorrador?8:0}}>CRONOGRAMA DE PAGOS</div>
            {isBorrador&&<div style={{display:'inline-block',background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.25)',borderRadius:4,padding:'3px 12px',fontSize:10.5,color:'rgba(255,255,255,.85)',fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase'}}>Vista previa — no guardado</div>}
          </div>

          {/* DATOS PRÉSTAMO */}
          <div style={{padding:'14px 20px 10px',background:'#fff',borderBottom:'1px solid #ddd'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 16px'}}>
              {[
                ['Cliente', loan.cliente],
                ['Garante', loan.garante||'—'],
                ['Monto prestado', fmt(loan.monto)],
                ['Tasa de interés', (N(loan.tasa)*100).toFixed(1)+'% '+((loan.tipo||'').toLowerCase())],
                ['N° de cuotas', rows.length+' cuotas'],
                ['Tipo', loan.tipo||'—'],
                ...(hasDeg?[['Desgravamen', fmt(rows[0]?.desgravamen||0)+' / cuota']]:[]),
                ['Fecha inicio', fmtD(loan.fecha_prestamo)],
                ...(loan.referencia?[['Referenciado por', loan.referencia]]:[]),
              ].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid #f0f0f0',fontSize:12.5,gap:8}}>
                  <span style={{color:'#888'}}>{k}</span>
                  <span style={{fontWeight:700,color:'#111',textAlign:'right'}}>{v}</span>
                </div>
              ))}
            </div>
          </div>

          {/* TABLA — scroll horizontal en móvil */}
          <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
            <table style={{width:'100%',minWidth:400,borderCollapse:'collapse',fontSize:12.5}}>
              <thead>
                <tr>
                  <th style={{...thStyle,textAlign:'center',width:38}}>N°</th>
                  <th style={{...thStyle,textAlign:'left'}}>Fecha</th>
                  <th style={{...thStyle,textAlign:'right'}}>Capital</th>
                  <th style={{...thStyle,textAlign:'right'}}>Interés</th>
                  {hasDeg&&<th style={{...thStyle,textAlign:'right'}}>Desgrav.</th>}
                  {hasGO&&<th style={{...thStyle,textAlign:'right'}}>G.Oper.</th>}
                  <th style={{...thStyle,textAlign:'right'}}>Cuota</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r,i)=>(
                  <tr key={r.id} style={{borderBottom:'1px solid #e0e0e0'}}>
                    <td style={{padding:'9px 10px',textAlign:'center',color:'#666',fontSize:12}}>{r.n_cuota}</td>
                    <td style={{padding:'9px 12px',color:'#333',whiteSpace:'nowrap'}}>{fmtD(r.fecha_vence)}</td>
                    <td style={{padding:'9px 12px',textAlign:'right',color:'#555'}}>{fmt(r.capital_cuota)}</td>
                    <td style={{padding:'9px 12px',textAlign:'right',color:'#555'}}>{fmt(r.interes_cuota)}</td>
                    {hasDeg&&<td style={{padding:'9px 12px',textAlign:'right',color:'#555'}}>{fmt(r.desgravamen)}</td>}
                    {hasGO&&<td style={{padding:'9px 12px',textAlign:'right',color:'#555'}}>{fmt(r.gasto_operativo||0)}</td>}
                    <td style={{padding:'9px 12px',textAlign:'right',fontWeight:700,color:'#222'}}>{fmt(r.cuota_base)}</td>
                  </tr>
                ))}
              </tbody>
              <tfoot>
                <tr style={{background:MINT,borderTop:'2px solid '+T}}>
                  <td colSpan={2} style={{padding:'10px 12px',fontWeight:700,color:D,fontSize:11,textTransform:'uppercase',letterSpacing:'.05em'}}>Totales</td>
                  <td style={{padding:'10px 12px',textAlign:'right',fontWeight:700,color:D}}>{fmt(totCap)}</td>
                  <td style={{padding:'10px 12px',textAlign:'right',fontWeight:700,color:D}}>{fmt(totInt)}</td>
                  {hasDeg&&<td style={{padding:'10px 12px',textAlign:'right',fontWeight:700,color:D}}>{fmt(totDeg)}</td>}
                  {hasGO&&<td style={{padding:'10px 12px',textAlign:'right',fontWeight:700,color:D}}>{fmt(totGO)}</td>}
                  <td style={{padding:'10px 12px',textAlign:'right',fontWeight:700,color:D,fontSize:14}}>{fmt(totBase)}</td>
                </tr>
              </tfoot>
            </table>
          </div>

        </div>
      </div>
    </div>
  );

function Cronograma({loans,sched,viewLoan,onPagar}){
  if(!Array.isArray(loans)||!Array.isArray(sched))return<div style={{padding:30,textAlign:'center',color:'var(--grey)'}}>Cargando...</div>;
  const[selId,setSelId]=useState(viewLoan?.id??'');
  const[search,setSearch]=useState(viewLoan?String(viewLoan.id):'');
  const[showModal,setShowModal]=useState(false);
  const loan=loans.find(l=>l.id===Number(selId)||l.id===selId);
  const rows=loan?sched.filter(r=>r.prestamo_id===loan.id).sort((a,b)=>a.n_cuota-b.n_cuota):[];
  const totBase=rows.reduce((a,r)=>a+N(r.cuota_base),0);
  const totPag=rows.filter(r=>r.monto_pagado).reduce((a,r)=>a+N(r.monto_pagado),0);
  const totSaldo=rows.reduce((a,r)=>a+getSaldo(r),0);
  const cuota=rows.length>0?rows[0].cuota_base:0;

  const filtered=React.useMemo(()=>{
    const q=search.trim().toLowerCase();
    if(!q)return loans.slice(0,8);
    return loans.filter(l=>String(l.id)===q||l.cliente.toLowerCase().includes(q)).slice(0,10);
  },[loans,search]);

  function selectLoan(l){setSelId(String(l.id));setSearch(l.cliente+' (ID:'+l.id+')');}

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      {showModal&&loan&&rows.length>0&&<CronogramaModal loan={loan} rows={rows} onClose={()=>setShowModal(false)}/>}
      <div><div className="pg-ey">Cronogramas</div><div className="pg-ti">Cronograma de pagos</div><div className="pg-su">Busca por ID o nombre del cliente</div></div>
      <div className="card" style={{marginBottom:13}}>
        <div className="c-hd"><div className="c-dot"/><div className="c-hd-t">Buscar préstamo</div></div>
        <div className="c-bd">
          <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:10,flexWrap:'wrap'}}>
            <div style={{position:'relative',flex:1,maxWidth:380}}>
              <span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'var(--grey)',pointerEvents:'none'}}>
                <svg viewBox="0 0 24 24" style={{width:14,height:14,stroke:'currentColor',fill:'none',strokeWidth:2,strokeLinecap:'round'}}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              </span>
              <input className="inp" placeholder="ID o nombre del cliente..." value={search}
                onChange={e=>{setSearch(e.target.value);setSelId('');}} style={{paddingLeft:34}}/>
            </div>
            {loan&&rows.length>0&&<button className="btn" style={{whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:6}} onClick={()=>setShowModal(true)}>
              <svg viewBox="0 0 24 24" style={{width:13,height:13,stroke:'currentColor',fill:'none',strokeWidth:2,strokeLinecap:'round'}}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              Ver para cliente
            </button>}
          </div>
          {search.trim()&&!selId&&(
            <div style={{border:'1px solid var(--border)',borderRadius:6,overflow:'hidden',maxWidth:480}}>
              {filtered.length===0&&<div style={{padding:'10px 14px',color:'var(--grey)',fontSize:13}}>Sin resultados</div>}
              {filtered.map(l=>{
                const est=getEstPrestamo(sched.filter(r=>r.prestamo_id===l.id));
                return<div key={l.id} onClick={()=>selectLoan(l)}
                  style={{padding:'9px 14px',cursor:'pointer',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--white)'}}
                  onMouseEnter={e=>e.currentTarget.style.background='var(--alt)'}
                  onMouseLeave={e=>e.currentTarget.style.background='var(--white)'}>
                  <div>
                    <span style={{fontWeight:700,color:'var(--dark)',marginRight:8}}>#{l.id}</span>
                    <span style={{fontWeight:600}}>{l.cliente}</span>
                    <span style={{color:'var(--grey)',fontSize:12,marginLeft:8}}>{fmt(l.monto)} · {l.tipo}</span>
                  </div>
                  <Badge s={est}/>
                </div>;
              })}
            </div>
          )}
        </div>
      </div>
      {loan&&rows.length===0&&(
        <div className="card" style={{padding:22,background:'#fde8e8',border:'1px solid #f5a5a5'}}>
          <div style={{fontWeight:700,color:'var(--red)',marginBottom:4}}>Sin cuotas en base de datos</div>
          <div style={{color:'var(--red)',fontSize:13}}>Elimínalo desde "Préstamos" y vuelve a registrarlo.</div>
        </div>
      )}
      {loan&&rows.length>0&&(
        <div className="card">
          <div className="c-header"><div className="c-header-title">CRONOGRAMA DE PAGOS</div><div className="c-header-sub">Crédito San Juan · {new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'long',year:'numeric'})}</div></div>
          <div className="crono-info">
            <div style={{borderRight:'1px solid var(--border)'}}>
              {[['Cliente',loan.cliente],['Monto',fmt(loan.monto)],['Tipo',loan.tipo],['N° Cuotas',`${loan.cuotas} cuotas`]].map(([k,v])=>(<div key={k} className="ci-row"><div className="ci-k">{k}</div><div className="ci-v" style={{fontWeight:k==='Cliente'?600:undefined}}>{v}</div></div>))}
            </div>
            <div>
              {[['Garante',loan.garante||'—'],['Referido por',loan.referencia||'—'],['Tasa',(N(loan.tasa)*100).toFixed(1)+'%'],['Fecha inicio',fmtD(loan.fecha_prestamo)]].map(([k,v])=>(<div key={k} className="ci-row"><div className="ci-k">{k}</div><div className="ci-v">{v}</div></div>))}
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',borderBottom:'1px solid var(--border)'}}>
            <div style={{borderRight:'1px solid var(--border)'}}><div className="c-sum-lbl">CUOTA</div><div className="c-sum-box">{fmt(cuota)}</div></div>
            <div><div className="c-sum-lbl">MONTO TOTAL</div><div className="c-sum-box">{fmt(totBase)}</div></div>
          </div>
          <div style={{display:'flex',gap:10,padding:'12px 16px',background:'var(--alt)',borderBottom:'1px solid var(--border)',flexWrap:'wrap'}}>
            {[
              {l:'Saldo pendiente',v:getEstPrestamo(rows)!=='CANCELADO'?totSaldo:0,c:(getEstPrestamo(rows)!=='CANCELADO'&&totSaldo>0)?'var(--red)':'var(--green)',bc:(getEstPrestamo(rows)!=='CANCELADO'&&totSaldo>0)?'#f5a5a5':'#a5d4b8',bg:(getEstPrestamo(rows)!=='CANCELADO'&&totSaldo>0)?'#fde8e8':'#dff2e8'},
              {l:'Total cobrado',v:totPag,c:'var(--green)',bc:'#a5d4b8',bg:'#dff2e8'},
              {l:'Cuotas restantes',v:rows.filter(r=>!['Pagado','Adelantado'].includes(getEst(r))).length,c:'var(--dark)',bc:'var(--border)',bg:'var(--light)',noFmt:true},
            ].map(i=>(<div key={i.l} className="c-pill" style={{background:i.bg,borderColor:i.bc}}><div className="c-pill-lbl" style={{color:i.c}}>{i.l}</div><div className="c-pill-val" style={{color:i.c}}>{i.noFmt?i.v:fmt(i.v)}</div></div>))}
          </div>
          <div className="tbl-wrap"><table>
            <thead><tr><th>#</th><th>Fecha Pago</th><th>Capital</th><th>Interés</th><th>Degrav.</th><th>G.Oper.</th><th>Cuota Base</th><th>Mora</th><th>TOTAL</th><th>Tipo Pago</th><th>Pagado</th><th>F. Pago</th><th>Estado</th><th>Saldo</th><th></th></tr></thead>
            <tbody>{rows.map(r=>{
              const est=getEst(r),tot2=N(r.cuota_base)+N(r.mora||0);
              return<tr key={r.id} style={est==='Vencido'?{background:'#fff8f8'}:{}}>
                <td style={{fontWeight:700,color:'var(--dark)',background:'var(--light)'}}>{r.n_cuota}</td>
                <td style={{color:est==='Vencido'?'var(--red)':undefined,fontWeight:est==='Vencido'?600:undefined,fontSize:12}}>{fmtD(r.fecha_vence)}</td>
                <td>{fmt(r.capital_cuota)}</td><td>{fmt(r.interes_cuota)}</td>
                <td>{fmt(r.desgravamen)}</td><td>{fmt(r.gasto_operativo||0)}</td>
                <td style={{fontWeight:700,color:'var(--dark)',background:'var(--light)'}}>{fmt(r.cuota_base)}</td>
                <td style={{color:'var(--red)'}}>{r.mora?fmt(r.mora):''}</td>
                <td style={{fontWeight:700,color:'var(--green)',background:'#dff2e8'}}>{fmt(tot2)}</td>
                <td style={{fontSize:11,color:'var(--grey)'}}>{r.tipo_pago}</td>
                <td style={{fontWeight:600,color:'var(--green)'}}>{r.monto_pagado?fmt(r.monto_pagado):''}</td>
                <td style={{fontSize:11,color:'var(--grey)'}}>{fmtD(r.fecha_pago)}</td>
                <td><Badge s={est}/></td>
                <td style={{fontWeight:700,color:getSaldo(r)>0?'var(--red)':'var(--green)'}}>{fmt(getSaldo(r))}</td>
                <td>{!['Pagado','Adelantado'].includes(est)&&<button className="btn btn-sm" onClick={()=>onPagar(r)}>Pagar</button>}</td>
              </tr>;
            })}</tbody>
            <tfoot><tr>
              <td colSpan={6} style={{textAlign:'right',fontSize:11,textTransform:'uppercase',letterSpacing:'.07em'}}>Totales</td>
              <td>{fmt(totBase)}</td><td/><td>{fmt(totBase)}</td><td/>
              <td style={{color:'var(--green)'}}>{fmt(totPag)}</td>
              <td colSpan={2}/><td style={{color:totSaldo>0?'var(--red)':'var(--green)'}}>{fmt(totSaldo)}</td><td/>
            </tr></tfoot>
          </table></div>
        </div>
      )}
    </div>
  );
}

function RegistrarPago({loans,sched,payingRow,onPay,onPagarTodo,onReload,onToast}){
  const[selId,setSelId]=useState(payingRow?String(payingRow.prestamo_id):'');
  const[search,setSearch]=useState(payingRow?String(payingRow.prestamo_id):'');
  const[selRow,setSelRow]=useState(payingRow||null);
  const[monto,setMonto]=useState('');
  const[mora,setMora]=useState('');
  const[tipo,setTipo]=useState('NORMAL');
  const[fecha,setFecha]=useState(todayStr());
  const[saving,setSaving]=useState(false);
  const[err,setErr]=useState('');
  const[aplicarMora,setAplicarMora]=useState(false);

  // Auto-fill mora when toggle on or selRow changes
  React.useEffect(()=>{
    if(!aplicarMora||!selRow){if(!aplicarMora)setMora('');return;}
    const fv=new Date(selRow.fecha_vence+'T00:00:00');
    const hoy=new Date();hoy.setHours(0,0,0,0);
    const dias=Math.max(0,Math.floor((hoy-fv)/(1000*60*60*24)));
    const loan2=loans.find(l=>Number(l.id)===Number(selRow.prestamo_id));
    const intMensual=loan2?N(loan2.monto)*N(loan2.tasa):N(selRow.interes_cuota);
    setMora(Math.ceil(intMensual/30*dias).toString());
  },[aplicarMora,selRow]);

  // Search by ID or client name
  const filtered=React.useMemo(()=>{
    const q=search.trim().toLowerCase();
    if(!q)return loans.slice(0,8);
    return loans.filter(l=>String(l.id)===q||l.cliente.toLowerCase().includes(q)).slice(0,10);
  },[loans,search]);

  const loan=loans.find(l=>l.id===Number(selId)||l.id===selId);
  const loanRows=loan?sched.filter(r=>r.prestamo_id===loan.id).sort((a,b)=>a.n_cuota-b.n_cuota):[];
  const pendientes=loanRows.filter(r=>!['Pagado','Adelantado'].includes(getEst(r)));


  function selectLoan(l){setSelId(String(l.id));setSearch(l.cliente+' (ID:'+l.id+')');setSelRow(null);setErr('');}

  async function agregarCuotaExtra(){
    if(!loan){setErr('Selecciona un préstamo primero');return;}
    // Get last cuota to base the new one on
    const sorted=loanRows.sort((a,b)=>a.n_cuota-b.n_cuota);
    const ultima=sorted[sorted.length-1];
    if(!ultima){setErr('No hay cuotas en este préstamo');return;}
    // Calculate next date based on loan type
    const lastDate=ultima.fecha_vence;
    let nextDate=lastDate;
    if(loan.tipo==='MENSUAL'){
      const d=new Date(lastDate+'T00:00:00');
      d.setMonth(d.getMonth()+1);
      nextDate=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    } else if(loan.tipo==='SEMANAL'){
      const d=new Date(lastDate+'T00:00:00');
      d.setDate(d.getDate()+7);
      nextDate=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    } else {
      const d=new Date(lastDate+'T00:00:00');
      d.setDate(d.getDate()+1);
      nextDate=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    }
    // Extra cuota = interest only, no capital (capital is still owed from original loan)
    const intExtra=ultima.interes_cuota;
    const degExtra=ultima.desgravamen||0;
    const goExtra=ultima.gasto_operativo||0;
    const nuevaCuota={
      prestamo_id:loan.id,
      cliente:loan.cliente,
      n_cuota:ultima.n_cuota+1,
      fecha_vence:nextDate,
      capital_cuota:0,
      interes_cuota:intExtra,
      desgravamen:degExtra,
      gasto_operativo:goExtra,
      cuota_base:intExtra+degExtra+goExtra,
      tipo_pago:'NORMAL',
      monto_pagado:null,mora:null,fecha_pago:null,
    };
    try{
      const H={'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json','Prefer':'return=minimal'};
      const r=await fetch(SURL+'/rest/v1/cronograma',{method:'POST',headers:H,body:JSON.stringify(nuevaCuota)});
      if(!r.ok){const t=await r.text();setErr('Error: '+t);return;}
      setErr('');
      if(onToast)onToast('✓ Cuota extra #'+(ultima.n_cuota+1)+' agregada — '+nextDate.split('-').reverse().join('/'));
      if(onReload)await onReload();
    }catch(ex){setErr('Error: '+ex.message);}
  }

  // FIX NUEVO: eliminar cuota extra agregada por error (solo las que tienen capital=0 y están fuera del plazo original)
  async function eliminarCuotaExtra(cuota){
    if(!confirm('¿Eliminar cuota extra #'+cuota.n_cuota+'? Esta acción no se puede deshacer.'))return;
    const H={'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Prefer':'return=minimal'};
    try{
      const r=await fetch(SURL+'/rest/v1/cronograma?id=eq.'+cuota.id,{method:'DELETE',headers:H});
      if(!r.ok){const t=await r.text();setErr('Error al eliminar: '+t);return;}
      setErr('');
      if(selRow&&selRow.id===cuota.id){setSelRow(null);setMonto('');setMora('');}
      if(onToast)onToast('Cuota extra #'+cuota.n_cuota+' eliminada');
      if(onReload)await onReload();
    }catch(ex){setErr('Error: '+ex.message);}
  }

  async function pagar(){
    if(!selRow){setErr('Selecciona una cuota');return;}
    if(!monto||isNaN(Number(monto))){setErr('Ingresa el monto a pagar');return;}
    setSaving(true);setErr('');
    try{
      // Map to the format App's registrarPago expects
      await onPay(selRow.id,{
        tipoPago:tipo,
        montoPagado:Number(monto),
        mora:Number(mora||0)||null,
        fechaPago:fecha,
      });
      setSelRow(null);setMonto('');setMora('');setTipo('NORMAL');
      setSelId('');setSearch('');
    }catch(ex){setErr(ex.message);}
    setSaving(false);
  }

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div><div className="pg-ey">Pagos</div><div className="pg-ti">Registrar pago</div><div className="pg-su">Busca por ID o nombre del cliente</div></div>

      {/* SEARCH BOX */}
      <div className="card" style={{marginBottom:13}}>
        <div className="c-hd"><div className="c-dot"/><div className="c-hd-t">Buscar préstamo</div></div>
        <div className="c-bd">
          <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:10}}>
            <div style={{position:'relative',flex:1,maxWidth:380}}>
              <span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'var(--grey)',pointerEvents:'none'}}>
                <svg viewBox="0 0 24 24" style={{width:14,height:14,stroke:'currentColor',fill:'none',strokeWidth:2,strokeLinecap:'round'}}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              </span>
              <input className="inp" placeholder="ID o nombre del cliente..." value={search} onChange={e=>{setSearch(e.target.value);setSelId('');}}
                style={{paddingLeft:34}} />
            </div>
            {selId&&<span style={{fontSize:12,color:'var(--teal)',fontWeight:600}}>Préstamo #{selId} seleccionado</span>}
          </div>
          {/* Results dropdown when searching */}
          {search.trim()&&!selId&&(
            <div style={{border:'1px solid var(--border)',borderRadius:6,overflow:'hidden',maxWidth:480}}>
              {filtered.length===0&&<div style={{padding:'10px 14px',color:'var(--grey)',fontSize:13}}>Sin resultados</div>}
              {filtered.map(l=>{
                const est=getEstPrestamo(sched.filter(r=>r.prestamo_id===l.id));
                return<div key={l.id} onClick={()=>selectLoan(l)}
                  style={{padding:'9px 14px',cursor:'pointer',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--white)'}}
                  onMouseEnter={e=>e.currentTarget.style.background='var(--alt)'}
                  onMouseLeave={e=>e.currentTarget.style.background='var(--white)'}>
                  <div>
                    <span style={{fontWeight:700,color:'var(--dark)',marginRight:8}}>#{l.id}</span>
                    <span style={{fontWeight:600}}>{l.cliente}</span>
                    <span style={{color:'var(--grey)',fontSize:12,marginLeft:8}}>{fmt(l.monto)} · {l.tipo}</span>
                  </div>
                  <Badge s={est}/>
                </div>;
              })}
            </div>
          )}
        </div>
      </div>

      {/* CUOTAS TABLE */}
      {loan&&pendientes.length===0&&<div className="card" style={{padding:18,color:'var(--green)',fontWeight:600}}>✓ Todas las cuotas de {loan.cliente} están al día</div>}
      {loan&&pendientes.length>0&&(
        <div className="card" style={{marginBottom:13}}>
          <div className="c-hd" style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}><div className="c-dot"/><div className="c-hd-t">Cuotas pendientes — {loan.cliente}</div></div>
              <button className="btn-ol btn-sm" style={{fontSize:11,marginRight:8}} onClick={agregarCuotaExtra}>
                + Cuota extra (solo interés)
              </button>
            </div>
          <div className="tbl-wrap"><table>
            <thead><tr><th>#</th><th>Fecha</th><th>Cuota base</th><th>Mora</th><th>Total</th><th>Estado</th><th>Acción</th></tr></thead>
            <tbody>{pendientes.map((r,idx)=>{
              const est=getEst(r);
              // Cuota extra = capital_cuota=0 Y n_cuota > cuotas originales del préstamo
              const esExtra=N(r.capital_cuota)===0&&loan&&r.n_cuota>N(loan.cuotas);
              return<tr key={r.id} style={{background:selRow?.id===r.id?'#e8f5ee':esExtra?'#f0f7ff':undefined}}>
                <td style={{fontWeight:700,color:'var(--dark)'}}>
                  {r.n_cuota}
                  {esExtra&&<span style={{fontSize:9,background:'#3b82f6',color:'#fff',borderRadius:3,padding:'1px 5px',marginLeft:5,fontWeight:600}}>EXTRA</span>}
                </td>
                <td style={{color:est==='Vencido'?'var(--red)':undefined,fontWeight:est==='Vencido'?600:undefined,fontSize:12}}>{fmtD(r.fecha_vence)}</td>
                <td>{fmt(r.cuota_base)}</td>
                <td style={{color:'var(--red)'}}>{r.mora?fmt(r.mora):''}</td>
                <td style={{fontWeight:700}}>{fmt(N(r.cuota_base)+N(r.mora||0))}</td>
                <td><Badge s={est}/></td>
                <td style={{display:'flex',gap:5,alignItems:'center'}}>
                  <button className="btn btn-sm" onClick={()=>{setSelRow(r);setTipo('NORMAL');setMonto(String(parseFloat(N(r.cuota_base).toFixed(2))));setMora(r.mora?String(N(r.mora)):'');}}
>Seleccionar</button>
                  {esExtra&&<button className="btn-del" title="Eliminar cuota extra" onClick={()=>eliminarCuotaExtra(r)}>×</button>}
                </td>
              </tr>;
            })}</tbody>
          </table></div>
        </div>
      )}

      {/* PAYMENT FORM */}
      {selRow&&(
        <div className="card">
          <div className="c-hd"><div className="c-dot"/><div className="c-hd-t">Registrar pago — Cuota {selRow.n_cuota} · {loan?.cliente}</div></div>
          <div className="c-bd" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <div>
              <span className="lbl">Monto a pagar *</span>
              <input className="inp" type="number" value={monto} onChange={e=>setMonto(e.target.value)} placeholder="0.00"/>
            </div>
            <div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                <span className="lbl" style={{marginBottom:0}}>Mora</span>
                <label style={{display:'flex',alignItems:'center',gap:5,fontSize:12,cursor:'pointer'}}>
                  <input type="checkbox" checked={aplicarMora}
                    onChange={e=>{
                      setAplicarMora(e.target.checked);
                      if(e.target.checked&&selRow){
                        const hoy=new Date();hoy.setHours(0,0,0,0);
                        const loan2=loans.find(l=>Number(l.id)===Number(selRow.prestamo_id));
                        const intMensual=loan2?N(loan2.monto)*N(loan2.tasa):N(selRow.interes_cuota);
                        const moraDiaria=intMensual/30;
                        // Si es cancelación total: suma mora de TODAS las cuotas vencidas del préstamo
                        if(tipo==='CANCELAR PRÉSTAMO'&&loan2){
                          const vencidas=loanRows.filter(r=>!['Pagado','Adelantado','Solo int.','Parcial'].includes(getEst(r))&&new Date(r.fecha_vence+'T00:00:00')<hoy);
                          const totalMora=vencidas.reduce((acc,r)=>{
                            const dias=Math.max(0,Math.floor((hoy-new Date(r.fecha_vence+'T00:00:00'))/(1000*60*60*24)));
                            return acc+Math.ceil(moraDiaria*dias);
                          },0);
                          setMora(totalMora>0?String(totalMora):'0');
                        } else {
                          const fv=new Date(selRow.fecha_vence+'T00:00:00');
                          const dias=Math.max(0,Math.floor((hoy-fv)/(1000*60*60*24)));
                          const moraCalc=Math.ceil(moraDiaria*dias);
                          setMora(moraCalc>0?String(moraCalc):'0');
                        }
                      }else{setMora('');}
                    }}
                    style={{width:14,height:14,accentColor:'var(--teal)',cursor:'pointer'}}/>
                  Aplicar mora
                </label>
              </div>
              {aplicarMora&&(
                <div>
                  <input className="inp" type="number" value={mora} onChange={e=>setMora(e.target.value)} placeholder="0.00"/>
                  {selRow&&(()=>{
                    const fv=new Date(selRow.fecha_vence+'T00:00:00');
                    const hoy=new Date();hoy.setHours(0,0,0,0);
                    const dias=Math.max(0,Math.floor((hoy-fv)/(1000*60*60*24)));
                    const loan2=loans.find(l=>Number(l.id)===Number(selRow.prestamo_id));
                    const intMensual=loan2?N(loan2.monto)*N(loan2.tasa):N(selRow.interes_cuota);
                    return dias>0?(<div style={{fontSize:11,color:'var(--grey)',marginTop:3}}>{dias} día{dias!==1?'s':''} × S/ {Math.ceil(intMensual/30)}/día = <strong>S/ {Math.ceil(intMensual/30*dias)}</strong></div>):(<div style={{fontSize:11,color:'var(--grey)',marginTop:3}}>Cuota no vencida — ingresa mora manualmente si aplica</div>);
                  })()}
                </div>
              )}
            </div>
            <div>
              <span className="lbl">Tipo de pago</span>
              <select className="inp" value={tipo} onChange={e=>{
                const t=e.target.value;
                setTipo(t);
                if(!selRow)return;
                if(t==='NORMAL')setMonto(String(parseFloat(N(selRow.cuota_base).toFixed(2))));
                else if(t==='SOLO INTERES')setMonto(String(parseFloat(N(selRow.interes_cuota).toFixed(2))));
                else if(t==='PAGO ADELANTADO')setMonto(String(parseFloat(getSaldo(selRow).toFixed(2))));
                else if(t==='CANCELAR PRÉSTAMO'){
                  // Sumar saldo de TODAS las cuotas (Solo int. → devuelve capital diferido)
                  const allRows=sched.filter(r=>Number(r.prestamo_id)===Number(selRow.prestamo_id));
                  const totalSaldo=allRows.reduce((a,r)=>a+getSaldo(r),0);
                  setMonto(String(parseFloat(totalSaldo.toFixed(2))));
                }
              }}>
                {['NORMAL','PARCIAL','SOLO INTERES','PAGO ADELANTADO','CANCELAR PRÉSTAMO'].map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div style={{gridColumn:'1/-1',background:'var(--alt)',borderRadius:6,padding:'8px 12px',fontSize:11.5,color:'var(--grey)',border:'1px solid var(--border)'}}>
              {tipo==='NORMAL'&&<span>✓ <b>Pago normal</b> — cuota completa. Si hay mora por atraso, agrégala en el campo Mora.</span>}
              {tipo==='PARCIAL'&&<span>⚡ <b>Abono parcial</b> — la cuota quedará con saldo pendiente hasta completarla.</span>}
              {tipo==='SOLO INTERES'&&<span>ℹ <b>Solo interés</b> — solo se cobra el interés. El capital queda diferido. Usar "Cancelar préstamo" al final para saldar todo el capital acumulado.</span>}
              {tipo==='PAGO ADELANTADO'&&<span>⏩ <b>Pago adelantado</b> — cancela esta cuota antes de su vencimiento.</span>}
              {tipo==='CANCELAR PRÉSTAMO'&&selRow&&(()=>{
                const allRowsC=sched.filter(r=>Number(r.prestamo_id)===Number(selRow.prestamo_id));
                const capDiferido=allRowsC.filter(r=>getEst(r)==='Solo int.').reduce((a,r)=>a+N(r.capital_cuota),0);
                const capPend=allRowsC.filter(r=>!['Pagado','Adelantado','Solo int.'].includes(getEst(r))).reduce((a,r)=>a+N(r.capital_cuota),0);
                const intPend=allRowsC.filter(r=>!['Pagado','Adelantado','Solo int.'].includes(getEst(r))).reduce((a,r)=>a+N(r.interes_cuota),0);
                const total=capDiferido+capPend+intPend;
                return(
                  <div>
                    <div style={{fontWeight:700,color:'#1B4F45',marginBottom:5}}>🔒 <b>Cancelar préstamo</b> — desglose del monto:</div>
                    {capDiferido>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:11.5,color:'#555',padding:'2px 0'}}>
                      <span>• Capital diferido (cuotas Solo int.)</span><span style={{fontWeight:700,color:'#a0620a'}}>{fmt(capDiferido)}</span>
                    </div>}
                    {capPend>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:11.5,color:'#555',padding:'2px 0'}}>
                      <span>• Capital de cuotas pendientes</span><span style={{fontWeight:700}}>{fmt(capPend)}</span>
                    </div>}
                    {intPend>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:11.5,color:'#555',padding:'2px 0'}}>
                      <span>• Interés de cuotas pendientes</span><span style={{fontWeight:700}}>{fmt(intPend)}</span>
                    </div>}
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:12,fontWeight:700,color:'#1B4F45',borderTop:'1px solid #d0ddd0',marginTop:4,paddingTop:4}}>
                      <span>Total a cobrar</span><span>{fmt(total)}</span>
                    </div>
                  </div>
                );
              })()}
            </div>
            <div>
              <span className="lbl">Fecha de pago</span>
              <DatePicker value={fecha} onChange={setFecha}/>
            </div>
          </div>
          {err&&<div style={{padding:'8px 18px',color:'var(--red)',fontSize:13,fontWeight:600}}>{err}</div>}
          <div className="c-bd" style={{paddingTop:0,display:'flex',gap:10}}>
            <button className="btn" disabled={saving} onClick={pagar}>{saving?'Guardando...':'Registrar pago'}</button>
            <button className="btn-ol" onClick={()=>{setSelRow(null);setMonto('');setMora('');}}>Cancelar</button>
          </div>
        </div>
      )}
    </div>
  );
}


/* ══ AUDITORÍA & CUADRE ════════════════════════════════════════ */
function Auditoria({loans,sched}){
  if(!Array.isArray(loans)||!Array.isArray(sched))return<div style={{padding:30,textAlign:'center',color:'var(--grey)'}}>Cargando...</div>;
  const D='#1B4F45';const T='#2d8a7a';const T2='#379F8B';

  // ── Fórmula CORRECTA por préstamo ────────────────────────────
  // Para CANCELADOS: expected = loan.monto + TODAS las interes_cuota + deg + go + mora
  //   Esto es correcto porque el cliente pagó:
  //     N × interes (cuotas Solo int.) + (capitals + ultimo_interes) en cancelación
  //   = N×interes + loan.monto + ultimo_interes = loan.monto + (N+1)×interes = loan.monto + sum(interes)
  // Para ACTIVOS: formula por cuota (Pagado→capital+interes, Solo int.→solo interes)
  function calcLoan(l){
    const cuotas=sched.filter(r=>Number(r.prestamo_id)===Number(l.id));
    const est=getEstPrestamo(cuotas);
    const bd=cuotas.reduce((a,r)=>a+N(r.monto_pagado||0),0);
    let expected;
    if(est==='CANCELADO'){
      // Fórmula nivel préstamo: capital original + TODOS los intereses del cronograma + deg + go + mora
      const totInt=cuotas.reduce((a,r)=>a+N(r.interes_cuota),0);
      const totDeg=cuotas.reduce((a,r)=>a+N(r.desgravamen),0);
      const totGO=cuotas.reduce((a,r)=>a+N(r.gasto_operativo||0),0);
      const totMora=cuotas.reduce((a,r)=>a+N(r.mora||0),0);
      expected=N(l.monto)+totInt+totDeg+totGO+totMora;
    }else{
      // Fórmula por cuota para préstamos activos
      const pgdas=cuotas.filter(r=>['Pagado','Adelantado'].includes(getEst(r)));
      const conPago=cuotas.filter(r=>N(r.monto_pagado)>0);
      const capRec=pgdas.reduce((a,r)=>a+N(r.capital_cuota),0);
      const intCob=conPago.reduce((a,r)=>a+N(r.interes_cuota),0);
      const degCob=pgdas.reduce((a,r)=>a+N(r.desgravamen),0);
      const goCob=pgdas.reduce((a,r)=>a+N(r.gasto_operativo||0),0);
      const moraCob=cuotas.filter(r=>N(r.mora)>0).reduce((a,r)=>a+N(r.mora),0);
      expected=capRec+intCob+degCob+goCob+moraCob;
    }
    const diff=Math.round((bd-expected)*100)/100;
    return{est,expected,bd,diff,cuotas};
  }

  // ── KPIs globales — misma fórmula que Dashboard ──────────────
  const totPrestado=loans.reduce((a,l)=>a+N(l.monto),0);
  const {total:totCapRecuperado,capCanc:capCancelados,capActivo:capActivosPagado,cancelSet:canceladosIds}=calcCapRecuperado(loans,sched);
  const cuotasConPago=sched.filter(r=>N(r.monto_pagado)>0);
  const totBD=cuotasConPago.reduce((a,r)=>a+N(r.monto_pagado),0);
  const totMoraCobrada=sched.filter(r=>N(r.mora)>0).reduce((a,r)=>a+N(r.mora),0);
  const capitalEnCalle=Math.max(0,totPrestado-totCapRecuperado);

    // ── Análisis por préstamo ──────────────────────────────────
  const analisis=loans.map(l=>({l,...calcLoan(l)}));
  const conError=analisis.filter(x=>Math.abs(x.diff)>=1);
  const cuadra=conError.length===0;

  const kpis=[
    {l:'Capital prestado',            v:fmt(totPrestado),     c:D,           bg:'var(--light)'},
    {l:'Cap. recup. — cancelados',    v:fmt(capCancelados),   c:T,           bg:'#e4f4f0'},
    {l:'Cap. recup. — activos parc.', v:fmt(capActivosPagado),c:'#2356a0',  bg:'#e8f0fb'},
    {l:'Capital recuperado TOTAL',    v:fmt(totCapRecuperado),c:T,           bg:'#dff2e8'},
    {l:'Capital en calle',            v:fmt(capitalEnCalle),  c:'#a0620a',   bg:'#fef3e2'},
    {l:'Total cobrado (BD)',          v:fmt(totBD),            c:cuadra?T:'#b52a2a',bg:cuadra?'#dff2e8':'#fde8e8'},
    {l:'Mora cobrada',                v:fmt(totMoraCobrada),  c:'#b52a2a',   bg:'#fde8e8'},
    {l:'Préstamos c/error',           v:conError.length+' préstamos',c:cuadra?T:'#b52a2a',bg:cuadra?'#dff2e8':'#fde8e8'},
  ];

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div>
        <div className="pg-ey">Control interno</div>
        <div className="pg-ti">Auditoría <span style={{color:T,fontWeight:400}}>&amp; Cuadre</span></div>
        <div className="pg-su">Reconciliación financiera en tiempo real — detecta montos incorrectamente registrados</div>
      </div>

      {/* Banner de estado */}
      <div style={{background:cuadra?'#dff2e8':'#fde8e8',border:'2px solid '+(cuadra?'#7dbfa0':'#f5a5a5'),borderRadius:10,padding:'14px 20px',marginBottom:14,display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
        <span style={{fontSize:28,flexShrink:0}}>{cuadra?'✅':'🔴'}</span>
        <div style={{flex:1,minWidth:180}}>
          <div style={{fontWeight:700,fontSize:14,color:cuadra?'#1e6e3a':'#8b1a1a'}}>
            {cuadra?'Todos los registros cuadran correctamente':'Se detectaron montos inconsistentes'}
          </div>
          <div style={{fontSize:11.5,color:cuadra?'#5a8a6a':'#c07070',marginTop:2}}>
            {cuadra
              ?'Ningún préstamo tiene inconsistencias — todo en orden'
              :conError.length+' préstamo(s) tienen monto_pagado diferente al esperado'}
          </div>
        </div>
        {!cuadra&&<div style={{textAlign:'center',flexShrink:0,background:'rgba(181,42,42,.1)',borderRadius:8,padding:'8px 16px'}}>
          <div style={{fontSize:9,color:'#c07070',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em'}}>Diferencia total</div>
          <div style={{fontSize:22,fontWeight:700,color:'#b52a2a',lineHeight:1}}>S/ {Math.abs(conError.reduce((a,x)=>a+x.diff,0)).toFixed(0)}</div>
        </div>}
      </div>

      {/* KPI strip */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(145px,1fr))',gap:9,marginBottom:14}}>
        {kpis.map((k,i)=>(
          <div key={i} style={{background:k.bg,borderRadius:6,padding:'11px 13px',border:'1px solid rgba(0,0,0,.06)'}}>
            <div style={{fontSize:9,fontWeight:700,color:k.c,textTransform:'uppercase',letterSpacing:'.08em',opacity:.7,marginBottom:3}}>{k.l}</div>
            <div style={{fontSize:15,fontWeight:700,color:k.c,letterSpacing:'-.02em'}}>{k.v}</div>
          </div>
        ))}
      </div>

      {/* Fórmula explicada */}
      <div className="card" style={{marginBottom:12}}>
        <div className="c-hd"><div className="c-dot"/><div className="c-hd-t">Lógica de reconciliación</div></div>
        <div className="c-bd" style={{fontSize:12.5,color:'#555',lineHeight:1.7}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,flexWrap:'wrap'}}>
            <div style={{background:'#f0f7ff',borderRadius:7,padding:'10px 13px',border:'1px solid #c5d9f5'}}>
              <div style={{fontWeight:700,color:'#1565c0',marginBottom:5,fontSize:12}}>🔒 Préstamos CANCELADOS</div>
              <div><b>Esperado</b> = Capital original + Σ(intereses de TODAS las cuotas) + desgravamen + mora</div>
              <div style={{marginTop:4,color:'#888',fontSize:11}}>Las cuotas "Solo interés" ya cobraron su interés → el monto de cancelación cubre el capital total. La suma debe coincidir.</div>
            </div>
            <div style={{background:'#f0f9f4',borderRadius:7,padding:'10px 13px',border:'1px solid #b0d8c0'}}>
              <div style={{fontWeight:700,color:'#1e6e3a',marginBottom:5,fontSize:12}}>⏳ Préstamos ACTIVOS</div>
              <div><b>Esperado</b> = Σ(capital de cuotas Pagado/Adelantado) + Σ(interés de cuotas con pago) + mora</div>
              <div style={{marginTop:4,color:'#888',fontSize:11}}>Cada cuota pagada contribuye su capital + interés. Las cuotas "Solo int." contribuyen solo su interés.</div>
            </div>
          </div>
        </div>
      </div>

      {/* Tabla de errores */}
      {conError.length>0&&(
        <div className="card" style={{marginBottom:12}}>
          <div className="c-hd">
            <div className="c-dot" style={{background:'var(--red)'}}/>
            <div className="c-hd-t" style={{color:'var(--red)'}}>Préstamos con inconsistencia ({conError.length})</div>
          </div>
          <div style={{padding:'10px 16px',background:'#fff9f0',borderBottom:'1px solid var(--border)',fontSize:12,color:'#92400e'}}>
            ⚠ Para corregir: busca la cuota de cancelación de este préstamo en el Cronograma y verifica que el <b>monto_pagado</b> sea exactamente: <i>Capital original + Σ intereses de todas las cuotas en el cronograma</i>
          </div>
          <div className="tbl-wrap"><table>
            <thead><tr>
              <th>ID</th><th>Cliente</th><th>Estado</th>
              <th style={{textAlign:'right'}}>Esperado</th>
              <th style={{textAlign:'right'}}>En BD</th>
              <th style={{textAlign:'right'}}>Diferencia</th>
              <th>¿Qué pasó?</th>
            </tr></thead>
            <tbody>
              {conError.map(({l,est,expected,bd,diff})=>{
                const signo=diff>0?'+':'';
                const esExceso=diff>0;
                return(
                  <tr key={l.id} style={{background:'#fff8f8'}}>
                    <td style={{fontWeight:700,color:'var(--dark)',fontSize:11}}>#{l.id}</td>
                    <td style={{fontWeight:600}}>{l.cliente}</td>
                    <td><Badge s={est}/></td>
                    <td style={{textAlign:'right',fontWeight:700,color:'#1B4F45'}}>{fmt(expected)}</td>
                    <td style={{textAlign:'right',fontWeight:700,color:'#b52a2a'}}>{fmt(bd)}</td>
                    <td style={{textAlign:'right',fontWeight:700,color:'#b52a2a'}}>{signo}S/ {Math.abs(diff).toFixed(2)}</td>
                    <td style={{fontSize:11,color:'#888',maxWidth:180}}>
                      {esExceso
                        ?'Se registró S/ '+Math.abs(diff).toFixed(0)+' de más en monto_pagado'
                        :'Falta registrar S/ '+Math.abs(diff).toFixed(0)+' en monto_pagado'}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table></div>
        </div>
      )}

      {/* Todo OK */}
      {cuadra&&loans.length>0&&(
        <div style={{textAlign:'center',padding:'34px 0'}}>
          <div style={{fontSize:38,marginBottom:8}}>✅</div>
          <div style={{fontWeight:700,fontSize:15,color:T,marginBottom:4}}>Todo cuadra perfectamente</div>
          <div style={{fontSize:12.5,color:'var(--grey)'}}>Todos los {loans.length} préstamos tienen sus montos consistentes.</div>
        </div>
      )}
      {loans.length===0&&(
        <div style={{textAlign:'center',padding:'34px 0',color:'var(--grey)'}}>
          <div style={{fontSize:34,marginBottom:8}}>📋</div>
          <div style={{fontWeight:700}}>Sin préstamos registrados</div>
        </div>
      )}
    </div>
  );
}

/* ══ EXPORTAR EXCEL ════════════════════════════════════════════ */
function ExportarExcel({loans,sched}){
  const D='#1B4F45'; const T='#2d8a7a';

  function exportar(){
    if(!window.XLSX){alert('XLSX no disponible');return;}
    const XL=window.XLSX;
    const wb=XL.utils.book_new();

    // ─ HOJA 1: PRÉSTAMOS ─────────────────────────────────────────
    const rows=loans.map(l=>{
      const cuotas=sched.filter(r=>Number(r.prestamo_id)===Number(l.id));
      const est=getEstPrestamo(cuotas);
      const cobrado=cuotas.filter(r=>r.monto_pagado).reduce((a,r)=>a+N(r.monto_pagado),0);
      // Para cancelados: saldo=0 siempre (capital 100% recuperado)
      const saldo=est==='CANCELADO'?0:cuotas.reduce((a,r)=>a+getSaldo(r),0);
      const mora=cuotas.reduce((a,r)=>a+N(r.mora||0),0);
      return[l.id,l.cliente,l.garante||'',l.referencia||'',l.cliente_externo||'NO',
        N(l.monto),parseFloat((N(l.tasa)*100).toFixed(2)),l.tipo,l.cuotas,
        fmtD(l.fecha_prestamo),N(l.desgravamen||0),N(l.gasto_operativo||0),
        parseFloat(cobrado.toFixed(2)),parseFloat(saldo.toFixed(2)),parseFloat(mora.toFixed(2)),
        est,l.creado_por_email||''];
    });

    const headers=['ID','Cliente','Garante','Referido por','Cliente externo',
      'Monto (S/.)','Tasa %','Tipo','N° Cuotas','Fecha préstamo',
      'Desgravamen','G. Operativo','Total cobrado','Saldo pendiente','Mora',
      'Estado','Registrado por'];

    const ws=XL.utils.aoa_to_sheet([headers,...rows]);
    ws['!cols']=[{wch:5},{wch:22},{wch:18},{wch:18},{wch:13},{wch:11},{wch:7},{wch:10},{wch:9},{wch:14},{wch:12},{wch:11},{wch:13},{wch:14},{wch:8},{wch:11},{wch:24}];
    ws['!rows']=[{hpt:22},...rows.map(()=>({hpt:17}))];

    // Header style
    const hSt={font:{bold:true,color:{rgb:'FFFFFF'},sz:10},fill:{fgColor:{rgb:'1B4F45'}},alignment:{horizontal:'center',vertical:'center'},border:{bottom:{style:'medium',color:{rgb:'2d8a7a'}}}};
    headers.forEach((_,ci)=>{
      const ref=XL.utils.encode_cell({r:0,c:ci});
      if(ws[ref])ws[ref].s=hSt;
    });

    // Row styles with estado colors
    const estBg={'ACTIVO':'C6EFCE','EN CURSO':'BDD7EE','VENCIDO':'FFC7CE','CANCELADO':'EDEDED'};
    const estFg={'ACTIVO':'276221','EN CURSO':'1F4E79','VENCIDO':'9C0006','CANCELADO':'595959'};
    rows.forEach((row,ri)=>{
      const bg=ri%2===0?'FFFFFF':'F0F7F5';
      const est=row[15];
      row.forEach((_,ci)=>{
        const ref=XL.utils.encode_cell({r:ri+1,c:ci});
        if(!ws[ref])return;
        const isEst=ci===15;
        const isNum=typeof row[ci]==='number';
        const isName=ci===1;
        ws[ref].s={
          fill:{fgColor:{rgb:isEst?(estBg[est]||'EDEDED'):bg}},
          font:{sz:10,bold:isName||isEst,color:{rgb:isEst?(estFg[est]||'595959'):(isName?'1B4F45':'333333')}},
          alignment:{horizontal:isNum?'right':(ci===0?'center':'left'),vertical:'center',wrapText:false},
          border:{bottom:{style:'thin',color:{rgb:'E0EBE0'}},right:{style:'thin',color:{rgb:'E8EEE8'}}}
        };
      });
    });

    // Totals row
    const totMonto=rows.reduce((a,r)=>a+r[5],0);
    const totCob=rows.reduce((a,r)=>a+r[12],0);
    const totSaldo=rows.reduce((a,r)=>a+r[13],0);
    const totMora=rows.reduce((a,r)=>a+r[14],0);
    const totRow=['','TOTALES','','','',parseFloat(totMonto.toFixed(2)),'','','','','','',parseFloat(totCob.toFixed(2)),parseFloat(totSaldo.toFixed(2)),parseFloat(totMora.toFixed(2)),'',''];
    XL.utils.sheet_add_aoa(ws,[totRow],{origin:-1});
    const lastR=rows.length+1;
    totRow.forEach((v,ci)=>{
      const ref=XL.utils.encode_cell({r:lastR,c:ci});
      if(!ws[ref])return;
      ws[ref].s={fill:{fgColor:{rgb:'1B4F45'}},font:{bold:true,color:{rgb:typeof v==='number'?'90D4C0':'FFFFFF'},sz:10},alignment:{horizontal:typeof v==='number'?'right':(ci===1?'left':'center'),vertical:'center'}};
    });
    ws['!rows'].push({hpt:20});

    // ─ HOJA 2: CRONOGRAMA ────────────────────────────────────────
    const cronoHeaders=['Préstamo ID','Cliente','N° Cuota','Fecha vence','Capital','Interés','Desgravamen','G. Operativo','Cuota base','Mora','Tipo pago','Monto pagado','Fecha pago','Estado','Saldo'];
    const cronoRows=sched.sort((a,b)=>a.prestamo_id-b.prestamo_id||a.n_cuota-b.n_cuota).map(r=>[
      r.prestamo_id,r.cliente,r.n_cuota,fmtD(r.fecha_vence),
      N(r.capital_cuota),N(r.interes_cuota),N(r.desgravamen),N(r.gasto_operativo||0),N(r.cuota_base),
      N(r.mora||0),r.tipo_pago||'',r.monto_pagado?N(r.monto_pagado):'',
      r.fecha_pago?fmtD(r.fecha_pago):'',getEst(r),parseFloat(getSaldo(r).toFixed(2))
    ]);
    const ws2=XL.utils.aoa_to_sheet([cronoHeaders,...cronoRows]);
    ws2['!cols']=[{wch:12},{wch:22},{wch:9},{wch:14},{wch:10},{wch:10},{wch:12},{wch:11},{wch:11},{wch:8},{wch:16},{wch:13},{wch:13},{wch:12},{wch:10}];
    ws2['!rows']=[{hpt:22},...cronoRows.map(()=>({hpt:16}))];
    const hSt2={...hSt,fill:{fgColor:{rgb:'2d8a7a'}}};
    cronoHeaders.forEach((_,ci)=>{const ref=XL.utils.encode_cell({r:0,c:ci});if(ws2[ref])ws2[ref].s=hSt2;});
    const estBg2={'Pagado':'C6EFCE','Adelantado':'C6EFCE','Vencido':'FFC7CE','Pendiente':'BDD7EE','Parcial':'FFEB9C','Solo int.':'E2EFDA'};
    cronoRows.forEach((row,ri)=>{
      const bg=ri%2===0?'FFFFFF':'F5FAF8';
      const est=row[13];
      row.forEach((_,ci)=>{
        const ref=XL.utils.encode_cell({r:ri+1,c:ci});
        if(!ws2[ref])return;
        const isEst=ci===13;
        const isNum=typeof row[ci]==='number';
        ws2[ref].s={
          fill:{fgColor:{rgb:isEst?(estBg2[est]||'F0F0F0'):bg}},
          font:{sz:10,bold:isEst||ci===8,color:{rgb:'333333'}},
          alignment:{horizontal:isNum?'right':(ci<=1||ci===10?'left':'center'),vertical:'center'},
          border:{bottom:{style:'thin',color:{rgb:'E0EBE0'}}}
        };
      });
    });
    XL.utils.book_append_sheet(wb,ws,'Préstamos');
    XL.utils.book_append_sheet(wb,ws2,'Cronograma');

    const fecha=todayStr();
    XL.writeFile(wb,'CreditoSanJuan_'+fecha+'.xlsx');
  }

  const totPres=loans.reduce((a,l)=>a+N(l.monto),0);
  const totCob=sched.filter(r=>r.monto_pagado).reduce((a,r)=>a+N(r.monto_pagado),0);
  const totSaldo=sched.reduce((a,r)=>a+getSaldo(r),0);
  const totMora=sched.reduce((a,r)=>a+N(r.mora||0),0);
  const nActivos=loans.filter(l=>getEstPrestamo(sched.filter(r=>r.prestamo_id===l.id))==='ACTIVO'||getEstPrestamo(sched.filter(r=>r.prestamo_id===l.id))==='EN CURSO').length;

  return(
    <div style={{animation:'fadeIn .3s ease'}}>
      <div><div className="pg-ey">Reportes</div><div className="pg-ti">Exportar datos</div><div className="pg-su">Descarga toda la información en Excel — actualizada en tiempo real</div></div>

      {/* KPI strip */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:10,marginBottom:18}}>
        {[
          {l:'Préstamos',v:loans.length,suf:'total',c:D,bg:'var(--light)'},
          {l:'Activos / en curso',v:nActivos,suf:'préstamos',c:T,bg:'#e4f4f0'},
          {l:'Capital prestado',v:fmt(totPres),c:D,bg:'var(--light)'},
          {l:'Total cobrado',v:fmt(totCob),c:'#1e6e3a',bg:'#dff2e8'},
          {l:'Saldo pendiente',v:fmt(totSaldo),c:'#a0620a',bg:'#fef3e2'},
          {l:'Mora acumulada',v:fmt(totMora),c:'var(--red)',bg:'#fde8e8'},
        ].map((k,i)=>(
          <div key={i} style={{background:k.bg,borderRadius:6,padding:'13px 16px',border:'1px solid rgba(0,0,0,.06)'}}>
            <div style={{fontSize:9.5,fontWeight:700,color:k.c,textTransform:'uppercase',letterSpacing:'.08em',opacity:.7,marginBottom:5}}>{k.l}</div>
            <div style={{fontSize:17,fontWeight:700,color:k.c,letterSpacing:'-.02em'}}>{k.v}</div>
          </div>
        ))}
      </div>

      <div className="card">
        <div className="c-hd"><div className="c-dot"/><div className="c-hd-t">Contenido del archivo</div></div>
        <div className="c-bd">
          <div style={{display:'grid',gap:10,marginBottom:20}}>
            {[
              {icon:'📋',title:'Hoja 1 — Préstamos',cols:'ID · Cliente · Garante · Referido por · Monto · Tasa · Tipo · Cuotas · Fecha · Desgravamen · Cobrado · Saldo · Mora · Estado',n:loans.length+' registros',c:D},
              {icon:'📅',title:'Hoja 2 — Cronograma',cols:'Préstamo ID · Cliente · N° cuota · Fecha vence · Capital · Interés · Cuota base · Mora · Monto pagado · Estado · Saldo',n:sched.length+' cuotas',c:T},
            ].map((h,i)=>(
              <div key={i} style={{display:'flex',gap:14,padding:'12px 16px',background:'var(--alt)',borderRadius:6,border:'1px solid var(--border)',alignItems:'flex-start'}}>
                <span style={{fontSize:20,flexShrink:0,marginTop:1}}>{h.icon}</span>
                <div style={{flex:1}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                    <div style={{fontWeight:700,color:'var(--ink)',fontSize:13}}>{h.title}</div>
                    <span style={{fontSize:11,color:'#fff',background:h.c,borderRadius:4,padding:'2px 9px',fontWeight:600}}>{h.n}</span>
                  </div>
                  <div style={{fontSize:11.5,color:'var(--grey)',lineHeight:1.5}}>{h.cols}</div>
                </div>
              </div>
            ))}
          </div>
          <button className="btn" style={{padding:'12px 28px',fontSize:13.5,display:'flex',alignItems:'center',gap:9}} onClick={exportar} disabled={loans.length===0}>
            <svg viewBox="0 0 24 24" style={{width:15,height:15,stroke:'currentColor',fill:'none',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'}}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Descargar Excel
          </button>
          {loans.length===0&&<div style={{marginTop:9,fontSize:12.5,color:'var(--grey)'}}>No hay datos — registra préstamos primero.</div>}
        </div>
      </div>
    </div>
  );
}


class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  componentDidCatch(e,i){console.error('App crash:',e,i);}
  render(){
    if(this.state.err)return(
      <div style={{padding:24,fontFamily:'monospace',fontSize:13,background:'#fff',minHeight:'100vh'}}>
        <div style={{background:'#fde8e8',border:'2px solid #e74c3c',borderRadius:8,padding:20,maxWidth:700,margin:'40px auto'}}>
          <div style={{fontWeight:700,fontSize:16,color:'#c0392b',marginBottom:12}}>💥 Error — capturado por ErrorBoundary</div>
          <div style={{color:'#333',marginBottom:8}}><b>Mensaje:</b> {this.state.err.message}</div>
          <div style={{color:'#666',fontSize:11,whiteSpace:'pre-wrap',background:'#f8f8f8',padding:10,borderRadius:4}}>{this.state.err.stack}</div>
          <button style={{marginTop:16,padding:'8px 20px',background:'#c0392b',color:'#fff',border:'none',borderRadius:6,cursor:'pointer'}} onClick={()=>this.setState({err:null})}>Reintentar</button>
        </div>
      </div>
    );
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
